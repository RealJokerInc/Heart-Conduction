014 ideal\n      for regular geometries (tissue slabs, rectangular patches), GPU computation, and rapid prototyping.\n      Its limitation is that it <em>requires a structured Cartesian grid</em>. You cannot fit a regular grid\n      to the curved walls of the left ventricle without staircase artifacts at the boundary. For realistic\n      anatomical geometries, use FEM or FVM instead.\n    </p>\n  </div>\n\n  <h3>8.3 &ensp; Finite Element Method (FEM)</h3>\n\n  <h4>Why FEM? The Geometry Problem</h4>\n\n  <p>\n    Real hearts are not rectangular. The left ventricle is a thick-walled ellipsoidal shell with curved\n    boundaries, trabeculations, and papillary muscles. To represent this geometry faithfully, we need\n    meshes made of triangles (2D) or tetrahedra (3D) that can conform to any shape. FDM cannot do this.\n    FEM can.\n  </p>\n\n  <p>\n    The mathematical trick that enables unstructured meshes is a change of perspective. Instead of\n    approximating derivatives pointwise (as FDM does), FEM reformulates the PDE in <em>weak form</em>\n    \u2014 multiplying by a test function and integrating. This seemingly abstract step has a profound\n    practical consequence: it lowers the smoothness requirement on the solution, allowing us to use\n    simple piecewise-linear \"hat functions\" on arbitrary triangulations.\n  </p>\n\n  <h4>Weak Form: What Integration by Parts Really Does</h4>\n\n  <p>\n    Before diving into the math, let us understand the idea in plain language. We want to ask:\n    \"does my approximate solution satisfy the PDE?\" But checking this point-by-point (like FDM does)\n    fails on triangular meshes because our piecewise-linear hat functions have <em>kinks</em> \u2014 the\n    second derivative is undefined at element boundaries. So instead, we check the PDE\n    <em>on average</em>, by multiplying both sides by a smooth \"test function\" $v$ and integrating over\n    the whole domain. If the average checks out for <em>every</em> possible test function, the\n    solution must be correct. This is the weak form.\n  </p>\n\n  <p>\n    The magic trick is <em>integration by parts</em> (the multidimensional version of the product rule\n    from calculus). It shifts one derivative from $V_m$ onto the test function $v$, so we only need\n    first derivatives of both \u2014 and first derivatives of our hat functions are perfectly well-defined\n    (they are just constant slopes on each triangle). This is why FEM can use simple piecewise-linear\n    approximations on arbitrary meshes, while FDM needs smooth grids.\n  </p>\n\n  <p>\n    Now let us see this concretely. Start with the monodomain diffusion term. Multiply by a test\n    function $v$, integrate over the domain $\\Omega$, and apply integration by parts (the divergence theorem):\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\underbrace{\\int_\\Omega \\chi C_m \\frac{\\partial V_m}{\\partial t}\\,v\\,dx}_{\\text{time derivative}} + \\underbrace{\\int_\\Omega \\nabla V_m \\cdot (\\mathbf{D}\\,\\nabla v)\\,dx}_{\\text{diffusion (after IBP)}} = \\underbrace{-\\int_\\Omega \\chi\\,I_{\\text{ion}}\\,v\\,dx}_{\\text{ionic current}} + \\underbrace{\\int_\\Omega I_{\\text{stim}}\\,v\\,dx}_{\\text{stimulus}}$$\n  </div>\n\n  <p>\n    The crucial step is the integration by parts on the diffusion term. The original PDE contains\n    $\\nabla \\cdot (\\mathbf{D}\\,\\nabla V_m)$ \u2014 a second derivative of $V_m$. After integration by\n    parts, we have $\\nabla V_m \\cdot (\\mathbf{D}\\,\\nabla v)$ \u2014 only <em>first</em> derivatives of\n    both $V_m$ and $v$. The boundary integral vanishes because of the no-flux condition (physically:\n    no current flows out of the heart). This matters because first derivatives of piecewise-linear\n    functions are well-defined (they are piecewise constant), while second derivatives are not.\n  </p>\n\n  <h4>From Integrals to Matrices</h4>\n\n  <p>\n    Expand the voltage as $V_m(\\mathbf{x}, t) = \\sum_j V_j(t)\\,\\varphi_j(\\mathbf{x})$, where each\n    $\\varphi_j$ is a \"hat function\" that equals 1 at node $j$ and 0 at all other nodes. Choose\n    $v = \\varphi_i$ for each node $i$. The integrals become matrix entries:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(8.1)</span>\n    $$\\mathbf{M}\\,\\dot{\\mathbf{V}}_m + \\mathbf{K}\\,\\mathbf{V}_m = \\mathbf{F}$$\n  </div>\n\n  <p>\n    with two matrices and one vector:\n  </p>\n\n  <p>\n    <strong>Mass matrix</strong> $M_{ij} = \\int_\\Omega \\chi C_m\\,\\varphi_i\\,\\varphi_j\\,dx$ \u2014 comes from\n    the time derivative. Physically, it weights each node by the \"volume\" it represents. It is symmetric,\n    positive definite, and sparse.\n  </p>\n\n  <p>\n    <strong>Stiffness matrix</strong> $K_{ij} = \\int_\\Omega \\nabla\\varphi_i \\cdot (\\mathbf{D}\\,\\nabla\\varphi_j)\\,dx$\n    \u2014 encodes the diffusive coupling. This is the FEM analogue of the FDM matrix we built above.\n    It is symmetric, positive semi-definite (row sums = 0 under Neumann BC), and sparse.\n  </p>\n\n  <p>\n    <strong>Load vector</strong> $F_i = -\\int_\\Omega \\chi\\,I_{\\text{ion}}\\,\\varphi_i\\,dx + \\int_\\Omega I_{\\text{stim}}\\,\\varphi_i\\,dx$\n    \u2014 contains the ionic current and stimulus. This is where Chapters 5\u20136 connect: at each node,\n    TTP06 or ORd evaluates $I_{\\text{ion}}$, which becomes an entry in $\\mathbf{F}$.\n  </p>\n\n  <h4>Worked Example: 4-Node, 2-Triangle Mesh</h4>\n\n  <p>\n    Consider the simplest 2D mesh: a unit square $[0,h] \\times [0,h]$ divided into two triangles.\n    We use isotropic conductivity $d$ and spacing $h$.\n  </p>\n\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 300 260\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:260px;\">\n      <!-- Triangle 1 (lower-right) -->\n      <polygon points=\"40,200 220,200 220,40\" fill=\"#eef0f8\" stroke=\"#0f3460\" stroke-width=\"1.5\"/>\n      <!-- Triangle 2 (upper-left) -->\n      <polygon points=\"40,200 220,40 40,40\" fill=\"#e8f5e9\" stroke=\"#2d6a4f\" stroke-width=\"1.5\"/>\n      <!-- Diagonal -->\n      <line x1=\"40\" y1=\"200\" x2=\"220\" y2=\"40\" stroke=\"#16213e\" stroke-width=\"1.5\"/>\n      <!-- Nodes -->\n      <circle cx=\"40\" cy=\"200\" r=\"8\" fill=\"#e94560\"/>\n      <circle cx=\"220\" cy=\"200\" r=\"8\" fill=\"#e94560\"/>\n      <circle cx=\"220\" cy=\"40\" r=\"8\" fill=\"#e94560\"/>\n      <circle cx=\"40\" cy=\"40\" r=\"8\" fill=\"#e94560\"/>\n      <!-- Node labels -->\n      <text x=\"22\" y=\"215\" font-family=\"Source Code Pro,monospace\" font-size=\"13\" fill=\"#16213e\" font-weight=\"700\">1</text>\n      <text x=\"232\" y=\"215\" font-family=\"Source Code Pro,monospace\" font-size=\"13\" fill=\"#16213e\" font-weight=\"700\">2</text>\n      <text x=\"232\" y=\"38\" font-family=\"Source Code Pro,monospace\" font-size=\"13\" fill=\"#16213e\" font-weight=\"700\">3</text>\n      <text x=\"22\" y=\"38\" font-family=\"Source Code Pro,monospace\" font-size=\"13\" fill=\"#16213e\" font-weight=\"700\">4</text>\n      <!-- Coordinates -->\n      <text x=\"40\" y=\"235\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"9\" fill=\"#888\">(0,0)</text>\n      <text x=\"220\" y=\"235\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"9\" fill=\"#888\">(h,0)</text>\n      <text x=\"220\" y=\"28\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"9\" fill=\"#888\">(h,h)</text>\n      <text x=\"40\" y=\"28\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"9\" fill=\"#888\">(0,h)</text>\n      <!-- Element labels -->\n      <text x=\"170\" y=\"170\" font-family=\"EB Garamond,serif\" font-size=\"14\" fill=\"#0f3460\" font-style=\"italic\">T1</text>\n      <text x=\"80\" y=\"90\" font-family=\"EB Garamond,serif\" font-size=\"14\" fill=\"#2d6a4f\" font-style=\"italic\">T2</text>\n    </svg>\n    <div class=\"figure-caption\"><span class=\"figure-label\">Figure 7.3.</span> A minimal 2D FEM mesh: 4 nodes, 2 triangles ($T_1$ with nodes 1-2-3, $T_2$ with nodes 1-3-4). The diagonal splits the square into two right triangles of area $h^2/2$.</div>\n  </div>\n\n  <p>\n    FEM assembles the global stiffness matrix element-by-element. For each triangle, we compute a\n    small <em>element stiffness matrix</em> (3\u00d73 for a triangle with 3 nodes), then \"scatter\" its\n    entries into the correct positions in the global matrix.\n  </p>\n\n  <p>\n    For a triangle with vertices at $\\mathbf{x}_a$, $\\mathbf{x}_b$, $\\mathbf{x}_c$ and area $A$,\n    the gradients of the linear basis functions are constant vectors:\n    $\\nabla\\varphi_a = \\tfrac{1}{2A}(y_b - y_c,\\; x_c - x_b)^T$ (and cyclic permutations).\n    The element stiffness entry is:\n  </p>\n\n  <div class=\"equation-block\">\n    $$K^e_{ab} = A\\,\\nabla\\varphi_a \\cdot (d\\,\\nabla\\varphi_b) = \\frac{d}{4A}\\bigl[(y_b - y_c)(y_c - y_a) + (x_c - x_b)(x_a - x_c)\\bigr]$$\n  </div>\n\n  <p>\n    <strong>Triangle $T_1$ (nodes 1, 2, 3)</strong> with vertices $(0,0)$, $(h,0)$, $(h,h)$, area $= h^2/2$:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\mathbf{K}^{T_1} = \\frac{d}{2}\\begin{pmatrix} 1 & -1 & 0 \\\\ -1 & 2 & -1 \\\\ 0 & -1 & 1 \\end{pmatrix} \\qquad \\text{(for nodes 1, 2, 3)}$$\n  </div>\n\n  <p>\n    <strong>Triangle $T_2$ (nodes 1, 3, 4)</strong> with vertices $(0,0)$, $(h,h)$, $(0,h)$, area $= h^2/2$:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\mathbf{K}^{T_2} = \\frac{d}{2}\\begin{pmatrix} 1 & 0 & -1 \\\\ 0 & 1 & -1 \\\\ -1 & -1 & 2 \\end{pmatrix} \\qquad \\text{(for nodes 1, 3, 4)}$$\n  </div>\n\n  <p>\n    <strong>Global assembly:</strong> Add element matrices into the global $4 \\times 4$ matrix. Node 1\n    appears in both triangles, so its diagonal entry gets contributions from both. Node 2 appears only\n    in $T_1$; node 4 only in $T_2$. The result:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\mathbf{K}_{\\text{global}} = \\frac{d}{2}\\begin{pmatrix} 2 & -1 & 0 & -1 \\\\ -1 & 2 & -1 & 0 \\\\ 0 & -1 & 2 & -1 \\\\ -1 & 0 & -1 & 2 \\end{pmatrix}$$\n  </div>\n\n  <p>\n    Check: every row sums to zero (conservation under Neumann BC). The matrix is symmetric\n    and positive semi-definite with a single zero eigenvalue (the constant mode). Physically,\n    each node couples to its connected neighbors with equal weight $-d/2$ \u2014 which makes sense\n    because the mesh is symmetric and the conductivity is isotropic.\n  </p>\n\n  <p>\n    Notice what happened during assembly: the element stiffness matrices <em>overlap</em> at shared nodes.\n    Node 1's diagonal entry is $d/2 + d/2 = d$ (contributions from both triangles). Node 3's diagonal\n    entry is also $d/2 + d/2 = d$. The off-diagonal entries come from whichever element(s) connect the\n    two nodes. Nodes 2 and 4 are <em>not</em> directly connected by any element edge, so $K_{24} = 0$\n    \u2014 even though they are geometric neighbors across the diagonal.\n  </p>\n\n  <h4>The Mass Matrix: Consistent vs. Lumped</h4>\n\n  <p>\n    The mass matrix for a linear triangle with area $A$ has entries:\n  </p>\n\n  <div class=\"equation-block\">\n    $$M^e_{ab} = \\frac{\\chi C_m A}{12}\\times\\begin{cases} 2 & \\text{if } a = b \\\\ 1 & \\text{if } a \\neq b \\end{cases}$$\n  </div>\n\n  <p>\n    For our two-triangle mesh (each with area $h^2/2$), the assembled <strong>consistent mass matrix</strong> is:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\mathbf{M}_{\\text{consistent}} = \\frac{\\chi C_m h^2}{12}\\begin{pmatrix} 4 & 1 & 2 & 1 \\\\ 1 & 2 & 1 & 0 \\\\ 2 & 1 & 4 & 1 \\\\ 1 & 0 & 1 & 2 \\end{pmatrix}$$\n  </div>\n\n  <p>\n    This matrix is full (no zero entries for connected nodes) and couples each node to its neighbors\n    even for the time derivative. This coupling is mathematically correct but computationally\n    inconvenient: for explicit time stepping, you would need to solve $\\mathbf{M}\\,\\dot{\\mathbf{V}} = \\mathbf{b}$\n    at every timestep, which requires inverting $\\mathbf{M}$.\n  </p>\n\n  <p>\n    The <strong>lumped mass matrix</strong> avoids this by concentrating each row's total mass onto the\n    diagonal:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\mathbf{M}_{\\text{lumped}} = \\frac{\\chi C_m h^2}{3}\\begin{pmatrix} 2 & 0 & 0 & 0 \\\\ 0 & 1 & 0 & 0 \\\\ 0 & 0 & 2 & 0 \\\\ 0 & 0 & 0 & 1 \\end{pmatrix}$$\n  </div>\n\n  <p>\n    The diagonal entries reflect the area \"owned\" by each node: nodes 1 and 3 (shared by two triangles)\n    each own $2 \\times h^2/6 = h^2/3$ of area, while nodes 2 and 4 (each in one triangle) own $h^2/6$.\n    With a lumped mass matrix, explicit time stepping becomes trivial: $\\dot{V}_i = b_i / M_{ii}$ \u2014 just\n    a pointwise division, no linear solve required.\n  </p>\n\n  <div class=\"insight insight-math\">\n    <p>\n      Mass lumping introduces an $O(h^2)$ error \u2014 the same order as the spatial discretization itself.\n      So for P1 elements, lumping does not degrade the overall accuracy order. This is why lumped mass\n      is the default choice in cardiac simulation: it preserves the convergence rate while eliminating\n      the mass-matrix solve. The only case where consistent mass matters is when using higher-order\n      elements (P2 or above), where lumping can reduce the accuracy benefit.\n    </p>\n  </div>\n\n  <h4>Element Types</h4>\n\n  <p>\n    For cardiac simulations, <strong>P1 elements</strong> (linear triangles in 2D, linear tetrahedra in 3D)\n    are the workhorse, providing $O(h^2)$ accuracy with minimal overhead. The gradients are constant\n    within each element, making the integrals trivial. <strong>P2 elements</strong> (quadratic) achieve\n    $O(h^3)$ accuracy but at $\\sim$8\u00d7 the memory cost. For the monodomain problem \u2014 where the\n    ionic model, not the linear solve, is the bottleneck \u2014 P1 elements with mesh refinement are\n    generally preferred.\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      <strong>When to use FEM:</strong> FEM is the method of choice for realistic anatomical heart\n      geometries. It handles any mesh shape (triangles, tetrahedra, hexahedra), naturally accommodates\n      curved boundaries, and has rigorous mathematical convergence theory. Its main cost is the assembly\n      step (computing element stiffness matrices and scattering into the global matrix) and the need for\n      a mass matrix. For structured Cartesian grids, FDM is faster; for problems dominated by sharp\n      conductivity jumps, FVM may be more appropriate.\n    </p>\n  </div>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      Engine V5.4 supports P1 FEM on triangular (2D) and tetrahedral (3D) meshes. The mass matrix\n      can be either consistent or lumped (diagonal). The stiffness matrix $\\mathbf{K}$ is assembled\n      element-by-element and stored in CSR (Compressed Sparse Row) format. Both explicit solvers\n      (which need only $\\mathbf{K}\\mathbf{V}$ products) and implicit solvers (which solve\n      $(\\mathbf{M} + \\alpha\\,\\mathbf{K})\\mathbf{V} = \\mathbf{b}$) operate through the same\n      assembled matrices.\n    </p>\n  </div>\n\n  <h3>8.4 &ensp; Finite Volume Method (FVM)</h3>\n\n  <h4>The Conservation Principle</h4>\n\n  <p>\n    FVM starts from the most physically intuitive formulation: conservation. Around each node $i$,\n    draw a <em>control volume</em> $\\Omega_i$ \u2014 the region of space \"owned\" by that node. Integrate\n    the monodomain equation over $\\Omega_i$:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\chi C_m\\,|\\Omega_i|\\,\\frac{dV_i}{dt} = \\underbrace{\\sum_{j \\in \\mathcal{N}(i)} F_{ij}}_{\\text{net flux from neighbors}} - \\chi\\,|\\Omega_i|\\,I_{\\text{ion},i}$$\n  </div>\n\n  <p>\n    where $|\\Omega_i|$ is the volume (or area, in 2D) of the control cell, $\\mathcal{N}(i)$ is the set\n    of neighbors sharing a face with cell $i$, and $F_{ij}$ is the flux from cell $j$ into cell $i$.\n    The key insight: the flux leaving cell $i$ into cell $j$ is <em>exactly equal and opposite</em> to\n    the flux entering cell $j$ from cell $i$: $F_{ij} = -F_{ji}$. This ensures that total charge is\n    conserved to machine precision \u2014 no charge is created or destroyed at any face.\n  </p>\n\n  <h4>Two-Point Flux Approximation (TPFA)</h4>\n\n  <p>\n    The flux between cells $i$ and $j$ is approximated using only the voltages at the two cell centers:\n  </p>\n\n  <div class=\"equation-block\">\n    $$F_{ij} = \\sigma_{ij}\\,\\frac{V_j - V_i}{|\\mathbf{x}_j - \\mathbf{x}_i|}\\,A_{ij}$$\n  </div>\n\n  <p>\n    where $A_{ij}$ is the area of the shared face and $\\sigma_{ij}$ is the effective conductivity at\n    the face. When the two cells have different conductivities ($\\sigma_i \\neq \\sigma_j$), the correct\n    effective value is the <strong>harmonic mean</strong>:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\sigma_{ij} = \\frac{2\\sigma_i\\,\\sigma_j}{\\sigma_i + \\sigma_j}$$\n  </div>\n\n  <p>\n    This is the formula for two resistors in series \u2014 the face lies between the two cells, so the total\n    resistance is the sum of half-cell resistances. Importantly, if one cell has zero conductivity\n    (scar tissue), $\\sigma_{ij} = 0$ regardless of the other cell's conductivity. This makes FVM\n    naturally correct at sharp tissue boundaries.\n  </p>\n\n  <h4>Worked Example: 1D, 4-Cell FVM</h4>\n\n  <p>\n    Consider four control volumes in 1D with uniform cell width $h$ and uniform conductivity $\\sigma$.\n    Each face has area 1 (unit cross-section). The flux from cell $j$ to cell $i$ is\n    $F_{ij} = \\sigma\\,(V_j - V_i)/h$.\n  </p>\n\n  <p>\n    The balance equation for cell $i$ (interior) is:\n    $h\\,\\chi C_m\\,dV_i/dt = \\sigma(V_{i-1} - V_i)/h + \\sigma(V_{i+1} - V_i)/h$,\n    which simplifies to:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\chi C_m\\,\\frac{dV_i}{dt} = \\frac{\\sigma}{h^2}\\bigl(V_{i-1} - 2V_i + V_{i+1}\\bigr)$$\n  </div>\n\n  <p>\n    This is <em>identical</em> to the FDM formula! On a uniform 1D grid with uniform conductivity, FVM\n    and FDM produce the same stiffness matrix. The difference emerges in two situations: (1) non-uniform\n    grids, where FVM correctly accounts for variable cell sizes through the control-volume areas, and\n    (2) discontinuous conductivity, where the harmonic mean gives the physically correct flux while FDM's\n    arithmetic average does not.\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      <strong>When to use FVM:</strong> FVM excels when <em>conservation</em> is paramount and when\n      conductivity has sharp jumps (e.g., scar tissue abutting healthy myocardium). The harmonic-mean\n      flux ensures physically correct behavior at material interfaces. The trade-off is that the\n      two-point flux approximation requires the mesh to be \"K-orthogonal\" (control-volume faces\n      perpendicular to the line connecting cell centers) for full accuracy with anisotropic\n      conductivity. On non-orthogonal meshes, more complex multi-point flux approximations are needed.\n    </p>\n  </div>\n\n  <h3>8.5 &ensp; Choosing Your Method: A Practical Guide</h3>\n\n  <p>\n    The choice between FDM, FEM, and FVM is ultimately a practical engineering decision. No method is\n    universally best \u2014 each has a domain where it excels. The following table summarizes the trade-offs:\n  </p>\n\n  <table>\n    <tr><th>Criterion</th><th>FDM</th><th>FEM</th><th>FVM</th></tr>\n    <tr><td><strong>Mesh type</strong></td><td>Structured Cartesian only</td><td>Any (triangles, tets, hex)</td><td>Any with dual mesh</td></tr>\n    <tr><td><strong>Geometry fidelity</strong></td><td>Staircase boundaries</td><td>Exact curved boundaries</td><td>Good with Voronoi cells</td></tr>\n    <tr><td><strong>Implementation</strong></td><td>Simplest (arrays + stencil)</td><td>Most complex (assembly)</td><td>Moderate (flux loops)</td></tr>\n    <tr><td><strong>Anisotropy</strong></td><td>9/27-pt stencil for off-diagonal</td><td>Natural (in weak form)</td><td>Needs K-orthogonal mesh</td></tr>\n    <tr><td><strong>Conservation</strong></td><td>Approximate</td><td>Approximate (exact in weak sense)</td><td>Exact by construction</td></tr>\n    <tr><td><strong>Sharp interfaces</strong></td><td>Poor (averaging artifacts)</td><td>Good (per-element $\\mathbf{D}$)</td><td>Excellent (harmonic mean)</td></tr>\n    <tr><td><strong>GPU friendliness</strong></td><td>Excellent (regular access)</td><td>Good (element-level parallelism)</td><td>Good (face-level parallelism)</td></tr>\n    <tr><td><strong>Memory per node</strong></td><td>Lowest</td><td>Moderate (M + K storage)</td><td>Low</td></tr>\n    <tr><td><strong>Mass matrix</strong></td><td>Not needed ($\\mathbf{M} = \\mathbf{I}$)</td><td>Required (can be lumped)</td><td>Diagonal by construction</td></tr>\n    <tr><td><strong>Accuracy order (P1)</strong></td><td>$O(h^2)$</td><td>$O(h^2)$</td><td>$O(h^2)$</td></tr>\n  </table>\n\n  <p>\n    In practice, the cardiac simulation community uses all three:\n  </p>\n\n  <p>\n    <strong>FDM</strong> dominates rapid prototyping, GPU-accelerated tissue slabs, and machine-learning\n    training datasets where millions of simulations are needed on simple geometries.\n  </p>\n\n  <p>\n    <strong>FEM</strong> dominates patient-specific simulations on MRI-derived anatomical meshes \u2014 the\n    standard for clinical applications and the default in major cardiac simulation packages\n    (openCARP, FEniCS-based solvers, deal.II frameworks).\n  </p>\n\n  <p>\n    <strong>FVM</strong> is used for specialized problems involving sharp material interfaces (fibrosis\n    modeling, scar characterization) and in Lattice Boltzmann-based solvers (Chapters 17\u201318) where\n    conservation is the defining principle.\n  </p>\n\n  <h3>8.6 &ensp; Connecting the Pieces: From PDE to Matrix System</h3>\n\n  <p>\n    We have spent the last five sections building spatial discretization tools \u2014 stiffness matrices from\n    FDM, FEM, and FVM. Now comes the payoff: we will derive, step by step, the central matrix equation\n    that the simulator actually solves. The goal is to show you exactly where every term comes from, so\n    that equation (8.2) below feels <em>inevitable</em> rather than pulled from thin air.\n  </p>\n\n  <p>\n    Here is the roadmap. We start from the continuous PDE (equation 7.1), break it into pieces, replace\n    each continuous piece with its discrete counterpart, and collect everything into one matrix equation.\n    By the end, you will see that equation (8.2) is just a compact way of writing \"voltage changes at\n    every node because of ion channels (local) plus current from neighbors (spatial).\"\n  </p>\n\n  <h4>Step 1: Start from the Continuous PDE</h4>\n\n  <p>\n    Recall the monodomain equation (7.1):\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\chi C_m \\frac{\\partial V_m}{\\partial t} = \\nabla \\cdot (\\mathbf{D}\\,\\nabla V_m) - \\chi\\,I_{\\text{ion}}(V_m, \\mathbf{w}) + I_{\\text{stim}}$$\n  </div>\n\n  <p>\n    This is a continuous equation \u2014 it holds at every point $\\mathbf{x}$ in the tissue simultaneously.\n    A computer cannot handle \"every point\" (there are infinitely many), so we pick a finite set of\n    $N$ points (the mesh nodes) and ask: what does this equation look like at node $i$?\n  </p>\n\n  <h4>Step 2: Sample at Node $i$ (the Semi-Discrete Idea)</h4>\n\n  <p>\n    Let $V_{m,i}(t)$ denote the voltage at node $i$ as a function of time. The time derivative is\n    simple \u2014 it just becomes $dV_{m,i}/dt$, an ordinary derivative because we are tracking a single\n    node's voltage over time. The ionic current is also simple \u2014 it only depends on\n    local quantities, so it becomes $I_{\\text{ion}}(V_{m,i}, \\mathbf{w}_i)$ evaluated entirely\n    at node $i$. The tricky term is the diffusion operator\n    $\\nabla \\cdot (\\mathbf{D}\\,\\nabla V_m)$, because it involves spatial derivatives \u2014\n    information from neighboring nodes. This is what sections 7.5\u20137.7 taught us to handle.\n  </p>\n\n  <h4>Step 3: Replace the Diffusion Operator with a Matrix Product</h4>\n\n  <p>\n    Every spatial discretization method does the same thing: it replaces the continuous diffusion\n    operator at node $i$ with a <em>weighted sum</em> of voltages at node $i$ and its neighbors:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\bigl[\\nabla \\cdot (\\mathbf{D}\\,\\nabla V_m)\\bigr]_i \\;\\approx\\; -\\sum_{j=1}^{N} K_{ij}\\,V_{m,j}$$\n  </div>\n\n  <p>\n    The minus sign is a convention: we define $\\mathbf{K}$ so that it is <em>positive</em>\n    semi-definite (the natural sign for a \"stiffness\" matrix). The entry $K_{ij}$ encodes\n    how strongly node $j$ influences node $i$ through diffusion \u2014 this is exactly what we\n    computed in the FDM stencil (Section 8.2), the FEM element assembly (Section 8.3), or the\n    FVM flux balance (Section 8.4). If node $j$ is not a neighbor of node $i$, then $K_{ij} = 0$,\n    which is why $\\mathbf{K}$ is sparse.\n  </p>\n\n  <p>\n    In vector notation, gathering all $N$ node voltages into\n    $\\mathbf{V}_m = (V_{m,1}, V_{m,2}, \\ldots, V_{m,N})^T$:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\text{Diffusion at all nodes} \\;\\approx\\; -\\mathbf{K}\\,\\mathbf{V}_m$$\n  </div>\n\n  <h4>Step 4: Handle the Time Derivative (the Mass Matrix)</h4>\n\n  <p>\n    For FDM and FVM, the time derivative is straightforward. At node $i$, the left-hand side of the PDE\n    is simply $\\chi C_m\\,dV_{m,i}/dt$, and we can write $\\chi C_m\\,\\dot{\\mathbf{V}}_m$ for the whole\n    vector. In matrix language, this is $\\mathbf{M}\\,\\dot{\\mathbf{V}}_m$ where $\\mathbf{M}$ is a\n    diagonal matrix with $M_{ii} = \\chi C_m |\\Omega_i|$ and $|\\Omega_i|$ is the volume associated\n    with node $i$ (for FDM on a uniform grid, $|\\Omega_i| = h^d$, so $\\mathbf{M}$ is proportional\n    to the identity).\n  </p>\n\n  <p>\n    For FEM, the mass matrix arises naturally from the weak form (Section 8.3). The time-derivative\n    integral $\\int_\\Omega \\chi C_m (\\partial V_m / \\partial t)\\,\\varphi_i\\,dx$ produces the entry\n    $M_{ij} = \\int_\\Omega \\chi C_m\\,\\varphi_i\\,\\varphi_j\\,dx$. This is a <em>consistent</em> mass\n    matrix \u2014 it is not diagonal because the hat functions of neighboring nodes overlap. In practice,\n    we often <em>lump</em> it (replace each row with its row sum on the diagonal) so that\n    $\\mathbf{M}$ becomes diagonal and trivially invertible, just like FDM's.\n  </p>\n\n  <p>\n    In all cases, $\\mathbf{M}$ has the physical meaning: it weights each node's time derivative by the\n    \"volume of tissue\" that node represents.\n  </p>\n\n  <h4>Step 5: Gather the Ionic Current into a Load Vector</h4>\n\n  <p>\n    The ionic current and stimulus terms are purely local \u2014 they don't involve spatial derivatives.\n    At node $i$, they contribute:\n  </p>\n\n  <div class=\"equation-block\">\n    $$F_i(t) = -\\chi\\,|\\Omega_i|\\,I_{\\text{ion}}(V_{m,i},\\,\\mathbf{w}_i) \\;+\\; |\\Omega_i|\\,I_{\\text{stim},i}(t)$$\n  </div>\n\n  <p>\n    Here $I_{\\text{ion}}(V_{m,i},\\,\\mathbf{w}_i)$ is the total ionic current at node $i$ \u2014 this\n    is equation (5.1) for TTP06 (12 currents, 17 state variables) or equation (6.1) for ORd\n    (15 currents, 40 state variables). The state vector $\\mathbf{w}_i$ lives entirely at node $i$:\n    none of its components (gates, concentrations, CaMKII states) diffuse.\n    Collecting all $N$ entries gives the <em>load vector</em> $\\mathbf{F}(t)$.\n  </p>\n\n  <p>\n    The weighting factor $|\\Omega_i|$ is the \"volume\" associated with node $i$: for FDM on a uniform\n    grid, $|\\Omega_i| = h^d$; for lumped FEM, it equals the lumped mass diagonal entry divided by\n    $\\chi C_m$; for FVM, it is the control-volume size.\n  </p>\n\n  <h4>Step 6: Assemble the Semi-Discrete System</h4>\n\n  <p>\n    Now we put steps 3, 4, and 5 together. The continuous PDE at node $i$ was:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\underbrace{\\chi C_m \\frac{dV_{m,i}}{dt}}_{\\text{mass} \\times \\text{time deriv}} \\;=\\; \\underbrace{-\\sum_j K_{ij} V_{m,j}}_{\\text{diffusion}} \\;+\\; \\underbrace{\\bigl(-\\chi\\,I_{\\text{ion},i} + I_{\\text{stim},i}\\bigr)|\\Omega_i|^{-1}\\cdot|\\Omega_i|}_{\\text{ionic + stimulus}}$$\n  </div>\n\n  <p>\n    Stacking all $N$ nodes into vectors and matrices:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(8.2)</span>\n    $$\\boxed{\\mathbf{M}\\,\\dot{\\mathbf{V}}_m = -\\mathbf{K}\\,\\mathbf{V}_m + \\mathbf{F}(t)}$$\n  </div>\n\n  <p>\n    This is it \u2014 the <em>semi-discrete</em> monodomain system. \"Semi-discrete\" because space has been\n    discretized (the matrices $\\mathbf{M}$ and $\\mathbf{K}$) but time is still continuous (the time\n    derivative $\\dot{\\mathbf{V}}_m$). Every term has a clear origin:\n  </p>\n\n  <table>\n    <tr><th>Term</th><th>Origin</th><th>What it encodes</th></tr>\n    <tr><td>$\\mathbf{M}$</td><td>Time-derivative integral (PDE left-hand side)</td><td>Volume weight per node; $\\mathbf{I}$ for FDM, diagonal for lumped FEM/FVM</td></tr>\n    <tr><td>$\\mathbf{K}$</td><td>Diffusion operator $\\nabla \\cdot (\\mathbf{D}\\nabla V_m)$</td><td>Spatial coupling: stencil (FDM), element assembly (FEM), flux balance (FVM)</td></tr>\n    <tr><td>$\\mathbf{F}(t)$</td><td>Ionic current + stimulus (PDE right-hand side)</td><td>Local chemistry from TTP06/ORd at each node; no spatial derivatives</td></tr>\n  </table>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      Equation (8.2) says exactly the same thing as the continuous PDE (7.1), but in a language a computer\n      can execute: \"at each node, the voltage rate of change equals the diffusive current arriving from\n      neighbors (encoded by the matrix $-\\mathbf{K}\\mathbf{V}_m$) plus the ionic current produced locally\n      (encoded by $\\mathbf{F}$).\" The matrices are just bookkeeping \u2014 a structured way to store the\n      neighbor weights that sections 7.5\u20137.7 computed.\n    </p>\n  </div>\n\n  <h4>One Full Timestep: How It All Fits Together</h4>\n\n  <p>\n    To make this concrete, here is what happens during a single timestep $\\Delta t$ using Godunov\n    operator splitting (Chapter 8), FDM spatial discretization, and TTP06 ionic model, on a mesh\n    with $N$ nodes:\n  </p>\n\n  <p>\n    <strong>Step 1 \u2014 Reaction (at every node independently):</strong>\n    For each node $i = 1, \\ldots, N$, evaluate TTP06's 12 currents from the current voltage $V_{m,i}^n$\n    and state variables $\\mathbf{w}_i^n$:\n  </p>\n\n  <div class=\"equation-block\">\n    $$I_{\\text{ion},i} = I_{\\text{Na},i} + I_{\\text{CaL},i} + I_{\\text{to},i} + \\cdots \\quad \\text{(12 terms from eq. 5.1)}$$\n  </div>\n\n  <p>\n    Update the voltage: $V_{m,i}^* = V_{m,i}^n + \\Delta t\\,(-I_{\\text{ion},i} / C_m)$.\n    Update the 17 state variables using Rush\u2013Larsen for gates and Forward Euler for concentrations:\n    $\\mathbf{w}_i^{n+1} = \\text{advance}(\\mathbf{w}_i^n, V_{m,i}^n, \\Delta t)$.\n    This step is <em>embarrassingly parallel</em> \u2014 each node is independent.\n  </p>\n\n  <p>\n    <strong>Step 2 \u2014 Diffusion (the matrix-vector product):</strong>\n    Starting from the reaction-updated voltages $\\mathbf{V}_m^*$, solve:\n    $\\mathbf{M}\\,(\\mathbf{V}_m^{n+1} - \\mathbf{V}_m^*)/\\Delta t = -\\mathbf{K}\\,\\mathbf{V}_m^{n+1}$\n    (for implicit diffusion) or\n    $\\mathbf{V}_m^{n+1} = \\mathbf{V}_m^* + (\\Delta t / \\chi C_m)\\,(-\\mathbf{K}\\,\\mathbf{V}_m^*)$\n    (for explicit diffusion with lumped mass).\n    For FDM, this is just the stencil applied to each grid point \u2014 5 multiplies and adds in 2D.\n  </p>\n\n  <p>\n    <strong>Advance to next timestep:</strong> Set $\\mathbf{V}_m^n \\leftarrow \\mathbf{V}_m^{n+1}$\n    and repeat. On a mesh with 1 million nodes, this means evaluating TTP06 one million times per\n    timestep (Step 1), then performing one sparse matrix-vector product of size $10^6$ (Step 2).\n    With $\\Delta t = 0.02$ ms and a simulation length of 500 ms, this is $25{,}000$ timesteps \u00d7\n    $10^6$ ionic evaluations = $2.5 \\times 10^{10}$ TTP06 calls. This is why efficient ionic model\n    implementations and spatial discretizations matter.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      This separation of spatial and temporal concerns is a deliberate design choice in Engine V5.4.\n      All three discretizations (FDM, FEM, FVM) implement the <code>SpatialDiscretization</code> ABC,\n      which exposes <code>apply_diffusion(V)</code> for explicit solvers and\n      <code>get_diffusion_operators(dt, scheme)</code> for implicit solvers. You can switch from FDM to\n      FEM without changing a single line of the solver code. The ionic model plugs in through the\n      <code>IonicModel</code> interface \u2014 switching from TTP06 (18 ionic states + V) to ORd (40 ionic\n      states + V) changes only the reaction step, not the diffusion step. Chapters 9 and 10 describe\n      the time integrators; Chapter 14 shows how this framework extends to the bidomain's 2\u00d72 block\n      system.\n    </p>\n  </div>\n\n\n\n  <!-- \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n  <h3>8.7 &ensp; Boundary Conditions for the Monodomain</h3>\n\n  <p>\n    Every PDE needs boundary conditions \u2014 rules that describe what happens at the edge of the domain. Without them, the problem has infinitely many solutions. Think of it this way: if you know that heat diffuses through a metal rod, you still cannot predict the temperature distribution unless you also know what is happening at the <em>ends</em> of the rod. Are they insulated? Are they held at a fixed temperature? Are they radiating into the surrounding air? Each choice gives a different answer.\n  </p>\n\n  <p>\n    For cardiac tissue, the same principle applies. The monodomain equation (7.1) tells us how the transmembrane voltage $V_m$ evolves inside the tissue, but it says nothing about the tissue boundary \u2014 the surface where myocardium meets the surrounding medium (pericardium, blood, air in an <em>ex vivo</em> preparation, or simply the edge of a computational domain). We need a rule at every boundary point.\n  </p>\n\n  <h4>8.7.1 &ensp; What Happens at the Edge of the Tissue?</h4>\n\n  <p>\n    There are three fundamental types of boundary conditions, each with a distinct physical interpretation for cardiac tissue:\n  </p>\n\n  <table>\n    <tr><th>BC Type</th><th>Mathematical Statement</th><th>Physical Meaning</th><th>When Used</th></tr>\n    <tr>\n      <td><strong>Neumann</strong></td>\n      <td>$\\mathbf{D}\\,\\nabla V_m \\cdot \\hat{\\mathbf{n}} = 0$ on $\\partial\\Omega$</td>\n      <td>No current leaves the tissue</td>\n      <td>Isolated heart, most simulations</td>\n    </tr>\n    <tr>\n      <td><strong>Dirichlet</strong></td>\n      <td>$V_m = V_0$ on $\\partial\\Omega$</td>\n      <td>Voltage is clamped by an external electrode</td>\n      <td>Voltage-clamp experiments, stimulus protocols</td>\n    </tr>\n    <tr>\n      <td><strong>Robin (mixed)</strong></td>\n      <td>$\\mathbf{D}\\,\\nabla V_m \\cdot \\hat{\\mathbf{n}} + \\alpha\\,(V_m - V_{\\infty}) = 0$</td>\n      <td>Partial current leakage into a surrounding bath</td>\n      <td>Bath-coupled experiments, Langendorff preparations</td>\n    </tr>\n  </table>\n\n  <p>\n    Here $\\hat{\\mathbf{n}}$ is the outward unit normal to the boundary $\\partial\\Omega$, and $\\mathbf{D}$ is the diffusion tensor from equation (7.1). The vast majority of monodomain simulations use <strong>Neumann (zero-flux) boundary conditions</strong>, because an isolated piece of cardiac tissue cannot leak current into empty space. This is the physically correct default.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>Why Neumann is the natural choice.</strong> In an isolated heart, the intracellular current has nowhere to go at the tissue surface \u2014 there are no cells beyond the boundary. So the current flux through the boundary must be zero: $\\mathbf{D}\\,\\nabla V_m \\cdot \\hat{\\mathbf{n}} = 0$. This is exactly the Neumann condition. Dirichlet BCs (clamped voltage) are used only in special experimental setups where an electrode physically holds the boundary voltage at a fixed value.\n    </p>\n  </div>\n\n  <h4>8.7.2 &ensp; Neumann: The Natural Boundary Condition</h4>\n\n  <p>\n    The zero-flux condition $\\mathbf{D}\\,\\nabla V_m \\cdot \\hat{\\mathbf{n}} = 0$ on $\\partial\\Omega$ says that the component of the diffusive flux perpendicular to the boundary is zero. Let us see how this is implemented in each discretization framework.\n  </p>\n\n  <p>\n    <strong>Finite Difference Method (FDM).</strong> On a structured grid, the boundary lies along the edge of the grid. Consider the left boundary of a 1D cable with $N$ nodes indexed $0, 1, \\ldots, N-1$. The Laplacian at node $0$ requires the value at a \"ghost node\" at position $-1$ (one grid spacing outside the domain). The Neumann condition $\\partial V_m/\\partial x\\big|_{x=0} = 0$ implies that $V_{-1} = V_1$ \u2014 the ghost value mirrors the first interior value. Substituting into the standard 3-point stencil at node $0$:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(8.3)</span>\n    $$(\\Delta V_m)_0 = \\frac{V_{-1} - 2V_0 + V_1}{\\Delta x^2} = \\frac{2(V_1 - V_0)}{\\Delta x^2}$$\n  </div>\n\n  <p>\n    The stencil at the boundary node uses a coefficient of $2$ on the interior neighbor instead of $1$, and the ghost node disappears. In the stiffness matrix $\\mathbf{K}$ from equation (8.2), this modifies only the first and last rows. The matrix remains symmetric \u2014 a crucial property for iterative solvers.\n  </p>\n\n  <p>\n    <strong>Finite Element Method (FEM).</strong> Here the Neumann condition is especially elegant. In the weak form (Section 8.1), we multiplied the PDE by a test function and integrated by parts. The integration by parts produced a boundary integral:\n  </p>\n\n  $$\\int_{\\partial\\Omega} \\mathbf{D}\\,\\nabla V_m \\cdot \\hat{\\mathbf{n}}\\;\\phi_i\\,dS$$\n\n  <p>\n    For Neumann BCs, this integral is exactly zero \u2014 it vanishes from the weak form without any special treatment. This is why Neumann is called the <strong>natural boundary condition</strong> in FEM: it is automatically satisfied by the variational formulation. You do not modify any matrix entries; you simply assemble the system as usual, and the zero-flux condition is imposed for free.\n  </p>\n\n  <p>\n    <strong>Finite Volume Method (FVM).</strong> The FVM formulation is based on flux balance across cell faces. At a boundary face, the Neumann condition says the flux is zero, so no contribution from that face enters the discrete equation. The implementation is straightforward: skip boundary faces (or set their flux contribution to zero) during assembly.\n  </p>\n\n  <h4>Worked Example: 5-Node Cable with Neumann BCs</h4>\n\n  <p>\n    Consider a 1D cable with 5 nodes ($i = 0, 1, 2, 3, 4$), spacing $\\Delta x = 0.025$ cm, and isotropic diffusion coefficient $D = 0.001\\,\\text{cm}^2/\\text{ms}$. With Neumann BCs at both ends, the modified discrete Laplacian (stiffness matrix divided by $\\Delta x^2$) is:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(8.4)</span>\n    $$\\mathbf{K}_{\\text{Neu}} = \\frac{D}{\\Delta x^2}\\begin{pmatrix} -1 & 1 & & & \\\\ 1 & -2 & 1 & & \\\\ & 1 & -2 & 1 & \\\\ & & 1 & -2 & 1 \\\\ & & & 1 & -1\\end{pmatrix}$$\n  </div>\n\n  <p>\n    Notice the first and last rows: the diagonal entries are $-1$ instead of $-2$, reflecting the ghost-node mirror condition from equation (8.3). Every row sums to zero \u2014 this is a mathematical signature of Neumann BCs. It means a spatially uniform voltage $V_m = \\text{const}$ produces zero diffusive flux ($\\mathbf{K}\\,\\mathbf{1} = \\mathbf{0}$), which is physically correct: a flat voltage profile has no gradients, so there is no current flow.\n  </p>\n\n  <div class=\"insight insight-math\">\n    <p>\n      <strong>The null space of Neumann.</strong> The all-ones vector $\\mathbf{1}$ is in the null space of $\\mathbf{K}_{\\text{Neu}}$. For the monodomain, this is not a problem \u2014 the mass matrix $\\mathbf{M}$ and the reaction term break the degeneracy. But for the bidomain's elliptic equation (Chapter 12), this null space becomes a significant issue: the extracellular potential $\\phi_e$ is determined only up to an additive constant. We will return to this in Section 12.6.\n    </p>\n  </div>\n\n  <p>\n    The forward pointer to spectral methods is also worth noting: the cosine basis naturally satisfies Neumann BCs (Appendix A.9), which is why the DCT diagonalizes $\\mathbf{K}_{\\text{Neu}}$. The eigenvalues of equation (A.8) are precisely the eigenvalues of this matrix.\n  </p>\n\n  <h4>8.7.3 &ensp; Dirichlet Boundary Conditions</h4>\n\n  <p>\n    The Dirichlet condition $V_m\\big|_{\\partial\\Omega} = V_0$ fixes the voltage at the boundary. Physically, this represents an ideal electrode that clamps the transmembrane voltage to a prescribed value \u2014 for instance, a voltage-clamp experiment where one end of a fiber is held at $-80$ mV.\n  </p>\n\n  <p>\n    <strong>FDM implementation.</strong> For a Dirichlet node, we do not solve an equation \u2014 the value is known. We replace the equation at the boundary node with $V_{m,0} = V_0$. In matrix terms, we zero out the row and column corresponding to the boundary node, place $1$ on the diagonal, and move the known value to the right-hand side:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(8.5)</span>\n    $$\\text{Row }0:\\quad 1 \\cdot V_{m,0} = V_0$$\n  </div>\n\n  <p>\n    All other rows that reference $V_{m,0}$ have that contribution moved to the right-hand side vector $\\mathbf{b}$. For example, row $1$ originally reads $(V_0 - 2V_1 + V_2)/\\Delta x^2$; after Dirichlet elimination, it becomes $(-2V_1 + V_2)/\\Delta x^2 + V_0/\\Delta x^2$, where the last term is a known constant added to $b_1$.\n  </p>\n\n  <p>\n    <strong>FEM implementation.</strong> Dirichlet BCs are called <strong>essential boundary conditions</strong> in FEM \u2014 they must be explicitly enforced. The standard approach is the same row/column elimination: set the diagonal to $1$, zero off-diagonal entries in that row and column, and adjust the right-hand side. An alternative is the <strong>penalty method</strong>: add a large number $P$ (e.g., $10^{10}$) to the diagonal entry and set $b_i = P \\cdot V_0$, which forces $V_{m,i} \\approx V_0$ without modifying the matrix structure.\n  </p>\n\n  <h4>Worked Example: Stimulus at One End</h4>\n\n  <p>\n    Using the same 5-node cable, suppose we apply a stimulus by clamping $V_{m,0} = 20$ mV (Dirichlet) while keeping the right end insulated (Neumann at $i = 4$). The modified system matrix becomes:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(8.6)</span>\n    $$\\mathbf{K}_{\\text{mixed}} = \\frac{D}{\\Delta x^2}\\begin{pmatrix} 1 & 0 & & & \\\\ 0 & -2 & 1 & & \\\\ & 1 & -2 & 1 & \\\\ & & 1 & -2 & 1 \\\\ & & & 1 & -1\\end{pmatrix}, \\quad \\mathbf{b}_{\\text{mixed}} = \\frac{D}{\\Delta x^2}\\begin{pmatrix} 20\\,\\text{mV} \\\\ 20\\,\\text{mV} \\\\ 0 \\\\ 0 \\\\ 0\\end{pmatrix}$$\n  </div>\n\n  <p>\n    Row 0 enforces $V_{m,0} = 20$ mV (Dirichlet). Row 1 has the contribution from $V_{m,0}$ moved to the right-hand side ($b_1 = D\\cdot V_0/\\Delta x^2$). Rows 2\u20133 are standard interior stencils. Row 4 has the Neumann modification ($-1$ on diagonal instead of $-2$). This mixed system is the most common setup for 1D cable simulations with a stimulus electrode.\n  </p>\n\n  <p>\n    The sine basis naturally satisfies Dirichlet BCs (Appendix A.9), which is why the DST diagonalizes the Laplacian with clamped boundaries. The eigenvalues of equation (A.9) correspond to this case.\n  </p>\n\n  <h4>8.7.4 &ensp; Summary and Forward Pointers</h4>\n\n  <p>\n    For the monodomain equation, boundary conditions are relatively straightforward \u2014 there is a single unknown ($V_m$) and a single condition per boundary segment. The table below summarizes the implementation strategies:\n  </p>\n\n  <table>\n    <tr><th>BC Type</th><th>FDM</th><th>FEM</th><th>Spectral</th></tr>\n    <tr>\n      <td>Neumann (zero-flux)</td>\n      <td>Ghost node mirroring (8.3)</td>\n      <td>Natural \u2014 automatic from weak form</td>\n      <td>DCT (Appendix A.9)</td>\n    </tr>\n    <tr>\n      <td>Dirichlet (fixed voltage)</td>\n      <td>Row elimination (8.5)</td>\n      <td>Essential \u2014 row elimination or penalty</td>\n      <td>DST (Appendix A.9)</td>\n    </tr>\n    <tr>\n      <td>Mixed (Neumann on some edges, Dirichlet on others)</td>\n      <td>Combine above per boundary segment</td>\n      <td>Combine above per boundary segment</td>\n      <td>DCT+DST on different axes (A.9)</td>\n    </tr>\n  </table>\n\n  <p>\n    The situation becomes substantially more complex for the bidomain model, where we have <em>two</em> unknowns ($V_m$ and $\\phi_e$) and must specify boundary conditions for each independently. The interplay between intracellular and extracellular BCs \u2014 and the consequences for the linear system's null space \u2014 is the subject of Section 12.6.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      <strong>Engine V5.4 connection.</strong> All three spatial discretization classes (<code>FDMDiscretization</code>, <code>FEMDiscretization</code>, <code>FVMDiscretization</code>) handle Neumann BCs by default. For FDM, the stiffness matrix $\\mathbf{K}$ is constructed with the modified boundary stencil from equation (8.3). For FEM, Neumann BCs emerge automatically from the assembly loop. Dirichlet BCs are enforced through row/column elimination in the <code>apply_dirichlet()</code> method, which modifies both the system matrix and the right-hand side vector. The spectral solvers (<code>DCTSolver</code>, <code>FFTSolver</code>) handle BCs implicitly through the choice of transform basis \u2014 no matrix modification is needed.\n    </p>\n  </div>\n\n\n\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 9 \u2014 OPERATOR SPLITTING                                    -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "ch9": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 9</div>\n  <h2 class=\"chapter-title\">Operator Splitting: Divide and Conquer</h2>\n  <div class=\"chapter-intro\">\n    The monodomain equation couples a stiff, nonlinear ODE system (ion channels) with a linear\n    diffusion PDE. Trying to solve them simultaneously would be nightmarish. Operator splitting\n    breaks the problem into two simpler subproblems \u2014 and it works remarkably well.\n  </div>\n\n  <h3>9.1 &ensp; Why Split? The Stiffness Argument</h3>\n\n  <p>\n    Imagine you are cooking a stir-fry. The vegetables need to sizzle at high heat for 30 seconds (fast\n    process), while the rice simmers gently for 20 minutes (slow process). Trying to cook both in the\n    same pot at the same temperature is hopeless \u2014 you either burn the rice or undercook the vegetables.\n    The smart approach: cook them in separate pots, each at the right temperature, then combine at the end.\n    Operator splitting does exactly this for the monodomain equation: the ionic channels (fast, local,\n    nonlinear) get their own \"pot,\" and the diffusion (slow, global, linear) gets another.\n  </p>\n\n  <p>\n    The fundamental problem is <em>timescale separation</em>. During the upstroke (Phase 0), the\n    sodium gate $m$ changes with a time constant of $\\sim 0.1$ ms, while the diffusion length\n    scale requires timesteps of $\\sim 0.01$ ms for stability. But during the plateau (Phase 2),\n    everything moves slowly \u2014 $\\tau \\sim 50{-}200$ ms. Any method that tries to handle both regimes\n    in a single system must either use tiny timesteps everywhere (wasting computation during the\n    plateau) or use implicit methods for the full coupled system (requiring the solution of a\n    massive nonlinear system at each step).\n  </p>\n\n  <p>\n    Operator splitting exploits the structure of the problem. Write equation (7.1) as:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\frac{\\partial V_m}{\\partial t} = \\underbrace{\\frac{1}{\\chi C_m}\\nabla \\cdot (\\mathbf{D}\\nabla V_m)}_{\\mathcal{D}(V_m)} + \\underbrace{\\frac{-I_{\\text{ion}}(V_m, \\mathbf{w})}{ C_m}}_{\\mathcal{R}(V_m, \\mathbf{w})}$$\n  </div>\n\n  <p>\n    Instead of solving $\\partial V_m/\\partial t = \\mathcal{D} + \\mathcal{R}$ as one equation,\n    we solve them sequentially: first advance the reaction $\\mathcal{R}$ (purely local ODE at each\n    point), then advance the diffusion $\\mathcal{D}$ (linear PDE, no ionic coupling).\n  </p>\n\n  <h3>9.2 &ensp; Godunov (First-Order) Splitting</h3>\n\n  <p>\n    The simplest splitting method advances from $t^n$ to $t^{n+1} = t^n + \\Delta t$ in two stages:\n  </p>\n\n  <p>\n    <strong>Stage 1 \u2014 Reaction:</strong> At every spatial point, solve the ODE system\n    $dV_m/dt = \\mathcal{R}(V_m, \\mathbf{w})$ and $d\\mathbf{w}/dt = \\mathbf{g}(V_m, \\mathbf{w})$\n    from $t^n$ to $t^{n+1}$, using $V_m^n$ as the initial condition.\n  </p>\n\n  <p>\n    <strong>Stage 2 \u2014 Diffusion:</strong> Starting from the updated $V_m^*$ (output of Stage 1),\n    solve $\\partial V_m/\\partial t = \\mathcal{D}(V_m)$ from $t^n$ to $t^{n+1}$.\n  </p>\n\n  <p>\n    Godunov splitting is first-order accurate in time: the splitting error is $O(\\Delta t)$. For\n    cardiac simulations with $\\Delta t = 0.01{-}0.05$ ms, this error is generally acceptable\n    because the spatial and temporal discretization errors are of similar magnitude.\n  </p>\n\n  <h3>9.3 &ensp; Strang (Second-Order) Splitting</h3>\n\n  <p>\n    For higher accuracy, Strang splitting uses a symmetric sequence:\n  </p>\n\n  <p>\n    <strong>Half-step reaction</strong> ($\\Delta t/2$) \u2192 <strong>Full-step diffusion</strong> ($\\Delta t$) \u2192\n    <strong>Half-step reaction</strong> ($\\Delta t/2$).\n  </p>\n\n  <p>\n    The symmetry cancels the leading-order splitting error, yielding $O(\\Delta t^2)$ accuracy. The cost\n    is modestly higher (two reaction solves instead of one, though each is half as long), but the\n    improved accuracy can allow larger timesteps for the same error tolerance.\n  </p>\n\n  <div class=\"insight insight-math\">\n    <p>\n      Strang splitting is second-order because of a <em>symmetry argument</em>. If the error of\n      $\\mathcal{R}\\to\\mathcal{D}$ is $+c\\,\\Delta t^2$ for some constant $c$, then the error of\n      $\\mathcal{D}\\to\\mathcal{R}$ is $-c\\,\\Delta t^2$ (the error changes sign when you swap the order).\n      By sandwiching \u2014 $\\mathcal{R}(\\Delta t/2)\\to\\mathcal{D}(\\Delta t)\\to\\mathcal{R}(\\Delta t/2)$ \u2014 the\n      first-order errors cancel, leaving $O(\\Delta t^3)$ local error and $O(\\Delta t^2)$ global error.\n    </p>\n  </div>\n\n  <h3>9.4 &ensp; The Rush\u2013Larsen Method for Ionic Variables</h3>\n\n  <p>\n    During the reaction substep, we must integrate the gating ODEs $dx/dt = (x_\\infty - x)/\\tau_x$.\n    Forward Euler would require very small substeps for gates with fast kinetics (small $\\tau_x$).\n    The Rush\u2013Larsen method sidesteps this entirely by noting that for <em>fixed voltage</em>, the\n    gating ODE has an exact exponential solution:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(9.1)</span>\n    $$x^{n+1} = x_\\infty(V_m^n) + \\bigl(x^n - x_\\infty(V_m^n)\\bigr)\\,e^{-\\Delta t / \\tau_x(V_m^n)}$$\n  </div>\n\n  <p>\n    This is unconditionally stable for any $\\Delta t > 0$: even if $\\tau_x = 0.01$ ms (the fastest\n    Na$^+$ gate during the upstroke), the exponential simply drives $x$ to $x_\\infty$ without\n    oscillation. For slow gates ($\\tau_x \\gg \\Delta t$), the exponential reduces to Forward Euler,\n    so no accuracy is lost.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      Rush\u2013Larsen is like solving the \"easy part\" of the ODE exactly and only approximating the\n      \"hard part\" (the voltage dependence of $x_\\infty$ and $\\tau_x$). Since these parameters change\n      slowly compared to the gate dynamics during an upstroke, the approximation is excellent.\n      It transforms the stiffest part of the problem \u2014 fast gating \u2014 from a numerical headache into\n      a single exponential evaluation per gate per timestep.\n    </p>\n  </div>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      In Engine V5.4, the splitting and ionic integration are cleanly separated. The\n      <code>SplittingStrategy</code> ABC (<code>solver/splitting/base.py</code>) owns an\n      <code>IonicSolver</code> and a <code>DiffusionSolver</code> and calls them in the appropriate\n      order. <code>GodunovSplitting</code> calls <code>ionic_solver.step(state, dt)</code> then\n      <code>diffusion_solver.step(state, dt)</code>. <code>StrangSplitting</code> calls ionic at\n      <code>dt/2</code>, diffusion at <code>dt</code>, ionic at <code>dt/2</code>.\n    </p>\n    <p>\n      The <code>RushLarsenSolver</code> (<code>solver/ionic_time_stepping/rush_larsen.py</code>) is\n      a subclass of the <code>IonicSolver</code> ABC. Its <code>step()</code> method follows a\n      specific order: (1) compute $I_{\\text{ion}}$ from the current state, (2) compute\n      $x_\\infty$ and $\\tau_x$ from the <em>old</em> voltage, (3) Forward Euler on voltage,\n      (4) Rush\u2013Larsen exponential update on gates, (5) Forward Euler on concentrations.\n      A separate <code>ForwardEulerIonicSolver</code> is available for debugging. Concentration\n      variables always use Forward Euler because they do not follow relaxation kinetics.\n    </p>\n  </div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 10 \u2014 EXPLICIT DIFFUSION SOLVERS                           -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "part-i": "<div class=\"part-page\">\n  <div class=\"part-number\">Part I</div>\n  <div class=\"part-title\">Single Cell Dynamics</div>\n  <div class=\"part-subtitle\">\n    From the squid giant axon to the human ventricular myocyte \u2014 how ion channels\n    generate the electrical signals that drive every heartbeat.\n  </div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 1 \u2014 THE HODGKIN\u2013HUXLEY REVOLUTION                       -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "part-ii": "<div class=\"part-page\">\n  <div class=\"part-number\">Part II</div>\n  <div class=\"part-title\">Tissue-Level Monodomain Modeling</div>\n  <div class=\"part-subtitle\">\n    Connecting millions of cells with diffusion \u2014 from the reaction\u2013diffusion PDE to the\n    numerical solvers that make whole-heart simulation possible.\n  </div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 7 \u2014 THE MONODOMAIN EQUATION                              -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "part-iii": "<div class=\"part-page\">\n  <div class=\"part-number\">Part III</div>\n  <div class=\"part-title\">The Bidomain Extension</div>\n  <div class=\"part-subtitle\">\n    When the monodomain assumption breaks down \u2014 modeling both intracellular and extracellular\n    domains for defibrillation, unipolar electrograms, and heterogeneous tissue.\n  </div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 11 \u2014 WHY BIDOMAIN?                                       -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 12 \u2014 THE BIDOMAIN MODEL                                  -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "part-iv": "<div class=\"part-page\">\n  <div class=\"part-number\">Part IV</div>\n  <div class=\"part-title\">Lattice-Boltzmann Methods</div>\n  <div class=\"part-subtitle\">\n    A radically different paradigm for solving diffusion equations \u2014 no matrices, no linear solves,\n    just fictitious particles streaming and colliding on a lattice. From the heat equation to\n    cardiac monodomain and bidomain, LBM trades algebraic machinery for embarrassingly parallel\n    data movement.\n  </div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 18 \u2014 THE LATTICE-BOLTZMANN METHOD                       -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "references": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Appendix</div>\n  <h2 class=\"chapter-title\">Key References</h2>\n\n  <h3>Core Bidomain Theory</h3>\n  <ol>\n    <li>Tung, L. (1978). <em>A bidomain model for describing ischemic myocardial D-C potentials.</em> PhD thesis, MIT.</li>\n    <li>Henriquez, C.S. (1993). Simulating the electrical behavior of cardiac tissue using the bidomain model. <em>Crit. Rev. Biomed. Eng.</em>, 21(1):1\u201377.</li>\n    <li>Sundnes, J., Lines, G.T., Cai, X., et al. (2006). <em>Computing the Electrical Activity in the Heart.</em> Springer.</li>\n  </ol>\n\n  <h3>Numerical Methods and Solvers</h3>\n  <ol start=\"4\">\n    <li>Vigmond, E.J., Weber dos Santos, R., Prassl, A.J., et al. (2008). Solvers for the cardiac bidomain equations. <em>Prog. Biophys. Mol. Biol.</em>, 96(1-3):3\u201318.</li>\n    <li>Pennacchio, M., Simoncini, V. (2002). Efficient algebraic solution of reaction\u2013diffusion systems for the cardiac excitation process. <em>J. Comput. Appl. Math.</em>, 145(1):49\u201370.</li>\n    <li>Plank, G., Liebmann, M., Weber dos Santos, R., et al. (2007). Algebraic multigrid preconditioner for the cardiac bidomain model. <em>IEEE Trans. Biomed. Eng.</em>, 54(4):585\u2013596.</li>\n  </ol>\n\n  <h3>Lattice-Boltzmann Methods for Cardiac EP</h3>\n  <ol start=\"7\">\n    <li>Rapaka, S., et al. (2012). LBM-EP: Lattice-Boltzmann method for fast cardiac electrophysiology simulation. <em>MICCAI 2012</em>.</li>\n    <li>Belmiloudi, A., et al. (2015). Coupled lattice Boltzmann modeling of bidomain type models in cardiac electrophysiology. <em>Springer</e or": "B-4"}, {"title": "B.5 &ensp; Common Operations Cheat Sheet", "anchor": "B-5"}, {"title": "B.6 &ensp; Linear Algebra", "anchor": "B-6"}, {"title": "B.7 &ensp; Sparse Matrices", "anchor": "B-7"}, {"title": "B.8 &ensp; GPU Acceleration", "anchor": "B-8"}, {"title": "B.9 &ensp; Advanced Operations for Scientific Computing", "anchor": "B-9"}, {"title": "B.10 &ensp; Automatic Differentiation (Autograd)", "anchor": "B-10"}, {"title": "B.11 &ensp; Building Neural Networks with nn.Module", "anchor": "B-11"}, {"title": "B.12 &ensp; Connecting to Engine V5.4", "anchor": "B-12"}, {"title": "B.13 &ensp; Where Machine Learning Meets Cardiac Modeling", "anchor": "B-13"}]}]}];
