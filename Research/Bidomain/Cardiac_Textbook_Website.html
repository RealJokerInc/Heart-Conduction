<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardiac Computational Modeling — A Visual Textbook</title>
<style>
/* ══════════════════════════════════════════════════════════
   Cardiac Computational Modeling — Textbook Website
   ══════════════════════════════════════════════════════════ */

/* ─── CSS Custom Properties (Light Mode) ─── */
:root {
  --text: #1a1a2e;
  --text-secondary: #5a6175;
  --bg: #ffffff;
  --bg-secondary: #f4f6fb;
  --sidebar-bg: #f8f9fc;
  --sidebar-hover: #eceef5;
  --sidebar-active: #e8eaf4;
  --sidebar-border: #e2e5ed;
  --topbar-bg: #ffffff;
  --topbar-border: #e2e5ed;
  --accent: #16213e;
  --accent2: #0f3460;
  --highlight: #e94560;
  --highlight-bg: rgba(233, 69, 96, 0.08);
  --light-bg: #f4f6fb;
  --border: #d0d5e0;
  --caption: #5a6175;
  --success: #2d6a4f;
  --code-bg: #f8f9fc;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);

  /* Insight boxes */
  --insight-green-bg: #eef7ee;
  --insight-green-border: #b7ddb7;
  --insight-yellow-bg: #fff8e6;
  --insight-yellow-border: #f0d060;
  --insight-purple-bg: #eef0f8;
  --insight-purple-border: #b0b8d4;
  --insight-engine-bg: #f0eef8;
  --insight-engine-border: #bbb4d6;
  --insight-think-bg: #e8f4f8;
  --insight-think-border: #7ec8d8;

  /* PDE cards */
  --pde-parabolic-bg: #fff3e0;
  --pde-parabolic-border: #e8a735;
  --pde-elliptic-bg: #e8f5e9;
  --pde-elliptic-border: #66bb6a;
  --pde-hyperbolic-bg: #e3f2fd;
  --pde-hyperbolic-border: #42a5f5;

  /* Layout */
  --sidebar-width: 290px;
  --topbar-height: 52px;
  --right-margin-width: 220px;
  --content-max-width: 52em;

  /* Font sizes */
  --font-size-base: 17px;
  --font-size-small: 15px;
  --font-size-large: 19px;
}

/* ─── Dark Mode ─── */
[data-theme="dark"] {
  --text: #e4e6eb;
  --text-secondary: #a0a5b5;
  --bg: #131320;
  --bg-secondary: #1c1c32;
  --sidebar-bg: #16162a;
  --sidebar-hover: #1e1e38;
  --sidebar-active: #252545;
  --sidebar-border: #2a2a48;
  --topbar-bg: #16162a;
  --topbar-border: #2a2a48;
  --accent: #8eafc8;
  --accent2: #a3c4db;
  --highlight: #e94560;
  --highlight-bg: rgba(233, 69, 96, 0.12);
  --light-bg: #1c1c32;
  --border: #333355;
  --caption: #8890a8;
  --success: #5bab7b;
  --code-bg: #1a1a30;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.4);

  --insight-green-bg: #1a2e1a;
  --insight-green-border: #3a6b3a;
  --insight-yellow-bg: #2e2a1a;
  --insight-yellow-border: #8a7a30;
  --insight-purple-bg: #1e1e32;
  --insight-purple-border: #5555a0;
  --insight-engine-bg: #221e32;
  --insight-engine-border: #6a5a9a;
  --insight-think-bg: #1a2a2e;
  --insight-think-border: #4a8898;

  --pde-parabolic-bg: #2a2210;
  --pde-parabolic-border: #8a7025;
  --pde-elliptic-bg: #1a2a1a;
  --pde-elliptic-border: #3a7a3e;
  --pde-hyperbolic-bg: #1a2230;
  --pde-hyperbolic-border: #3070b0;
}

/* ─── Reset & Base ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: var(--font-size-base);
  scroll-behavior: smooth;
}
html.font-small { font-size: var(--font-size-small); }
html.font-large { font-size: var(--font-size-large); }

body {
  font-family: 'EB Garamond', 'Georgia', serif;
  line-height: 1.65;
  color: var(--text);
  background: var(--bg);
  overflow-x: hidden;
}

.skip-link {
  position: absolute;
  top: -100px;
  left: 0;
  background: var(--highlight);
  color: white;
  padding: 0.5em 1em;
  z-index: 1000;
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
}
.skip-link:focus { top: 0; }

/* ══════════════════════════════════════════════════════════
   TOP BAR
   ══════════════════════════════════════════════════════════ */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--topbar-height);
  background: var(--topbar-bg);
  border-bottom: 1px solid var(--topbar-border);
  display: flex;
  align-items: center;
  padding: 0 1rem;
  gap: 0.75rem;
  z-index: 100;
  box-shadow: var(--shadow);
}

.sidebar-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  cursor: pointer;
  padding: 0.4rem;
  border-radius: 6px;
}
.sidebar-toggle:hover { background: var(--sidebar-hover); }

.topbar-title {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--accent);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar-title-short { display: none; }

.topbar-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 0.25rem;
}

.topbar-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 0.45rem;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: background 0.15s, color 0.15s;
}
.topbar-btn:hover {
  background: var(--sidebar-hover);
  color: var(--text);
}

/* Theme toggle icons */
[data-theme="light"] .icon-moon { display: none; }
[data-theme="dark"] .icon-sun { display: none; }

/* Progress bar */
.progress-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 2px;
  background: var(--highlight);
  width: 0%;
  transition: width 0.2s ease-out;
}

/* ─── Search ─── */
.search-container { position: relative; }

.search-panel {
  display: none;
  position: absolute;
  top: calc(100% + 0.5rem);
  right: 0;
  width: 380px;
  max-height: 480px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  z-index: 200;
}
.search-panel.active { display: block; }

#search-input {
  width: 100%;
  padding: 0.75rem 1rem;
  border: none;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  outline: none;
}
#search-input::placeholder { color: var(--caption); }

.search-results {
  max-height: 400px;
  overflow-y: auto;
  padding: 0.5rem;
}
.search-result-item {
  padding: 0.6rem 0.75rem;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  line-height: 1.4;
  transition: background 0.1s;
}
.search-result-item:hover { background: var(--sidebar-hover); }
.search-result-chapter {
  font-weight: 600;
  color: var(--accent2);
  font-size: 0.75rem;
  margin-bottom: 0.15rem;
}
.search-result-text {
  color: var(--text-secondary);
}
.search-result-text mark {
  background: var(--highlight-bg);
  color: var(--highlight);
  border-radius: 2px;
  padding: 0 0.15em;
}
.search-no-results {
  padding: 1.5rem;
  text-align: center;
  color: var(--caption);
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
}

/* ══════════════════════════════════════════════════════════
   SIDEBAR
   ══════════════════════════════════════════════════════════ */
.sidebar {
  position: fixed;
  top: var(--topbar-height);
  left: 0;
  bottom: 0;
  width: var(--sidebar-width);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--sidebar-border);
  overflow-y: auto;
  z-index: 90;
  transition: transform 0.25s ease;
}

.sidebar-header {
  padding: 1.25rem 1.25rem 0.75rem;
  border-bottom: 1px solid var(--sidebar-border);
}
.sidebar-brand {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  color: var(--caption);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.sidebar-toc { padding: 0.75rem 0; }

/* Part headers */
.toc-part {
  padding: 0.6rem 1.25rem 0.3rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--highlight);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 0.5rem;
}
.toc-part:first-child { margin-top: 0; }

/* Chapter links */
.toc-chapter {
  display: block;
  padding: 0.4rem 1.25rem 0.4rem 1.5rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text);
  text-decoration: none;
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
  border-left: 3px solid transparent;
}
.toc-chapter:hover {
  background: var(--sidebar-hover);
}
.toc-chapter.active {
  background: var(--sidebar-active);
  color: var(--highlight);
  border-left-color: var(--highlight);
  font-weight: 600;
}
.toc-chapter-num {
  display: inline-block;
  width: 1.8em;
  color: var(--caption);
  font-weight: 400;
  font-size: 0.78rem;
}
.toc-chapter.active .toc-chapter-num { color: var(--highlight); }

/* Section links (collapsed by default) */
.toc-sections {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.toc-sections.expanded {
  max-height: 1000px;
}
.toc-section {
  display: block;
  padding: 0.25rem 1.25rem 0.25rem 2.8rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.75rem;
  color: var(--text-secondary);
  text-decoration: none;
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
}
.toc-section:hover {
  background: var(--sidebar-hover);
  color: var(--text);
}
.toc-section.active {
  color: var(--highlight);
  font-weight: 600;
}

/* Sidebar overlay for mobile */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  z-index: 85;
}
.sidebar-overlay.active { display: block; }

/* ══════════════════════════════════════════════════════════
   MAIN CONTENT
   ══════════════════════════════════════════════════════════ */
.content {
  margin-left: var(--sidebar-width);
  margin-top: var(--topbar-height);
  padding: 2rem 2.5rem 4rem;
  min-height: calc(100vh - var(--topbar-height));
}

.chapter-content {
  max-width: var(--content-max-width);
  margin: 0 auto;
}

/* Loading state */
.loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 50vh;
  color: var(--caption);
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  gap: 1rem;
}
.loading-spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--highlight);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════════════════════════════════
   RIGHT MARGIN
   ══════════════════════════════════════════════════════════ */
.right-margin {
  position: fixed;
  top: calc(var(--topbar-height) + 2rem);
  right: 1.5rem;
  width: var(--right-margin-width);
  max-height: calc(100vh - var(--topbar-height) - 4rem);
  overflow-y: auto;
  font-family: 'Inter', sans-serif;
  display: none;
}
.right-margin-header {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--caption);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.75rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}
.right-margin-toc {
  list-style: none;
  padding: 0;
}
.right-margin-toc li {
  margin-bottom: 0;
}
.right-margin-toc a {
  display: block;
  padding: 0.3rem 0 0.3rem 0.75rem;
  font-size: 0.72rem;
  color: var(--text-secondary);
  text-decoration: none;
  border-left: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  line-height: 1.35;
}
.right-margin-toc a:hover {
  color: var(--text);
}
.right-margin-toc a.active {
  color: var(--highlight);
  border-left-color: var(--highlight);
}

/* ══════════════════════════════════════════════════════════
   BOTTOM NAVIGATION
   ══════════════════════════════════════════════════════════ */
.bottom-nav {
  display: flex;
  justify-content: space-between;
  gap: 1rem;
  margin-top: 3rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}
.bottom-nav a {
  display: flex;
  flex-direction: column;
  padding: 1rem 1.25rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  text-decoration: none;
  transition: border-color 0.15s, background 0.15s;
  max-width: 48%;
  font-family: 'Inter', sans-serif;
}
.bottom-nav a:hover {
  border-color: var(--highlight);
  background: var(--highlight-bg);
}
.nav-prev { align-items: flex-start; }
.nav-next { align-items: flex-end; margin-left: auto; }
.nav-direction {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--highlight);
  margin-bottom: 0.2rem;
}
.nav-label {
  font-size: 0.82rem;
  color: var(--text);
  font-weight: 500;
  line-height: 1.3;
}
.bottom-nav a.hidden { visibility: hidden; }

/* ══════════════════════════════════════════════════════════
   CHAPTER CONTENT STYLES (from textbook CSS)
   ══════════════════════════════════════════════════════════ */

/* Title page (shown as welcome) */
.title-page {
  text-align: center;
  padding: 4em 0 3em;
}
.title-page h1 {
  font-size: 2.6em;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.02em;
  margin-bottom: 0.2em;
  line-height: 1.2;
}
.title-page .subtitle {
  font-size: 1.35em;
  font-weight: 400;
  font-style: italic;
  color: var(--caption);
  margin-bottom: 2em;
}
.title-page .rule {
  width: 8em;
  height: 2px;
  background: var(--highlight);
  margin: 1.5em auto;
}
.title-page .meta {
  font-size: 1em;
  color: var(--caption);
  line-height: 1.8;
}

/* Part pages */
.part-page {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 40vh;
  text-align: center;
  padding: 3em 0;
}
.part-number {
  font-size: 1.1em;
  font-weight: 600;
  color: var(--highlight);
  text-transform: uppercase;
  letter-spacing: 0.2em;
  margin-bottom: 0.5em;
}
.part-title {
  font-size: 2.2em;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 0.3em;
  line-height: 1.25;
}
.part-subtitle {
  font-size: 1.15em;
  font-style: italic;
  color: var(--caption);
  max-width: 32em;
  line-height: 1.5;
}

/* Chapter headings */
.chapter { padding-top: 0.5em; }
.chapter-number {
  font-size: 0.95em;
  font-weight: 600;
  color: var(--highlight);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 0.2em;
}
h2.chapter-title {
  font-size: 2em;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 0.5em;
  line-height: 1.25;
}
.chapter-intro {
  font-size: 1.05em;
  font-style: italic;
  color: var(--caption);
  border-left: 3px solid var(--highlight);
  padding: 0.5em 1em;
  margin-bottom: 1.5em;
  background: var(--light-bg);
}
h3 {
  font-size: 1.35em;
  font-weight: 600;
  color: var(--accent2);
  margin: 1.5em 0 0.5em;
}
h4 {
  font-size: 1.1em;
  font-weight: 600;
  color: var(--accent);
  margin: 1.2em 0 0.4em;
}
p { margin-bottom: 0.8em; text-align: justify; hyphens: auto; }

/* Equations */
.equation-block {
  margin: 1.2em 0;
  padding: 0.8em 1em;
  background: var(--light-bg);
  border-left: 3px solid var(--accent2);
  border-radius: 0 4px 4px 0;
  overflow-x: auto;
  max-width: 100%;
}
mjx-container[jax="SVG"] { max-width: 100% !important; }
mjx-container[jax="SVG"][display="true"] {
  overflow-x: auto;
  max-width: 100% !important;
}
.equation-label {
  float: right;
  font-size: 0.9em;
  color: var(--caption);
  font-style: italic;
}

/* Insight boxes */
.insight {
  margin: 1.3em 0;
  padding: 1em 1.2em;
  border-radius: 6px;
  font-size: 0.97em;
}
.insight-intuition { background: var(--insight-green-bg); border: 1px solid var(--insight-green-border); }
.insight-intuition::before {
  content: "🌿 Intuition"; display: block; font-weight: 700;
  color: var(--success); margin-bottom: 0.4em; font-size: 0.95em;
}
.insight-warning { background: var(--insight-yellow-bg); border: 1px solid var(--insight-yellow-border); }
.insight-warning::before {
  content: "⚠ Key Insight"; display: block; font-weight: 700;
  color: #8a6d00; margin-bottom: 0.4em; font-size: 0.95em;
}
[data-theme="dark"] .insight-warning::before { color: #d4a830; }

.insight-math { background: var(--insight-purple-bg); border: 1px solid var(--insight-purple-border); }
.insight-math::before {
  content: "📐 Mathematical Note"; display: block; font-weight: 700;
  color: var(--accent2); margin-bottom: 0.4em; font-size: 0.95em;
}
.insight-engine { background: var(--insight-engine-bg); border: 1px solid var(--insight-engine-border); }
.insight-engine::before {
  content: "⚙ Engine V5.4 Connection"; display: block; font-weight: 700;
  color: #4a3d7a; margin-bottom: 0.4em; font-size: 0.95em;
}
[data-theme="dark"] .insight-engine::before { color: #a090d0; }

.insight-think { background: var(--insight-think-bg); border: 1px solid var(--insight-think-border); }
.insight-think::before {
  content: "💭 Think About It"; display: block; font-weight: 700;
  color: #1a6b7a; margin-bottom: 0.4em; font-size: 0.95em;
}
[data-theme="dark"] .insight-think::before { color: #6ab8c8; }

/* Tables */
table {
  border-collapse: collapse;
  width: 100%;
  margin: 1em 0;
  font-size: 0.93em;
}
th {
  background: var(--accent);
  color: white;
  padding: 0.5em 0.8em;
  text-align: left;
  font-weight: 600;
}
[data-theme="dark"] th { background: #2a2a50; }
td {
  padding: 0.45em 0.8em;
  border-bottom: 1px solid var(--border);
}
tr:nth-child(even) { background: var(--light-bg); }

/* Figures */
.figure { margin: 1.5em 0; text-align: center; }
.figure svg { max-width: 100%; height: auto; }
.figure-caption {
  font-size: 0.9em; font-style: italic;
  color: var(--caption); margin-top: 0.5em;
}
.figure-label { font-weight: 600; color: var(--accent2); }

/* Code */
pre {
  font-family: 'Source Code Pro', monospace;
  font-size: 0.85em;
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.8em 1em;
  overflow-x: auto;
  margin: 0.8em 0;
  line-height: 1.5;
}
code {
  font-family: 'Source Code Pro', monospace;
  font-size: 0.9em;
  background: var(--code-bg);
  padding: 0.1em 0.3em;
  border-radius: 3px;
}
pre code { background: none; padding: 0; }

/* Block matrix */
.block-matrix {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 1.2em 0;
  font-size: 1.05em;
}

/* Misc */
.separator {
  width: 4em; height: 2px;
  background: var(--highlight);
  margin: 2em auto;
}
.footnote {
  font-size: 0.85em; color: var(--caption);
  border-top: 1px solid var(--border);
  padding-top: 0.5em; margin-top: 2em;
}
ul, ol { margin: 0.5em 0 0.8em 1.5em; }
li { margin-bottom: 0.3em; }

/* PDE cards */
.pde-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0.8em;
  margin: 1.3em 0;
}

<script>
window.__CHAPTERS__ = {"appendices": "<div class=\"part-page\">\n  <div class=\"part-number\">Appendices</div>\n  <div class=\"part-title\">Reference Material</div>\n  <div class=\"part-subtitle\">\n    Key references, a visual guide to differential equations, and an introduction to\n    PyTorch for scientific computing.\n  </div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  APPENDIX / REFERENCES                                            -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "appendix-a": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Appendix A</div>\n  <h2 class=\"chapter-title\">A Visual Guide to Differential Equations</h2>\n  <div class=\"chapter-intro\">\n    This appendix steps back from the bidomain model to build a deep, visual intuition for the three fundamental types of partial differential equations: parabolic, elliptic, and hyperbolic. We begin with the heat equation \u2014 the simplest and most intuitive PDE \u2014 and use it as a lens to understand all three families. The style here follows the philosophy of 3Blue1Brown: start with a concrete picture, build understanding layer by layer, and let the math emerge naturally from the intuition.\n  </div>\n\n  <h3>A.1 &ensp; The Heat Equation: Where It All Begins</h3>\n\n  <p>\n    Imagine you have a thin metal rod. You heat one spot in the middle with a blowtorch, creating a sharp temperature peak, and then you turn off the blowtorch. What happens?\n  </p>\n\n  <p>\n    You already know the answer intuitively: the hot spot cools down, and the warmth spreads outward into the cooler parts of the rod. Over time, the temperature profile gets smoother and flatter, until eventually the whole rod reaches a uniform temperature. This simple physical process \u2014 heat spreading from hot regions to cold regions \u2014 is described by one of the most important equations in all of mathematics:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(A.1)</span>\n    $$\\frac{\\partial u}{\\partial t} = \\alpha \\frac{\\partial^2 u}{\\partial x^2}$$\n  </div>\n\n  <p>\n    This is the <strong>heat equation</strong> in one dimension. Here $u(x,t)$ is the temperature at position $x$ and time $t$, and $\\alpha > 0$ is the <em>thermal diffusivity</em> \u2014 a material property that tells you how quickly heat spreads (copper has high $\\alpha$; wood has low $\\alpha$).\n  </p>\n\n  <p>\n    But what does this equation actually <em>say</em>? Let us read it like a sentence.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>Reading the heat equation as English:</strong> \"The rate at which the temperature changes at a point ($\\partial u/\\partial t$) is proportional to how much that point's temperature differs from the average of its neighbors ($\\partial^2 u/\\partial x^2$).\" If a point is hotter than its surroundings, it cools down. If it is cooler, it warms up. The equation says nothing more \u2014 and nothing less \u2014 than this.\n    </p>\n  </div>\n\n  <p>\n    This is the fundamental insight, and it is worth dwelling on. The second derivative $\\partial^2 u/\\partial x^2$ is not just a mathematical abstraction \u2014 it measures <em>concavity</em>. At a temperature peak (concave down), the second derivative is negative, so $\\partial u/\\partial t < 0$: the temperature decreases. At a temperature valley (concave up), the second derivative is positive, so $\\partial u/\\partial t > 0$: the temperature increases. The heat equation is a machine that relentlessly destroys peaks and fills valleys.\n  </p>\n\n  <!-- SVG: Heat diffusion evolution -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 520 240\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:480px;\">\n      <!-- Axes -->\n      <line x1=\"50\" y1=\"210\" x2=\"490\" y2=\"210\" stroke=\"#5a6175\" stroke-width=\"1.2\"/>\n      <line x1=\"50\" y1=\"210\" x2=\"50\" y2=\"20\" stroke=\"#5a6175\" stroke-width=\"1.2\"/>\n      <text x=\"270\" y=\"235\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"13\" fill=\"#5a6175\">position $x$</text>\n      <text x=\"30\" y=\"115\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"13\" fill=\"#5a6175\" transform=\"rotate(-90,30,115)\">temperature $u$</text>\n      <!-- t=0: sharp peak -->\n      <path d=\"M 60,200 Q 150,200 200,195 Q 230,185 250,80 Q 260,35 270,80 Q 290,185 320,195 Q 370,200 480,200\" fill=\"none\" stroke=\"#e94560\" stroke-width=\"2.5\"/>\n      <text x=\"285\" y=\"48\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#e94560\" font-weight=\"600\">t = 0</text>\n      <!-- t=1: spreading -->\n      <path d=\"M 60,198 Q 140,196 190,185 Q 225,165 250,115 Q 265,85 270,115 Q 295,165 330,185 Q 380,196 480,198\" fill=\"none\" stroke=\"#d35400\" stroke-width=\"2\" stroke-dasharray=\"6,3\"/>\n      <text x=\"340\" y=\"170\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#d35400\" font-weight=\"600\">t = 1</text>\n      <!-- t=3: broad and flat -->\n      <path d=\"M 60,194 Q 130,190 180,180 Q 220,168 250,152 Q 265,145 270,152 Q 300,168 340,180 Q 390,190 480,194\" fill=\"none\" stroke=\"#e67e22\" stroke-width=\"1.8\" stroke-dasharray=\"3,3\"/>\n      <text x=\"385\" y=\"175\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#e67e22\" font-weight=\"600\">t = 3</text>\n      <!-- t=10: nearly flat -->\n      <path d=\"M 60,192 Q 150,190 220,187 Q 255,185 270,184 Q 285,185 330,187 Q 400,190 480,192\" fill=\"none\" stroke=\"#f39c12\" stroke-width=\"1.5\" stroke-dasharray=\"2,4\"/>\n      <text x=\"420\" y=\"182\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#f39c12\" font-weight=\"600\">t = 10</text>\n      <!-- Annotation arrow -->\n      <path d=\"M 270,60 L 270,100\" fill=\"none\" stroke=\"#888\" stroke-width=\"0.8\" marker-end=\"url(#arr)\"/>\n      <defs><marker id=\"arr\" markerWidth=\"6\" markerHeight=\"6\" refX=\"5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#888\"/></marker></defs>\n      <text x=\"270\" y=\"106\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"9\" fill=\"#888\">peak decays</text>\n    </svg>\n    <div class=\"figure-caption\"><span class=\"figure-label\">Figure A.1.</span> A sharp temperature peak (red) diffuses over time, becoming broader and flatter. The heat equation smooths all discontinuities \u2014 information about the initial sharp shape is irreversibly lost.</div>\n  </div>\n\n  <p>\n    Notice three properties that are visible even from the picture:\n  </p>\n\n  <ol>\n    <li><strong>Smoothing.</strong> The solution gets smoother over time. A sharp corner at $t=0$ becomes an infinitely smooth curve at any $t>0$. The heat equation is a \"smoothing machine.\"</li>\n    <li><strong>Irreversibility.</strong> You cannot run time backwards and recover the sharp peak from the flat profile. Information is destroyed. (Mathematically: the backwards heat equation is ill-posed.)</li>\n    <li><strong>Maximum principle.</strong> The hottest point at any later time is never hotter than the hottest point at $t=0$. Diffusion can only reduce extremes, never amplify them.</li>\n  </ol>\n\n  <p>\n    These three properties \u2014 smoothing, irreversibility, and a maximum principle \u2014 are the <em>defining fingerprint</em> of <strong>parabolic</strong> equations. Every parabolic PDE shares them.\n  </p>\n\n  <h3>A.2 &ensp; What the Laplacian Really Means</h3>\n\n  <p>\n    Before we classify PDEs, we need to build intuition for the single most important differential operator in physics: the <strong>Laplacian</strong> $\\nabla^2 u$ (also written $\\Delta u$).\n  </p>\n\n  <p>\n    In one dimension, $\\nabla^2 u = \\partial^2 u/\\partial x^2$ \u2014 just the second derivative. In two or three dimensions:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\nabla^2 u = \\frac{\\partial^2 u}{\\partial x^2} + \\frac{\\partial^2 u}{\\partial y^2} + \\frac{\\partial^2 u}{\\partial z^2}$$\n  </div>\n\n  <p>\n    But what does it <em>mean</em>? Here is the deepest and most useful interpretation:\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      <strong>The Laplacian measures the difference between a point's value and the average of its neighbors.</strong> Specifically, for a function $u$ that is smooth enough:\n    </p>\n    <p>\n      $$\\nabla^2 u(\\mathbf{x}) = \\lim_{r\\to 0}\\; \\frac{2d}{r^2}\\Bigl[\\overline{u}_r(\\mathbf{x}) - u(\\mathbf{x})\\Bigr]$$\n    </p>\n    <p>\n      where $\\overline{u}_r(\\mathbf{x})$ is the average of $u$ on a sphere of radius $r$ centered at $\\mathbf{x}$, and $d$ is the spatial dimension. If $u(\\mathbf{x})$ is <em>less</em> than its neighborhood average, then $\\nabla^2 u > 0$. If <em>more</em>, then $\\nabla^2 u < 0$.\n    </p>\n  </div>\n\n  <!-- SVG: Laplacian as neighbor averaging -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 520 180\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:460px;\">\n      <!-- Left panel: point above average -->\n      <text x=\"130\" y=\"18\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"12\" fill=\"#5a6175\" font-weight=\"600\">Peak: $u > $ neighbors</text>\n      <!-- Circle of neighbors -->\n      <circle cx=\"130\" cy=\"100\" r=\"50\" fill=\"none\" stroke=\"#b0b8d4\" stroke-width=\"1\" stroke-dasharray=\"4,3\"/>\n      <!-- Neighbor dots -->\n      <circle cx=\"80\" cy=\"100\" r=\"5\" fill=\"#42a5f5\"/>\n      <circle cx=\"130\" cy=\"50\" r=\"5\" fill=\"#42a5f5\"/>\n      <circle cx=\"180\" cy=\"100\" r=\"5\" fill=\"#42a5f5\"/>\n      <circle cx=\"130\" cy=\"150\" r=\"5\" fill=\"#42a5f5\"/>\n      <!-- Center: hot -->\n      <circle cx=\"130\" cy=\"100\" r=\"7\" fill=\"#e94560\" stroke=\"#c0392b\" stroke-width=\"1.5\"/>\n      <!-- Arrows inward -->\n      <text x=\"130\" y=\"100\" text-anchor=\"middle\" dominant-baseline=\"central\" font-family=\"Source Code Pro,monospace\" font-size=\"9\" fill=\"white\" font-weight=\"700\">H</text>\n      <text x=\"80\" y=\"100\" text-anchor=\"middle\" dominant-baseline=\"central\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"white\">C</text>\n      <text x=\"130\" y=\"50\" text-anchor=\"middle\" dominant-baseline=\"central\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"white\">C</text>\n      <text x=\"180\" y=\"100\" text-anchor=\"middle\" dominant-baseline=\"central\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"white\">C</text>\n      <text x=\"130\" y=\"150\" text-anchor=\"middle\" dominant-baseline=\"central\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"white\">C</text>\n      <text x=\"130\" y=\"172\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#c0392b\">$\\nabla^2 u < 0$ \u2192 cools down</text>\n\n      <!-- Right panel: point below average -->\n      <text x=\"390\" y=\"18\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"12\" fill=\"#5a6175\" font-weight=\"600\">Valley: $u < $ neighbors</text>\n      <circle cx=\"390\" cy=\"100\" r=\"50\" fill=\"none\" stroke=\"#b0b8d4\" stroke-width=\"1\" stroke-dasharray=\"4,3\"/>\n      <circle cx=\"340\" cy=\"100\" r=\"5\" fill=\"#e94560\"/>\n      <circle cx=\"390\" cy=\"50\" r=\"5\" fill=\"#e94560\"/>\n      <circle cx=\"440\" cy=\"100\" r=\"5\" fill=\"#e94560\"/>\n      <circle cx=\"390\" cy=\"150\" r=\"5\" fill=\"#e94560\"/>\n      <circle cx=\"390\" cy=\"100\" r=\"7\" fill=\"#42a5f5\" stroke=\"#1565c0\" stroke-width=\"1.5\"/>\n      <text x=\"390\" y=\"100\" text-anchor=\"middle\" dominant-baseline=\"central\" font-family=\"Source Code Pro,monospace\" font-size=\"9\" fill=\"white\" font-weight=\"700\">C</text>\n      <text x=\"340\" y=\"100\" text-anchor=\"middle\" dominant-baseline=\"central\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"white\">H</text>\n      <text x=\"390\" y=\"50\" text-anchor=\"middle\" dominant-baseline=\"central\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"white\">H</text>\n      <text x=\"440\" y=\"100\" text-anchor=\"middle\" dominant-baseline=\"central\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"white\">H</text>\n      <text x=\"390\" y=\"150\" text-anchor=\"middle\" dominant-baseline=\"central\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"white\">H</text>\n      <text x=\"390\" y=\"172\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#1565c0\">$\\nabla^2 u > 0$ \u2192 warms up</text>\n    </svg>\n    <div class=\"figure-caption\"><span class=\"figure-label\">Figure A.2.</span> The Laplacian as a \"disagreement detector.\" Left: a hot point (H) surrounded by cool neighbors (C) has $\\nabla^2 u < 0$. Right: a cool point surrounded by hot neighbors has $\\nabla^2 u > 0$. The heat equation says: resolve the disagreement.</div>\n  </div>\n\n  <p>\n    This is why the Laplacian appears in so many equations across physics. Any time nature wants to smooth out differences \u2014 heat, chemical concentration, electrical potential \u2014 the Laplacian is doing the work. The heat equation $\\partial u/\\partial t = \\alpha\\,\\nabla^2 u$ simply says: <em>evolve toward the local average</em>.\n  </p>\n\n  <div class=\"insight insight-think\">\n    <p>\n      <strong>A discrete analogy.</strong> On a grid, approximate $\\nabla^2 u$ at node $i$ as $\\nabla^2 u_i \\approx \\frac{1}{h^2}(\\bar{u}_{\\text{neighbors}} - u_i)$ where $\\bar{u}_{\\text{neighbors}}$ is the average of the neighboring values. The heat equation on a grid becomes: each node moves a small fraction toward the average of its neighbors at each time step. This is literally a smoothing filter \u2014 the same operation used in image processing.\n    </p>\n  </div>\n\n  <h3>A.3 &ensp; The Three Families of PDEs</h3>\n\n  <p>\n    Now we are ready for the big classification. Consider the most general second-order linear PDE in two variables:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(A.2)</span>\n    $$A\\,\\frac{\\partial^2 u}{\\partial x^2} + 2B\\,\\frac{\\partial^2 u}{\\partial x\\,\\partial y} + C\\,\\frac{\\partial^2 u}{\\partial y^2} + \\text{(lower-order terms)} = 0$$\n  </div>\n\n  <p>\n    The character of this equation \u2014 its fundamental behavior, the types of solutions it admits, the numerical methods that work \u2014 is determined by a single number: the <strong>discriminant</strong>\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\Delta = B^2 - AC$$\n  </div>\n\n  <p>\n    This is exactly the same discriminant from the quadratic formula, and the analogy to conic sections is deep. Just as $B^2 - 4AC$ classifies conics into ellipses, parabolas, and hyperbolas, this discriminant classifies PDEs into three families:\n  </p>\n\n  <div class=\"pde-grid\">\n    <div class=\"pde-card pde-card-parabolic\">\n      <h4>Parabolic ($\\Delta = 0$)</h4>\n      <p><strong>Prototype:</strong> Heat equation</p>\n      <p>$\\dfrac{\\partial u}{\\partial t} = \\alpha\\,\\nabla^2 u$</p>\n      <p><em>Diffusion, smoothing, irreversible</em></p>\n    </div>\n    <div class=\"pde-card pde-card-elliptic\">\n      <h4>Elliptic ($\\Delta < 0$)</h4>\n      <p><strong>Prototype:</strong> Laplace equation</p>\n      <p>$\\nabla^2 u = 0$</p>\n      <p><em>Equilibrium, steady-state, no time</em></p>\n    </div>\n    <div class=\"pde-card pde-card-hyperbolic\">\n      <h4>Hyperbolic ($\\Delta > 0$)</h4>\n      <p><strong>Prototype:</strong> Wave equation</p>\n      <p>$\\dfrac{\\partial^2 u}{\\partial t^2} = c^2\\,\\nabla^2 u$</p>\n      <p><em>Propagation, waves, reversible</em></p>\n    </div>\n  </div>\n\n  <div class=\"insight insight-think\">\n    <p>\n      <strong>Why does the name \"parabolic\" come from the degenerate case $\\Delta=0$?</strong> Think of the conic $Ax^2 + 2Bxy + Cy^2 = 1$. When $\\Delta = 0$, this degenerates from a closed curve (ellipse) to an open, unbounded shape (parabola). Similarly, the PDE loses one \"degree of freedom\" \u2014 information propagates in one direction only (forward in time), just as a parabola is open in one direction.\n    </p>\n  </div>\n\n  <p>\n    Let us now build deep intuition for each family.\n  </p>\n\n  <h3>A.4 &ensp; Parabolic Equations: Diffusion and Smoothing</h3>\n\n  <p>\n    The heat equation is the prototype, but parabolic equations describe far more than heat. Any process where \"stuff\" spreads out from high-concentration regions to low-concentration regions is parabolic: chemical diffusion (Fick's law), financial option pricing (Black\u2013Scholes), probability spreading (Fokker\u2013Planck), and \u2014 most relevant to us \u2014 the evolution of the transmembrane potential $V_m$ in the monodomain equation.\n  </p>\n\n  <p>\n    The unifying feature is the structure: <strong>one time derivative balanced against two spatial derivatives</strong>. This mismatch ($\\partial_t$ vs. $\\partial_{xx}$) dictates everything:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\underbrace{\\frac{\\partial u}{\\partial t}}_{\\text{1st order in }t} = \\alpha \\underbrace{\\frac{\\partial^2 u}{\\partial x^2}}_{\\text{2nd order in }x}$$\n  </div>\n\n  <p>\n    Because there is only a <em>first</em> derivative in time, you need only <em>one</em> initial condition: $u(x,0) = u_0(x)$. Time marches in one direction only. There is no \"bouncing back.\" This is why parabolic equations model irreversible processes.\n  </p>\n\n  <p>\n    <strong>The smoothing property, precisely stated.</strong> If you start with any initial condition \u2014 even one with sharp corners or discontinuities \u2014 the solution $u(x,t)$ is infinitely smooth for all $t > 0$. This is remarkable. A square-wave initial condition instantly (at any positive time, no matter how small) becomes a $C^\\infty$ function. Intuitively: diffusion smears out all sharp features immediately.\n  </p>\n\n  <p>\n    <strong>Infinite propagation speed.</strong> Here is a subtle and often confusing point. Heat propagates at <em>infinite speed</em> in the mathematical heat equation \u2014 if you heat one end of an infinitely long rod, the other end feels it instantly (though the effect is exponentially small). This is physically unrealistic but mathematically convenient. The parabolic monodomain equation inherits this property: a stimulus at one point technically affects the entire domain immediately, though the practical effect dies off exponentially fast.\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      <strong>The parabolic CFL condition.</strong> When you discretize a parabolic equation with an explicit time stepper (like forward Euler), stability demands $\\Delta t \\leq C\\,\\Delta x^2$. The <em>quadratic</em> dependence on $\\Delta x$ is severe: halving the mesh spacing requires quartering the time step. This is why implicit methods (Crank\u2013Nicolson, BDF, SDIRK) are essential for parabolic problems \u2014 they are unconditionally stable, allowing $\\Delta t$ dictated by accuracy rather than stability.\n    </p>\n  </div>\n\n  <h3>A.5 &ensp; Elliptic Equations: Equilibrium and Constraints</h3>\n\n  <p>\n    Now remove time from the picture entirely. Ask: <em>what does the temperature look like after the system has fully equilibrated?</em> At equilibrium, $\\partial u/\\partial t = 0$, and the heat equation becomes:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(A.3)</span>\n    $$\\nabla^2 u = 0 \\qquad \\text{(Laplace's equation)}$$\n  </div>\n\n  <p>\n    This is the prototypical <strong>elliptic</strong> equation. It says: at every point, the value of $u$ equals the average of its neighbors. There is no time. There is no evolution. It is a pure <em>constraint</em>.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>The rubber sheet analogy.</strong> Imagine a flat rubber membrane stretched over a wire frame. The frame is bent into some shape (the boundary condition). Where does the membrane settle? At every interior point, the height of the membrane equals the average height of the surrounding points \u2014 because the elastic forces balance in all directions. The equilibrium shape satisfies Laplace's equation.\n    </p>\n  </div>\n\n  <!-- SVG: Rubber sheet equilibrium -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 520 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:460px;\">\n      <!-- Wire frame (boundary) -->\n      <path d=\"M 60,160 Q 130,40 200,80 Q 270,120 340,50 Q 410,20 480,130\" fill=\"none\" stroke=\"#16213e\" stroke-width=\"2.5\"/>\n      <!-- Membrane surface (smooth interpolation) -->\n      <path d=\"M 60,160 Q 100,100 140,100 Q 180,100 220,95 Q 260,90 300,75 Q 340,60 380,55 Q 420,60 480,130\" fill=\"none\" stroke=\"#42a5f5\" stroke-width=\"2\" stroke-dasharray=\"6,3\"/>\n      <!-- Fixed boundary markers -->\n      <circle cx=\"60\" cy=\"160\" r=\"5\" fill=\"#e94560\"/>\n      <circle cx=\"480\" cy=\"130\" r=\"5\" fill=\"#e94560\"/>\n      <!-- Labels -->\n      <text x=\"55\" y=\"178\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#e94560\">fixed</text>\n      <text x=\"470\" y=\"148\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#e94560\">fixed</text>\n      <text x=\"270\" y=\"55\" font-family=\"EB Garamond,serif\" font-size=\"12\" fill=\"#42a5f5\" font-weight=\"600\">equilibrium surface</text>\n      <text x=\"350\" y=\"38\" font-family=\"EB Garamond,serif\" font-size=\"12\" fill=\"#16213e\" font-weight=\"600\">boundary shape</text>\n      <!-- Interior point annotation -->\n      <circle cx=\"270\" cy=\"85\" r=\"3\" fill=\"#42a5f5\"/>\n      <text x=\"270\" y=\"110\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#5a6175\">$u =$ average of neighbors</text>\n    </svg>\n    <div class=\"figure-caption\"><span class=\"figure-label\">Figure A.3.</span> The rubber sheet analogy for Laplace's equation. The boundary conditions (wire frame) determine the shape; the interior settles into an equilibrium where each point's value equals the average of its neighbors.</div>\n  </div>\n\n  <p>\n    The key properties of elliptic equations mirror the equilibrium intuition:\n  </p>\n\n  <ol>\n    <li><strong>Mean value property.</strong> The value at any interior point equals the average over any surrounding sphere. This is the deepest characterization of harmonic functions (solutions to $\\nabla^2 u = 0$).</li>\n    <li><strong>Maximum principle.</strong> The maximum and minimum of $u$ occur on the <em>boundary</em>, never in the interior. The rubber sheet cannot bulge above or below the wire frame.</li>\n    <li><strong>Global coupling.</strong> Changing the boundary condition at one point affects the solution <em>everywhere</em> in the interior. Information propagates in all directions simultaneously. There is no concept of \"marching\" from one end to the other.</li>\n    <li><strong>No time, no initial conditions.</strong> You need only boundary conditions. The equation determines the interior values uniquely from the boundary.</li>\n  </ol>\n\n  <div class=\"insight insight-think\">\n    <p>\n      <strong>Why you cannot \"march\" an elliptic equation.</strong> In a parabolic equation, you know $u$ at $t=0$ and march forward to $t = \\Delta t$, then to $t = 2\\Delta t$, and so on. In an elliptic equation, there is no \"forward.\" Changing one boundary value ripples through the <em>entire</em> domain simultaneously. This is why elliptic equations always require solving a <strong>global linear system</strong> \u2014 you must find all unknowns at once.\n    </p>\n  </div>\n\n  <p>\n    If there is a source term, Laplace's equation becomes <strong>Poisson's equation</strong>: $\\nabla^2 u = f$. This is still elliptic. It says: the difference between a point's value and its neighborhood average is proportional to the local source strength $f$. This is exactly the form of the bidomain elliptic constraint.\n  </p>\n\n  <h3>A.6 &ensp; Hyperbolic Equations: Waves and Propagation</h3>\n\n  <p>\n    The third family is fundamentally different from the first two. Consider the <strong>wave equation</strong>:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(A.4)</span>\n    $$\\frac{\\partial^2 u}{\\partial t^2} = c^2 \\frac{\\partial^2 u}{\\partial x^2}$$\n  </div>\n\n  <p>\n    Notice the crucial structural difference: the <em>second</em> derivative in time. Where the heat equation had $\\partial_t$ (first order), the wave equation has $\\partial_{tt}$ (second order). This single change transforms the physics completely.\n  </p>\n\n  <p>\n    With a first-order time derivative, you need one initial condition ($u$ at $t=0$). With a second-order time derivative, you need <em>two</em>: the initial shape $u(x,0)$ and the initial velocity $\\partial u/\\partial t\\big|_{t=0}$. This is like specifying both the position and velocity of a particle \u2014 and it means the equation is <em>reversible</em>. You can run time forward or backward and get valid solutions.\n  </p>\n\n  <!-- SVG: Wave propagation -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 520 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:480px;\">\n      <!-- Axis -->\n      <line x1=\"40\" y1=\"100\" x2=\"500\" y2=\"100\" stroke=\"#d0d5e0\" stroke-width=\"0.8\"/>\n      <!-- t=0: initial pulse -->\n      <path d=\"M 50,100 Q 200,100 230,100 Q 245,95 255,55 Q 260,40 265,55 Q 275,95 290,100 Q 320,100 490,100\" fill=\"none\" stroke=\"#16213e\" stroke-width=\"2.5\"/>\n      <text x=\"260\" y=\"30\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#16213e\" font-weight=\"600\">t = 0</text>\n      <!-- t=2: two pulses moving apart -->\n      <path d=\"M 50,100 Q 100,100 130,100 Q 145,96 155,75 Q 160,65 165,75 Q 175,96 190,100\" fill=\"none\" stroke=\"#2980b9\" stroke-width=\"2\" stroke-dasharray=\"6,3\"/>\n      <path d=\"M 330,100 Q 355,96 365,75 Q 370,65 375,75 Q 385,96 400,100 Q 450,100 490,100\" fill=\"none\" stroke=\"#2980b9\" stroke-width=\"2\" stroke-dasharray=\"6,3\"/>\n      <text x=\"160\" y=\"56\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#2980b9\" font-weight=\"600\">t = 2</text>\n      <text x=\"370\" y=\"56\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#2980b9\" font-weight=\"600\">t = 2</text>\n      <!-- Arrows showing propagation -->\n      <path d=\"M 230,120 L 180,135\" fill=\"none\" stroke=\"#888\" stroke-width=\"1\" marker-end=\"url(#arr)\"/>\n      <text x=\"195\" y=\"150\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#888\">speed $c$</text>\n      <path d=\"M 290,120 L 340,135\" fill=\"none\" stroke=\"#888\" stroke-width=\"1\" marker-end=\"url(#arr)\"/>\n      <text x=\"325\" y=\"150\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#888\">speed $c$</text>\n      <!-- Key difference label -->\n      <text x=\"260\" y=\"188\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#5a6175\">Pulse splits and travels at finite speed \u2014 shape preserved</text>\n    </svg>\n    <div class=\"figure-caption\"><span class=\"figure-label\">Figure A.4.</span> The wave equation splits an initial pulse into two copies traveling in opposite directions at speed $c$. Unlike diffusion, the pulse shape is preserved \u2014 no smoothing occurs.</div>\n  </div>\n\n  <p>\n    The contrast with the heat equation could not be sharper:\n  </p>\n\n  <table>\n    <tr><th>Property</th><th>Parabolic (heat)</th><th>Hyperbolic (wave)</th></tr>\n    <tr><td>Time derivative order</td><td>1st ($\\partial_t$)</td><td>2nd ($\\partial_{tt}$)</td></tr>\n    <tr><td>Initial conditions needed</td><td>1 (value)</td><td>2 (value + velocity)</td></tr>\n    <tr><td>Reversible?</td><td>No</td><td>Yes</td></tr>\n    <tr><td>Propagation speed</td><td>Infinite (exponential decay)</td><td>Finite ($c$)</td></tr>\n    <tr><td>Smoothing?</td><td>Yes \u2014 destroys sharp features</td><td>No \u2014 preserves sharp features</td></tr>\n    <tr><td>Energy</td><td>Dissipated over time</td><td>Conserved</td></tr>\n  </table>\n\n  <p>\n    The finite propagation speed is the hallmark of hyperbolic equations. A disturbance at point $x_0$ at time $t_0$ can only be felt at point $x$ after time $(x - x_0)/c$. This region of influence is called the <strong>light cone</strong> (even for non-relativistic waves), and the boundary of this cone consists of <strong>characteristics</strong> \u2014 curves in space-time along which information travels.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>Why cardiac EP is NOT hyperbolic.</strong> At first glance, the action potential \"wavefront\" sweeping through the heart looks like a traveling wave \u2014 so you might expect a wave equation. But it is not a wave in the hyperbolic sense. The action potential front is driven by <em>diffusion</em> (current spreading from depolarized cells to resting cells) plus a <em>nonlinear reaction</em> (ion channels opening in a cascade). There is no second time derivative. There is no energy conservation. And the wavefront <em>does</em> smooth out over time. The monodomain and bidomain equations are parabolic, not hyperbolic \u2014 the traveling wavefront emerges from the interplay of diffusion and reaction, not from wave mechanics.\n    </p>\n  </div>\n\n  <h3>A.7 &ensp; Why the Bidomain Model Has Two Types</h3>\n\n  <p>\n    We can now understand the bidomain model's structure at a much deeper level. The bidomain system is not a single PDE \u2014 it is a <em>coupled pair</em>, and each equation belongs to a different family:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(A.5)</span>\n    $$\\underbrace{\\chi C_m \\frac{\\partial V_m}{\\partial t} = -\\chi\\,I_{\\text{ion}} + \\nabla\\cdot(\\mathbf{D}_i\\,\\nabla V_m) + \\nabla\\cdot(\\mathbf{D}_i\\,\\nabla\\phi_e)}_{\\text{Parabolic: has }\\partial V_m/\\partial t}$$\n  </div>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(A.6)</span>\n    $$\\underbrace{0 = \\nabla\\cdot(\\mathbf{D}_i\\,\\nabla V_m) + \\nabla\\cdot\\bigl[(\\mathbf{D}_i + \\mathbf{D}_e)\\,\\nabla\\phi_e\\bigr]}_{\\text{Elliptic: no time derivative at all}}$$\n  </div>\n\n  <p>\n    This mixed parabolic\u2013elliptic structure is the source of both the model's physical richness and its computational difficulty:\n  </p>\n\n  <ol>\n    <li><strong>The parabolic equation</strong> governs the evolution of the transmembrane potential $V_m$. It is a diffusion equation \u2014 with all the properties we discussed: smoothing, irreversibility, CFL restrictions for explicit methods. The \"stuff\" being diffused is electrical charge, and the diffusion coefficient is determined by the intracellular conductivity tensor $\\mathbf{D}_i$. It can in principle be marched forward in time.</li>\n    <li><strong>The elliptic equation</strong> constrains the extracellular potential $\\phi_e$. It has no time derivative \u2014 it is an <em>equilibrium condition</em> that must hold at every instant, like the rubber sheet analogy. At every moment, the extracellular potential adjusts <em>instantly</em> so that the total current in and out of every point balances. It cannot be marched \u2014 it must be solved as a global linear system.</li>\n  </ol>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      <strong>The fundamental computational consequence.</strong> The parabolic equation can (in theory) be treated explicitly. The elliptic equation <em>cannot</em> \u2014 ever. This is why every bidomain solver requires at least one implicit linear solve per time step: the elliptic constraint demands it. This is not a choice of method; it is a consequence of the equation's type. No clever algorithm can avoid it, because the elliptic equation couples all spatial points simultaneously.\n    </p>\n  </div>\n\n  <p>\n    The monodomain equation, by contrast, is purely parabolic \u2014 a single equation with a single time derivative. This is why it is so much cheaper: you never need to solve an elliptic constraint. The LBM methods in Chapter 17 exploit this: a lattice-Boltzmann scheme can handle a parabolic PDE naturally (the collision-streaming cycle is essentially an explicit time stepper), but it has no mechanism for enforcing a global elliptic constraint.\n  </p>\n\n  <p>\n    Understanding the type of each equation also tells you <em>which numerical methods to reach for</em>:\n  </p>\n\n  <table>\n    <tr><th>Equation type</th><th>Natural solvers</th><th>Avoid</th></tr>\n    <tr><td>Parabolic ($V_m$)</td><td>Implicit time steppers (CN, BDF, SDIRK), operator splitting, IMEX, LBM</td><td>Fully explicit on fine meshes (CFL: $\\Delta t \\propto \\Delta x^2$)</td></tr>\n    <tr><td>Elliptic ($\\phi_e$)</td><td>Direct solvers, CG/MINRES with AMG preconditioner, multigrid</td><td>Explicit time stepping (impossible \u2014 no time derivative)</td></tr>\n  </table>\n\n  <p>\n    The classification of PDEs into parabolic, elliptic, and hyperbolic is not merely academic taxonomy. It determines which initial/boundary conditions are needed, which numerical methods will work, what stability restrictions apply, and whether information flows forward only or in all directions simultaneously. For the bidomain model, this classification is the key to understanding why the computational challenge is fundamentally harder than monodomain \u2014 and why the solver strategies of Chapter 15 are not optional refinements but structural necessities.\n  </p>\n\n\n  <!-- \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n  <h3>A.8 &ensp; From Physical Space to Transform Space</h3>\n\n  <p>\n    Imagine you are listening to an orchestra. You hear a rich, complex sound \u2014 violins, cellos, flutes, and timpani all playing at once. Your ear receives a single pressure wave, a wiggly curve that changes instant by instant. But your brain does something remarkable: it separates that single wave into individual pitches. You hear the violin's high note and the cello's low note <em>simultaneously</em>, even though they arrived as one signal. Your brain has performed a <strong>transform</strong> \u2014 it has taken data from the <em>time domain</em> (pressure versus time) and re-expressed it in the <em>frequency domain</em> (which pitches are present and how loud each one is).\n  </p>\n\n  <p>\n    A mathematical transform does exactly the same thing. It takes a function expressed in one \"space\" and re-writes it in another space where the problem becomes simpler. The key insight is this:\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>A transform is just looking at the same data through a different lens.</strong> The data does not change \u2014 only the way we describe it changes. And in the new description, operations that were hard (like differentiation) become easy (like multiplication).\n    </p>\n  </div>\n\n  <p>\n    To see why this matters for solving PDEs, consider the simplest diffusion problem: the 1D heat equation on a rod of length $L$,\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(A.7)</span>\n    $$\\frac{\\partial u}{\\partial t} = D\\,\\frac{\\partial^2 u}{\\partial x^2}$$\n  </div>\n\n  <p>\n    In physical space, solving this equation requires computing $\\partial^2 u/\\partial x^2$ \u2014 the second spatial derivative. On a grid with $N$ points, this means assembling and solving a linear system involving an $N \\times N$ matrix (the discrete Laplacian). For large $N$, this can be expensive.\n  </p>\n\n  <p>\n    Now suppose we expand $u(x,t)$ in terms of sinusoidal basis functions. That is, we write the solution as a sum of waves:\n  </p>\n\n  $$u(x,t) = \\sum_k \\hat{u}_k(t)\\,\\psi_k(x)$$\n\n  <p>\n    where each $\\psi_k(x)$ is a sine or cosine function and $\\hat{u}_k(t)$ is the coefficient (amplitude) of the $k$-th wave at time $t$. The magic happens when we take the second derivative. Each basis function satisfies:\n  </p>\n\n  $$\\frac{d^2\\,\\psi_k}{dx^2} = -\\lambda_k\\,\\psi_k$$\n\n  <p>\n    where $\\lambda_k$ is a constant that depends on the wave number $k$. In other words, the second derivative of a sinusoid is just a <em>scaled copy of itself</em>. Substituting into the heat equation, each mode evolves independently:\n  </p>\n\n  $$\\frac{d\\hat{u}_k}{dt} = -D\\,\\lambda_k\\,\\hat{u}_k$$\n\n  <p>\n    This is just an ordinary differential equation! Differentiation in physical space has become <em>multiplication by $-D\\lambda_k$</em> in transform space. Instead of one big coupled system, we have $N$ independent scalar equations \u2014 each trivially solvable. The entire procedure is:\n  </p>\n\n  <ol>\n    <li><strong>Forward transform</strong>: Decompose $u(x)$ into its frequency components $\\hat{u}_k$.</li>\n    <li><strong>Operate in transform space</strong>: Multiply (or divide) each $\\hat{u}_k$ by the appropriate eigenvalue $\\lambda_k$.</li>\n    <li><strong>Inverse transform</strong>: Reassemble the solution from the modified coefficients.</li>\n  </ol>\n\n  <p>\n    This three-step process is the essence of every spectral solver in this textbook, including the DCT solver of Chapter 15.\n  </p>\n\n  <h4>The Discrete Version and the FFT</h4>\n\n  <p>\n    On a computer, we do not have a continuous function \u2014 we have $N$ sampled values on a grid. The <strong>Discrete Fourier Transform (DFT)</strong> takes these $N$ values and produces $N$ frequency coefficients $\\hat{u}_k$. In matrix form, this is just a matrix-vector multiplication by an $N \\times N$ matrix whose entries are complex exponentials. The inverse DFT is another matrix-vector multiplication that recovers the original values.\n  </p>\n\n  <p>\n    Naively, multiplying by an $N \\times N$ matrix costs $O(N^2)$ operations. But the <strong>Fast Fourier Transform (FFT)</strong>, discovered by Cooley and Tukey in 1965, exploits the special structure of the DFT matrix to compute the same result in $O(N \\log N)$ operations. For a grid with a million points, this is the difference between $10^{12}$ and $10^7$ operations \u2014 a factor of 100,000.\n  </p>\n\n  <div class=\"insight insight-math\">\n    <p>\n      <strong>Why $O(N \\log N)$?</strong> The FFT works by recursively splitting the DFT of $N$ points into two DFTs of $N/2$ points, using the symmetry of complex exponentials ($e^{i\\pi} = -1$). Each split halves the problem, and you need $\\log_2 N$ levels of splitting, with $O(N)$ work at each level. The result: $O(N \\log N)$ total.\n    </p>\n  </div>\n\n  <p>\n    For a 2D grid ($N_x \\times N_y$ points), the transform can be applied along each dimension separately \u2014 first transform all rows, then transform all columns. The total cost is $O(N_x N_y (\\log N_x + \\log N_y))$, which is effectively $O(N \\log N)$ where $N = N_x \\times N_y$ is the total number of points.\n  </p>\n\n  <p>\n    But there is a catch. The standard Fourier transform (and its discrete cousin, the DFT/FFT) assumes the signal is <strong>periodic</strong>. It wraps the rod into a circle: the value at $x = L$ is the same as the value at $x = 0$. This is rarely what we want in cardiac simulation, where tissue has edges and boundaries. To handle boundaries properly, we need a different family of transforms \u2014 the cosine and sine transforms \u2014 which are the subject of the next section.\n  </p>\n\n  <!-- \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n  <h3>A.9 &ensp; Cosine and Sine Transforms: Why Shape Matters for Boundaries</h3>\n\n  <p>\n    Think of a guitar string. If both ends are clamped (like a real guitar string), the string can only vibrate in shapes that are zero at both ends \u2014 these are sine waves. But if both ends are free to slide up and down (imagine the string passing through frictionless rings at each end), the string vibrates in shapes whose <em>slope</em> is zero at each end \u2014 these are cosine waves. The shape of the basis function encodes the boundary condition.\n  </p>\n\n  <p>\n    This is the central idea of this section: <strong>the choice of transform determines the boundary condition, and vice versa.</strong>\n  </p>\n\n  <h4>The Problem with the Standard Fourier Transform</h4>\n\n  <p>\n    As we noted in Section A.8, the DFT assumes periodicity. If your data has value 0 at the left edge and value 5 at the right edge, the DFT assumes the signal jumps from 5 back to 0, creating an artificial discontinuity. This discontinuity produces spurious high-frequency ringing in the frequency domain (known as <strong>Gibbs phenomenon</strong>) and ruins the accuracy of a spectral solve.\n  </p>\n\n  <p>\n    What we need are transforms whose basis functions naturally satisfy the boundary conditions of our problem. There are two fundamental types:\n  </p>\n\n  <h4>Cosine Basis \u2192 Neumann Boundary Conditions</h4>\n\n  <p>\n    Consider the family of cosine functions on the interval $[0, L]$:\n  </p>\n\n  $$\\psi_k(x) = \\cos\\!\\left(\\frac{k\\pi x}{L}\\right), \\qquad k = 0, 1, 2, \\ldots$$\n\n  <p>\n    Let us check what happens at the boundaries. Take the derivative:\n  </p>\n\n  $$\\frac{d\\psi_k}{dx} = -\\frac{k\\pi}{L}\\,\\sin\\!\\left(\\frac{k\\pi x}{L}\\right)$$\n\n  <p>\n    At $x = 0$: $\\sin(0) = 0$, so $\\frac{d\\psi_k}{dx}\\big|_{x=0} = 0$. At $x = L$: $\\sin(k\\pi) = 0$ (for every integer $k$), so $\\frac{d\\psi_k}{dx}\\big|_{x=L} = 0$. The derivative vanishes at both endpoints \u2014 automatically! This is exactly the <strong>Neumann (zero-flux) boundary condition</strong>: $\\partial u/\\partial n = 0$.\n  </p>\n\n  <p>\n    If we expand our solution in cosine functions, any function we can represent will automatically satisfy Neumann BCs at both ends. We do not need to impose them separately \u2014 the basis enforces them for us. The <strong>Discrete Cosine Transform (DCT)</strong> is the discrete version of this expansion.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>The basis function <em>is</em> the boundary condition.</strong> Choose the right shape and the BC enforces itself. Cosines have flat endpoints (zero slope) \u2192 Neumann. Sines pass through zero \u2192 Dirichlet. No ghost nodes, no modified stencils, no special treatment at boundaries. This is why spectral methods are so elegant for structured grids.\n    </p>\n  </div>\n\n  <h4>Sine Basis \u2192 Dirichlet Boundary Conditions</h4>\n\n  <p>\n    Now consider the family of sine functions:\n  </p>\n\n  $$\\phi_k(x) = \\sin\\!\\left(\\frac{k\\pi x}{L}\\right), \\qquad k = 1, 2, 3, \\ldots$$\n\n  <p>\n    At $x = 0$: $\\sin(0) = 0$. At $x = L$: $\\sin(k\\pi) = 0$. The function itself vanishes at both endpoints \u2014 this is the <strong>Dirichlet boundary condition</strong>: $u = 0$ on the boundary.\n  </p>\n\n  <p>\n    If we expand our solution in sine functions, the solution is automatically zero at both ends. The <strong>Discrete Sine Transform (DST)</strong> is the discrete version. Note that the index starts at $k = 1$ (not $k = 0$), because $\\sin(0) = 0$ everywhere \u2014 a constant zero function carries no information.\n  </p>\n\n  <h4>Eigenvalues: What Each Transform Does to the Laplacian</h4>\n\n  <p>\n    For the spectral solver of Chapter 15, we need the eigenvalues of the discrete Laplacian \u2014 the constants $\\lambda_k$ such that $\\Delta \\psi_k = -\\lambda_k \\psi_k$. These eigenvalues come directly from the basis functions.\n  </p>\n\n  <p>\n    <strong>1D eigenvalues, Neumann (DCT).</strong> On a grid with $N$ points and spacing $\\Delta x = L/N$, the discrete Laplacian's eigenvalues for the cosine basis are:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(A.8)</span>\n    $$\\lambda_k^{\\text{DCT}} = \\frac{2}{\\Delta x^2}\\left(\\cos\\!\\left(\\frac{\\pi k}{N}\\right) - 1\\right), \\qquad k = 0, 1, \\ldots, N-1$$\n  </div>\n\n  <p>\n    All eigenvalues are $\\leq 0$ (the Laplacian is negative semi-definite). The $k=0$ mode has $\\lambda_0 = 0$, corresponding to the constant mode $\\psi_0(x) = 1$ \u2014 a spatially uniform solution whose Laplacian is zero. This zero eigenvalue is the spectral fingerprint of the Neumann null space, and it will appear again in Chapter 15 when we discuss spectral solvers.\n  </p>\n\n  <p>\n    <strong>1D eigenvalues, Dirichlet (DST).</strong> For the sine basis:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(A.9)</span>\n    $$\\lambda_k^{\\text{DST}} = \\frac{2}{\\Delta x^2}\\left(\\cos\\!\\left(\\frac{\\pi k}{N+1}\\right) - 1\\right), \\qquad k = 1, 2, \\ldots, N$$\n  </div>\n\n  <p>\n    Notice the subtle difference: the denominator is $N+1$ instead of $N$, and the index starts at $k=1$. There is no zero eigenvalue \u2014 Dirichlet BCs pin the boundary values, removing the constant mode from the solution space. This means the Laplacian matrix is non-singular (invertible) under Dirichlet BCs, which simplifies the spectral solve: no special handling of a null space is needed.\n  </p>\n\n  <h4>The 2D Extension: Products of Basis Functions</h4>\n\n  <p>\n    On a 2D grid ($N_x \\times N_y$), the basis functions are <em>products</em> of 1D basis functions, one for each spatial direction. Which product you use depends on the boundary condition <em>in that direction</em>:\n  </p>\n\n  <table>\n    <tr><th>BC on $x$-boundaries</th><th>BC on $y$-boundaries</th><th>Basis function</th><th>Transform</th></tr>\n    <tr><td>Neumann</td><td>Neumann</td><td>$\\cos(i\\pi x/L_x)\\cdot\\cos(j\\pi y/L_y)$</td><td>DCT in $x$ and $y$</td></tr>\n    <tr><td>Dirichlet</td><td>Dirichlet</td><td>$\\sin(i\\pi x/L_x)\\cdot\\sin(j\\pi y/L_y)$</td><td>DST in $x$ and $y$</td></tr>\n    <tr><td>Neumann</td><td>Dirichlet</td><td>$\\cos(i\\pi x/L_x)\\cdot\\sin(j\\pi y/L_y)$</td><td>DCT in $x$, DST in $y$</td></tr>\n    <tr><td>Dirichlet</td><td>Neumann</td><td>$\\sin(i\\pi x/L_x)\\cdot\\cos(j\\pi y/L_y)$</td><td>DST in $x$, DCT in $y$</td></tr>\n  </table>\n\n  <p>\n    The 2D eigenvalues are simply the sum of the 1D eigenvalues from each direction:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(A.10)</span>\n    $$\\lambda_{i,j} = \\lambda_i^{(x)} + \\lambda_j^{(y)}$$\n  </div>\n\n  <p>\n    where $\\lambda_i^{(x)}$ and $\\lambda_j^{(y)}$ are the 1D eigenvalues from equation (A.8) or (A.9), depending on the boundary condition in that direction.\n  </p>\n\n  <h4>When Can DCT and DST Be Combined?</h4>\n\n  <p>\n    This is a question that often trips up newcomers. The answer is straightforward once you understand the basis function structure:\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      <strong>DCT and DST can be combined when different boundary conditions apply to different spatial axes.</strong> You use a cosine transform along any axis where Neumann BCs hold, and a sine transform along any axis where Dirichlet BCs hold. The transforms are applied independently, dimension by dimension.\n    </p>\n    <p>\n      What you <em>cannot</em> do is mix boundary conditions on the <em>same</em> axis with a pure spectral method. If one end of the $x$-axis has Neumann and the other has Dirichlet, neither pure cosines nor pure sines will satisfy both conditions simultaneously. In that case, you need a different approach \u2014 such as a \"quarter-wave\" transform (rarely used in practice) or simply falling back to an iterative solver like PCG (Chapter 15, Section 15.1).\n    </p>\n  </div>\n\n  <h4>Worked Example: 1D Neumann Heat Equation via DCT</h4>\n\n  <p>\n    To make all of this concrete, let us solve a simple 1D diffusion problem using the DCT. Consider a rod with $N = 4$ grid points, spacing $\\Delta x = 1$, diffusion coefficient $D = 1$, and Neumann BCs at both ends. The initial temperature profile is $u = [4,\\, 2,\\, 1,\\, 3]$.\n  </p>\n\n  <p>\n    <strong>Step 1: Compute the eigenvalues.</strong> Using equation (A.8) with $N = 4$ and $\\Delta x = 1$:\n  </p>\n\n  <table>\n    <tr><th>$k$</th><th>$\\cos(\\pi k/4)$</th><th>$\\lambda_k = 2(\\cos(\\pi k/4) - 1)$</th></tr>\n    <tr><td>0</td><td>1</td><td>$0$</td></tr>\n    <tr><td>1</td><td>$\\cos(\\pi/4) \\approx 0.707$</td><td>$\\approx -0.586$</td></tr>\n    <tr><td>2</td><td>$\\cos(\\pi/2) = 0$</td><td>$-2$</td></tr>\n    <tr><td>3</td><td>$\\cos(3\\pi/4) \\approx -0.707$</td><td>$\\approx -3.414$</td></tr>\n  </table>\n\n  <p>\n    <strong>Step 2: Forward DCT.</strong> Transform $u = [4, 2, 1, 3]$ into frequency space. The DCT (type II, orthonormal) gives: $\\hat{u} = [5.0,\\; 1.577,\\; 0.5,\\; -0.224]$ (values rounded).\n  </p>\n\n  <p>\n    <strong>Step 3: Solve in spectral space.</strong> Suppose we want to solve the implicit (BDF1) equation $u^{n+1} - \\Delta t\\,D\\,\\Delta u^{n+1} = u^n$ with $\\Delta t = 0.1$. In spectral space, for each mode $k$:\n  </p>\n\n  $$\\hat{u}_k^{n+1} = \\frac{\\hat{u}_k^n}{1 - \\Delta t \\cdot D \\cdot \\lambda_k}$$\n\n  <table>\n    <tr><th>$k$</th><th>Denominator $1 - 0.1\\lambda_k$</th><th>$\\hat{u}_k^{n+1}$</th></tr>\n    <tr><td>0</td><td>1.000</td><td>5.000</td></tr>\n    <tr><td>1</td><td>1.059</td><td>1.490</td></tr>\n    <tr><td>2</td><td>1.200</td><td>0.417</td></tr>\n    <tr><td>3</td><td>1.341</td><td>$-0.167$</td></tr>\n  </table>\n\n  <p>\n    <strong>Step 4: Inverse DCT.</strong> Transform $\\hat{u}^{n+1}$ back to physical space to get $u^{n+1}$. The higher modes ($k = 2, 3$) have been damped more than the lower modes \u2014 exactly what diffusion should do. The mean ($k = 0$) is preserved, because Neumann BCs conserve total heat.\n  </p>\n\n  <p>\n    That is the entire algorithm. No matrix assembly, no iterative convergence loop. The cost per time step is dominated by two DCTs: $O(N \\log N)$. For the 2D cardiac grids of this textbook, the same procedure applies dimension by dimension, as described in Chapter 15, Section 15.3.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      <strong>Engine V5.4 connection.</strong> The <code>DCTSolver</code> class in <code>linear_solver/fft.py</code> implements exactly this algorithm. It pre-computes the 2D eigenvalue grid $\\lambda_{i,j}$ using equation (A.10), then uses <code>torch-dct</code> (or a fallback FFT-based DCT) for the forward and inverse transforms. The eigenvalues are cached after the first solve and reused at every subsequent time step \u2014 a single $O(N)$ setup cost for unlimited $O(N \\log N)$ solves.\n    </p>\n  </div>\n\n  <!-- \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n  <h3>A.10 &ensp; Iterative Methods and the Conjugate Gradient</h3>\n\n  <p>\n    Imagine you are blindfolded in a hilly landscape, trying to find the lowest valley. You cannot see the terrain, but you can feel the slope beneath your feet. The obvious strategy: always step downhill. If the slope is steep, take a big step; if it is gentle, take a small step. Eventually, you will reach a valley. This is <strong>gradient descent</strong> \u2014 and it is the simplest iterative method for solving linear systems.\n  </p>\n\n  <p>\n    But gradient descent has a problem. In a long, narrow valley (imagine a bowling-lane-shaped landscape), it zigzags back and forth across the valley floor, making slow progress toward the minimum. Each step corrects for one direction but overshoots in another. For a system with $N$ unknowns, this can require $O(N)$ iterations \u2014 not much better than a direct solve.\n  </p>\n\n  <p>\n    The <strong>conjugate gradient (CG)</strong> method fixes this problem with a beautiful geometric idea: instead of always stepping in the steepest direction, choose search directions that are <em>conjugate</em> (orthogonal with respect to the matrix $A$). Each conjugate direction eliminates the error along one dimension of the problem, guaranteeing that the exact solution is reached in at most $N$ steps. In practice, for well-conditioned systems, far fewer than $N$ steps are needed.\n  </p>\n\n  <h4>Why Iterative?</h4>\n\n  <p>\n    To solve $A\\mathbf{x} = \\mathbf{b}$ where $A$ is an $N \\times N$ matrix, the most straightforward approach is a direct method: Gaussian elimination (LU factorization). This always works, but it costs $O(N^3)$ operations and $O(N^2)$ memory. For the 2D cardiac grids in this textbook, $N$ can easily be $10^5$ to $10^6$ (a $300 \\times 300$ grid has 90,000 nodes). A direct solve on 90,000 unknowns would require roughly $10^{15}$ floating-point operations \u2014 completely impractical.\n  </p>\n\n  <p>\n    Iterative methods take a different approach. Starting from an initial guess $\\mathbf{x}_0$ (often zero, or the solution from the previous time step), they generate a sequence $\\mathbf{x}_0, \\mathbf{x}_1, \\mathbf{x}_2, \\ldots$ that converges to the true solution. Each iteration costs $O(N)$ operations (dominated by one sparse matrix-vector multiply), and convergence typically requires far fewer than $N$ iterations. The total cost is $O(k \\cdot N)$ where $k$ is the number of iterations \u2014 and for cardiac simulation with warm starting, $k$ is often as small as 3\u20138.\n  </p>\n\n  <h4>The Energy Minimization Viewpoint</h4>\n\n  <p>\n    When $A$ is <strong>symmetric positive-definite (SPD)</strong> \u2014 meaning $A = A^T$ and $\\mathbf{x}^T A \\mathbf{x} > 0$ for all nonzero $\\mathbf{x}$ \u2014 solving $A\\mathbf{x} = \\mathbf{b}$ is equivalent to minimizing the <em>energy functional</em>:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(A.11)</span>\n    $$E(\\mathbf{x}) = \\frac{1}{2}\\mathbf{x}^T A\\,\\mathbf{x} - \\mathbf{b}^T\\mathbf{x}$$\n  </div>\n\n  <p>\n    Taking the gradient (in the multivariable calculus sense) and setting it to zero gives $\\nabla E = A\\mathbf{x} - \\mathbf{b} = 0$, which is exactly $A\\mathbf{x} = \\mathbf{b}$. The function $E(\\mathbf{x})$ defines a paraboloid (a bowl shape) in $N$-dimensional space, and the solution $\\mathbf{x}^*$ sits at the bottom.\n  </p>\n\n  <p>\n    The gradient at any point $\\mathbf{x}$ is $\\nabla E = A\\mathbf{x} - \\mathbf{b}$. But this is exactly the <strong>negative residual</strong>: $-\\mathbf{r}$, where $\\mathbf{r} = \\mathbf{b} - A\\mathbf{x}$ is the residual (how far we are from satisfying the equation). So the steepest-descent direction is the residual $\\mathbf{r}$ \u2014 and the residual tells us both the direction and the magnitude of the error.\n  </p>\n\n  <h4>From Gradient Descent to Conjugate Gradient</h4>\n\n  <p>\n    <strong>Gradient descent</strong> takes each step in the direction of steepest descent (the residual $\\mathbf{r}$), choosing the step size $\\alpha$ that minimizes $E$ along that line. This works but zigzags.\n  </p>\n\n  <p>\n    <strong>Conjugate gradient</strong> builds a sequence of search directions $\\mathbf{p}_0, \\mathbf{p}_1, \\mathbf{p}_2, \\ldots$ that are <em>$A$-conjugate</em>: $\\mathbf{p}_i^T A \\mathbf{p}_j = 0$ for $i \\neq j$. This means each direction is orthogonal to all previous directions <em>with respect to the geometry defined by $A$</em>. The key property is that once you minimize along direction $\\mathbf{p}_i$, you never need to revisit it \u2014 the error along $\\mathbf{p}_i$ stays zero in all subsequent iterations. This is why CG converges in at most $N$ steps (one per dimension of the problem).\n  </p>\n\n  <p>\n    The beautiful trick of CG is that these conjugate directions can be constructed cheaply. Each new direction needs only the current residual and the previous direction \u2014 no storage of the full history:\n  </p>\n\n  $$\\mathbf{p}_{k+1} = \\mathbf{r}_{k+1} + \\beta_k\\,\\mathbf{p}_k$$\n\n  <p>\n    where $\\beta_k$ is a scalar chosen to ensure $A$-conjugacy. The complete algorithm has remarkably few operations per iteration.\n  </p>\n\n  <h4>The PCG Algorithm</h4>\n\n  <p>\n    In practice, CG is almost always used with <strong>preconditioning</strong>. A preconditioner $M$ is an approximation to $A$ that is cheap to invert. Instead of solving $A\\mathbf{x} = \\mathbf{b}$, we effectively solve $M^{-1}A\\mathbf{x} = M^{-1}\\mathbf{b}$. If $M \\approx A$, then $M^{-1}A \\approx I$ (the identity), and the system is nearly trivial.\n  </p>\n\n  <p>\n    The simplest preconditioner is <strong>Jacobi (diagonal) preconditioning</strong>: $M = \\text{diag}(A)$. This scales each equation by the inverse of its diagonal entry, making all diagonal entries equal to 1. It is nearly free to compute and often reduces the iteration count by a factor of 2\u20135.\n  </p>\n\n  <p>\n    The Preconditioned Conjugate Gradient (PCG) algorithm, written step by step:\n  </p>\n\n  <div class=\"equation-block\" style=\"text-align:left; padding:1em; background:#f8f8f8; border-left:3px solid #666;\">\n    <strong>Algorithm: PCG with Jacobi preconditioning</strong><br><br>\n    <strong>Input</strong>: SPD matrix $A$, right-hand side $\\mathbf{b}$, initial guess $\\mathbf{x}_0$, tolerance $\\varepsilon$<br>\n    <strong>Setup</strong>: $M^{-1} = 1/\\text{diag}(A)$ &emsp;(Jacobi preconditioner)<br><br>\n    1. &ensp; $\\mathbf{r}_0 = \\mathbf{b} - A\\mathbf{x}_0$ &emsp;(initial residual)<br>\n    2. &ensp; $\\mathbf{z}_0 = M^{-1}\\mathbf{r}_0$ &emsp;(preconditioned residual)<br>\n    3. &ensp; $\\mathbf{p}_0 = \\mathbf{z}_0$ &emsp;(initial search direction)<br>\n    4. &ensp; <strong>for</strong> $k = 0, 1, 2, \\ldots$<br>\n    5. &emsp;&emsp; $\\alpha_k = \\dfrac{\\mathbf{r}_k^T \\mathbf{z}_k}{\\mathbf{p}_k^T A\\mathbf{p}_k}$ &emsp;(step size)<br><br>\n    6. &emsp;&emsp; $\\mathbf{x}_{k+1} = \\mathbf{x}_k + \\alpha_k\\,\\mathbf{p}_k$ &emsp;(update solution)<br>\n    7. &emsp;&emsp; $\\mathbf{r}_{k+1} = \\mathbf{r}_k - \\alpha_k\\,A\\mathbf{p}_k$ &emsp;(update residual)<br>\n    8. &emsp;&emsp; <strong>if</strong> $\\|\\mathbf{r}_{k+1}\\|/\\|\\mathbf{b}\\| < \\varepsilon$: <strong>stop</strong> &emsp;(converged)<br>\n    9. &emsp;&emsp; $\\mathbf{z}_{k+1} = M^{-1}\
