phi_e)_k = 0$ for some node $k$. Computationally simplest; physically reasonable (choose a \"ground\" reference). Modify one row/column of $\\mathbf{A}_{22}$.</li>\n    <li><strong>Integral constraint</strong>: enforce $\\int_\\Omega \\phi_e\\,dx = 0$ via a Lagrange multiplier. Adds one extra equation to the system. More elegant for theoretical analysis.</li>\n    <li><strong>Deflation</strong>: project the constant mode out of the Krylov subspace at each iteration. Algebraically clean; no modification to the matrix. Slightly more complex to implement.</li>\n    <li><strong>Spectral handling (DCT)</strong>: in the DCT solver, the $(0,0)$ coefficient corresponds exactly to the constant mode. Setting $\\hat{\\mathbf{V}}_{0,0} = 0$ after the spectral division is equivalent to pinning the mean to zero \u2014 no special matrix modification needed.</li>\n  </ol>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      <strong>Engine V5.4 connection.</strong> For monodomain, the null space of $\\mathbf{K}$ is removed by the mass matrix in the implicit system (Section 8.7). For the bidomain extension, we recommend pin-one-node as the default strategy, with DCT null-space handling as the automatic approach when using <code>DCTSolver</code>. The <code>DCTSolver._compute_eigenvalues()</code> method already handles the $(0,0)$ singularity by setting the denominator to 1.0 and the solution coefficient to 0.0.\n    </p>\n  </div>\n\n\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 17 \u2014 IMPLEMENTATION ROADMAP                              -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "ch17": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 17</div>\n  <h2 class=\"chapter-title\">Implementation Roadmap for Engine V5.4</h2>\n  <div class=\"chapter-intro\">\n    This chapter maps the mathematical framework from Chapters 12\u201316 onto the concrete software architecture of Engine V5.4, identifying what can be reused, what must be extended, and what must be built new.\n  </div>\n\n  <h3>17.1 &ensp; Architecture Extensions</h3>\n\n  <p>\n    Engine V5.4 is built around four abstract interfaces: <code>SpatialDiscretization</code>, <code>DiffusionSolver</code>, <code>LinearSolver</code>, and <code>IonicSolver</code>. The bidomain extension requires changes primarily in the first three:\n  </p>\n\n  <table>\n    <tr><th>Component</th><th>Monodomain (Current)</th><th>Bidomain (Extension)</th></tr>\n    <tr><td>State Vector</td><td>$[V_m]$ \u2014 $N$ unknowns</td><td>$[V_m,\\;\\phi_e]$ \u2014 $2N$ unknowns</td></tr>\n    <tr><td>Conductivity</td><td>Single $\\mathbf{D}_{\\text{eff}}$</td><td>Separate $\\mathbf{D}_i$, $\\mathbf{D}_e$</td></tr>\n    <tr><td>Stiffness Matrix</td><td>One $\\mathbf{K}$</td><td>Two: $\\mathbf{K}_i$, $\\mathbf{K}_e$ \u2192 2\u00d72 block</td></tr>\n    <tr><td>Linear Solver</td><td>PCG (SPD system)</td><td>FGMRES/MINRES (indefinite system)</td></tr>\n    <tr><td>Preconditioner</td><td>AMG or IC(0)</td><td>Block LDU + AMG sub-blocks</td></tr>\n    <tr><td>Ionic Solver</td><td>Rush\u2013Larsen</td><td>Rush\u2013Larsen <em>(unchanged)</em></td></tr>\n    <tr><td>LBM Solver</td><td>1 lattice (D3Q7/MRT)</td><td>2 lattices + pseudo-time for $\\phi_e$</td></tr>\n    <tr><td>Operator Splitting</td><td>Strang splitting</td><td>Strang splitting <em>(unchanged)</em></td></tr>\n  </table>\n\n  <h3>17.2 &ensp; Recommended Solver Stack</h3>\n\n  <p>\n    Based on the analysis in Chapters 13\u201316, the recommended solver configuration for a production bidomain engine is:\n  </p>\n\n  <div class=\"insight insight-engine\" style=\"font-size:1em;\">\n    <p><strong>Time Integration:</strong> Strang splitting (reaction\u2013diffusion\u2013reaction)</p>\n    <p><strong>Reaction Solver:</strong> Rush\u2013Larsen (reuse from V5.4)</p>\n    <p><strong>Diffusion Time Stepper:</strong> SDIRK2 (L-stable, second-order)</p>\n    <p><strong>Outer Linear Solver:</strong> FGMRES(30) with tolerance $10^{-6}$</p>\n    <p><strong>Preconditioner:</strong> Block LDU with Schur complement approximation</p>\n    <p><strong>Sub-block Solver:</strong> AMG V-cycle (AMGX for GPU, Hypre for CPU)</p>\n    <p><strong>Null-Space Handling:</strong> Pin one node of $\\phi_e$ to zero</p>\n    <p><strong>Expected Performance:</strong> 10\u201330 FGMRES iterations per time step; 10\u201320\u00d7 slower than monodomain</p>\n  </div>\n\n  <h3>17.3 &ensp; Performance Expectations</h3>\n\n  <p>\n    The bidomain model is inherently more expensive than monodomain. Realistic expectations:\n  </p>\n\n  <table>\n    <tr><th>Metric</th><th>Monodomain</th><th>Bidomain</th><th>Ratio</th></tr>\n    <tr><td>Unknowns per node</td><td>1</td><td>2</td><td>2\u00d7</td></tr>\n    <tr><td>Linear system size</td><td>$N$</td><td>$2N$</td><td>2\u00d7</td></tr>\n    <tr><td>Linear solve cost per step</td><td>1 PCG solve</td><td>2 AMG solves + coupling</td><td>5\u201310\u00d7</td></tr>\n    <tr><td>Total wall time (with optimal solver)</td><td>Baseline</td><td>10\u201320\u00d7 baseline</td><td>10\u201320\u00d7</td></tr>\n    <tr><td>Memory</td><td>Baseline</td><td>3\u20134\u00d7 baseline</td><td>3\u20134\u00d7</td></tr>\n  </table>\n\n  <p>\n    For a typical 3D cardiac mesh with $N = 10^6$ nodes, the monodomain solve takes approximately 1\u20135 seconds per heartbeat on a modern GPU. The bidomain solve would take approximately 10\u2013100 seconds per heartbeat \u2014 still tractable for research and many clinical applications.\n  </p>\n\n  <div class=\"separator\"></div>\n\n  <p style=\"text-align:center; font-style:italic; color:var(--caption);\">\n    End of Parts I\u2013III. The full research documentation, including detailed code examples and implementation<br>\n    guides, is available in the <code>Research/Bidomain/</code> folder of the Engine V5.4 repository.\n  </p>\n</div>\n\n\n\n<!-- \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 -->\n<!--                    PART IV \u2014 LATTICE-BOLTZMANN METHODS            -->\n<!-- \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 -->", "ch18": "<div class=\"chapter\">\n\n<div class=\"chapter-number\">Chapter 18</div>\n<h2 class=\"chapter-title\">The Lattice-Boltzmann Method: From Kinetic Theory to Computation</h2>\n\n<div class=\"chapter-intro\">\nIn Chapters 13\u201316, we discretized partial differential equations. We started with physics at the macroscopic scale \u2014 fluid flow, heat diffusion, electrical signal propagation \u2014 and asked: how do we approximate the derivatives on a computer? Those methods (FDM, FEM, FVM) work brilliantly and are the industrial standard. But there is another path, one that begins not with a PDE, but with something more fundamental: the motion of individual particles, governed by kinetic theory.\n\nThis chapter introduces the Lattice-Boltzmann Method (LBM). Unlike classical discretizations that approximate a PDE, LBM simulates a discrete analogue of the Boltzmann equation \u2014 a statement about how particles move and collide. The miracle is that when you correctly simulate the microscopic collisions, the macroscopic behavior (flow, diffusion, electrical conduction) emerges automatically. For cardiac problems, especially when spatial resolution is tight or parallelization is critical, LBM offers a compelling alternative to classical methods.\n\nWe will build this from first principles: the Boltzmann equation, its simplification to the BGK collision operator, the discretization of velocity space onto a lattice, and the final algorithm. By chapter's end, you will understand not just what LBM computes, but why the method works \u2014 and how to tune it for cardiac electrophysiology.\n</div>\n\n<h3>18.1 &ensp; The Thermodynamic Foundation: Phase Space and the Equilibrium State</h3>\n\n<div class=\"insight insight-intuition\">\n<strong>Core Insight:</strong> Every numerical method we have studied so far &mdash; FDM, FEM, FVM &mdash; starts from a macroscopic PDE and discretizes it. LBM takes a radically different route. It starts from a much deeper level: the statistical mechanics of particles. If you correctly model how particles distribute themselves in velocity space and how that distribution evolves, the macroscopic behavior &mdash; diffusion, fluid flow, heat conduction &mdash; emerges automatically. To understand LBM, we must first understand the space it lives in and the equilibrium it relaxes toward.\n</div>\n\n<h4>Position Space: What You Already Know</h4>\n\nIn every method we have encountered so far, the unknown is a scalar field: $V(\\mathbf{x}, t)$ for voltage, $T(\\mathbf{x}, t)$ for temperature, $\\phi(\\mathbf{x}, t)$ for a generic concentration. At each point $\\mathbf{x}$ in the domain, we store <strong>one number</strong> &mdash; the local value of the field. This is position space: a map from location to field value.\n\nPosition space is intuitive. You can picture a heat map of the heart where each pixel has a color representing voltage. FDM puts a number on each grid point. FEM interpolates between nodes. FVM averages over cells. In all cases, the fundamental object is simple: one value per spatial location.\n\nBut this simplicity comes at a cost. The macroscopic PDE &mdash; the diffusion equation, the monodomain equation &mdash; is a coarse-grained description. It tells you how the <em>average</em> behavior evolves, but it has already thrown away information about what individual particles are doing. To build LBM, we need to recover some of that microscopic information. That means working in a richer space.\n\n<h4>Velocity Space: What Are the Particles Doing?</h4>\n\nImagine standing at a single point in cardiac tissue and watching every ion that passes through. Some ions are moving fast to the right. Some are drifting slowly upward. Some are nearly stationary, vibrating in place. If you could catalog every ion and record its velocity, you would not get a single number &mdash; you would get a <strong>distribution</strong>.\n\nThis distribution is the velocity-space view at a single point. It answers the question: \"Of all the particles at position $\\mathbf{x}$, how many have velocity $\\mathbf{c}$?\" In a hot gas, the distribution is wide &mdash; particles are moving at all speeds in all directions. In a cold gas, the distribution is narrow &mdash; most particles are clustered near zero velocity. In a gas with bulk flow, the distribution is shifted &mdash; its peak is no longer at zero but at the flow velocity $\\mathbf{u}$.\n\nThe crucial point: <strong>at every single location in physical space, there is an entire distribution of velocities.</strong> Not one velocity, not an average velocity &mdash; a full spread. The shape of this spread encodes the thermodynamic state at that point: temperature (width of the spread), bulk flow (shift of the peak), pressure (area under the curve).\n\n<h4>Phase Space: Position and Velocity Together</h4>\n\n<strong>Phase space</strong> is the combined space where you track both where a particle is AND how fast it is going. In two spatial dimensions, a particle's full state is four numbers: $(x, y, c_x, c_y)$ &mdash; two for position, two for velocity. In three dimensions, it is six numbers: $(x, y, z, c_x, c_y, c_z)$.\n\nThe <strong>distribution function</strong> $f(\\mathbf{x}, \\mathbf{c}, t)$ lives in this combined space. It is a function of position, velocity, and time simultaneously. Its value tells you: at position $\\mathbf{x}$, at time $t$, the density of particles with velocity $\\mathbf{c}$.\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.1)</span>$$f : (\\mathbf{x}, \\mathbf{c}, t) \\;\\longrightarrow\\; \\text{particle density at } (\\mathbf{x}, \\mathbf{c}) \\text{ at time } t$$</div>\n\nThis is the fundamental object of kinetic theory. Compare it to the macroscopic field:\n\n<table style=\"width:75%; border-collapse:collapse; margin:1em auto; font-size:0.9em;\">\n<tr style=\"background-color:#f0f0f0;\">\n<th style=\"border:1px solid #333; padding:0.3em 0.5em;\"></th>\n<th style=\"border:1px solid #333; padding:0.3em 0.5em;\">Macroscopic (FDM/FEM)</th>\n<th style=\"border:1px solid #333; padding:0.3em 0.5em;\">Kinetic (LBM)</th>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\"><strong>Unknown</strong></td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$\\phi(\\mathbf{x}, t)$ &mdash; one number per point</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$f(\\mathbf{x}, \\mathbf{c}, t)$ &mdash; a distribution per point</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\"><strong>Lives in</strong></td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">Position space ($D$ dimensions)</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">Phase space ($2D$ dimensions)</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\"><strong>Information</strong></td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">Average field value</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">Full velocity distribution</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\"><strong>Storage per node</strong></td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">1 value</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$Q$ values (one per velocity direction)</td>\n</tr>\n</table>\n\nThe extra information in the velocity distribution is not wasted. It is exactly what allows LBM to avoid assembling and solving matrix systems &mdash; the transport physics is encoded in the distribution itself, and the collision-streaming algorithm updates it locally.\n\n<h4>The Equilibrium State: Where Does the Distribution Settle?</h4>\n\nHere is the central question of this section &mdash; and arguably the most important idea in all of LBM:\n\n<strong>When a system of particles reaches thermal equilibrium, what shape does the velocity distribution take?</strong>\n\nThe answer has been known since the 19th century, and it is one of the great results of statistical mechanics. James Clerk Maxwell and Ludwig Boltzmann proved that the equilibrium velocity distribution of a gas is a <strong>Gaussian</strong> (a bell curve) in velocity space:\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.2)</span>$$f^{\\text{eq}}(\\mathbf{c}) = \\frac{\\rho}{(2\\pi c_s^2)^{D/2}} \\exp\\!\\left(-\\frac{|\\mathbf{c} - \\mathbf{u}|^2}{2c_s^2}\\right)$$</div>\n\nThis is the <strong>Maxwell-Boltzmann distribution</strong>. Every symbol has a physical meaning:\n\n<ul>\n<li>$\\rho$ &mdash; the total density of particles at this location. This is the macroscopic quantity we are ultimately tracking (voltage, temperature, concentration).</li>\n<li>$\\mathbf{u}$ &mdash; the bulk (average) velocity of the particles. For diffusion problems, $\\mathbf{u} = \\mathbf{0}$ &mdash; there is no net flow, and the bell curve is centered at the origin.</li>\n<li>$c_s$ &mdash; a parameter that controls the <strong>width</strong> of the bell curve. Physically, it is related to temperature: a higher $c_s$ means a wider spread (hotter gas, faster particles on average). In LBM, $c_s$ will become the <strong>lattice speed of sound</strong>, connecting the microscopic model to macroscopic transport properties.</li>\n<li>$D$ &mdash; the spatial dimension (2 for 2D, 3 for 3D). The normalization $(2\\pi c_s^2)^{D/2}$ ensures the total probability integrates to $\\rho$.</li>\n</ul>\n\n<h4>What the Gaussian Tells Us: Three Physical Claims</h4>\n\nThe Maxwell-Boltzmann distribution (18.2) is not just a formula &mdash; it makes three specific physical claims about what equilibrium looks like. Each claim corresponds to a different \"order\" of the distribution, and each will turn out to be critically important when we build the lattice method.\n\n<div style=\"margin-left:1.5em;\">\n\n<h4 style=\"margin-top:1.2em;\">Zeroth Order &mdash; Conservation</h4>\n\nIntegrate the distribution over all velocities:\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.3)</span>$$\\int f^{\\text{eq}}(\\mathbf{c}) \\, d\\mathbf{c} = \\rho$$</div>\n\nThe total amount of \"stuff\" is $\\rho$. This is conservation of mass (or charge, or energy, depending on what $\\rho$ represents). The equilibrium does not create or destroy anything &mdash; it only redistributes velocities. No matter how the particles rearrange their speeds and directions, the total count stays the same.\n\n<h4 style=\"margin-top:1.2em;\">First Order &mdash; Symmetry of Flux</h4>\n\nCompute the average velocity by weighting with $\\mathbf{c}$:\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.4)</span>$$\\int \\mathbf{c} \\, f^{\\text{eq}}(\\mathbf{c}) \\, d\\mathbf{c} = \\rho \\, \\mathbf{u}$$</div>\n\nFor a gas at rest ($\\mathbf{u} = \\mathbf{0}$), the mean velocity is zero. The bell curve is symmetric &mdash; as many particles move left as right, up as down. There is no net flux. For diffusion problems in cardiac EP, this is exactly the equilibrium condition: at rest, the distribution is centered and symmetric.\n\n<h4 style=\"margin-top:1.2em;\">Second Order &mdash; Isotropic Variance</h4>\n\nCompute the velocity covariance (the \"spread\" of the bell curve):\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.5)</span>$$\\int (c_\\alpha - u_\\alpha)(c_\\beta - u_\\beta) \\, f^{\\text{eq}}(\\mathbf{c}) \\, d\\mathbf{c} = \\rho \\, c_s^2 \\, \\delta_{\\alpha\\beta}$$</div>\n\nThe variance is <strong>isotropic</strong> &mdash; the bell curve has the same width in every direction. The $\\delta_{\\alpha\\beta}$ (Kronecker delta: 1 if $\\alpha = \\beta$, 0 otherwise) means there is no preferred axis. The parameter $c_s^2$ is the variance of the Gaussian, and it is the same along $x$, $y$, and $z$.\n\nThis isotropy is a physical claim: at thermodynamic equilibrium, no direction is special. The random thermal motion of particles is equally vigorous in all directions. This will later impose constraints on the lattice weights and will be the reason why the <strong>standard LBM lattice produces isotropic diffusion by default</strong>.\n\n</div>\n\n<div class=\"insight insight-intuition\">\n<strong>Three orders, three physics:</strong> The Gaussian equilibrium encodes conservation (zeroth order), zero net flux (first order), and isotropic variance (second order). These are not abstract mathematical properties &mdash; they are the defining characteristics of thermodynamic equilibrium. Every lattice-Boltzmann scheme must respect all three, because they are the physical laws that the scheme must recover at the macroscopic level. In Section 18.4, we will see that these three conditions are exactly the constraints that determine the lattice weights $w_i$ and velocities $\\mathbf{c}_i$.\n</div>\n\n<h4>Two Cases: Rest and Flow</h4>\n\nThe Maxwell-Boltzmann distribution (18.2) handles two physically distinct situations:\n\n<strong>Case 1: System at rest ($\\mathbf{u} = \\mathbf{0}$).</strong> The bell curve is centered at the origin of velocity space. No bulk motion &mdash; particles jiggle randomly in all directions with equal probability. This is the relevant case for <strong>diffusion</strong>: cardiac tissue conducts electrical signals by ion diffusion, not bulk fluid flow. The equilibrium distribution simplifies to:\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.6)</span>$$f^{\\text{eq}}(\\mathbf{c}) = \\frac{\\rho}{(2\\pi c_s^2)^{D/2}} \\exp\\!\\left(-\\frac{|\\mathbf{c}|^2}{2c_s^2}\\right)$$</div>\n\na symmetric Gaussian centered at the origin. This is the equilibrium that our cardiac LBM will use.\n\n<strong>Case 2: System with bulk flow ($\\mathbf{u} \\neq \\mathbf{0}$).</strong> The bell curve is shifted &mdash; its peak is at $\\mathbf{u}$ instead of at the origin. More particles are moving in the flow direction than against it. This is the relevant case for <strong>fluid dynamics</strong> (Navier-Stokes). The distribution is still a Gaussian, but the center has moved. The shift breaks the first-order symmetry: $\\int \\mathbf{c} \\, f^{\\text{eq}} \\, d\\mathbf{c} = \\rho\\mathbf{u} \\neq \\mathbf{0}$.\n\n<div class=\"insight insight-math\">\n<strong>Why $c_s$ is the bridge between micro and macro:</strong> The parameter $c_s$ plays a dual role. In the continuous Maxwell-Boltzmann distribution, it is the <strong>thermal velocity</strong> &mdash; the standard deviation of the velocity Gaussian, set by the temperature of the gas ($c_s^2 = k_B T / m$). When we discretize onto a lattice, $c_s$ becomes the <strong>lattice speed of sound</strong> ($c_s^2 = c^2/3$ where $c = \\Delta x / \\Delta t$). This is not a coincidence: the Chapman-Enskog analysis (Section 18.2) shows that the lattice speed of sound must equal the Gaussian's variance parameter for the discrete scheme to recover the correct macroscopic transport equations. The connection $c_s^2 = c^2/3$ is a fixed consequence of the lattice geometry and the quadrature exactness conditions (Section 18.4).\n</div>\n\n<h4>Why the Equilibrium Is the Heart of LBM</h4>\n\nIn FDM, FEM, and FVM, the physics enters through the PDE &mdash; you discretize the diffusion equation or the monodomain equation directly. In LBM, <strong>the physics enters through the equilibrium distribution</strong>. The entire method can be summarized in one sentence:\n\n<em>Relax the velocity distribution toward the Maxwell-Boltzmann equilibrium, and the correct macroscopic PDE emerges automatically.</em>\n\nThis is why we have spent this section building the equilibrium from physical principles rather than just writing down a formula. The Gaussian is not an arbitrary choice &mdash; it is the unique distribution that satisfies the constraints of thermodynamic equilibrium (maximum entropy subject to conservation of mass, momentum, and energy). Every property of LBM &mdash; the lattice weights, the velocity sets, the collision operator, the transport coefficients &mdash; traces back to this Gaussian.\n\nIn the sections that follow, we will:\n<ul>\n<li><strong>Section 18.2:</strong> Write down the equation that governs how $f$ evolves toward this equilibrium (the Boltzmann equation), and simplify it for practical computation (the BGK collision operator).</li>\n<li><strong>Section 18.3:</strong> Discretize velocity space onto a lattice, turning the continuous $f(\\mathbf{x}, \\mathbf{c}, t)$ into a finite set of distributions $f_i(\\mathbf{x}, t)$, and write the lattice-Boltzmann equation.</li>\n<li><strong>Section 18.4:</strong> Return to the Gaussian equilibrium and ask: what constraints do equations (18.3)&ndash;(18.5) impose on the discrete lattice? This will determine the weights $w_i$, velocity vectors $\\mathbf{c}_i$, and the discrete equilibrium $f_i^{\\text{eq}}$.</li>\n<li><strong>Section 18.5:</strong> Introduce moment space &mdash; a representation that reveals which physical laws the collision operator is actually enforcing, and how to control them independently.</li>\n</ul>\n\n<h3>18.2 &ensp; The Boltzmann Equation and Kinetic Theory</h3>\n\n<h4>The Boltzmann Equation: Fundamental Form</h4>\n\nThe Boltzmann equation describes how the distribution function $f(\\mathbf{x}, \\mathbf{c}, t)$ &mdash; introduced in Section 18.1 &mdash; evolves in time. In the <strong>Eulerian frame</strong> (you stand at a fixed point in phase space and watch the distribution change around you), it reads:\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.7)</span>$$\\frac{\\partial f}{\\partial t} + \\mathbf{c} \\cdot \\nabla f + \\mathbf{F} \\cdot \\nabla_{\\mathbf{c}} f = \\Omega(f)$$</div>\n\nLet us parse each term on the left-hand side:\n\n<ul>\n<li>$\\frac{\\partial f}{\\partial t}$: How the distribution changes in time at a fixed point in phase space.</li>\n<li>$\\mathbf{c} \\cdot \\nabla f$: Particles streaming through physical space at velocity $\\mathbf{c}$. This is advection: a particle at $\\mathbf{x}$ with velocity $\\mathbf{c}$ will be at $\\mathbf{x} + \\mathbf{c}\\Delta t$ after time $\\Delta t$.</li>\n<li>$\\mathbf{F} \\cdot \\nabla_{\\mathbf{c}} f$: External forces accelerating particles, changing their velocities. The $\\nabla_{\\mathbf{c}}$ means the derivative is in <em>velocity</em> space, not physical space. This term accounts for gravity, electric fields, or any body force that shifts the velocity distribution.</li>\n</ul>\n\nThe first two terms together form the <strong>material (total) derivative</strong> familiar from fluid mechanics &mdash; the rate of change following a particle that streams at velocity $\\mathbf{c}$. The third term is separate: it represents forces that <em>change</em> the particle's velocity, pushing it through velocity space. If we define the streaming derivative as\n\n<div class=\"equation-block\">$$\\frac{Df}{Dt} \\;\\equiv\\; \\frac{\\partial f}{\\partial t} + \\mathbf{c} \\cdot \\nabla f$$</div>\n\nthen equation (18.7) can be written compactly as\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.7a)</span>$$\\frac{Df}{Dt} + \\mathbf{F} \\cdot \\nabla_{\\mathbf{c}} f = \\Omega(f)$$</div>\n\nThis <strong>Lagrangian perspective</strong> is often more intuitive: ride along with a particle that streams at constant velocity $\\mathbf{c}$. From its frame, the distribution $f$ changes for only two reasons &mdash; external forces push particles to different velocities, and collisions reshuffle the velocity population. If there were no forces and no collisions, $f$ would be carried unchanged along the streaming trajectory, like a ball on a frictionless surface.\n\nFor LBM applications (diffusion, monodomain), we will drop the external force term entirely (no body forces accelerate particles through velocity space). This makes the Eulerian form (18.7) the natural starting point for deriving the lattice-Boltzmann equation.\n\n<strong>The right-hand side is the collision operator:</strong>\n\nThe symbol $\\Omega(f)$ represents collisions. When particles collide, their velocities change. The full collision integral is:\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.8)</span>$$\\Omega(f) = \\int \\int (f'f'_1 - f f_1) \\, g \\, B(g, \\theta) \\, d\\Omega \\, d\\mathbf{c}_1$$</div>\n\nThe notation is intimidating. Here is what it means:\n<ul>\n<li>$f$ and $f_1$: the distribution functions of two particles BEFORE collision.</li>\n<li>$f'$ and $f'_1$: the distributions of those same two particles AFTER collision.</li>\n<li>$g = |\\mathbf{c} - \\mathbf{c}_1|$: the relative speed of the two particles.</li>\n<li>$B(g, \\theta)$: the scattering cross-section, which depends on the relative velocity and scattering angle $\\theta$.</li>\n<li>$d\\Omega$: integration over all possible scattering angles.</li>\n<li>$d\\mathbf{c}_1$: integration over all velocities of the second particle.</li>\n</ul>\n\nThe expression $(f'f'_1 - ff_1)$ is a balance: the gain term $f'f'_1$ counts particles scattered INTO the state $(\\mathbf{x}, \\mathbf{c})$ by collisions, while the loss term $ff_1$ counts particles scattered OUT.\n\n<h4>The BGK Simplification</h4>\n\nThe collision integral (18.8) is a 5-dimensional integral &mdash; computationally intractable. For a coarse 3D grid with $100^3$ points and even a modest $10^3$ velocities per point, evaluating it requires $\\sim 10^{15}$ operations per timestep. For most of the 20th century, the Boltzmann equation remained a theoretical tool, not a practical one.\n\nThe breakthrough came from Bhatnagar, Gross, and Krook in 1954. They asked: <strong>Can we replace the complex collision integral with something simple that still produces the correct macroscopic physics?</strong>\n\nTheir answer was to replace the collision integral with a single relaxation toward the equilibrium distribution we met in Section 18.1:\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.11)</span>$$\\Omega(f) \\approx -\\frac{1}{\\tau}(f - f^{\\text{eq}})$$</div>\n\nwhere $\\tau$ is a single relaxation time and $f^{\\text{eq}}$ is the Maxwell-Boltzmann equilibrium (equation 17.2). The idea is elegantly simple: the actual distribution $f$ is nudged toward its local equilibrium at a rate determined by $\\tau$. No detailed calculation of scattering angles or cross-sections is needed.\n\nThis is the <strong>BGK approximation</strong>. Notice the direct connection to Section 18.1: the $f^{\\text{eq}}$ that appears here is exactly the Gaussian equilibrium (18.2) &mdash; the bell curve in velocity space that encodes conservation, zero flux, and isotropic variance. The BGK operator says: whatever the current distribution looks like, push it toward that Gaussian. The three physical claims we established in Section 18.1 &mdash; equations (18.3), (18.4), and (18.5) &mdash; are the properties that $f^{\\text{eq}}$ carries into the collision step.\n\nSubstituting (18.11) into (18.7), we get the <strong>BGK Boltzmann equation</strong>:\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.12)</span>$$\\frac{\\partial f}{\\partial t} + \\mathbf{c} \\cdot \\nabla f = -\\frac{1}{\\tau}(f - f^{\\text{eq}})$$</div>\n\nwhere we have dropped the external force term $\\mathbf{F} \\cdot \\nabla_{\\mathbf{c}} f$ (in LBM for diffusion, there are no external forces accelerating particles through velocity space).\n\n<h4>Why BGK Works: Chapman-Enskog Analysis</h4>\n\nWhy should such a drastic simplification &mdash; replacing a 5-dimensional integral with a simple relaxation &mdash; give the right macroscopic physics? The answer comes from <strong>Chapman-Enskog analysis</strong>, one of the deepest results in statistical mechanics.\n\nThe idea: assume the distribution function is close to equilibrium, with small corrections:\n\n$$f = f^{\\text{eq}} + \\epsilon f^{(1)} + \\epsilon^2 f^{(2)} + \\cdots$$\n\nwhere $\\epsilon$ is a small parameter measuring how far the system is from equilibrium (technically, the Knudsen number $\\text{Kn} = \\lambda / L$, the ratio of mean free path to system size). Then expand the Boltzmann equation order by order. What emerges at each order is a specific piece of the macroscopic equations:\n\n<strong>Zeroth order</strong> ($\\epsilon^0$): the distribution equals the equilibrium $f = f^{\\text{eq}}$. Taking the zeroth and first moments of $f^{\\text{eq}}$ (exactly the integrals from equations 17.3 and 17.4) gives the <strong>conservation laws</strong>:\n\n$$\\frac{\\partial \\rho}{\\partial t} + \\nabla \\cdot (\\rho \\mathbf{u}) = 0 \\qquad \\text{(mass conservation)}$$\n\nThese are the Euler equations &mdash; ideal fluid dynamics with no dissipation.\n\n<strong>First order</strong> ($\\epsilon^1$): the correction $f^{(1)}$ introduces gradients of velocity and temperature. Taking moments of $f^{(1)}$ produces the <strong>dissipative terms</strong> &mdash; this is where viscosity and diffusivity enter:\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.9)</span>$$\\rho \\frac{D\\mathbf{u}}{Dt} = -\\nabla p + \\underbrace{\\eta \\nabla^2 \\mathbf{u}}_{\\text{viscous stress}} + \\mathbf{f}$$</div>\n\nfor fluid flow (Navier-Stokes), and\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.10)</span>$$\\frac{\\partial T}{\\partial t} + \\mathbf{u} \\cdot \\nabla T = \\underbrace{D \\nabla^2 T}_{\\text{diffusion}}$$</div>\n\nfor heat or mass diffusion. The underbraced terms are the ones that the first-order correction adds &mdash; they are absent in the Euler (zeroth-order) equations. The transport coefficients (viscosity $\\eta$, diffusivity $D$) are determined by the relaxation time $\\tau$. Large $\\tau$ (slow relaxation toward equilibrium) gives high viscosity or diffusivity; small $\\tau$ gives low viscosity or diffusivity. The relationship is precise and will be derived explicitly in Section 18.4 as the $\\tau$-$D$ relationship.\n\n<div class=\"insight insight-intuition\">\n<strong>The key insight:</strong> The macroscopic PDEs we have been solving throughout this textbook &mdash; the diffusion equation, the monodomain equation, even Navier-Stokes &mdash; are not fundamental. They are <strong>emergent</strong>. They arise as the zeroth- and first-order limits of the Boltzmann equation in the collision-dominated regime. The zeroth-order (equilibrium) contribution gives conservation laws. The first-order (near-equilibrium) correction gives the dissipative transport terms. The equilibrium $f^{\\text{eq}}$ carries the conservation physics (18.3)&ndash;(18.5); the relaxation rate $1/\\tau$ sets the transport coefficients. Together, they recover the full macroscopic PDE.\n</div>\n\n<div class=\"insight insight-math\">\n<strong>Why Chapman-Enskog Works:</strong> The expansion assumes the distribution is locally near equilibrium, with small non-hydrodynamic corrections. The collision operator acts to restore equilibrium. By expanding around this equilibrium and using the fact that the collision operator has specific zero eigenvalues (corresponding to conserved quantities like mass and momentum), one can systematically extract the macroscopic equations order by order in the Knudsen number.\n</div>\n\n<h3>18.3 &ensp; The Lattice-Boltzmann Equation: Single Relaxation Time (SRT/BGK)</h3>\n\n<div style=\"margin:1em 1.5em; padding:0.8em 1.2em; background:#f8f8f8; border-left:3px solid #0072B2;\">\n<strong>The Core Strategy of LBM</strong>\n<ol>\n<li><strong>Start from the kinetic level:</strong> the Boltzmann equation governs how $f(\\mathbf{x}, \\mathbf{c}, t)$ evolves in phase space (Section 18.2).</li>\n<li><strong>Simplify the collision:</strong> replace the intractable collision integral with BGK relaxation toward $f^{\\text{eq}}$ &mdash; the Maxwell-Boltzmann Gaussian from Section 18.1 (Section 18.2).</li>\n<li><strong>Discretize velocity space:</strong> replace the continuous $\\mathbf{c}$ with a small finite set of lattice velocities $\\mathbf{c}_i$ and write the discrete update rule (this section).</li>\n<li><strong>Derive the lattice from the Gaussian:</strong> the weights $w_i$, velocity sets $\\mathbf{c}_i$, and discrete equilibrium $f_i^{\\text{eq}}$ all follow from quadrature on the Maxwell-Boltzmann distribution (Section 18.4).</li>\n<li><strong>Trust Chapman-Enskog:</strong> this analysis guarantees that the simplified, discretized scheme recovers the correct macroscopic PDE in the hydrodynamic limit.</li>\n</ol>\nThe equilibrium $f^{\\text{eq}}$ is the thread that connects everything: it defines the target of relaxation (BGK), it carries the conservation laws (Section 18.1), and it determines which macroscopic equation the scheme recovers (Chapman-Enskog).\n</div>\n\n<h4>From Continuous to Discrete: Three Deliberate Choices</h4>\n\nIn Section 18.2 we arrived at the BGK Boltzmann equation (18.12):\n\n$$\\frac{\\partial f}{\\partial t} + \\mathbf{c} \\cdot \\nabla f = -\\frac{1}{\\tau}(f - f^{\\text{eq}})$$\n\nThis is still a continuous equation &mdash; $f$ lives on a continuous position space, a continuous velocity space, and continuous time. To turn it into something a computer can execute, we make three deliberate discretization choices:\n\n<ol style=\"margin:0.8em 0 0.8em 1.8em; line-height:1.65;\">\n<li style=\"margin-bottom:0.7em;\"><strong>Discretize velocity space.</strong> Replace the continuous velocity $\\mathbf{c}$ with a small finite set of lattice velocities $\\{\\mathbf{c}_0, \\mathbf{c}_1, \\ldots, \\mathbf{c}_{Q-1}\\}$. The continuous distribution $f(\\mathbf{x}, \\mathbf{c}, t)$ becomes a finite collection of distributions $f_i(\\mathbf{x}, t)$, one for each lattice direction $i$. This is the step where velocity space &mdash; the infinite-dimensional space from Section 18.1 &mdash; collapses to a handful of directions. The choice of which velocities to keep (and the associated weights) is governed by the Gaussian quadrature we will derive in Section 18.4.</li>\n<li style=\"margin-bottom:0.7em;\"><strong>Discretize time.</strong> Replace $\\partial f / \\partial t$ with a finite difference over a timestep $\\Delta t$. This turns the differential equation into an update rule.</li>\n<li style=\"margin-bottom:0.7em;\"><strong>Lock the grid to the velocities.</strong> Choose the spatial grid spacing $\\Delta x$ and timestep $\\Delta t$ so that each lattice velocity $\\mathbf{c}_i$ moves a particle from one grid node to an adjacent grid node in exactly one timestep: $\\mathbf{c}_i \\Delta t = \\mathbf{c}_i \\Delta x / |\\mathbf{c}_i|$. This eliminates interpolation entirely &mdash; streaming is exact.</li>\n</ol>\n\nNotice one term that is conspicuously absent: the external force $\\mathbf{F} \\cdot \\nabla_{\\mathbf{c}} f$ from equation (18.7). Recall that this term describes forces that accelerate particles through velocity space &mdash; gravity pulling molecules downward, electric fields pushing ions. For diffusion and the monodomain equation, there are no such body forces: particles stream freely and collide, but nothing pushes them to change velocity mid-flight. We therefore drop it. (For applications that do require forcing &mdash; buoyancy-driven flows, electrokinetics &mdash; the force re-enters as a source term added to the right-hand side, but that is beyond our scope.)\n\nWith these three choices, the material derivative $Df/Dt$ becomes a simple finite difference along the lattice direction $i$, and the BGK equation becomes:\n\n<h4>The Discrete Lattice-Boltzmann Equation</h4>\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.13)</span>$$f_i(\\mathbf{x}, \\, t + \\Delta t) - f_i(\\mathbf{x}, t) = -\\frac{\\Delta t}{\\tau}\\left[f_i(\\mathbf{x}, t) - f_i^{\\text{eq}}(\\mathbf{x}, t)\\right]$$</div>\n\nThe left-hand side is the change in the distribution $f_i$ at node $\\mathbf{x}$ over one timestep. The right-hand side is the collision: a relaxation nudge toward the local equilibrium $f_i^{\\text{eq}}$, scaled by $\\Delta t / \\tau$. This is the entire algorithm at a single node before streaming.\n\nAfter computing the post-collision state, we stream: each $f_i$ is moved to the neighboring node in the direction $\\mathbf{c}_i$. The combined collision-then-stream update gives the full lattice-Boltzmann equation in its standard form:\n\n$$f_i(\\mathbf{x} + \\mathbf{c}_i \\Delta t, \\, t + \\Delta t) = f_i(\\mathbf{x}, t) - \\frac{\\Delta t}{\\tau}\\left[f_i(\\mathbf{x}, t) - f_i^{\\text{eq}}(\\mathbf{x}, t)\\right]$$\n\nThis single line says: compute the collision at $\\mathbf{x}$, then place the result at the downstream neighbor $\\mathbf{x} + \\mathbf{c}_i \\Delta t$. The equation is fully explicit &mdash; no matrix inversions, no implicit coupling between nodes, no iterative solves. You compute it one node at a time, and the entire simulation marches forward.\n\nIn practice, we split this into two conceptual steps, which we now describe.\n\n<h4>Step 1: Collision (Local, Pure Relaxation)</h4>\n\nAt each node, we compute:\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.14)</span>$$f_i^*(\\mathbf{x}, t) = f_i(\\mathbf{x}, t) - \\frac{\\Delta t}{\\tau}\\left[f_i(\\mathbf{x}, t) - f_i^{\\text{eq}}(\\mathbf{x}, t)\\right]$$</div>\n\nThis is the collision step. The superscript $*$ on $f_i^*$ denotes the <strong>post-collision</strong> distribution \u2014 the state of the distribution function AFTER the collision relaxation has been applied but BEFORE streaming moves data to neighbors. You can read $f_i^*$ as \"f-i-star\" or \"f-i post-collision.\" It is an intermediate quantity: $f_i$ is the pre-collision state, $f_i^*$ is the post-collision state, and after streaming, $f_i^*$ becomes the new $f_i$ at the destination node.\n\nThe collision step happens at a single node, purely local. The distributions $f_i$ at node $\\mathbf{x}$ are nudged toward their equilibrium values $f_i^{\\text{eq}}$. The speed of this nudge is controlled by $\\Delta t / \\tau$:\n<ul>\n<li>If $\\tau$ is large, the nudge is small \u2014 the distribution relaxes slowly.</li>\n<li>If $\\tau$ is small (but must remain $> \\Delta t/2$ for stability), the nudge is large \u2014 the distribution relaxes quickly.</li>\n</ul>\n\nThe parameter $\\tau$ directly controls the transport properties (diffusivity, viscosity). This is the heart of the method: all the physics (how fast heat diffuses, how viscous the fluid is) is encoded in $\\tau$.\n\n<h4>Step 2: Streaming (Pure Data Movement)</h4>\n\nAfter collision, we shift the post-collision distributions to their neighboring nodes:\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.15)</span>$$f_i(\\mathbf{x} + \\mathbf{c}_i \\Delta t, \\, t + \\Delta t) = f_i^*(\\mathbf{x}, t)$$</div>\n\nThis is the streaming step. Each distribution $f_i^*$ at node $\\mathbf{x}$ slides to the neighboring node in direction $i$. The destination is $\\mathbf{x} + \\mathbf{c}_i \\Delta t$. If the lattice is designed so that $\\mathbf{c}_i \\Delta t = \\Delta x$ (one lattice spacing), then streaming is a simple data copy \u2014 a value at the center moves to a neighbor.\n\nCritically, streaming is not a collision. There is no physics in streaming \u2014 it is pure kinematics. A particle moving with velocity $\\mathbf{c}_i$ will naturally travel a distance $\\mathbf{c}_i \\Delta t$ in time $\\Delta t$. Streaming enforces this.\n\n<h4>The Combined Form</h4>\n\nSubstituting the collision step (18.14) into the streaming step (18.15) &mdash; replacing $f_i^*$ with its definition &mdash; gives the single combined equation:\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.16)</span>$$f_i(\\mathbf{x} + \\mathbf{c}_i \\Delta t, \\, t + \\Delta t) = f_i(\\mathbf{x}, t) - \\frac{\\Delta t}{\\tau}\\left[f_i(\\mathbf{x}, t) - f_i^{\\text{eq}}(\\mathbf{x}, t)\\right]$$</div>\n\nThis is the <strong>lattice-Boltzmann equation in streaming form</strong>. It is the same physics as equation (18.13), but written from the destination's perspective: the value arriving at node $\\mathbf{x} + \\mathbf{c}_i \\Delta t$ at the next timestep equals the current value at node $\\mathbf{x}$, corrected by the collision. You will encounter this form throughout the LBM literature &mdash; it is the most compact way to write the full collide-and-stream update.\n\n<div class=\"insight insight-intuition\">\n<strong>Locality and Parallelization:</strong> Both collision and streaming are local operations. Collision affects only one node at a time. Streaming is a data copy \u2014 the value $f_i^*(\\mathbf{x}, t)$ moves to a neighbor, but it does not interact with neighbors' data. After collision, all the $f_i$ at all nodes are independent. Streaming then redistributes them. This extreme locality means LBM is trivially parallelizable: each node (or even each lattice direction at each node) can be processed on a separate processor with zero communication overhead during the step. Only a halo exchange is needed between processors after streaming. This is one reason LBM is popular on GPUs.\n</div>\n\n<h4>Variable Definitions and Component Form</h4>\n\nTo implement LBM, you must understand every variable. Here is a complete reference:\n\n<table style=\"width:90%; border-collapse:collapse; margin:1em auto; font-size:0.95em;\">\n<tr style=\"background-color:#f0f0f0;\">\n<th style=\"border:1px solid #333; padding:0.7em; text-align:left;\">Symbol</th>\n<th style=\"border:1px solid #333; padding:0.7em; text-align:left;\">Meaning</th>\n<th style=\"border:1px solid #333; padding:0.7em; text-align:left;\">Units / Constraints</th>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.7em;\">$f_i(\\mathbf{x}, t)$</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">Distribution function for direction $i$ at node $\\mathbf{x}$, time $t$</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">Density (or concentration if diffusion)</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.7em;\">$f_i^*(\\mathbf{x}, t)$</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">Post-collision distribution for direction $i$ (after relaxation, before streaming)</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">Same units as $f_i$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.7em;\">$f_i^{\\text{eq}}(\\mathbf{x}, t)$</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">Equilibrium distribution for direction $i$</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">Density (or concentration)</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.7em;\">$\\tau$</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">Relaxation time</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">Must satisfy $\\tau > \\Delta t / 2$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.7em;\">$\\Delta t$</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">Timestep</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">In lattice units, $\\Delta t = 1$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.7em;\">$\\mathbf{c}_i$</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">Discrete velocity vector for direction $i$</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">$\\mathbf{c}_0 = \\mathbf{0}$ (rest); $|\\mathbf{c}_i| = c = \\Delta x / \\Delta t$ (moving)</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.7em;\">$w_i$</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">Weight for direction $i$</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">$\\sum_i w_i = 1$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.7em;\">$\\phi(\\mathbf{x}, t) = \\sum_i f_i$</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">Macroscopic variable (temperature, voltage, density)</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">Physical units (K, mV, kg/m\u00b3)</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.7em;\">$Q$</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">Number of lattice directions (velocities)</td>\n<td style=\"border:1px solid #333; padding:0.7em;\">$i$ ranges from $0$ to $Q-1$</td>\n</tr>\n</table>\n\n<strong>In detail:</strong>\n\n$f_i(\\mathbf{x}, t)$ is the distribution function for direction $i$. Think of it as \"the portion of the macroscopic quantity assigned to direction $i$ at this node at this time.\" There are $Q$ values of $f_i$ stored at each node &mdash; one per lattice direction. The sum $\\sum_i f_i = \\phi$ recovers the total macroscopic quantity.\n\n$f_i^{\\text{eq}}(\\mathbf{x}, t)$ is the equilibrium distribution for direction $i$ &mdash; the target that the collision step relaxes toward. Its exact form depends on the weights $w_i$ and the macroscopic field, and will be derived in Section 18.4 from the Gaussian equilibrium we built in Section 18.1.\n\n$\\tau$ is the relaxation time. It controls how quickly the distribution approaches equilibrium. The relationship between $\\tau$ and the physical diffusivity $D$ comes from Chapman-Enskog analysis and will be derived in Section 18.4.\n\n$\\Delta t$ is the timestep. In lattice units, we often set $\\Delta t = 1$, but it is useful to keep $\\Delta t$ explicit when connecting lattice variables to physical ones.\n\n$\\mathbf{c}_i$ is the discrete velocity vector for direction $i$. Each $\\mathbf{c}_i$ points from a node to a neighbor (or stays put if $i=0$). The specific velocity sets and their associated weights are derived in Section 18.4 from the Gaussian quadrature framework.\n\n$w_i$ is the weight for direction $i$. Like $\\mathbf{c}_i$, the weights are uniquely determined by the quadrature exactness conditions and will be derived in Section 18.4.\n\n$\\phi(\\mathbf{x}, t) = \\sum_i f_i(\\mathbf{x}, t)$ is the recovered macroscopic quantity. For diffusion of temperature, $\\phi$ is temperature. For cardiac electrophysiology, $\\phi$ is the voltage. The sum over all lattice directions gives the total.\n\n<h3>18.4 &ensp; From the Gaussian to the Lattice: Discretizing $f^{\\text{eq}}$, $w_i$, and $\\mathbf{c}_i$</h3>\n\n<h4>From Integrals to Sums</h4>\n\nIn Section 18.1 we wrote down the Maxwell-Boltzmann equilibrium (equation 17.2) and showed that it satisfies three integral identities &mdash; conservation of mass (18.3), momentum (18.4), and isotropic variance (18.5). Each of these is an integral over velocity space: you integrate $f^{\\text{eq}}(\\mathbf{c})$ &mdash; or $f^{\\text{eq}}$ multiplied by some power of $\\mathbf{c}$ &mdash; over <em>all directions and all magnitudes</em>.\n\nLBM replaces \"all directions and all magnitudes\" with <strong>a few lattice vectors $\\mathbf{e}_i$ and weights $w_i$</strong>. The lattice vectors are dimensionless integer vectors &mdash; their components are just 0 and $\\pm 1$. For example, in D2Q5:\n\n$$\\mathbf{e}_0 = (0,0), \\quad \\mathbf{e}_1 = (1,0), \\quad \\mathbf{e}_2 = (-1,0), \\quad \\mathbf{e}_3 = (0,1), \\quad \\mathbf{e}_4 = (0,-1)$$\n\nEach lattice vector comes with a weight $w_i$ that says \"this sample point represents this much of the Gaussian bell curve.\" Every continuous integral becomes a finite sum:\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.18)</span>$$\\int p(\\mathbf{c}) \\; \\underbrace{\\frac{1}{(2\\pi c_s^2)^{D/2}} e^{-|\\mathbf{c}|^2 / 2c_s^2}}_{\\text{Gaussian kernel}} \\; d\\mathbf{c} \\;\\approx\\; \\sum_{i=0}^{Q-1} w_i \\; p(\\mathbf{e}_i)$$</div>\n\nThe left-hand side integrates over the full continuous velocity space $\\mathbf{c}$. The right-hand side evaluates at the lattice nodes $\\mathbf{e}_i$ in dimensionless space &mdash; this is where the quadrature lives. Here $p$ is a placeholder &mdash; it stands for whatever function of velocity you want to integrate against the Gaussian. Plug in $p = 1$ and you compute total mass. Plug in $p = e_{i\\alpha}$ (a single component of $\\mathbf{e}_i$) and you compute momentum. Plug in $p = e_{i\\alpha} e_{i\\beta}$ and you compute the stress tensor. The nodes $\\mathbf{e}_i$ and their weights $w_i$ are chosen so that these sums are <em>exact</em> for all polynomials up to the degree you need.\n\n<strong>This is where $w_i$ and $\\mathbf{e}_i$ come from.</strong> They are not free parameters that we tune. They are the nodes and weights of a quadrature rule applied to the Gaussian &mdash; a married pair, born together from the bell curve's shape. Once you choose a lattice geometry (how many sample points, and where), the weights are uniquely determined.\n\n<div class=\"insight insight-intuition\">\n<strong>How Can Five Points Replace an Entire Plane?</strong> In the continuous integral, $\\mathbf{c}$ ranges over all directions and all magnitudes &mdash; an infinite velocity plane. On the lattice, we replace this with just 5 (or 9) sample points whose components are 0 and $\\pm 1$. This seems like a drastic reduction. But remember what we are integrating: a Gaussian bell curve that decays rapidly away from the origin. Almost all of the integral's value is concentrated within a few lattice spacings of the center. The quadrature exploits this &mdash; it places its sample points precisely where the Gaussian has significant weight, and the weights $w_i$ encode how much of the bell curve each point represents. Five well-chosen points on a steep hill capture more information than a thousand points in the flat plains beyond it.\n</div>\n\n<h4>Physical Velocities</h4>\n\nThe $\\mathbf{e}_i$ are dimensionless integers &mdash; they tell you which neighbor to hop to on the grid. But the Boltzmann equation and the physics it describes involve velocities with real units. To recover a <strong>physical velocity</strong> $\\mathbf{c}_i$ (length/time), scale by the lattice speed $c = \\Delta x / \\Delta t$:\n\n$$\\mathbf{c}_i = \\mathbf{e}_i \\, \\frac{\\Delta x}{\\Delta t}$$\n\nSo $\\mathbf{e}_1 = (1,0)$ is a one-node hop on the grid, and $\\mathbf{c}_1 = (\\Delta x / \\Delta t, \\; 0)$ is the physical speed of that hop. Throughout this chapter, we use $\\mathbf{e}_i$ when writing velocity tables, streaming rules, and the quadrature formula &mdash; anything that lives in lattice space. We use $\\mathbf{c}_i$ when connecting to physical quantities: the speed of sound $c_s$, the $\\tau$-$D$ diffusion relationship, and the equilibrium distribution in fluid-flow problems.\n\nA natural worry: if $\\mathbf{c}_i$ changes when you refine your grid (because $\\Delta x / \\Delta t$ changes), do the weights $w_i$ change too? They do not. The weights are married to $\\mathbf{e}_i$, not to $\\mathbf{c}_i$, and $\\mathbf{e}_i$ is a fixed set of integer vectors that never changes. When you halve $\\Delta x$, every physical velocity $\\mathbf{c}_i$ shrinks &mdash; but the lattice speed of sound $c_s$ shrinks by the same factor, so the dimensionless ratio $\\mathbf{c}_i / c_s = \\mathbf{e}_i / \\sqrt{3}$ is unchanged. The Gaussian in lattice units always has the same shape, the sample points sit in the same places relative to its width, and the weights stay fixed. Grid refinement changes the physics that $c_s$ maps to, not the quadrature itself.\n\n<h4>The Discrete Equilibrium</h4>\n\nFor <strong>pure diffusion</strong> ($\\mathbf{u} = 0$), the Gaussian is centered at the origin. When you evaluate it at the quadrature nodes and fold in the weights, all the velocity-dependent structure vanishes. The discrete equilibrium is simply:\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.27)</span>$$f_i^{\\text{eq}} = w_i \\, \\phi$$</div>\n\nwhere $\\phi = \\sum_j f_j$ is the local macroscopic quantity (temperature, voltage, concentration). Each direction carries a fraction $w_i$ of the total field &mdash; the rest direction carries the most (it sits at the peak of the bell curve), and the moving directions carry the remainder. There is no preferred direction &mdash; the equilibrium is symmetric, just as the centered Gaussian is symmetric.\n\nThis is the equilibrium we use for cardiac electrophysiology, since the monodomain and bidomain equations are diffusion equations with no bulk flow.\n\n<h4>Gauss-Hermite Quadrature: Why These Specific Nodes and Weights</h4>\n\nThe quadrature rule in equation (18.18) has a classical name: <strong>Gauss-Hermite quadrature</strong>. It is the standard method for integrating polynomials multiplied by a Gaussian kernel, and it has been studied since the 19th century. The key result is this: given a Gaussian in $D$ dimensions, there exist specific sets of nodes and weights such that the finite sum is <em>exact</em> (not approximate) for all polynomial integrands up to a certain degree.\n\n<div class=\"insight insight-intuition\">\n<strong>Nodes and Weights Are a Married Pair:</strong> In Gauss-Hermite quadrature, you do not get to choose the nodes and the weights independently. Once you pick a set of sample points on the bell curve, the weights are uniquely determined (and vice versa). This is why every lattice specification &mdash; D2Q5, D2Q9, D3Q7 &mdash; always lists both $\\mathbf{e}_i$ AND $w_i$ together. They are a package deal, born from the same Gaussian.\n</div>\n\nFor <strong>diffusion</strong> (no bulk flow), the equilibrium is the Gaussian centered at zero. The macroscopic equations involve integrals of polynomials up to second degree in $\\mathbf{c}$, so exactness through second order is sufficient. D2Q5 and D3Q7 satisfy this.\n\nFor <strong>fluid flow</strong> (Navier-Stokes), the equilibrium is a shifted Gaussian, and higher-order polynomial terms appear. The quadrature must also be exact for fourth-degree polynomials, which requires more lattice directions (D2Q9 instead of D2Q5).\n\n<h4>Discrete vs. Continuous: Lattice Naming Convention</h4>\n\nLattices are named using the notation $\\text{D}_d \\text{Q}_q$, where:\n<ul>\n<li><strong>D</strong> = spatial dimension (1, 2, or 3)</li>\n<li><strong>Q</strong> = number of lattice directions (discrete velocities)</li>\n</ul>\n\nCommon examples:\n<ul>\n<li><strong>D1Q3</strong>: 1D, 3 velocities (left, right, rest)</li>\n<li><strong>D2Q5</strong>: 2D, 5 velocities (rest + 4 cardinal neighbors)</li>\n<li><strong>D2Q9</strong>: 2D, 9 velocities (rest + 4 cardinal + 4 diagonal)</li>\n<li><strong>D3Q7</strong>: 3D, 7 velocities (rest + 6 face-centered neighbors)</li>\n<li><strong>D3Q19</strong>: 3D, 19 velocities (face-centered + edge-adjacent)</li>\n<li><strong>D3Q27</strong>: 3D, 27 velocities (complete cubic stencil)</li>\n</ul>\n\nThe choice of lattice is determined by the physics:\n<ul>\n<li><strong>For diffusion</strong> (no bulk flow), D2Q5 or D3Q7 suffice. These have only cardinal directions.</li>\n<li><strong>For fluid flow</strong> (Navier-Stokes), diagonal directions are needed to represent the full stress tensor. D2Q9 or D3Q19 are required.</li>\n</ul>\n\nSince cardiac electrophysiology primarily solves diffusion problems (the monodomain and bidomain equations), <strong>D2Q5 and D3Q7 are the natural choices</strong>.\n\n<div class=\"insight insight-warning\">\n<strong>Memory vs. Physics:</strong> The number of distributions stored per node equals $Q$. A D2Q9 lattice requires storing 9 values per node; a D2Q5 requires only 5. For a 500\u00d7500\u00d7500 3D mesh, a D2Q5 saves a factor of $(7 \\text{ directions}) / (27 \\text{ directions}) \\approx 4\\times$ memory compared to D3Q27, even though physically, D3Q7 produces the same diffusion results. This is one reason LBM for cardiac problems uses minimal lattices.\n</div>\n\n\n<h4>The Discrete Velocity Set</h4>\n\nWith the quadrature framework in mind, here are the standard lattices. Each is a specific Gauss-Hermite quadrature rule on a regular grid \u2014 the nodes are placed at grid points so that streaming is a simple data shift.\n\n<strong>D1Q3 (One-Dimensional):</strong>\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.17)</span>$$e_0 = 0, \\quad e_1 = 1, \\quad e_2 = -1$$</div>\n\nThree quadrature nodes in one dimension: one at the center of the bell curve (rest), one hop to the right, one hop to the left. The physical velocities are $c_i = e_i \\cdot \\Delta x / \\Delta t$.\n\n<strong>D2Q5 (Two-Dimensional, Cardinal Directions):</strong>\n\n<table style=\"width:60%; border-collapse:collapse; margin:1em auto; font-size:0.9em;\">\n<tr style=\"background-color:#f0f0f0;\">\n<th style=\"border:1px solid #333; padding:0.3em 0.5em;\">$i$</th>\n<th style=\"border:1px solid #333; padding:0.3em 0.5em;\">Direction</th>\n<th style=\"border:1px solid #333; padding:0.3em 0.5em;\">$\\mathbf{e}_i$</th>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">0</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">Rest</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(0, 0)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">1</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">East</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(1, 0)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">2</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">West</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(-1, 0)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">3</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">North</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(0, 1)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">4</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">South</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(0, -1)$</td>\n</tr>\n</table>\n\nFive quadrature nodes: one at the peak of the 2D bell curve (rest), four at one lattice spacing along each cardinal direction. These five sample points are sufficient to exactly integrate second-degree polynomials against the 2D Gaussian.\n\n<div class=\"figure\">\n<svg viewBox=\"0 0 920 320\" style=\"max-width:850px; display:block; margin:1.5em auto;\" xmlns=\"http://www.w3.org/2000/svg\">\n  <style>\n    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }\n  </style>\n  <defs>\n    <marker id=\"arr-d\" markerWidth=\"8\" markerHeight=\"6\" refX=\"7\" refY=\"3\" orient=\"auto\" markerUnits=\"strokeWidth\">\n      <path d=\"M0,0 L8,3 L0,6 Z\" fill=\"#333\"/>\n    </marker>\n    <marker id=\"arr-diag\" markerWidth=\"8\" markerHeight=\"6\" refX=\"7\" refY=\"3\" orient=\"auto\" markerUnits=\"strokeWidth\">\n      <path d=\"M0,0 L8,3 L0,6 Z\" fill=\"#D55E00\"/>\n    </marker>\n  </defs>\n\n  <!-- \u2550\u2550\u2550 PANEL (a): D2Q5 \u2550\u2550\u2550 -->\n  <!-- Background grid -->\n  <g stroke=\"#E0E0E0\" stroke-width=\"0.75\" stroke-dasharray=\"4,4\">\n    <line x1=\"50\" y1=\"40\" x2=\"250\" y2=\"40\"/>\n    <line x1=\"50\" y1=\"140\" x2=\"250\" y2=\"140\"/>\n    <line x1=\"50\" y1=\"240\" x2=\"250\" y2=\"240\"/>\n    <line x1=\"50\" y1=\"40\" x2=\"50\" y2=\"240\"/>\n    <line x1=\"150\" y1=\"40\" x2=\"150\" y2=\"240\"/>\n    <line x1=\"250\" y1=\"40\" x2=\"250\" y2=\"240\"/>\n  </g>\n\n  <!-- Background nodes (open circles) -->\n  <g fill=\"white\" stroke=\"#999\" stroke-width=\"1\">\n    <circle cx=\"50\" cy=\"40\" r=\"4\"/>  <circle cx=\"150\" cy=\"40\" r=\"4\"/>  <circle cx=\"250\" cy=\"40\" r=\"4\"/>\n    <circle cx=\"50\" cy=\"140\" r=\"4\"/> <circle cx=\"250\" cy=\"140\" r=\"4\"/>\n    <circle cx=\"50\" cy=\"240\" r=\"4\"/> <circle cx=\"150\" cy=\"240\" r=\"4\"/> <circle cx=\"250\" cy=\"240\" r=\"4\"/>\n  </g>\n\n  <!-- Arrows from center to cardinal neighbors -->\n  <g stroke=\"#333\" stroke-width=\"2\" marker-end=\"url(#arr-d)\">\n    <line x1=\"158\" y1=\"140\" x2=\"238\" y2=\"140\"/>\n    <line x1=\"142\" y1=\"140\" x2=\"62\"  y2=\"140\"/>\n    <line x1=\"150\" y1=\"132\" x2=\"150\" y2=\"52\"/>\n    <line x1=\"150\" y1=\"148\" x2=\"150\" y2=\"228\"/>\n  </g>\n\n  <!-- Cardinal neighbor nodes (filled) -->\n  <g fill=\"#E69F00\">\n    <circle cx=\"250\" cy=\"140\" r=\"7\"/>\n    <circle cx=\"50\"  cy=\"140\" r=\"7\"/>\n    <circle cx=\"150\" cy=\"40\"  r=\"7\"/>\n    <circle cx=\"150\" cy=\"240\" r=\"7\"/>\n  </g>\n\n  <!-- Center node (largest, distinct color) -->\n  <circle cx=\"150\" cy=\"140\" r=\"9\" fill=\"#0072B2\"/>\n\n  <!-- Weight labels next to nodes -->\n  <g font-size=\"13\" fill=\"#333\" text-anchor=\"middle\">\n    <text x=\"150\" y=\"125\" font-weight=\"600\" fill=\"#0072B2\">w\u2080=1/3</text>\n    <text x=\"250\" y=\"125\">w=1/6</text>\n    <text x=\"50\"  y=\"125\">w=1/6</text>\n    <text x=\"183\" y=\"38\">w=1/6</text>\n    <text x=\"183\" y=\"255\">w=1/6</text>\n  </g>\n\n  <!-- Direction indices -->\n  <g font-size=\"14\" fill=\"#333\" font-weight=\"600\">\n    <text x=\"150\" y=\"160\" text-anchor=\"middle\">i=0</text>\n    <text x=\"270\" y=\"145\" text-anchor=\"start\">i=1</text>\n    <text x=\"18\"  y=\"145\" text-anchor=\"start\">i=2</text>\n    <text x=\"130\" y=\"30\"  text-anchor=\"end\">i=3</text>\n    <text x=\"130\" y=\"256\" text-anchor=\"end\">i=4</text>\n  </g>\n\n  <!-- Panel label -->\n  <text x=\"150\" y=\"298\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"#333\">(a) D2Q5</text>\n\n\n  <!-- \u2550\u2550\u2550 PANEL (b): D2Q9 \u2550\u2550\u2550 -->\n  <g transform=\"translate(320,0)\">\n    <!-- Background grid -->\n    <g stroke=\"#E0E0E0\" stroke-width=\"0.75\" stroke-dasharray=\"4,4\">\n      <line x1=\"50\" y1=\"40\" x2=\"250\" y2=\"40\"/>\n      <line x1=\"50\" y1=\"140\" x2=\"250\" y2=\"140\"/>\n      <line x1=\"50\" y1=\"240\" x2=\"250\" y2=\"240\"/>\n      <line x1=\"50\" y1=\"40\" x2=\"50\" y2=\"240\"/>\n      <line x1=\"150\" y1=\"40\" x2=\"150\" y2=\"240\"/>\n      <line x1=\"250\" y1=\"40\" x2=\"250\" y2=\"240\"/>\n    </g>\n\n    <!-- Cardinal arrows -->\n    <g stroke=\"#333\" stroke-width=\"2\" marker-end=\"url(#arr-d)\">\n      <line x1=\"158\" y1=\"140\" x2=\"238\" y2=\"140\"/>\n      <line x1=\"142\" y1=\"140\" x2=\"62\"  y2=\"140\"/>\n      <line x1=\"150\" y1=\"132\" x2=\"150\" y2=\"52\"/>\n      <line x1=\"150\" y1=\"148\" x2=\"150\" y2=\"228\"/>\n    </g>\n\n    <!-- Diagonal arrows (different color for distinction) -->\n    <g stroke=\"#D55E00\" stroke-width=\"1.5\" marker-end=\"url(#arr-diag)\" stroke-dasharray=\"none\">\n      <line x1=\"157\" y1=\"133\" x2=\"240\" y2=\"50\"/>\n      <line x1=\"143\" y1=\"133\" x2=\"60\"  y2=\"50\"/>\n      <line x1=\"157\" y1=\"147\" x2=\"240\" y2=\"230\"/>\n      <line x1=\"143\" y1=\"147\" x2=\"60\"  y2=\"230\"/>\n    </g>\n\n    <!-- Cardinal neighbor nodes -->\n    <g fill=\"#E69F00\">\n      <circle cx=\"250\" cy=\"140\" r=\"7\"/>\n      <circle cx=\"50\"  cy=\"140\" r=\"7\"/>\n      <circle cx=\"150\" cy=\"40\"  r=\"7\"/>\n      <circle cx=\"150\" cy=\"240\" r=\"7\"/>\n    </g>\n\n    <!-- Diagonal neighbor nodes -->\n    <g fill=\"#D55E00\">\n      <circle cx=\"250\" cy=\"40\"  r=\"6\"/>\n      <circle cx=\"50\"  cy=\"40\"  r=\"6\"/>\n      <circle cx=\"250\" cy=\"240\" r=\"6\"/>\n      <circle cx=\"50\"  cy=\"240\" r=\"6\"/>\n    </g>\n\n    <!-- Center node -->\n    <circle cx=\"150\" cy=\"140\" r=\"9\" fill=\"#0072B2\"/>\n\n    <!-- Weight labels -->\n    <g font-size=\"12\" fill=\"#333\" text-anchor=\"middle\">\n      <text x=\"150\" y=\"125\" font-weight=\"600\" fill=\"#0072B2\" font-size=\"13\">w\u2080=4/9</text>\n      <text x=\"250\" y=\"125\" fill=\"#E69F00\">1/9</text>\n      <text x=\"50\"  y=\"125\" fill=\"#E69F00\">1/9</text>\n      <text x=\"177\" y=\"38\"  fill=\"#E69F00\">1/9</text>\n      <text x=\"177\" y=\"255\" fill=\"#E69F00\">1/9</text>\n      <text x=\"270\" y=\"30\"  fill=\"#D55E00\">1/36</text>\n      <text x=\"25\"  y=\"30\"  fill=\"#D55E00\">1/36</text>\n      <text x=\"270\" y=\"255\" fill=\"#D55E00\">1/36</text>\n      <text x=\"25\"  y=\"255\" fill=\"#D55E00\">1/36</text>\n    </g>\n\n    <!-- Panel label -->\n    <text x=\"150\" y=\"298\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"#333\">(b) D2Q9</text>\n  </g>\n\n\n  <!-- \u2550\u2550\u2550 PANEL (c): D3Q7 (isometric) \u2550\u2550\u2550 -->\n  <g transform=\"translate(640,0)\">\n    <!-- Isometric cube: center at (150, 150) -->\n    <!-- Isometric unit vectors (scaled 80px):\n         +x \u2192 (69, 40), -x \u2192 (-69, -40)\n         +y \u2192 (-69, 40), -y \u2192 (69, -40)\n         +z \u2192 (0, -80), -z \u2192 (0, 80) -->\n\n    <!-- Cube wireframe (back edges dashed) -->\n    <g stroke=\"#E0E0E0\" stroke-width=\"0.75\">\n      <!-- Back edges (dashed) -->\n      <line x1=\"150\" y1=\"150\" x2=\"81\" y2=\"110\" stroke-dasharray=\"4,4\"/>\n      <line x1=\"81\" y1=\"110\" x2=\"12\" y2=\"150\" stroke-dasharray=\"4,4\"/>\n      <line x1=\"81\" y1=\"110\" x2=\"81\" y2=\"30\" stroke-dasharray=\"4,4\"/>\n\n      <!-- Front edges (solid) -->\n      <line x1=\"150\" y1=\"150\" x2=\"219\" y2=\"110\"/>\n      <line x1=\"150\" y1=\"150\" x2=\"81\"  y2=\"190\"/>\n      <line x1=\"150\" y1=\"150\" x2=\"150\" y2=\"230\"/>\n      <line x1=\"150\" y1=\"150\" x2=\"150\" y2=\"70\"/>\n      <line x1=\"219\" y1=\"110\" x2=\"150\" y2=\"70\"/>\n      <line x1=\"81\"  y1=\"190\" x2=\"150\" y2=\"230\"/>\n      <line x1=\"219\" y1=\"110\" x2=\"219\" y2=\"190\"/>\n      <line x1=\"81\"  y1=\"190\" x2=\"12\"  y2=\"150\"/>\n      <line x1=\"219\" y1=\"190\" x2=\"150\" y2=\"230\"/>\n      <line x1=\"150\" y1=\"70\"  x2=\"81\"  y2=\"30\"/>\n      <line x1=\"150\" y1=\"70\"  x2=\"219\" y2=\"30\"/>\n      <line x1=\"12\"  y1=\"150\" x2=\"12\"  y2=\"70\"/>\n      <line x1=\"12\"  y1=\"70\"  x2=\"81\"  y2=\"30\"/>\n      <line x1=\"219\" y1=\"30\"  x2=\"150\" y2=\"70\"/>\n    </g>\n\n    <!-- Arrows from center to 6 face-centered neighbors -->\n    <!-- +x: (150,150) \u2192 (219,110) -->\n    <line x1=\"155\" y1=\"147\" x2=\"210\" y2=\"114\" stroke=\"#333\" stroke-width=\"2\" marker-end=\"url(#arr-d)\"/>\n    <!-- -x: (150,150) \u2192 (81,190) -->\n    <line x1=\"145\" y1=\"153\" x2=\"90\"  y2=\"186\" stroke=\"#333\" stroke-width=\"2\" marker-end=\"url(#arr-d)\"/>\n    <!-- +y: (150,150) \u2192 (81,110) -->\n    <line x1=\"145\" y1=\"147\" x2=\"90\"  y2=\"114\" stroke=\"#333\" stroke-width=\"2\" marker-end=\"url(#arr-d)\"/>\n    <!-- -y: (150,150) \u2192 (219,190) -->\n    <line x1=\"155\" y1=\"153\" x2=\"210\" y2=\"186\" stroke=\"#333\" stroke-width=\"2\" marker-end=\"url(#arr-d)\"/>\n    <!-- +z: (150,150) \u2192 (150,70) -->\n    <line x1=\"150\" y1=\"142\" x2=\"150\" y2=\"80\"  stroke=\"#333\" stroke-width=\"2\" marker-end=\"url(#arr-d)\"/>\n    <!-- -z: (150,150) \u2192 (150,230) -->\n    <line x1=\"150\" y1=\"158\" x2=\"150\" y2=\"220\" stroke=\"#333\" stroke-width=\"2\" marker-end=\"url(#arr-d)\"/>\n\n    <!-- Face-centered neighbor nodes -->\n    <g fill=\"#E69F00\">\n      <circle cx=\"219\" cy=\"110\" r=\"7\"/>\n      <circle cx=\"81\"  cy=\"190\" r=\"7\"/>\n      <circle cx=\"81\"  cy=\"110\" r=\"7\" opacity=\"0.7\"/>\n      <circle cx=\"219\" cy=\"190\" r=\"7\"/>\n      <circle cx=\"150\" cy=\"70\"  r=\"7\"/>\n      <circle cx=\"150\" cy=\"230\" r=\"7\"/>\n    </g>\n\n    <!-- Center node -->\n    <circle cx=\"150\" cy=\"150\" r=\"9\" fill=\"#0072B2\"/>\n\n    <!-- Axis labels -->\n    <g font-size=\"14\" fill=\"#333\" font-weight=\"600\">\n      <text x=\"228\" y=\"105\" text-anchor=\"start\">+x</text>\n      <text x=\"68\"  y=\"205\" text-anchor=\"end\">\u2212x</text>\n      <text x=\"68\"  y=\"105\" text-anchor=\"end\">+y</text>\n      <text x=\"228\" y=\"205\" text-anchor=\"start\">\u2212y</text>\n      <text x=\"162\" y=\"68\"  text-anchor=\"start\">+z</text>\n      <text x=\"162\" y=\"245\" text-anchor=\"start\">\u2212z</text>\n    </g>\n\n    <!-- Weight label at center -->\n    <text x=\"150\" y=\"170\" text-anchor=\"middle\" font-size=\"13\" fill=\"#0072B2\" font-weight=\"600\">w\u2080=1/4</text>\n    <text x=\"238\" y=\"138\" text-anchor=\"start\" font-size=\"12\" fill=\"#333\">w=1/8</text>\n\n    <!-- Panel label -->\n    <text x=\"150\" y=\"298\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"#333\">(c) D3Q7</text>\n  </g>\n</svg>\n<div class=\"figure-caption\"><strong>Figure 17.1:</strong> Common lattice stencils for LBM. <strong>(a)</strong> D2Q5: five velocities (rest + four cardinal) \u2014 sufficient for isotropic diffusion. <strong>(b)</strong> D2Q9: nine velocities (rest + cardinal + diagonal) \u2014 required for fluid flow to capture cross-velocity terms. <strong>(c)</strong> D3Q7: seven velocities in 3D (rest + six face-centered) \u2014 the minimal 3D stencil for diffusion. Blue center node = rest velocity (peak of the Gaussian); orange = cardinal neighbors; vermillion = diagonal neighbors. Arrows indicate streaming directions; weights $w_i$ annotated at each node.</div>\n</div>\n\n<strong>D2Q9 (Two-Dimensional, Cardinal + Diagonal):</strong>\n\nFor fluid flow, the polynomial expansion of the shifted Gaussian contains terms like $e_{ix} e_{iy}$ (cross-products of velocity components). To integrate these exactly, we need diagonal quadrature nodes. D2Q9 adds four diagonal directions to D2Q5:\n\n<table style=\"width:60%; border-collapse:collapse; margin:1em auto; font-size:0.9em;\">\n<tr style=\"background-color:#f0f0f0;\">\n<th style=\"border:1px solid #333; padding:0.3em 0.5em;\">$i$</th>\n<th style=\"border:1px solid #333; padding:0.3em 0.5em;\">Direction</th>\n<th style=\"border:1px solid #333; padding:0.3em 0.5em;\">$\\mathbf{e}_i$</th>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">0</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">Rest</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(0, 0)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">1</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">East</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(1, 0)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">2</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">West</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(-1, 0)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">3</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">North</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(0, 1)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">4</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">South</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(0, -1)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">5</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">NE</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(1, 1)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">6</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">NW</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(-1, 1)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">7</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">SE</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(1, -1)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">8</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">SW</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(-1, -1)$</td>\n</tr>\n</table>\n\nDirections 1\u20134 are the same cardinal nodes as D2Q5. Directions 5\u20138 are the diagonal nodes. In lattice units, they sit at distance $\\sqrt{2}$ from the center (vs. distance 1 for the cardinal nodes). They are further out on the bell curve, sampling the Gaussian's tails in diagonal directions.\n\n<strong>D3Q7 (Three-Dimensional, Face-Centered):</strong>\n\nThe 3D analogue of D2Q5. One quadrature node at the peak, six at one lattice spacing along each coordinate axis:\n\n<table style=\"width:60%; border-collapse:collapse; margin:1em auto; font-size:0.9em;\">\n<tr style=\"background-color:#f0f0f0;\">\n<th style=\"border:1px solid #333; padding:0.3em 0.5em;\">$i$</th>\n<th style=\"border:1px solid #333; padding:0.3em 0.5em;\">Direction</th>\n<th style=\"border:1px solid #333; padding:0.3em 0.5em;\">$\\mathbf{e}_i$</th>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">0</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">Rest</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(0, 0, 0)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">1</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$+x$</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(1, 0, 0)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">2</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$-x$</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(-1, 0, 0)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">3</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$+y$</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(0, 1, 0)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">4</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$-y$</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(0, -1, 0)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">5</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$+z$</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(0, 0, 1)$</td>\n</tr>\n<tr>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">6</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$-z$</td>\n<td style=\"border:1px solid #333; padding:0.3em 0.5em;\">$(0, 0, -1)$</td>\n</tr>\n</table>\n\nAll six moving nodes sit at the same distance (one lattice spacing) from the center \u2014 they sample the Gaussian at the same height on the bell curve, which is why they all receive the same weight.\n\n<h4>The Weight Lattice</h4>\n\nThe weights paired with each velocity set are determined by Gauss-Hermite quadrature &mdash; equation (18.18). Each weight $w_i$ represents how much of the Gaussian bell curve the quadrature node $\\mathbf{e}_i$ is responsible for. Nodes near the peak of the Gaussian (where the bell curve is tallest) represent more of the total area and receive larger weights. Nodes further out (where the bell curve has decayed) represent less area and receive smaller weights.\n\n<strong>D1Q3 weights:</strong>\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.19)</span>$$w_0 = \\frac{2}{3}, \\quad w_1 = w_2 = \\frac{1}{6}$$</div>\n\nThe rest node sits at the peak of the 1D bell curve \u2014 it captures two-thirds of the total area. The two moving nodes, one lattice spacing away from the peak, each capture one-sixth. Most of the Gaussian's area is concentrated near the center, which is why the rest weight dominates.\n\n<strong>D2Q5 weights:</strong>\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.20)</span>$$w_0 = \\frac{1}{3}, \\quad w_1 = w_2 = w_3 = w_4 = \\frac{1}{6}$$</div>\n\nThe rest node captures one-third of the 2D bell curve. Each cardinal node captures one-sixth. The total is $1/3 + 4 \\times 1/6 = 1$. All four cardinal nodes are at the same distance from the peak, so they receive the same weight \u2014 the bell curve is symmetric.\n\n<strong>D2Q9 weights:</strong>\n\n<div class=\"equation-block\"><span class=\"equation-label\">(18.21)</span>$$w_0 = \\frac{4}{9}, \\quad w_{1,2,3,4} = \\frac{1}{9} \\quad (\\text{cardinal}), \\quad w_{5,6,7,8} = \\frac{1}{36} \\quad (\\text{diagonal})$$</div>\n\nThree distinct weight classes, directly reflecting the Gaussian's shape. The rest node at the peak captures $4/9$ of the area \u2014 nearly half. The cardinal nodes at distance 1 (in lattice units) each capture $1/9$. The diagonal nodes at distance $\\sqrt{2}$ each capture only $1/36$ \u2014 four times less than a cardinal node. This factor of four is the Gaussian at work: moving from distance $c$ to $\\sqrt{2}\\,c$ from the peak, the bell curve has decayed, so those nodes represent less area. Check: $4/9 + 4 \\times 1/9 + 4 \\times 1/36 = 4/9 + 4/9 + 1/9 = 1$ \u2713.\n\n<div class=\"insight insight-intuition\">\n<strong>Why Diagonal Weights Are Smaller:</strong> Picture a 2D bell curve \u2014 a smooth hill centered at the origin. The cardinal quadrature nodes sit at distance 1 from the p
