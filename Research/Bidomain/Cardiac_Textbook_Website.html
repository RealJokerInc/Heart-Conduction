 K$^+$ gate $n$ opens even more slowly ($\\tau_n \\approx$ 5\u201310 ms).\n    As $n^4$ grows, the outward K$^+$ current $I_K = \\bar{g}_K n^4 (V_m - E_K)$ overwhelms the now-extinct\n    Na$^+$ current and pulls $V_m$ back toward $E_K$.\n  </p>\n\n  <h3>1.4 &ensp; Activation vs. Inactivation: The Refractory Period</h3>\n\n  <p>\n    After an action potential, the cell enters a <em>refractory period</em> during which it cannot fire again.\n    This is essential for ordered wave propagation \u2014 without it, waves could travel backward and the heart\n    would fibrillate. The refractory period has a clear gating-variable explanation:\n  </p>\n\n  <p>\n    Immediately after the action potential, $h \\approx 0$ (Na$^+$ channels are inactivated) and $n$ is still\n    elevated (K$^+$ channels are open). Even if a new stimulus arrives, there are no Na$^+$ channels\n    available to open \u2014 the $h$ gate needs time to recover ($h$ must return toward $h_\\infty(V_{\\text{rest}}) \\approx 0.6$).\n    This recovery takes 5\u201310 ms in nerve, and 200\u2013300 ms in ventricular cardiac cells.\n  </p>\n\n  <!-- \u2500\u2500\u2500 Action Potential Timeline \u2500\u2500\u2500 -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 500 220\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:440px;\">\n      <!-- Axes -->\n      <line x1=\"50\" y1=\"190\" x2=\"470\" y2=\"190\" stroke=\"#16213e\" stroke-width=\"1.2\"/>\n      <line x1=\"50\" y1=\"190\" x2=\"50\" y2=\"15\" stroke=\"#16213e\" stroke-width=\"1.2\"/>\n      <text x=\"260\" y=\"213\" font-size=\"10\" fill=\"#16213e\" font-family=\"serif\" text-anchor=\"middle\">Time (ms)</text>\n      <text x=\"14\" y=\"100\" font-size=\"10\" fill=\"#16213e\" font-family=\"serif\" text-anchor=\"middle\" transform=\"rotate(-90,14,100)\">V<tspan font-size=\"7\" dy=\"2\">m</tspan><tspan dy=\"-2\"> (mV)</tspan></text>\n\n      <!-- V scale -->\n      <text x=\"42\" y=\"194\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"end\">-80</text>\n      <text x=\"42\" y=\"105\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"end\">0</text>\n      <text x=\"42\" y=\"35\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"end\">+40</text>\n      <!-- time ticks -->\n      <text x=\"50\" y=\"203\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"middle\">0</text>\n      <text x=\"134\" y=\"203\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"middle\">1</text>\n      <text x=\"218\" y=\"203\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"middle\">2</text>\n      <text x=\"302\" y=\"203\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"middle\">3</text>\n      <text x=\"386\" y=\"203\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"middle\">4</text>\n\n      <!-- zero line -->\n      <line x1=\"50\" y1=\"105\" x2=\"470\" y2=\"105\" stroke=\"#d0d5e0\" stroke-width=\"0.5\" stroke-dasharray=\"3,3\"/>\n\n      <!-- AP trace (nerve-like: fast spike, ~1.5ms total) -->\n      <path d=\"M 50,185 L 90,185 Q 95,185 100,170 Q 108,100 112,32 Q 114,25 118,32 Q 125,55 135,90 Q 150,135 170,165 Q 195,187 250,189 L 470,189\"\n            fill=\"none\" stroke=\"#e94560\" stroke-width=\"2.2\"/>\n\n      <!-- Annotations -->\n      <text x=\"116\" y=\"20\" font-size=\"9\" fill=\"#e94560\" font-family=\"serif\" font-weight=\"600\">Overshoot</text>\n      <path d=\"M 95,173 L 80,155\" fill=\"none\" stroke=\"#0f3460\" stroke-width=\"0.8\"/>\n      <text x=\"50\" y=\"150\" font-size=\"8\" fill=\"#0f3460\" font-family=\"serif\">Threshold</text>\n\n      <!-- Refractory period bracket -->\n      <line x1=\"118\" y1=\"195\" x2=\"250\" y2=\"195\" stroke=\"#4a3d7a\" stroke-width=\"1.5\"/>\n      <line x1=\"118\" y1=\"192\" x2=\"118\" y2=\"198\" stroke=\"#4a3d7a\" stroke-width=\"1.5\"/>\n      <line x1=\"250\" y1=\"192\" x2=\"250\" y2=\"198\" stroke=\"#4a3d7a\" stroke-width=\"1.5\"/>\n      <text x=\"184\" y=\"210\" font-size=\"8\" fill=\"#4a3d7a\" font-family=\"serif\" text-anchor=\"middle\" font-style=\"italic\">Refractory period</text>\n    </svg>\n    <div class=\"figure-caption\">\n      <span class=\"figure-label\">Figure 1.3.</span> The nerve action potential (squid axon). The upstroke is driven by\n      Na$^+$ influx ($m^3h$ activating), the repolarization by Na$^+$ inactivation ($h \\to 0$) and delayed K$^+$\n      activation ($n^4$ increasing). The refractory period corresponds to the time needed for $h$ to recover.\n    </div>\n  </div>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      In Engine V5.4, every ionic model inherits from the <code>IonicModel</code> abstract base class\n      (<code>cardiac_sim/ionic/base.py</code>), which requires: <code>compute_Iion(V, ionic_states)</code>\n      to compute total ionic current, <code>step(V, ionic_states, dt)</code> to advance the full model,\n      and separate methods <code>compute_gate_steady_states()</code> and\n      <code>compute_gate_time_constants()</code> so that the Rush\u2013Larsen solver can update gates\n      externally. V is always stored separately from ionic states. The Hodgkin\u2013Huxley structure \u2014\n      membrane current as sum of conductances times driving forces, gating variables following\n      first-order kinetics \u2014 is exactly the pattern this interface encodes. Understanding HH means\n      understanding the API contract of every model in the engine.\n    </p>\n  </div>\n\n  <p>\n    The complete Hodgkin\u2013Huxley system is four coupled ordinary differential equations: one for $V_m$\n    (the circuit equation) and three for the gates ($m$, $h$, $n$). It was the first biophysically\n    detailed cell model and remains the conceptual template for all that followed. But for the heart,\n    we need something quite different \u2014 as we'll see in the next chapter.\n  </p>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 2 \u2014 FROM NEURONS TO HEART CELLS                         -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "ch10": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 10</div>\n  <h2 class=\"chapter-title\">Explicit Diffusion Solvers</h2>\n  <div class=\"chapter-intro\">\n    After the reaction substep updates the ionic variables, the diffusion substep must advance\n    $V_m$ under pure diffusion. Explicit time-stepping methods \u2014 from the workhorse Forward Euler\n    to the high-accuracy RK4 \u2014 form a family of increasing sophistication. This chapter walks\n    through each one, starting from intuition and building to implementation-ready equations.\n  </div>\n\n  <h3>10.1 &ensp; Forward Euler and the CFL Condition</h3>\n\n  <!-- Layer 1: ELI5 -->\n  <p>\n    The simplest idea for advancing the diffusion equation is also the most intuitive: look at the\n    current state, compute how fast things are changing, and take a step forward. This is\n    <em>Forward Euler</em> \u2014 the computational equivalent of \"if I'm heading north at 60 mph, in one\n    hour I'll be 60 miles north.\" It works beautifully as long as you don't take steps that are too\n    large. Take too big a step, and the solution oscillates wildly and blows up \u2014 this limit is called\n    the <em>CFL condition</em>, and it is the fundamental price of simplicity.\n  </p>\n\n  <!-- Layer 2: Conceptual -->\n  <p>\n    Here is the core idea: at each timestep, we evaluate the right-hand side of the diffusion\n    equation (the spatial Laplacian acting on $V_m$), multiply by $\\Delta t$, and add the result\n    to the current state. We never look ahead \u2014 only at where we <em>are</em>. That is what makes it\n    \"explicit\": the new state is computed entirely from the old state, with no system of equations to solve.\n  </p>\n\n  <!-- Layer 3: Math -->\n  <p>\n    In the semi-discrete form from equation (8.2), the diffusion substep is the ODE system\n    $\\mathbf{M}\\,d\\mathbf{V}/dt = -\\mathbf{K}\\,\\mathbf{V}$. Forward Euler approximates the time\n    derivative by a forward difference:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(10.1)</span>\n    $$\\mathbf{V}^{n+1} = \\mathbf{V}^n + \\Delta t\\;\\mathbf{M}^{-1}\\bigl(-\\mathbf{K}\\,\\mathbf{V}^n\\bigr)$$\n  </div>\n\n  <p>\n    When using FDM with lumped mass ($\\mathbf{M} = \\mathbf{I}$), this simplifies to\n    $\\mathbf{V}^{n+1} = \\mathbf{V}^n - \\Delta t\\,\\mathbf{K}\\,\\mathbf{V}^n$.\n    Each grid point's update depends only on its neighbors at time level $n$ \u2014 no global\n    communication, no matrix solve. This is why Forward Euler is trivially parallelizable and ideal\n    for GPU computation.\n  </p>\n\n  <!-- Layer 3 continued: CFL -->\n  <p>\n    The price is the <em>CFL stability condition</em>. For a regular grid with spacing $h$ and\n    diffusivity $d$, Forward Euler is stable only when:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(10.2)</span>\n    $$\\Delta t \\leq \\frac{h^2}{2\\,n_{\\text{dim}}\\,d_{\\max}}$$\n  </div>\n\n  <p>\n    where $n_{\\text{dim}}$ is the spatial dimension and $d_{\\max}$ is the largest eigenvalue of the\n    conductivity tensor. For typical cardiac parameters ($h = 0.2$ mm, $d_{\\max} = 0.174$ mm$^2$/ms,\n    2D), this gives $\\Delta t \\leq 0.057$ ms \u2014 tight, but workable for the $\\Delta t = 0.01{-}0.05$ ms\n    range that the ionic model already requires.\n  </p>\n\n  <!-- Layer 4: Worked example -->\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>Worked CFL example.</strong> Suppose we want to simulate a 2D cardiac sheet with\n      $h = 0.1$ mm (a fine mesh) and longitudinal conductivity $d_L = 0.174$ mm$^2$/ms. Then\n      $\\Delta t_{\\max} = (0.1)^2 / (2 \\times 2 \\times 0.174) = 0.01 / 0.696 = 0.0144$ ms.\n      That is below the typical ionic timestep of 0.02 ms \u2014 so for fine meshes, the diffusion\n      stability constraint becomes the bottleneck, not the ionic kinetics. This is exactly why\n      Chapter 10's implicit methods exist.\n    </p>\n  </div>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      The CFL condition scales as $h^2$. Halve the mesh spacing and the maximum timestep drops by a\n      factor of four. For fine 3D meshes ($h = 0.1$ mm), this can force $\\Delta t$ below what the ionic\n      solver needs, making explicit methods the bottleneck. This is the primary motivation for implicit\n      methods (Chapter 10).\n    </p>\n  </div>\n\n  <h3>10.2 &ensp; Why Go Beyond Forward Euler?</h3>\n\n  <!-- Layer 1: ELI5 -->\n  <p>\n    Imagine driving from New York to Boston. Forward Euler checks your speedometer <em>once</em> at\n    the start and assumes that speed holds for the entire trip. If the road curves, you end up in\n    the ocean. A smarter driver checks the speedometer multiple times along the way \u2014 at the start,\n    at the midpoint, near the end \u2014 and uses all those readings to estimate where they actually end\n    up. That is what Runge\u2013Kutta methods do: <em>sample the slope multiple times within each\n    timestep</em> and combine the samples into a much better estimate of the true solution.\n  </p>\n\n  <!-- Layer 2: Conceptual -->\n  <p>\n    The key insight is that Forward Euler's error comes from assuming the derivative is constant\n    across the entire step. In reality, the derivative changes as $V_m$ changes. By evaluating the\n    derivative at intermediate points within the step, we can capture this curvature.\n    More evaluations = better curvature tracking = higher-order accuracy. The family of methods\n    that does this systematically is called <strong>Runge\u2013Kutta (RK) methods</strong>, named after\n    Carl Runge and Martin Kutta who developed them in the early 1900s.\n  </p>\n\n  <p>\n    Every explicit RK method follows the same recipe: (1) evaluate the right-hand side at several\n    carefully chosen points, (2) take a weighted average of those evaluations, (3) use that average\n    as the effective slope for the timestep. The differences between RK1 (Forward Euler), RK2, and\n    RK4 are simply <em>how many</em> sample points they use and <em>how</em> they weight them.\n  </p>\n\n  <h3>10.3 &ensp; RK2 \u2014 Heun's Method (The Two-Sample Correction)</h3>\n\n  <!-- Layer 1: ELI5 -->\n  <p>\n    RK2 is like a rough draft followed by a revision. You start by making the same guess Forward\n    Euler would (the \"predictor\") \u2014 but instead of stopping there, you evaluate the slope at that\n    predicted point too, and then average the two slopes. The result is far more accurate because\n    you have sampled the derivative at both ends of the interval instead of just one.\n  </p>\n\n  <!-- Layer 3: Diagram -->\n  <svg viewBox=\"0 0 520 280\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:520px; display:block; margin:1.5em auto;\">\n    <defs>\n      <marker id=\"arr9a\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\">\n        <path d=\"M0,0 L8,3 L0,6\" fill=\"none\" stroke=\"#d32f2f\" stroke-width=\"1.2\"/>\n      </marker>\n      <marker id=\"arr9b\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\">\n        <path d=\"M0,0 L8,3 L0,6\" fill=\"none\" stroke=\"#1565c0\" stroke-width=\"1.2\"/>\n      </marker>\n      <marker id=\"arr9c\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\">\n        <path d=\"M0,0 L8,3 L0,6\" fill=\"none\" stroke=\"#2e7d32\" stroke-width=\"1.4\"/>\n      </marker>\n    </defs>\n    <!-- Axes -->\n    <line x1=\"50\" y1=\"240\" x2=\"490\" y2=\"240\" stroke=\"#333\" stroke-width=\"1.5\"/>\n    <line x1=\"50\" y1=\"240\" x2=\"50\" y2=\"20\" stroke=\"#333\" stroke-width=\"1.5\"/>\n    <text x=\"270\" y=\"270\" text-anchor=\"middle\" font-size=\"13\" fill=\"#333\">$t$</text>\n    <text x=\"30\" y=\"130\" text-anchor=\"middle\" font-size=\"13\" fill=\"#333\" transform=\"rotate(-90,30,130)\">$V$</text>\n    <!-- True curve (gray dashed) -->\n    <path d=\"M80,200 Q200,120 400,80\" fill=\"none\" stroke=\"#999\" stroke-width=\"1.5\" stroke-dasharray=\"6,4\"/>\n    <text x=\"410\" y=\"75\" font-size=\"11\" fill=\"#999\">true solution</text>\n    <!-- Point at t_n -->\n    <circle cx=\"80\" cy=\"200\" r=\"5\" fill=\"#333\"/>\n    <text x=\"75\" y=\"258\" font-size=\"12\" fill=\"#333\">$t^n$</text>\n    <text x=\"60\" y=\"195\" font-size=\"11\" fill=\"#333\">$V^n$</text>\n    <!-- k1 slope (red) from (t_n, V_n) -->\n    <line x1=\"80\" y1=\"200\" x2=\"310\" y2=\"108\" stroke=\"#d32f2f\" stroke-width=\"2\" marker-end=\"url(#arr9a)\"/>\n    <text x=\"170\" y=\"138\" font-size=\"12\" fill=\"#d32f2f\" font-weight=\"bold\">$k_1$ slope</text>\n    <!-- FE predictor point -->\n    <circle cx=\"310\" cy=\"108\" r=\"4\" fill=\"#d32f2f\" opacity=\"0.6\"/>\n    <text x=\"318\" y=\"102\" font-size=\"11\" fill=\"#d32f2f\">$\\tilde{V}$ (predictor)</text>\n    <!-- k2 slope (blue) from predicted point -->\n    <line x1=\"310\" y1=\"108\" x2=\"440\" y2=\"75\" stroke=\"#1565c0\" stroke-width=\"2\" marker-end=\"url(#arr9b)\"/>\n    <text x=\"365\" y=\"80\" font-size=\"12\" fill=\"#1565c0\" font-weight=\"bold\">$k_2$ slope</text>\n    <!-- t^{n+1} marker -->\n    <text x=\"300\" y=\"258\" font-size=\"12\" fill=\"#333\">$t^{n+1}$</text>\n    <line x1=\"310\" y1=\"240\" x2=\"310\" y2=\"235\" stroke=\"#333\" stroke-width=\"1\"/>\n    <!-- Average slope (green) from (t_n, V_n) -->\n    <line x1=\"80\" y1=\"200\" x2=\"310\" y2=\"137\" stroke=\"#2e7d32\" stroke-width=\"2.5\" marker-end=\"url(#arr9c)\"/>\n    <text x=\"130\" y=\"185\" font-size=\"12\" fill=\"#2e7d32\" font-weight=\"bold\">average slope \u2192 $V^{n+1}$</text>\n    <!-- Final RK2 point -->\n    <circle cx=\"310\" cy=\"137\" r=\"5\" fill=\"#2e7d32\"/>\n  </svg>\n\n  <p style=\"text-align:center; font-size:0.92em; color:#555; margin-top:-0.5em;\">\n    <strong>Figure 9.1</strong> \u2014 RK2 (Heun's method) visualized. The red arrow is the Forward Euler predictor\n    ($k_1$ slope). The blue arrow is the slope evaluated at the predicted point ($k_2$). The green arrow\n    is the average of both slopes \u2014 which lands much closer to the true solution (dashed gray).\n  </p>\n\n  <!-- Layer 3: Math (the actual equations) -->\n  <p>\n    Formally, RK2 (Heun's method) advances from $V^n$ to $V^{n+1}$ in two stages. Let\n    $f(V) = \\mathbf{M}^{-1}(-\\mathbf{K}\\,V)$ denote the right-hand side of the diffusion ODE:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(10.3)</span>\n    $$\\boxed{\\begin{aligned}\n    k_1 &= \\Delta t \\; f\\!\\left(V^n\\right) & &\\text{(slope at start)} \\\\[4pt]\n    k_2 &= \\Delta t \\; f\\!\\left(V^n + k_1\\right) & &\\text{(slope at FE predictor)} \\\\[4pt]\n    V^{n+1} &= V^n + \\tfrac{1}{2}\\left(k_1 + k_2\\right) & &\\text{(average both slopes)}\n    \\end{aligned}}$$\n  </div>\n\n  <p>\n    That final line is the key: $V^{n+1}$ is <em>not</em> the Forward Euler predictor $V^n + k_1$.\n    Instead, we go back to $V^n$ and use the average of the two slopes, $\\frac{1}{2}(k_1 + k_2)$.\n    This is where the name \"predictor\u2013corrector\" comes from: $k_1$ predicts, and the averaging\n    with $k_2$ corrects.\n  </p>\n\n  <p>\n    Expanding $f(\\mathbf{V}) = \\mathcal{L}\\,\\mathbf{V}$ where $\\mathcal{L}$ is the discrete diffusion\n    operator (i.e., <code>apply_diffusion(V)</code> from Chapter 7), the matrix form computed at each\n    timestep is:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(10.3b)</span>\n    $$\\boxed{\\begin{aligned}\n    \\mathbf{k}_1 &= \\mathcal{L}\\,\\mathbf{V}^n \\\\[4pt]\n    \\mathbf{k}_2 &= \\mathcal{L}\\bigl(\\mathbf{V}^n + \\Delta t\\,\\mathbf{k}_1\\bigr) \\\\[4pt]\n    \\mathbf{V}^{n+1} &= \\mathbf{V}^n + \\tfrac{\\Delta t}{2}\\bigl(\\mathbf{k}_1 + \\mathbf{k}_2\\bigr)\n    \\end{aligned}}$$\n  </div>\n\n  <p>\n    Note that each $\\mathbf{k}_i$ here is a <em>bare</em> rate vector (units of mV/ms) \u2014 the factor\n    $\\Delta t$ is applied only at the final update. This is the convention used by the solver code\n    and is mathematically equivalent to the standard form (10.3) where $k_i = \\Delta t \\cdot f(V)$.\n  </p>\n\n  <div class=\"insight insight-math\">\n    <p>\n      <strong>Why exactly $\\frac{1}{2}$?</strong> Heun's method is designed so that the Taylor\n      expansion of $V^{n+1}$ matches the true solution through $O(\\Delta t^2)$.\n      Forward Euler matches only through $O(\\Delta t)$. By evaluating $f$ at the predicted point and\n      averaging, we capture the second-order term $\\frac{1}{2}\\Delta t^2 f'(V^n) f(V^n)$ that\n      Forward Euler misses. The coefficient $\\frac{1}{2}$ is not arbitrary \u2014 it is the unique weight\n      that achieves this cancellation for the two-stage Heun form.\n    </p>\n  </div>\n\n  <!-- Layer 4: Worked example -->\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>Worked example.</strong> Consider $dV/dt = -2V$ with $V^0 = 1.0$ and $\\Delta t = 0.1$.\n      The exact solution at $t = 0.1$ is $e^{-0.2} = 0.81873$.\n    </p>\n    <p>\n      <strong>Forward Euler:</strong> $V^1 = 1.0 + 0.1 \\times (-2 \\times 1.0) = 0.800$. Error = $0.01873$.\n    </p>\n    <p>\n      <strong>RK2 (Heun):</strong><br/>\n      $k_1 = 0.1 \\times (-2 \\times 1.0) = -0.2$<br/>\n      $\\tilde{V} = 1.0 + (-0.2) = 0.8$<br/>\n      $k_2 = 0.1 \\times (-2 \\times 0.8) = -0.16$<br/>\n      $V^1 = 1.0 + \\frac{1}{2}(-0.2 + (-0.16)) = 1.0 - 0.18 = 0.820$. Error = $0.00127$.\n    </p>\n    <p>\n      RK2's error ($0.00127$) is <strong>15\u00d7 smaller</strong> than Forward Euler's ($0.01873$) for the\n      same timestep \u2014 and it only cost one extra function evaluation.\n    </p>\n  </div>\n\n  <h3>10.4 &ensp; RK4 \u2014 The Classical Four-Stage Method</h3>\n\n  <!-- Layer 1: ELI5 -->\n  <p>\n    If RK2 is checking your speedometer twice, RK4 checks it <em>four times</em>: at the start,\n    twice at the midpoint (using two different estimates), and once at the end. It then combines\n    all four readings with a specific weighted average that is tuned to capture the curvature of\n    the solution remarkably well. RK4 is so accurate that it has been the default ODE integrator\n    in science and engineering since the 1900s \u2014 a century of trust.\n  </p>\n\n  <!-- Layer 2: Conceptual -->\n  <p>\n    The genius of RK4 is its <em>midpoint sampling</em>. Rather than just checking the endpoints\n    (like RK2), it takes two independent samples at $t^n + \\Delta t/2$. Why the midpoint?\n    Because the midpoint rule for integration is second-order accurate all by itself, and by\n    doing it twice (with refined estimates), the errors cancel to fourth order. The final weighted\n    average \u2014 giving the midpoint samples twice the weight of the endpoints \u2014 is not a coincidence.\n    It mirrors Simpson's rule from numerical integration, which achieves fourth-order accuracy by\n    weighting the endpoints and midpoint as $\\frac{1}{6}$, $\\frac{4}{6}$, $\\frac{1}{6}$.\n  </p>\n\n  <!-- Layer 3: Diagram -->\n  <svg viewBox=\"0 0 560 320\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:560px; display:block; margin:1.5em auto;\">\n    <defs>\n      <marker id=\"arr9r\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\">\n        <path d=\"M0,0 L8,3 L0,6\" fill=\"none\" stroke=\"#d32f2f\" stroke-width=\"1.2\"/>\n      </marker>\n      <marker id=\"arr9o\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\">\n        <path d=\"M0,0 L8,3 L0,6\" fill=\"none\" stroke=\"#e65100\" stroke-width=\"1.2\"/>\n      </marker>\n      <marker id=\"arr9p\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\">\n        <path d=\"M0,0 L8,3 L0,6\" fill=\"none\" stroke=\"#6a1b9a\" stroke-width=\"1.2\"/>\n      </marker>\n      <marker id=\"arr9bl\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\">\n        <path d=\"M0,0 L8,3 L0,6\" fill=\"none\" stroke=\"#1565c0\" stroke-width=\"1.2\"/>\n      </marker>\n      <marker id=\"arr9g2\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\">\n        <path d=\"M0,0 L8,3 L0,6\" fill=\"none\" stroke=\"#2e7d32\" stroke-width=\"1.4\"/>\n      </marker>\n    </defs>\n    <!-- Axes -->\n    <line x1=\"50\" y1=\"280\" x2=\"530\" y2=\"280\" stroke=\"#333\" stroke-width=\"1.5\"/>\n    <line x1=\"50\" y1=\"280\" x2=\"50\" y2=\"20\" stroke=\"#333\" stroke-width=\"1.5\"/>\n    <text x=\"290\" y=\"308\" text-anchor=\"middle\" font-size=\"13\" fill=\"#333\">$t$</text>\n    <text x=\"30\" y=\"150\" text-anchor=\"middle\" font-size=\"13\" fill=\"#333\" transform=\"rotate(-90,30,150)\">$V$</text>\n    <!-- True curve (gray dashed) -->\n    <path d=\"M80,230 Q250,130 460,70\" fill=\"none\" stroke=\"#aaa\" stroke-width=\"1.5\" stroke-dasharray=\"6,4\"/>\n    <text x=\"468\" y=\"65\" font-size=\"10\" fill=\"#999\">true</text>\n    <!-- Time markers -->\n    <text x=\"75\" y=\"298\" font-size=\"11\" fill=\"#333\">$t^n$</text>\n    <line x1=\"80\" y1=\"280\" x2=\"80\" y2=\"275\" stroke=\"#333\"/>\n    <text x=\"250\" y=\"298\" font-size=\"11\" fill=\"#333\">$t^n\\!+\\!\\tfrac{\\Delta t}{2}$</text>\n    <line x1=\"270\" y1=\"280\" x2=\"270\" y2=\"275\" stroke=\"#333\"/>\n    <text x=\"445\" y=\"298\" font-size=\"11\" fill=\"#333\">$t^{n+1}$</text>\n    <line x1=\"460\" y1=\"280\" x2=\"460\" y2=\"275\" stroke=\"#333\"/>\n    <!-- Point at t_n -->\n    <circle cx=\"80\" cy=\"230\" r=\"5\" fill=\"#333\"/>\n    <!-- k1 (red) -->\n    <line x1=\"80\" y1=\"230\" x2=\"270\" y2=\"160\" stroke=\"#d32f2f\" stroke-width=\"2\" marker-end=\"url(#arr9r)\" opacity=\"0.85\"/>\n    <text x=\"120\" y=\"182\" font-size=\"12\" fill=\"#d32f2f\" font-weight=\"bold\">$k_1$</text>\n    <circle cx=\"270\" cy=\"160\" r=\"3\" fill=\"#d32f2f\" opacity=\"0.5\"/>\n    <!-- k2 (orange) - from (t_n, V_n) but using k1/2 -->\n    <line x1=\"80\" y1=\"230\" x2=\"270\" y2=\"148\" stroke=\"#e65100\" stroke-width=\"2\" marker-end=\"url(#arr9o)\" opacity=\"0.85\"/>\n    <text x=\"140\" y=\"167\" font-size=\"12\" fill=\"#e65100\" font-weight=\"bold\">$k_2$</text>\n    <circle cx=\"270\" cy=\"148\" r=\"3\" fill=\"#e65100\" opacity=\"0.5\"/>\n    <!-- k3 (purple) - from (t_n, V_n) using k2/2 -->\n    <line x1=\"80\" y1=\"230\" x2=\"270\" y2=\"141\" stroke=\"#6a1b9a\" stroke-width=\"2\" marker-end=\"url(#arr9p)\" opacity=\"0.85\"/>\n    <text x=\"160\" y=\"155\" font-size=\"12\" fill=\"#6a1b9a\" font-weight=\"bold\">$k_3$</text>\n    <circle cx=\"270\" cy=\"141\" r=\"3\" fill=\"#6a1b9a\" opacity=\"0.5\"/>\n    <!-- k4 (blue) - full step using k3 -->\n    <line x1=\"80\" y1=\"230\" x2=\"460\" y2=\"83\" stroke=\"#1565c0\" stroke-width=\"2\" marker-end=\"url(#arr9bl)\" opacity=\"0.85\"/>\n    <text x=\"310\" y=\"130\" font-size=\"12\" fill=\"#1565c0\" font-weight=\"bold\">$k_4$</text>\n    <circle cx=\"460\" cy=\"83\" r=\"3\" fill=\"#1565c0\" opacity=\"0.5\"/>\n    <!-- Final RK4 result (green) -->\n    <line x1=\"80\" y1=\"230\" x2=\"460\" y2=\"93\" stroke=\"#2e7d32\" stroke-width=\"2.5\" marker-end=\"url(#arr9g2)\"/>\n    <text x=\"340\" y=\"108\" font-size=\"12\" fill=\"#2e7d32\" font-weight=\"bold\">weighted average \u2192 $V^{n+1}$</text>\n    <circle cx=\"460\" cy=\"93\" r=\"5\" fill=\"#2e7d32\"/>\n    <!-- Legend -->\n    <rect x=\"350\" y=\"195\" width=\"180\" height=\"80\" rx=\"4\" fill=\"white\" stroke=\"#ddd\" stroke-width=\"1\"/>\n    <line x1=\"360\" y1=\"212\" x2=\"385\" y2=\"212\" stroke=\"#d32f2f\" stroke-width=\"2\"/>\n    <text x=\"392\" y=\"216\" font-size=\"10\" fill=\"#333\">$k_1$: slope at start (\u00d71)</text>\n    <line x1=\"360\" y1=\"230\" x2=\"385\" y2=\"230\" stroke=\"#e65100\" stroke-width=\"2\"/>\n    <text x=\"392\" y=\"234\" font-size=\"10\" fill=\"#333\">$k_2$: 1st midpoint (\u00d72)</text>\n    <line x1=\"360\" y1=\"248\" x2=\"385\" y2=\"248\" stroke=\"#6a1b9a\" stroke-width=\"2\"/>\n    <text x=\"392\" y=\"252\" font-size=\"10\" fill=\"#333\">$k_3$: 2nd midpoint (\u00d72)</text>\n    <line x1=\"360\" y1=\"266\" x2=\"385\" y2=\"266\" stroke=\"#1565c0\" stroke-width=\"2\"/>\n    <text x=\"392\" y=\"270\" font-size=\"10\" fill=\"#333\">$k_4$: slope at end (\u00d71)</text>\n  </svg>\n\n  <p style=\"text-align:center; font-size:0.92em; color:#555; margin-top:-0.5em;\">\n    <strong>Figure 9.2</strong> \u2014 The four stages of RK4. Each colored line shows a slope evaluation;\n    the green result is the weighted average $\\frac{1}{6}(k_1 + 2k_2 + 2k_3 + k_4)$.\n    The midpoint slopes ($k_2$, $k_3$) get double weight, mirroring Simpson's rule.\n  </p>\n\n  <!-- Layer 3: Math (the actual equations) -->\n  <p>\n    The classical RK4 method evaluates the right-hand side $f(V) = \\mathbf{M}^{-1}(-\\mathbf{K}\\,V)$\n    at four carefully chosen points:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(10.4)</span>\n    $$\\boxed{\\begin{aligned}\n    k_1 &= \\Delta t \\; f\\!\\left(V^n\\right) & &\\text{(slope at } t^n\\text{)} \\\\[4pt]\n    k_2 &= \\Delta t \\; f\\!\\left(V^n + \\tfrac{1}{2}\\,k_1\\right) & &\\text{(1st midpoint, using } k_1 \\text{ to get there)} \\\\[4pt]\n    k_3 &= \\Delta t \\; f\\!\\left(V^n + \\tfrac{1}{2}\\,k_2\\right) & &\\text{(2nd midpoint, using } k_2 \\text{ to get there)} \\\\[4pt]\n    k_4 &= \\Delta t \\; f\\!\\left(V^n + k_3\\right) & &\\text{(slope at } t^{n+1}\\text{, using } k_3 \\text{ to get there)} \\\\[6pt]\n    V^{n+1} &= V^n + \\tfrac{1}{6}\\bigl(k_1 + 2k_2 + 2k_3 + k_4\\bigr) & &\\text{(weighted average)}\n    \\end{aligned}}$$\n  </div>\n\n  <p>\n    Read the stages as a conversation: $k_1$ says \"here's the slope at the start.\" $k_2$ says\n    \"okay, I used your slope to walk to the midpoint \u2014 here's the slope <em>there</em>.\" $k_3$ says\n    \"let me try the midpoint again using $k_2$'s improved estimate.\" $k_4$ says \"and here's the slope\n    at the far end, using $k_3$.\" The final weighted average gives the midpoint samples ($k_2, k_3$)\n    double weight because the midpoint carries more information about the interval's curvature \u2014 exactly\n    as in Simpson's 1-4-1 quadrature rule.\n  </p>\n\n  <p>\n    In discrete matrix form with $\\mathcal{L}$ as the spatial operator:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(10.4b)</span>\n    $$\\boxed{\\begin{aligned}\n    \\mathbf{k}_1 &= \\mathcal{L}\\,\\mathbf{V}^n \\\\[3pt]\n    \\mathbf{k}_2 &= \\mathcal{L}\\bigl(\\mathbf{V}^n + \\tfrac{\\Delta t}{2}\\,\\mathbf{k}_1\\bigr) \\\\[3pt]\n    \\mathbf{k}_3 &= \\mathcal{L}\\bigl(\\mathbf{V}^n + \\tfrac{\\Delta t}{2}\\,\\mathbf{k}_2\\bigr) \\\\[3pt]\n    \\mathbf{k}_4 &= \\mathcal{L}\\bigl(\\mathbf{V}^n + \\Delta t\\,\\mathbf{k}_3\\bigr) \\\\[5pt]\n    \\mathbf{V}^{n+1} &= \\mathbf{V}^n + \\frac{\\Delta t}{6}\\bigl(\\mathbf{k}_1 + 2\\,\\mathbf{k}_2 + 2\\,\\mathbf{k}_3 + \\mathbf{k}_4\\bigr)\n    \\end{aligned}}$$\n  </div>\n\n  <p>\n    Again, each $\\mathbf{k}_i$ is a bare rate (mV/ms), not pre-multiplied by $\\Delta t$. The factor\n    $\\Delta t$ appears only at the final update, which avoids four unnecessary multiplications per step.\n  </p>\n\n  <div class=\"insight insight-math\">\n    <p>\n      <strong>Why these specific weights?</strong> The weights $\\frac{1}{6}(1, 2, 2, 1)$ are not\n      chosen by trial and error. They come from matching the Taylor expansion of $V(t^n + \\Delta t)$\n      through the $\\Delta t^4$ term. There are 8 \"order conditions\" that a 4th-order method must satisfy\n      (corresponding to the 8 rooted trees with up to 4 vertices in Butcher's theory). The classical\n      RK4 tableau \u2014 with its midpoint-endpoint structure \u2014 is the simplest 4-stage method satisfying\n      all 8 conditions. No 3-stage explicit method can achieve 4th-order accuracy.\n    </p>\n  </div>\n\n  <!-- Layer 4: Worked example -->\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>Worked example.</strong> Same test: $dV/dt = -2V$, $V^0 = 1.0$, $\\Delta t = 0.1$.\n      Exact answer: $e^{-0.2} = 0.818731$.\n    </p>\n    <p>\n      $k_1 = 0.1 \\times (-2 \\times 1.0) = -0.200$<br/>\n      $k_2 = 0.1 \\times (-2 \\times (1.0 - 0.100)) = 0.1 \\times (-1.800) = -0.180$<br/>\n      $k_3 = 0.1 \\times (-2 \\times (1.0 - 0.090)) = 0.1 \\times (-1.820) = -0.182$<br/>\n      $k_4 = 0.1 \\times (-2 \\times (1.0 - 0.182)) = 0.1 \\times (-1.636) = -0.1636$\n    </p>\n    <p>\n      $V^1 = 1.0 + \\frac{1}{6}(-0.200 + 2(-0.180) + 2(-0.182) + (-0.1636))$<br/>\n      $\\phantom{V^1} = 1.0 + \\frac{1}{6}(-1.0876) = 1.0 - 0.18127 = 0.81873$\n    </p>\n    <p>\n      <strong>Error = $0.000001$</strong> \u2014 five orders of magnitude smaller than Forward Euler, for\n      just 4\u00d7 the cost. This is the power of fourth-order convergence.\n    </p>\n  </div>\n\n  <h3>10.5 &ensp; Stability Regions: How Large Can $\\Delta t$ Be?</h3>\n\n  <!-- Layer 1: ELI5 -->\n  <p>\n    Every explicit method has a \"safe zone\" \u2014 a region in the complex plane where the timestep is\n    small enough that the solution stays bounded. Step outside this zone, and the solution blows up\n    exponentially. The size and shape of this safe zone determines the practical maximum timestep.\n  </p>\n\n  <!-- Layer 2: Conceptual -->\n  <p>\n    For the test equation $dV/dt = \\lambda V$ (where $\\lambda$ is an eigenvalue of the diffusion\n    operator), one timestep gives $V^{n+1} = R(z)\\,V^n$ where $z = \\lambda\\,\\Delta t$ and $R(z)$\n    is the <em>stability function</em>. The method is stable when $|R(z)| \\leq 1$. For diffusion,\n    $\\lambda$ is real and negative (eigenvalues of $-\\mathbf{K}$), so we only need the intersection\n    of the stability region with the negative real axis.\n  </p>\n\n  <!-- Layer 3: Math -->\n  <p>\n    The stability functions for each method are:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(10.5)</span>\n    $$\\begin{aligned}\n    \\text{Forward Euler:} \\quad R(z) &= 1 + z & &\\text{stable for } z \\in [-2, 0] \\\\[4pt]\n    \\text{RK2 (Heun):} \\quad R(z) &= 1 + z + \\tfrac{1}{2}z^2 & &\\text{stable for } z \\in [-2, 0] \\\\[4pt]\n    \\text{RK4:} \\quad R(z) &= 1 + z + \\tfrac{1}{2}z^2 + \\tfrac{1}{6}z^3 + \\tfrac{1}{24}z^4 & &\\text{stable for } z \\in [-2.785, 0]\n    \\end{aligned}$$\n  </div>\n\n  <!-- Layer 3: Stability region diagram -->\n  <svg viewBox=\"0 0 500 300\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:500px; display:block; margin:1.5em auto;\">\n    <!-- Background -->\n    <rect x=\"40\" y=\"10\" width=\"440\" height=\"270\" fill=\"#f8f9fa\" rx=\"4\"/>\n    <!-- Grid lines -->\n    <line x1=\"280\" y1=\"20\" x2=\"280\" y2=\"270\" stroke=\"#ddd\" stroke-width=\"1\"/>\n    <line x1=\"50\" y1=\"145\" x2=\"470\" y2=\"145\" stroke=\"#ddd\" stroke-width=\"1\"/>\n    <!-- Real axis label -->\n    <text x=\"460\" y=\"162\" font-size=\"11\" fill=\"#666\">Re($z$)</text>\n    <text x=\"285\" y=\"28\" font-size=\"11\" fill=\"#666\">Im($z$)</text>\n    <!-- Scale marks on real axis -->\n    <text x=\"58\" y=\"162\" font-size=\"10\" fill=\"#888\">$-3$</text>\n    <line x1=\"60\" y1=\"145\" x2=\"60\" y2=\"150\" stroke=\"#888\"/>\n    <text x=\"130\" y=\"162\" font-size=\"10\" fill=\"#888\">$-2$</text>\n    <line x1=\"133\" y1=\"145\" x2=\"133\" y2=\"150\" stroke=\"#888\"/>\n    <text x=\"203\" y=\"162\" font-size=\"10\" fill=\"#888\">$-1$</text>\n    <line x1=\"207\" y1=\"145\" x2=\"207\" y2=\"150\" stroke=\"#888\"/>\n    <text x=\"350\" y=\"162\" font-size=\"10\" fill=\"#888\">$1$</text>\n    <line x1=\"353\" y1=\"145\" x2=\"353\" y2=\"150\" stroke=\"#888\"/>\n    <!-- FE stability region (circle centered at -1, radius 1) -->\n    <circle cx=\"207\" cy=\"145\" r=\"73\" fill=\"none\" stroke=\"#d32f2f\" stroke-width=\"2\" stroke-dasharray=\"6,3\"/>\n    <!-- RK2 stability region (roughly elliptical, same real axis but taller) -->\n    <ellipse cx=\"207\" cy=\"145\" rx=\"73\" ry=\"88\" fill=\"none\" stroke=\"#e65100\" stroke-width=\"2\" stroke-dasharray=\"8,3\"/>\n    <!-- RK4 stability region (larger, characteristic shape) -->\n    <path d=\"M280,145\n             C280,90 260,50 207,35\n             C140,15 75,50 60,90\n             C45,130 50,145 53,150\n             C50,160 45,180 60,200\n             C75,240 140,275 207,255\n             C260,240 280,200 280,145 Z\"\n          fill=\"rgba(21,101,192,0.08)\" stroke=\"#1565c0\" stroke-width=\"2.5\"/>\n    <!-- Real axis stability intervals -->\n    <!-- FE/RK2: [-2, 0] -->\n    <line x1=\"133\" y1=\"140\" x2=\"280\" y2=\"140\" stroke=\"#d32f2f\" stroke-width=\"4\" opacity=\"0.5\"/>\n    <!-- RK4: [-2.785, 0] -->\n    <line x1=\"75\" y1=\"150\" x2=\"280\" y2=\"150\" stroke=\"#1565c0\" stroke-width=\"4\" opacity=\"0.5\"/>\n    <!-- Legend -->\n    <rect x=\"310\" y=\"30\" width=\"160\" height=\"74\" rx=\"4\" fill=\"white\" stroke=\"#ddd\"/>\n    <line x1=\"320\" y1=\"48\" x2=\"348\" y2=\"48\" stroke=\"#d32f2f\" stroke-width=\"2\" stroke-dasharray=\"6,3\"/>\n    <text x=\"355\" y=\"52\" font-size=\"11\" fill=\"#333\">FE: $|z| \\leq 2$</text>\n    <line x1=\"320\" y1=\"68\" x2=\"348\" y2=\"68\" stroke=\"#e65100\" stroke-width=\"2\" stroke-dasharray=\"8,3\"/>\n    <text x=\"355\" y=\"72\" font-size=\"11\" fill=\"#333\">RK2: $|z| \\leq 2$</text>\n    <line x1=\"320\" y1=\"88\" x2=\"348\" y2=\"88\" stroke=\"#1565c0\" stroke-width=\"2.5\"/>\n    <text x=\"355\" y=\"92\" font-size=\"11\" fill=\"#333\">RK4: $|z| \\leq 2.785$</text>\n  </svg>\n\n  <p style=\"text-align:center; font-size:0.92em; color:#555; margin-top:-0.5em;\">\n    <strong>Figure 9.3</strong> \u2014 Stability regions in the complex $z = \\lambda\\,\\Delta t$ plane.\n    The method is stable when $z$ lies inside the boundary. Along the negative real axis (which is\n    what matters for diffusion), RK4 allows $\\sim$39% larger timesteps than FE/RK2.\n  </p>\n\n  <p>\n    A critical observation: <strong>RK2 and Forward Euler have the same stability limit along the\n    real axis</strong> ($|z| \\leq 2$). So RK2 cannot take larger timesteps than Forward Euler for\n    pure diffusion \u2014 its advantage is purely in <em>accuracy per step</em>, not stability.\n    RK4, however, extends the real-axis limit to $|z| \\leq 2.785$, allowing about 39% larger steps.\n    In terms of the CFL condition:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(10.6)</span>\n    $$\\Delta t_{\\text{RK4}} \\leq \\frac{2.785\\; h^2}{2\\,n_{\\text{dim}}\\,d_{\\max}} \\approx 1.39\\;\\Delta t_{\\text{FE}}$$\n  </div>\n\n  <h3>10.6 &ensp; Cost vs. Accuracy: Choosing Your Explicit Method</h3>\n\n  <!-- Layer 2: Comparative analysis -->\n  <p>\n    Each RK method trades cost for accuracy. The question is: for a given error tolerance, which\n    method minimizes total work? The answer depends on whether you are\n    <em>stability-limited</em> (the CFL condition forces small $\\Delta t$) or\n    <em>accuracy-limited</em> (you could take larger $\\Delta t$ but the error would be too large).\n  </p>\n\n  <table style=\"width:100%; border-collapse:collapse; margin:1em 0; font-size:0.95em;\">\n    <thead>\n      <tr style=\"background:#f0f0f0;\">\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:left;\">Method</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:center;\">$f$ evals/step</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:center;\">Order</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:center;\">Real-axis stability</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:center;\">$\\Delta t_{\\max}$ (relative)</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:center;\">Best when...</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <td style=\"padding:8px; border:1px solid #ddd;\">Forward Euler</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">1</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">1</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">$[-2, 0]$</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">1.0\u00d7</td>\n        <td style=\"padding:8px; border:1px solid #ddd;\">CFL-limited (fine mesh, ionic $\\Delta t$ \u226b CFL)</td>\n      </tr>\n      <tr style=\"background:#fafafa;\">\n        <td style=\"padding:8px; border:1px solid #ddd;\">RK2 (Heun)</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">2</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">2</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">$[-2, 0]$</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">1.0\u00d7</td>\n        <td style=\"padding:8px; border:1px solid #ddd;\">Accuracy matters, not quite CFL-limited</td>\n      </tr>\n      <tr>\n        <td style=\"padding:8px; border:1px solid #ddd;\">RK4</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">4</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">4</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">$[-2.785, 0]$</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">1.39\u00d7</td>\n        <td style=\"padding:8px; border:1px solid #ddd;\">Smooth solution, accuracy-limited regime</td>\n      </tr>\n    </tbody>\n  </table>\n\n  <p>\n    <strong>The practical verdict for cardiac simulation:</strong> Most cardiac simulations are\n    CFL-limited \u2014 the sharp wavefront during depolarization demands small $\\Delta t$ regardless of\n    accuracy concerns. In this regime, Forward Euler is usually the best choice: the CFL condition\n    forces a small enough $\\Delta t$ that first-order accuracy is adequate, and the cost per step is\n    minimal. RK4 shines in accuracy-limited regimes (coarse mesh, smooth solutions) or when coupled\n    with adaptive timestepping, which Chapter 10 does not cover but is an active research direction.\n  </p>\n\n  <h3>10.7 &ensp; When Explicit Methods Shine</h3>\n\n  <p>\n    Despite the CFL constraint, explicit methods remain competitive in several important scenarios:\n  </p>\n\n  <p>\n    <strong>The mesh is coarse enough</strong> that the CFL limit does not bite. For $h = 0.2{-}0.5$ mm\n    (common in 2D studies), the allowed $\\Delta t$ is comparable to or larger than what the ionic\n    solver needs anyway.\n  </p>\n\n  <p>\n    <strong>GPU parallelism is critical.</strong> Explicit methods are embarrassingly parallel \u2014 each\n    cell's update is independent. No linear system needs to be solved, no global communication is\n    required. On modern GPUs with thousands of cores, this parallelism translates directly to speed.\n  </p>\n\n  <p>\n    <strong>Memory is limited.</strong> Explicit methods store only the current state and the Laplacian\n    evaluation \u2014 no preconditioner, no Krylov vectors, no mass matrix factorization.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      In Engine V5.4, all three explicit methods inherit from a <code>DiffusionSolver</code> ABC\n      (<code>solver/diffusion_time_stepping/base.py</code>). Each calls <code>self._spatial.apply_diffusion(V)</code>\n      \u2014 the $\\mathcal{L}$ operator \u2014 which encapsulates FDM, FEM, or FVM (Chapter 7). Swapping\n      between spatial methods is a one-line configuration change; the time integrator only sees the\n      operator $\\mathcal{L}$. Explicit solvers need no pre-built matrices; only the implicit solvers\n      (Chapter 10) build <code>DiffusionOperators</code>.\n    </p>\n  </div>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      <strong>Memory consideration for RK4.</strong> Each $\\mathbf{k}_i$ is a full-length voltage vector (one\n      float per mesh node). RK4 stores 4 of these simultaneously, plus the original $\\mathbf{V}^n$.\n      For a 3D mesh with $10^6$ nodes at 8 bytes/float, that is $5 \\times 8$ MB $= 40$ MB \u2014 trivial\n      on a CPU, but meaningful on a GPU where shared memory is limited. Forward Euler needs only one\n      extra vector ($2 \\times 8$ MB). This is another reason why Forward Euler dominates GPU cardiac\n      codes.\n    </p>\n  </div>\n</div>\n\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 11 \u2014 IMPLICIT DIFFUSION SOLVERS                          -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "ch11": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 11</div>\n  <h2 class=\"chapter-title\">Implicit Diffusion Solvers</h2>\n  <div class=\"chapter-intro\">\n    When meshes are fine or three-dimensional, the CFL constraint makes explicit methods impractical.\n    Implicit methods trade the simplicity of a matrix-free update for unconditional stability \u2014 at the\n    cost of solving a linear system at every timestep.\n  </div>\n\n  <h3>11.1 &ensp; Why Implicit? The CFL Wall</h3>\n\n  <!-- Layer 1: ELI5 -->\n  <p>\n    Explicit methods (Chapter 9) are like steering a boat by looking only at where you <em>are</em>. If\n    the river is calm, this works fine. But in rapids (fine meshes, fast diffusion), the boat oscillates\n    wildly because you are always reacting to where you <em>were</em>, not where you are <em>going</em>.\n    Implicit methods fix this by peeking ahead: they ask \"where will I be at the end of this step?\"\n    and solve for that future state directly. This costs more per step (you must solve a system of\n    equations), but the payoff is unconditional stability \u2014 you can take any step size without blowing up.\n  </p>\n\n  <!-- Layer 2: Conceptual -->\n  <p>\n    The fundamental issue is that the CFL condition (equation 9.2) scales as $h^2$: halve the mesh\n    spacing and the maximum timestep drops by a factor of four. For a 3D mesh with $h = 0.1$ mm\n    ($d_{\\max} = 0.174$ mm$^2$/ms), the CFL limit is $\\Delta t \\leq 0.004$ ms \u2014 far below the\n    $0.01{-}0.05$ ms range the ionic solver prefers. Running 5\u201312 explicit diffusion substeps per\n    ionic step wastes enormous effort. Implicit methods eliminate this constraint entirely: they are\n    <em>unconditionally stable</em>, meaning $\\Delta t$ is limited only by accuracy, not by stability.\n    In practice, this lets us match the diffusion timestep to the ionic timestep, halving or more\n    the total simulation time.\n  </p>\n\n  <p>\n    The price is that at each timestep, the new voltage $\\mathbf{V}^{n+1}$ appears on <em>both sides</em>\n    of the equation \u2014 so we must solve a linear system $\\mathbf{A}\\,\\mathbf{V}^{n+1} = \\mathbf{b}$ to\n    find it. This is where the machinery of Chapter 7 pays off: the stiffness matrix $\\mathbf{K}$ and\n    mass matrix $\\mathbf{M}$ from the spatial discretization become the building blocks of $\\mathbf{A}$\n    and $\\mathbf{b}$.\n  </p>\n\n  <h3>11.2 &ensp; Backward Euler (BDF1): The Simplest Implicit Method</h3>\n\n  <!-- Layer 1: ELI5 -->\n  <p>\n    If Forward Euler asks \"where am I now, and where does the slope say I should go?\", Backward Euler\n    asks the reverse: \"where do I end up such that the slope <em>there</em> points back to where I started?\"\n    This backward-looking logic makes it inherently stable \u2014 it cannot overshoot because it is defined by\n    the destination, not the departure.\n  </p>\n\n  <!-- Layer 2: Conceptual -->\n  <p>\n    Formally, Backward Euler evaluates the diffusion operator at the <em>new</em> time level:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(11.1)</span>\n    $$\\mathbf{V}^{n+1} = \\mathbf{V}^n + \\Delta t\\;\\mathcal{D}(\\mathbf{V}^{n+1})$$\n  </div>\n\n  <p>\n    Since $\\mathbf{V}^{n+1}$ appears on both sides, this is an <em>implicit</em> equation. To solve it,\n    we substitute the semi-discrete diffusion operator from Chapter 7:\n    $\\mathbf{M}\\,d\\mathbf{V}/dt = -\\mathbf{K}\\,\\mathbf{V}$. Replacing $d\\mathbf{V}/dt$ with the\n    backward difference $(\\mathbf{V}^{n+1} - \\mathbf{V}^n)/\\Delta t$ and rearranging:\n  </p>\n\n  <!-- Layer 3: Matrix form (what the code computes) -->\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(11.2)</span>\n    $$\\boxed{\\underbrace{\\bigl(\\mathbf{M} + \\Delta t\\,\\mathbf{K}\\bigr)}_{\\mathbf{A}_{\\text{lhs}}}\\;\\mathbf{V}^{n+1} = \\underbrace{\\mathbf{M}}_{\\mathbf{B}_{\\text{rhs}}}\\;\\mathbf{V}^n}$$\n  </div>\n\n  <p>\n    This is the exact linear system the code solves. The left-hand side matrix\n    $\\mathbf{A}_{\\text{lhs}} = \\mathbf{M} + \\Delta t\\,\\mathbf{K}$ is symmetric positive definite (SPD)\n    for the standard monodomain problem with Neumann boundary conditions, so the conjugate gradient\n    method converges reliably. The right-hand side is simply $\\mathbf{B}_{\\text{rhs}} \\cdot \\mathbf{V}^n$\n    \u2014 a single sparse matrix-vector product.\n  </p>\n\n  <p>\n    Backward Euler is first-order accurate ($O(\\Delta t)$) and <em>L-stable</em> \u2014 meaning it not only\n    stays bounded but actively <em>damps</em> high-frequency modes. This aggressive damping is useful\n    after discontinuous events (stimulus application, wavefront collision) where oscillations would\n    otherwise pollute the solution. It is also the natural first step for multi-step methods like BDF2.\n  </p>\n\n  <p>\n    For FDM with lumped mass ($\\mathbf{M} = \\mathbf{I}$), the system simplifies to\n    $(\\mathbf{I} + \\Delta t\\,\\mathbf{K})\\,\\mathbf{V}^{n+1} = \\mathbf{V}^n$.\n  </p>\n\n  <h3>11.3 &ensp; Crank\u2013Nicolson: Second-Order Implicit</h3>\n\n  <!-- Layer 1: ELI5 -->\n  <p>\n    Backward Euler looks only at the destination; Forward Euler looks only at the start. Crank\u2013Nicolson\n    <em>averages the two</em> \u2014 evaluating the diffusion operator at both the old and new time levels and\n    taking the midpoint. This averaging is what gives it second-order accuracy: by sampling both ends of\n    the interval, it captures the curvature that either method alone would miss.\n  </p>\n\n  <!-- Layer 2: Continuous form -->\n  <p>\n    The Crank\u2013Nicolson method (also called the trapezoidal rule) applies the diffusion operator at the\n    half-way point between old and new:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(11.3)</span>\n    $$\\mathbf{V}^{n+1} = \\mathbf{V}^n + \\frac{\\Delta t}{2}\\bigl[\\mathcal{D}(\\mathbf{V}^n) + \\mathcal{D}(\\mathbf{V}^{n+1})\\bigr]$$\n  </div>\n\n  <p>\n    Substituting $\\mathcal{D}(\\mathbf{V}) = -\\mathbf{M}^{-1}\\mathbf{K}\\,\\mathbf{V}$, multiplying through\n    by $\\mathbf{M}$, and collecting terms:\n  </p>\n\n  <!-- Layer 3: Matrix form (what the code computes) -->\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(11.4)</span>\n    $$\\boxed{\\underbrace{\\bigl(\\mathbf{M} + \\tfrac{\\Delta t}{2}\\mathbf{K}\\bigr)}_{\\mathbf{A}_{\\text{lhs}}}\\;\\mathbf{V}^{n+1} = \\underbrace{\\bigl(\\mathbf{M} - \\tfrac{\\Delta t}{2}\\mathbf{K}\\bigr)}_{\\mathbf{B}_{\\text{rhs}}}\\;\\mathbf{V}^n}$$\n  </div>\n\n  <p>\n    Compare with Backward Euler (11.2): the only difference is the $\\frac{1}{2}$ on the $\\mathbf{K}$\n    terms and the appearance of $\\mathbf{K}$ on the right-hand side. Both sides now involve the stiffness\n    matrix, but the computation is the same: one sparse matrix-vector product for the RHS, then a\n    linear solve with $\\mathbf{A}_{\\text{lhs}}$.\n  </p>\n\n  <p>\n    Crank\u2013Nicolson is second-order accurate ($O(\\Delta t^2)$) and A-stable \u2014 unconditionally stable, but\n    <em>not</em> L-stable. The practical consequence: at very sharp wavefronts, CN can produce mild 2$\\Delta t$\n    oscillations (the Crank\u2013Nicolson \"ringing\" artifact). These oscillations do not grow (A-stability) but\n    they can be aesthetically unpleasant and may trigger spurious ionic model activation. For most cardiac\n    simulations with $\\Delta t \\leq 0.05$ ms, the oscillations are negligible.\n  </p>\n\n  <!-- Layer 4: Worked example -->\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>Worked example.</strong> Consider a 5-node 1D cable (FDM, lumped mass, $\\mathbf{M} = \\mathbf{I}$)\n      with stiffness matrix $\\mathbf{K}$ from Chapter 7 and $\\Delta t = 0.02$ ms. The CN matrices are:\n    </p>\n    <p>\n      $\\mathbf{A}_{\\text{lhs}} = \\mathbf{I} + 0.01\\,\\mathbf{K}$, &ensp;\n      $\\mathbf{B}_{\\text{rhs}} = \\mathbf{I} - 0.01\\,\\mathbf{K}$\n    </p>\n    <p>\n      At each timestep: (1) compute $\\mathbf{b} = \\mathbf{B}_{\\text{rhs}} \\cdot \\mathbf{V}^n$\n      (sparse matvec, $\\sim 5N$ flops), then (2) solve $\\mathbf{A}_{\\text{lhs}} \\cdot \\mathbf{V}^{n+1} = \\mathbf{b}$\n      (CG iteration, 10\u201330 iterations \u00d7 $\\sim 5N$ flops per iteration). Compare with Forward Euler:\n      one matvec per step, but requiring $\\Delta t \\leq h^2/(2d) \\approx 0.003$ ms \u2014 meaning CN can\n      take $\\sim$7\u00d7 larger steps for the same total cost per unit simulation time.\n    </p>\n  </div>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      Both $\\mathbf{A}_{\\text{lhs}}$ and $\\mathbf{B}_{\\text{rhs}}$ are precomputed once at the start\n      of the simulation (or when $\\Delta t$ changes) and reused at every timestep. They are sparse\n      matrices with the same sparsity pattern as $\\mathbf{K}$. This one-time assembly cost is amortized\n      over thousands of timesteps.\n    </p>\n  </div>\n\n  <h3>11.4 &ensp; BDF2: Second-Order with Strong Damping</h3>\n\n  <!-- Layer 1: ELI5 -->\n  <p>\n    BDF2 is like Crank\u2013Nicolson's tougher cousin. Both are second-order accurate, but BDF2 achieves this\n    by using <em>two previous time levels</em> \u2014 $\\mathbf{V}^n$ and $\\mathbf{V}^{n-1}$ \u2014 rather than\n    averaging the diffusion operator. The payoff is <em>L-stability</em>: BDF2 aggressively damps stiff\n    transients that would cause CN to ring. For the steep cardiac wavefront ($\\sim$0.3 mm wide, crossing a\n    grid cell in $\\sim$0.01 ms), this damping is usually beneficial.\n  </p>\n\n  <!-- Layer 2: Continuous form -->\n  <p>\n    The BDF2 formula replaces the first-order backward difference with a second-order version using\n    two history levels:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(11.5)</span>\n    $$\\frac{3\\,\\mathbf{V}^{n+1} - 4\\,\\mathbf{V}^n + \\mathbf{V}^{n-1}}{2\\,\\Delta t} = \\mathcal{D}(\\mathbf{V}^{n+1})$$\n  </div>\n\n  <p>\n    The left side is a second-order backward difference approximation to $d\\mathbf{V}/dt$ at time\n    $t^{n+1}$, using the three points $\\{t^{n-1}, t^n, t^{n+1}\\}$. Multiplying through by\n    $2\\,\\Delta t\\,\\mathbf{M}$ and substituting $\\mathcal{D} = -\\mathbf{M}^{-1}\\mathbf{K}$:\n  </p>\n\n  <!-- Layer 3: Matrix form (what the code computes) -->\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(11.6)</span>\n    $$\\boxed{\\underbrace{\\bigl(3\\,\\mathbf{M} + 2\\,\\Delta t\\,\\mathbf{K}\\bigr)}_{\\mathbf{A}_{\\text{lhs}}}\\;\\mathbf{V}^{n+1} = \\underbrace{4\\,\\mathbf{M}}_{\\mathbf{B}_{\\text{rhs}}}\\;\\mathbf{V}^n - \\mathbf{M}\\,\\mathbf{V}^{n-1}}$$\n  </div>\n\n  <p>\n    The right-hand side now involves <em>two</em> previous voltage vectors: $4\\,\\mathbf{M}\\,\\mathbf{V}^n - \\mathbf{M}\\,\\mathbf{V}^{n-1}$.\n    This is the price of being a two-step method: the solver must store the previous timestep's voltage\n    $\\mathbf{V}^{n-1}$ in addition to the current $\\mathbf{V}^n$. Since $\\mathbf{V}^{n-1}$ is not\n    available at $t = 0$, the first step must use BDF1 (Backward Euler) as a bootstrap \u2014 a one-step\n    method that requires only $\\mathbf{V}^0$.\n  </p>\n\n  <div class=\"insight insight-math\">\n    <p>\n      BDF2 is A-stable but (despite its strong damping) technically not L-stable \u2014 that distinction\n      belongs to BDF1. However, BDF2's damping of high-frequency modes is much stronger than CN's.\n      The stability function $R(z) = (4 - 1/(1 + 2z/3))$ satisfies $|R(\\infty)| = 1/3$, compared to\n      $|R(\\infty)| = 1$ for CN. In practice, this means BDF2 suppresses the \"ringing\" at sharp\n      wavefronts that CN can exhibit.\n    </p>\n  </div>\n\n  <h3>11.5 &ensp; Comparing the Three Methods</h3>\n\n  <table style=\"width:100%; border-collapse:collapse; margin:1em 0; font-size:0.95em;\">\n    <thead>\n      <tr style=\"background:#f0f0f0;\">\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:left;\">Method</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:center;\">Order</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:center;\">$\\mathbf{A}_{\\text{lhs}}$</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:center;\">$\\mathbf{B}_{\\text{rhs}} \\cdot \\mathbf{V}^n$</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:center;\">Stability</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:center;\">Best when...</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <td style=\"padding:8px; border:1px solid #ddd;\">BDF1</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">1</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">$\\mathbf{M} + \\Delta t\\,\\mathbf{K}$</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">$\\mathbf{M}\\,\\mathbf{V}^n$</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">L-stable</td>\n        <td style=\"padding:8px; border:1px solid #ddd;\">First step; after discontinuities</td>\n      </tr>\n      <tr style=\"background:#fafafa;\">\n        <td style=\"padding:8px; border:1px solid #ddd;\">CN</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">2</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">$\\mathbf{M} + \\frac{\\Delta t}{2}\\mathbf{K}$</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">$(\\mathbf{M} - \\frac{\\Delta t}{2}\\mathbf{K})\\,\\mathbf{V}^n$</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">A-stable</td>\n        <td style=\"padding:8px; border:1px solid #ddd;\">Default choice; smooth solutions</td>\n      </tr>\n      <tr>\n        <td style=\"padding:8px; border:1px solid #ddd;\">BDF2</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">2</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">$3\\mathbf{M} + 2\\Delta t\\,\\mathbf{K}$</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">$4\\mathbf{M}\\,\\mathbf{V}^n - \\mathbf{M}\\,\\mathbf{V}^{n-1}$</td>\n        <td style=\"padding:8px; border:1px solid #ddd; text-align:center;\">A-stable, strongly damping</td>\n        <td style=\"padding:8px; border:1px solid #ddd;\">Sharp wavefronts; large $\\Delta t$</td>\n      </tr>\n    </tbody>\n  </table>\n\n  <p>\n    All three methods share the same computational skeleton: precompute $\\mathbf{A}_{\\text{lhs}}$ and\n    $\\mathbf{B}_{\\text{rhs}}$ once, then at each timestep perform one sparse matrix-vector product\n    (the RHS) followed by one linear solve (the LHS). The linear solve dominates the cost \u2014 typically\n    60\u201380% of wall-clock time in an implicit monodomain simulation.\n  </p>\n\n  <h3>11.6 &ensp; Linear Solvers: PCG, Chebyshev, and FFT</h3>\n\n  <p>\n    The linear system $\\mathbf{A}_{\\text{lhs}}\\,\\mathbf{V}^{n+1} = \\mathbf{b}$ must be solved\n    efficiently at every timestep. Since $\\mathbf{A}_{\\text{lhs}}$ is SPD (for Neumann boundary\n    conditions), the conjugate gradient method is the natural choice. Engine V5.4 offers three\n    solver strategies, each suited to different hardware and problem configurations:\n  </p>\n\n  <p>\n    <strong>PCG (Preconditioned Conjugate Gradient)</strong> with Jacobi preconditioning is the\n    default. It is robust, well-understood, and converges in $O(\\sqrt{\\kappa})$ iterations, where\n    $\\kappa$ is the condition number of the system. For the monodomain problem, $\\kappa \\propto h^{-2}$,\n    so finer meshes require more iterations \u2014 but typically 10\u201330 suffice for the tolerance levels\n    needed in cardiac simulation.\n  </p>\n\n  <p>\n    <strong>Chebyshev iteration</strong> is a fixed-polynomial method that requires no inner products \u2014\n    making it ideal for GPU computation, where global reductions (inner products) are expensive. It\n    requires an estimate of the eigenvalue bounds of $\\mathbf{A}_{\\text{lhs}}$, but these can be\n    precomputed once. The Chebyshev solver achieves zero-synchronization operation: every thread computes\n    independently for a fixed number of iterations.\n  </p>\n\n  <p>\n    <strong>FFT/DCT solver</strong> applies when the domain is a regular rectangle with uniform\n    spacing. The discrete Laplacian diagonalizes under a cosine transform (for Neumann BC), giving\n    a direct solve: transform \u2192 divide by eigenvalues \u2192 inverse transform. This is $O(N \\log N)$ and\n    exact to machine precision \u2014 no iterations needed. It is the fastest option when applicable, but\n    limited to rectangular domains with constant conductivity.\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      The choice of linear solver often dominates the total simulation cost. In a typical implicit\n      monodomain simulation, 60\u201380% of wall-clock time is spent in the linear solver. This is why\n      the Chebyshev (GPU-friendly) and FFT (direct) solvers exist in V5.4 alongside PCG \u2014 each\n      targets a different performance bottleneck.\n    </p>\n  </div>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      In Engine V5.4, the implicit solvers (<code>CrankNicolsonSolver</code>, <code>BDF1Solver</code>,\n      <code>BDF2Solver</code>) each inherit from <code>DiffusionSolver</code> and additionally own a\n      <code>LinearSolver</code>. At construction, each calls\n      <code>spatial.get_diffusion_operators(dt, scheme)</code> with <code>scheme</code> = <code>\"CN\"</code>,\n      <code>\"BDF1\"</code>, or <code>\"BDF2\"</code> \u2014 this returns a <code>DiffusionOperators</code>\n      object containing the precomputed sparse matrices $\\mathbf{A}_{\\text{lhs}}$ and $\\mathbf{B}_{\\text{rhs}}$.\n      The <code>step()</code> method is then identical for all three: compute\n      <code>rhs = B_rhs @ V</code>, solve <code>A_lhs @ V_new = rhs</code>. BDF2 additionally stores\n      <code>V_prev</code> and subtracts <code>M @ V_prev</code> from the RHS, with an automatic\n      fallback to BDF1 for the first timestep.\n    </p>\n  </div>\n</div>\n\n\n<!-- Part II ends here \u2014 LBM methods are covered in Part IV -->\n\n\n<!-- \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 -->\n<!--                    PART III \u2014 THE BIDOMAIN EXTENSION               -->\n<!-- \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 -->", "ch12": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 12</div>\n  <h2 class=\"chapter-title\">The Bidomain Model</h2>\n  <div class=\"chapter-intro\">\n    Before we write equations, we build a physical picture of why two \"domains\" are needed.\n    Then we derive the bidomain equations step by step, from conservation laws to the coupled\n    parabolic\u2013elliptic system that Engine V5.4 will solve.\n  </div>\n\n  <h3>12.1 &ensp; Currents in a Living Heart</h3>\n\n  <p>\n    Cardiac tissue is not a simple conducting wire. It is a dense, three-dimensional mesh of individual cells (myocytes), each wrapped in a lipid bilayer membrane that acts as both a capacitor and a nonlinear switch. Between the cells lies a bath of salty fluid \u2014 the <em>extracellular space</em>. Inside each cell, the cytoplasm forms another conducting medium \u2014 the <em>intracellular space</em>. The two spaces are connected electrically by thousands of gap junctions that stitch neighboring cells together.\n  </p>\n  <p>\n    When a wave of electrical activation sweeps through the heart, current flows simultaneously in <strong>both</strong> spaces:\n  </p>\n  <ul>\n    <li><strong>Intracellular current</strong> $\\mathbf{J}_i$ travels from cell to cell through gap junctions, following the fiber direction preferentially (anisotropy ratio $\\approx$ 10:1).</li>\n    <li><strong>Extracellular current</strong> $\\mathbf{J}_e$ flows through the interstitial fluid, also anisotropic but with a milder ratio ($\\approx$ 2.5:1).</li>\n    <li><strong>Transmembrane current</strong> $I_m$ crosses the cell membrane, carried by ion channels, pumps, and membrane capacitance.</li>\n  </ul>\n  <p>\n    The crucial observation is that <em>these anisotropy ratios are not equal</em>. Current takes different preferred paths in the two spaces. This mismatch is what the monodomain model cannot capture \u2014 and what the bidomain model was invented to describe.\n  </p>\n\n  <h3>12.2 &ensp; Divergence and Conservation: The Language of Current Flow</h3>\n\n  <p>\n    To build the bidomain equations, we need one fundamental physical law: <strong>conservation of charge</strong>. In a region of tissue, charge cannot appear or disappear \u2014 it can only flow in or out. The mathematical way to say \"what flows out must equal what is produced inside\" is the <em>divergence</em>.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>What is divergence, intuitively?</strong> Imagine placing a tiny balloon at a point in a fluid. If the fluid is flowing outward from that point, the balloon inflates \u2014 the divergence is positive. If the fluid converges inward, the balloon deflates \u2014 the divergence is negative. For electric current, $\\nabla \\cdot \\mathbf{J}$ measures how much current is \"created\" at each point (positive) or \"absorbed\" (negative).\n    </p>\n  </div>\n\n  <p>\n    Now apply this to our two domains. In the intracellular space, current $\\mathbf{J}_i$ flows from cell to cell. At any point, some of that current may leak out of the intracellular space across the membrane into the extracellular space. That leaking current <em>is</em> the transmembrane current $I_m$. Conservation says:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(12.1)</span>\n    $$\\nabla \\cdot \\mathbf{J}_i = -\\chi \\, I_m$$\n  </div>\n\n  <p>\n    The negative sign tells us: if transmembrane current flows <em>outward</em> (from inside the cell to outside), it is a <em>sink</em> for intracellular current \u2014 current is leaving the intracellular space.\n  </p>\n\n  <p>\n    Similarly, in the extracellular space, that same transmembrane current is now a <em>source</em> \u2014 current arriving from inside:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(12.2)</span>\n    $$\\nabla \\cdot \\mathbf{J}_e = +\\chi \\, I_m$$\n  </div>\n\n  <p>\n    Here $\\chi$ is the surface-to-volume ratio of the cells (how much membrane area per unit volume of tissue \u2014 typically 1000\u20131500 cm$^{-1}$). It converts a current per unit membrane area ($I_m$ in $\\mu$A/cm$^2$) into a current per unit volume.\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      <strong>The conservation identity.</strong> If you add equations (12.1) and (12.2), the transmembrane currents cancel exactly:\n      $$\\nabla \\cdot \\mathbf{J}_i + \\nabla \\cdot \\mathbf{J}_e = 0$$\n      This is simply the statement that <em>total current is conserved</em>: every charge that leaves the intracellular space enters the extracellular space, and vice versa. No charge is created or destroyed inside the tissue. This identity is the backbone of the entire bidomain framework.\n    </p>\n  </div>\n\n  <h3>12.3 &ensp; From One Domain to Two</h3>\n\n  <p>\n    In the <strong>monodomain</strong> model, we make a simplifying assumption: the ratio of intracellular to extracellular conductivity is the same in every direction. Under this assumption, the extracellular potential $\\phi_e$ becomes spatially uniform (or can be set to zero), and we need to track only one unknown \u2014 the transmembrane potential $V_m$. One PDE, one unknown. Simple and fast.\n  </p>\n  <p>\n    But real cardiac tissue violates this assumption. The intracellular space is strongly anisotropic (current flows about 10 times faster along fibers than across them), while the extracellular space is only mildly anisotropic ($\\approx$ 2.5:1). This <strong>unequal anisotropy ratio</strong> means the extracellular potential is <em>not</em> uniform \u2014 it develops complex spatial patterns of its own.\n  </p>\n  <p>\n    This matters in practice whenever we need to model:\n  </p>\n  <ul>\n    <li><strong>Defibrillation</strong> \u2014 an external electric field interacts with the tissue through the extracellular space.</li>\n    <li><strong>Virtual electrode polarization</strong> \u2014 field-induced regions of depolarization and hyperpolarization that cannot exist in the monodomain picture.</li>\n    <li><strong>ECG generation</strong> \u2014 body-surface potentials are driven by extracellular currents.</li>\n    <li><strong>External stimulation</strong> \u2014 electrode stimuli enter through $\\phi_e$.</li>\n  </ul>\n  <p>\n    To capture these phenomena, we must solve for <strong>both</strong> $V_m$ and $\\phi_e$. We need the <em>bidomain</em> model: two coupled equations, two unknowns, one beautiful (and computationally expensive) system.\n  </p>\n\n  <!-- Diagram: Monodomain vs Bidomain -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 700 280\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:600px;\">\n      <!-- Monodomain side -->\n      <rect x=\"20\" y=\"20\" width=\"300\" height=\"240\" rx=\"10\" fill=\"#f4f6fb\" stroke=\"#d0d5e0\" stroke-width=\"1.5\"/>\n      <text x=\"170\" y=\"50\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"16\" font-weight=\"700\" fill=\"#16213e\">Monodomain</text>\n      <rect x=\"60\" y=\"75\" width=\"220\" height=\"50\" rx=\"6\" fill=\"#16213e\" opacity=\"0.9\"/>\n      <text x=\"170\" y=\"105\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"15\" fill=\"white\">Single Domain: V<tspan baseline-shift=\"sub\" font-size=\"11\">m</tspan></text>\n      <text x=\"170\" y=\"155\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"13\" fill=\"#5a6175\">1 parabolic PDE</text>\n      <text x=\"170\" y=\"175\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"13\" fill=\"#5a6175\">N unknowns</text>\n      <text x=\"170\" y=\"195\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"13\" fill=\"#5a6175\">D<tspan baseline-shift=\"sub\" font-size=\"10\">eff</tspan> = harmonic mean</text>\n      <text x=\"170\" y=\"225\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"12\" fill=\"#2d6a4f\" font-style=\"italic\">Assumes equal anisotropy ratios</text>\n      <!-- Arrow -->\n      <line x1=\"340\" y1=\"140\" x2=\"370\" y2=\"140\" stroke=\"#e94560\" stroke-width=\"2.5\" marker-end=\"url(#arrow)\"/>\n      <defs><marker id=\"arrow\" markerWidth=\"10\" markerHeight=\"7\" refX=\"10\" refY=\"3.5\" orient=\"auto\"><polygon points=\"0 0, 10 3.5, 0 7\" fill=\"#e94560\"/></marker></defs>\n      <!-- Bidomain side -->\n      <rect x=\"380\" y=\"20\" width=\"300\" height=\"240\" rx=\"10\" fill=\"#f4f6fb\" stroke=\"#d0d5e0\" stroke-width=\"1.5\"/>\n      <text x=\"530\" y=\"50\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"16\" font-weight=\"700\" fill=\"#16213e\">Bidomain</text>\n      <rect x=\"400\" y=\"70\" width=\"120\" height=\"40\" rx=\"6\" fill=\"#0f3460\"/>\n      <text x=\"460\" y=\"95\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"14\" fill=\"white\">V<tspan baseline-shift=\"sub\" font-size=\"10\">m</tspan> (parabolic)</text>\n      <rect x=\"540\" y=\"70\" width=\"120\" height=\"40\" rx=\"6\" fill=\"#e94560\"/>\n      <text x=\"600\" y=\"95\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"14\" fill=\"white\">\u03c6<tspan baseline-shift=\"sub\" font-size=\"10\">e</tspan> (elliptic)</text>\n      <!-- coupling arrow -->\n      <path d=\"M520,90 C530,110 540,110 540,90\" fill=\"none\" stroke=\"#16213e\" stroke-width=\"1.5\" stroke-dasharray=\"4,3\"/>\n      <text x=\"530\" y=\"125\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#16213e\">coupled</text>\n      <text x=\"530\" y=\"155\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"13\" fill=\"#5a6175\">1 parabolic + 1 elliptic PDE</text>\n      <text x=\"530\" y=\"175\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"13\" fill=\"#5a6175\">2N unknowns</text>\n      <text x=\"530\" y=\"195\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"13\" fill=\"#5a6175\">Separate D<tspan baseline-shift=\"sub\" font-size=\"10\">i</tspan> and D<tspan baseline-shift=\"sub\" font-size=\"10\">e</tspan></text>\n      <text x=\"530\" y=\"225\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"12\" fill=\"#e94560\" font-style=\"italic\">No anisotropy assumption</text>\n    </svg>\n    <div class=\"figure-caption\"><span class=\"figure-label\">Figure 12.1.</span> Comparison of monodomain and bidomain representations. The bidomain model introduces a second unknown ($\\phi_e$) and a second equation (elliptic), coupled through the intracellular conductivity tensor.</div>  </div>\n  <h3>12.4 &ensp; The Monodomain Equation (Review)</h3>\n\n  <p>\n    The monodomain equation, which Engine V5.4 solves, describes how the transmembrane potential $V_m$ evolves in time:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(12.3)</span>\n    $$\\chi \\, C_m \\frac{\\partial V_m}{\\partial t} = -\\chi \\, I_{\\text{ion}}(V_m, \\mathbf{w}) + \\nabla \\cdot \\bigl(\\mathbf{D}\\,\\nabla V_m\\bigr) + I_{\\text{stim}}$$\n  </div>\n\n  <p>\n    Reading each term from left to right:\n  </p>\n  <ul>\n    <li><strong>Left-hand side</strong>: rate of change of membrane charge ($\\chi C_m\\, \\partial V_m/\\partial t$). The membrane is a capacitor.</li>\n    <li><strong>$-\\chi\\,I_{\\text{ion}}$</strong>: ionic currents through membrane channels \u2014 these are nonlinear functions of $V_m$ and gating variables $\\mathbf{w}$.</li>\n    <li><strong>$\\nabla\\cdot(\\mathbf{D}\\,\\nabla V_m)$</strong>: diffusion of voltage through the tissue. The tensor $\\mathbf{D}$ encodes the <em>effective</em> conductivity \u2014 a blend of intracellular and extracellular contributions.</li>\n    <li><strong>$I_{\\text{stim}}$</strong>: externally applied stimulus current.</li>\n  </ul>\n\n  <p>\n    This is a single <strong>parabolic</strong> PDE (it has a time derivative and a second-order spatial derivative). It is well-suited to standard diffusion solvers, LBM, or finite-element methods.\n  </p>\n\n  <h3>12.5 &ensp; Building the Bidomain System</h3>\n\n  <p>\n    Let us now be more precise. In each domain, Ohm's law gives us the current density:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\mathbf{J}_i = -\\mathbf{D}_i\\,\\nabla \\phi_i, \\qquad \\mathbf{J}_e = -\\mathbf{D}_e\\,\\nabla \\phi_e$$\n  </div>\n\n  <p>\n    where $\\phi_i$ and $\\phi_e$ are the intracellular and extracellular potentials, and $\\mathbf{D}_i$, $\\mathbf{D}_e$ are their respective conductivity tensors.\n  </p>\n  <p>\n    The transmembrane potential is defined as their difference:\n  </p>\n\n  <div class=\"equation-block\">\n    $$V_m = \\phi_i - \\phi_e$$\n  </div>\n\n  <p>\n    The transmembrane current per unit volume is the sum of capacitive and ionic components:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\chi\\, I_m = \\chi\\,C_m\\,\\frac{\\partial V_m}{\\partial t} + \\chi\\, I_{\\text{ion}}(V_m, \\mathbf{w})$$\n  </div>\n\n  <p>\n    Now substitute into the conservation laws from Chapter 12. From the intracellular conservation $\\nabla\\cdot\\mathbf{J}_i = -\\chi I_m$:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\nabla\\cdot(\\mathbf{D}_i\\,\\nabla\\phi_i) = \\chi\\,C_m\\,\\frac{\\partial V_m}{\\partial t} + \\chi\\,I_{\\text{ion}}$$\n  </div>\n\n  <p>\n    Since $\\phi_i = V_m + \\phi_e$, we can rewrite $\\nabla\\phi_i = \\nabla V_m + \\nabla\\phi_e$, giving us:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(12.4)</span>\n    $$\\chi\\,C_m\\,\\frac{\\partial V_m}{\\partial t} = -\\chi\\,I_{\\text{ion}}(V_m,\\mathbf{w}) + \\nabla\\cdot(\\mathbf{D}_i\\,\\nabla V_m) + \\nabla\\cdot(\\mathbf{D}_i\\,\\nabla\\phi_e) + I_{\\text{stim}}^i$$\n  </div>\n\n  <p>\n    This is the <strong>parabolic equation</strong> of the bidomain system. Compare it to the monodomain equation (12.3): the key difference is the <em>extra coupling term</em> $\\nabla\\cdot(\\mathbf{D}_i\\,\\nabla\\phi_e)$, which accounts for how the extracellular potential gradient drives intracellular current.\n  </p>\n\n  <p>\n    For the second equation, add both conservation laws: $\\nabla\\cdot\\mathbf{J}_i + \\nabla\\cdot\\mathbf{J}_e = 0$. Expanding:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(12.5)</span>\n    $$0 = \\nabla\\cdot\\bigl(\\mathbf{D}_i\\,\\nabla V_m\\bigr) + \\nabla\\cdot\\bigl[(\\mathbf{D}_i + \\mathbf{D}_e)\\,\\nabla\\phi_e\\bigr] + I_{\\text{stim}}^e$$\n  </div>\n\n  <p>\n    This is the <strong>elliptic equation</strong>. It has <em>no time derivative</em> \u2014 it is a constraint that must hold at every instant. Think of it as saying: \"at each moment, the total current flowing into and out of every point in the tissue must balance.\"\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>Why is the second equation elliptic?</strong> Because the extracellular space has no \"memory\" \u2014 it equilibrates instantaneously (on the timescale of cardiac propagation). There is no capacitor in the extracellular space storing charge over time. The extracellular potential adjusts immediately to satisfy current conservation. This makes $\\phi_e$ a <em>slave variable</em>: it is completely determined by the current state of $V_m$ at each instant.\n    </p>\n  </div>\n\n  <h3>12.6 &ensp; The Parabolic\u2013Elliptic Couple</h3>\n\n  <p>\n    All of Part II (Chapters 7\u201310) dealt with a single parabolic PDE \u2014 the monodomain equation. \"Parabolic\" means the equation has a first-order time derivative, and its solutions spread out and smooth over time, like heat diffusing through a rod. We learned to discretize it in space (Chapter 7), split reaction from diffusion (Chapter 8), integrate the reaction ODEs (Chapter 9), and solve the implicit diffusion step (Chapter 10). The entire solution strategy was: march forward in time, one step at a time.\n  </p>\n\n  <p>\n    Now we face something fundamentally different. The bidomain model has <em>two</em> equations, and they are not the same type. One is parabolic (it evolves in time), and the other is <strong>elliptic</strong> (it has no time derivative at all). An elliptic equation is like a rubber sheet stretched over a frame (Appendix A.5) \u2014 if you
