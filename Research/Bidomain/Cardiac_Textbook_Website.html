push on one part, the entire sheet adjusts <em>instantaneously</em> to find a new equilibrium. There is no \"marching forward\" for an elliptic equation; it must be solved as a global boundary-value problem at every instant in time.\n  </p>\n\n  <p>\n    This parabolic\u2013elliptic pairing changes everything about how we solve the system. Let us examine the structure:\n  </p>\n\n  <table>\n    <tr>\n      <th>Equation</th>\n      <th>Type</th>\n      <th>Unknown</th>\n      <th>Character</th>\n    </tr>\n    <tr>\n      <td>(12.4) \u2014 Membrane dynamics</td>\n      <td>Parabolic</td>\n      <td>$V_m$ (primary)</td>\n      <td>Evolves in time; has $\\partial V_m/\\partial t$</td>\n    </tr>\n    <tr>\n      <td>(12.5) \u2014 Current conservation</td>\n      <td>Elliptic</td>\n      <td>$\\phi_e$ (constraint)</td>\n      <td>No time derivative; instantaneous balance</td>\n    </tr>\n  </table>\n\n  <p>\n    The two equations are <strong>bidirectionally coupled</strong>: the parabolic equation depends on $\\phi_e$ (through $\\nabla\\cdot(\\mathbf{D}_i\\,\\nabla\\phi_e)$), and the elliptic equation depends on $V_m$ (through $\\nabla\\cdot(\\mathbf{D}_i\\,\\nabla V_m)$). Neither can be solved independently.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>Why the elliptic equation cannot be marched in time.</strong> The parabolic equation (12.4) has $\\partial V_m/\\partial t$ on the left \u2014 it tells us the <em>rate of change</em> of $V_m$, so we can step forward. The elliptic equation (12.5) has <em>no</em> time derivative \u2014 it is a constraint that must be satisfied at every instant, like requiring that the forces on a bridge sum to zero at all times. You cannot \"advance\" a force-balance equation; you can only solve it. This is why the bidomain diffusion step requires solving a linear system (Chapter 15), not just evaluating a time derivative.\n    </p>\n  </div>\n\n  <p>\n    The good news is that the elliptic equation has no memory \u2014 its solution at time $t$ depends only on $V_m(t)$, not on $\\phi_e$ at any earlier time. This means that if we know $V_m^{n+1}$ (or an approximation of it), we can solve the elliptic equation for $\\phi_e^{n+1}$ without any information about $\\phi_e^n$. This property is the key to operator splitting (Chapter 14): advance $V_m$ first, then solve for $\\phi_e$.\n  </p>\n\n  <p>\n    Additionally, the gating variables $\\mathbf{w}$ evolve according to a system of ODEs:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(12.6)</span>\n    $$\\frac{d\\mathbf{w}}{dt} = \\mathbf{h}(V_m, \\mathbf{w})$$\n  </div>\n\n  <p>\n    These ODEs are <em>local</em> \u2014 they depend only on $V_m$ and $\\mathbf{w}$ at each point, not on spatial derivatives. This is good news: the ionic solver from Engine V5.4 (e.g., Rush\u2013Larsen exponential integrator) can be reused without modification.\n  </p>\n\n  <h3>12.7 &ensp; When Bidomain Reduces to Monodomain</h3>\n\n  <p>\n    Under the <strong>equal anisotropy ratio</strong> assumption \u2014 meaning $\\mathbf{D}_e = \\lambda\\,\\mathbf{D}_i$ for some positive scalar $\\lambda$ \u2014 the elliptic equation (12.5) degenerates. With this assumption, the combined conductivity $(\\mathbf{D}_i + \\mathbf{D}_e) = (1+\\lambda)\\,\\mathbf{D}_i$, and the elliptic equation becomes $\\nabla\\cdot(\\mathbf{D}_i\\,\\nabla[V_m + (1+\\lambda)\\phi_e]) = 0$, which implies $\\phi_e$ is essentially constant (or zero with appropriate boundary conditions). The parabolic equation then reduces to the monodomain form with an effective conductivity:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\mathbf{D}_{\\text{eff}} = \\frac{\\mathbf{D}_i \\, \\mathbf{D}_e}{\\mathbf{D}_i + \\mathbf{D}_e}$$\n  </div>\n\n  <p>\n    In real cardiac tissue, however, the anisotropy ratios are markedly different:\n  </p>\n\n  <table>\n    <tr><th>Domain</th><th>$\\sigma_L$ (S/cm)</th><th>$\\sigma_T$ (S/cm)</th><th>Ratio $\\sigma_L/\\sigma_T$</th></tr>\n    <tr><td>Intracellular</td><td>0.3 \u2013 0.5</td><td>0.03 \u2013 0.05</td><td>$\\approx$ 10:1</td></tr>\n    <tr><td>Extracellular</td><td>0.3 \u2013 0.6</td><td>0.15 \u2013 0.3</td><td>$\\approx$ 2.5:1</td></tr>\n  </table>\n\n  <p>\n    Because 10:1 $\\neq$ 2.5:1, the equal anisotropy assumption fails, and the full bidomain system is needed.\n  </p>\n\n  <h3>12.8 &ensp; Conductivity Tensors and Fiber Architecture</h3>\n\n  <p>\n    In each domain, the conductivity tensor is expressed in local fiber coordinates as a diagonal matrix:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\mathbf{D}_d^{\\text{local}} = \\begin{pmatrix}\\sigma_d^L & 0 & 0 \\\\ 0 & \\sigma_d^T & 0 \\\\ 0 & 0 & \\sigma_d^T\\end{pmatrix}, \\quad d \\in \\{i, e\\}$$\n  </div>\n\n  <p>\n    where $\\sigma_d^L$ and $\\sigma_d^T$ are the longitudinal (along-fiber) and transverse (cross-fiber) conductivities. In an anatomically realistic heart model, the fibers rotate transmurally (about 120\u00b0 from epicardium to endocardium), so the local tensor must be rotated into global coordinates via:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\mathbf{D}_d^{\\text{global}}(\\mathbf{x}) = \\mathbf{R}(\\theta(\\mathbf{x}))\\;\\mathbf{D}_d^{\\text{local}}\\;\\mathbf{R}(\\theta(\\mathbf{x}))^T$$\n  </div>\n\n  <p>\n    This makes the conductivity a <em>spatially varying</em> tensor field \u2014 one of the major implementation challenges for any bidomain solver.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      Engine V5.4 already handles fiber-aligned conductivity tensors for the monodomain model. For bidomain, the same rotation machinery can be reused \u2014 we simply need to maintain <em>two</em> tensor fields ($\\mathbf{D}_i$ and $\\mathbf{D}_e$) instead of one effective $\\mathbf{D}$.\n    </p>\n  </div>\n\n\n  <!-- \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n\n  <h3>12.9 &ensp; Boundary Conditions: Two Domains, Two Choices</h3>\n\n  <p>\n    In the monodomain model (Section 7.4), we needed one boundary condition for one unknown.\n    The bidomain model has <em>two</em> unknowns \u2014 the intracellular potential $\\phi_i$ and the\n    extracellular potential $\\phi_e$ \u2014 so we need <em>two</em> boundary conditions at every\n    point on the tissue surface. This doubles the number of choices and creates physical situations\n    that have no monodomain analogue.\n  </p>\n\n  <p>\n    To build intuition, think of a piece of cardiac tissue sitting in a glass dish. The intracellular\n    space (inside the cells) is sealed at the tissue surface \u2014 cell membranes continue right up to the\n    edge, and no intracellular current can escape. This is always Neumann. But the extracellular space\n    (between the cells) is open \u2014 it may be in contact with a conductive bath (saline solution) or\n    exposed to air. What happens at the boundary depends on <em>what is outside</em>.\n  </p>\n\n  <p>\n    There are three canonical physical scenarios:\n  </p>\n\n  <ul>\n    <li><strong>Isolated tissue (Neumann on both):</strong> No current leaves through either domain. This is the most realistic for an intact heart \u2014 but it introduces a <em>null space</em> in the elliptic equation, because $\\phi_e$ is determined only up to an additive constant.</li>\n    <li><strong>Grounded bath (Neumann on $\\phi_i$, Dirichlet on $\\phi_e$):</strong> Cells are sealed, but the extracellular space opens into a bath at a reference potential. This is the standard Langendorff preparation. The Dirichlet condition removes the null space.</li>\n    <li><strong>Current injection (Dirichlet on $\\phi_i$ at electrode):</strong> An intracellular electrode clamps $\\phi_i$ locally. Rare experimentally but important for theoretical stimulation studies.</li>\n  </ul>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>The null space is physics, not a bug.</strong> When the entire boundary has Neumann\n      conditions on $\\phi_e$, the extracellular potential is defined only relative to some reference\n      point \u2014 just like altitude is defined relative to sea level. You can add any constant to $\\phi_e$\n      without changing any current flow. This is a real physical degeneracy: only <em>differences</em>\n      in extracellular potential matter, not absolute values.\n    </p>\n  </div>\n\n  <p>\n    The concrete mathematical formulations \u2014 how each BC type modifies the stiffness matrices\n    and the block system \u2014 are developed in Chapter 13 (Section 13.4). The strategies for handling\n    the null space in iterative solvers (pinning, deflation, DCT zero-mode removal) are covered in\n    Chapter 16 (Section 16.5).\n  </p>\n\n\n\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 13 \u2014 SPATIAL DISCRETIZATION                              -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "ch13": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 13</div>\n  <h2 class=\"chapter-title\">Spatial Discretization</h2>\n  <div class=\"chapter-intro\">\n    Chapter 8 developed the spatial discretization toolkit \u2014 FDM, FEM, FVM \u2014 for a single diffusion operator. Here we apply those same methods to the bidomain system, where two coupled PDEs produce a fundamentally different algebraic structure: a 2\u00d72 block matrix system with $2N$ unknowns.\n  </div>\n\n  <h3>13.1 &ensp; From One Stiffness Matrix to Two</h3>\n\n  <p>\n    In the monodomain model (Chapter 7), spatial discretization produces a single stiffness matrix $\\mathbf{K}$ assembled from the effective conductivity tensor $\\mathbf{D}$. The bidomain model has <em>two</em> conducting domains \u2014 intracellular and extracellular \u2014 each with its own conductivity tensor. Applying the same discretization machinery (whether FDM, FEM, or FVM) to each domain separately produces two stiffness matrices:\n  </p>\n\n  <p>\n    <strong>Intracellular stiffness</strong> $\\mathbf{K}_i$: assembled from $\\mathbf{D}_i$ using exactly the same procedure as the monodomain $\\mathbf{K}$, with entries $(K_i)_{jk} = \\int_\\Omega \\nabla\\varphi_j \\cdot (\\mathbf{D}_i\\,\\nabla\\varphi_k)\\,dx$ for FEM, or the corresponding stencil matrix $\\mathbf{L}_i$ for FDM.\n  </p>\n\n  <p>\n    <strong>Extracellular stiffness</strong> $\\mathbf{K}_e$: assembled identically but with $\\mathbf{D}_e$. The combined stiffness $\\mathbf{K}_i + \\mathbf{K}_e$ corresponds to the bulk conductivity tensor $\\mathbf{D}_i + \\mathbf{D}_e$.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      Engine V5.4's spatial discretization infrastructure already assembles a single stiffness matrix $\\mathbf{K}$ (or Laplacian $\\mathbf{L}$) from a conductivity tensor field. Extending to bidomain requires calling this same assembly routine <em>twice</em> \u2014 once with $\\mathbf{D}_i$ and once with $\\mathbf{D}_e$ \u2014 then combining the results into the 2\u00d72 block format described below.\n    </p>\n  </div>\n\n  <h3>13.2 &ensp; The Bidomain Weak Form</h3>\n\n  <p>\n    For FEM specifically, the bidomain weak form involves both unknowns ($V_m$ and $\\phi_e$) simultaneously. Multiplying the parabolic equation by test function $v \\in H^1(\\Omega)$ and integrating by parts:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\begin{aligned}\n    \\int_\\Omega \\chi C_m \\frac{\\partial V_m}{\\partial t}\\,v\\,dx\n      &+ \\int_\\Omega \\nabla V_m \\cdot (\\mathbf{D}_i\\,\\nabla v)\\,dx\n       + \\int_\\Omega \\nabla\\phi_e\\cdot(\\mathbf{D}_i\\,\\nabla v)\\,dx \\\\[4pt]\n      &= -\\int_\\Omega \\chi\\,I_{\\text{ion}}\\,v\\,dx\n       + \\int_\\Omega I_{\\text{stim}}^i\\,v\\,dx\n    \\end{aligned}$$\n  </div>\n\n  <p>\n    For the elliptic equation, multiply by $q \\in H^1(\\Omega)$:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\begin{aligned}\n    \\int_\\Omega \\nabla\\phi_e \\cdot \\bigl[(\\mathbf{D}_i + \\mathbf{D}_e)\\,\\nabla q\\bigr]\\,dx\n      &+ \\int_\\Omega \\nabla V_m \\cdot (\\mathbf{D}_i\\,\\nabla q)\\,dx \\\\[4pt]\n      &= -\\int_\\Omega I_{\\text{stim}}^e\\,q\\,dx\n    \\end{aligned}$$\n  </div>\n\n  <p>\n    Notice the critical structural feature: the intracellular conductivity $\\mathbf{D}_i$ appears in <em>both</em> equations \u2014 it is the coupling agent between $V_m$ and $\\phi_e$. The extracellular conductivity $\\mathbf{D}_e$ appears only in the elliptic equation. Expanding in the finite element basis produces the semi-discrete system:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(13.1)</span>\n    $$\\begin{pmatrix}\\mathbf{M} & \\mathbf{0} \\\\ \\mathbf{0} & \\mathbf{0}\\end{pmatrix}\\!\\begin{pmatrix}\\dot{\\mathbf{V}}_m \\\\ \\dot{\\boldsymbol{\\phi}}_e\\end{pmatrix} + \\begin{pmatrix}\\mathbf{K}_i & \\mathbf{K}_i \\\\ \\mathbf{K}_i & \\mathbf{K}_i\\!+\\!\\mathbf{K}_e\\end{pmatrix}\\!\\begin{pmatrix}\\mathbf{V}_m \\\\ \\boldsymbol{\\phi}_e\\end{pmatrix} = \\begin{pmatrix}\\mathbf{F}_V \\\\ \\mathbf{F}_\\phi\\end{pmatrix}$$\n  </div>\n\n  <div class=\"insight insight-math\">\n    <p>\n      Notice the elegant structure: $\\mathbf{K}_i$ appears in <em>every</em> block of the 2\u00d72 stiffness matrix \u2014 it is the \"glue\" coupling $V_m$ and $\\phi_e$. The extracellular stiffness $\\mathbf{K}_e$ appears only in the (2,2) block, strengthening the elliptic equation. The mass matrix $\\mathbf{M}$ (from Chapter 7) appears only in the (1,1) position because only $V_m$ has a time derivative.\n    </p>\n  </div>\n\n  <h3>13.3 &ensp; The 2\u00d72 Block System</h3>\n\n  <p>\n    Regardless of the spatial discretization method (FDM, FEM, or FVM \u2014 all described in Chapter 7), the final algebraic system at each time step has the same form:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(13.2)</span>\n    $$\\underbrace{\\begin{pmatrix}\\mathbf{A}_{11} & \\mathbf{A}_{12} \\\\ \\mathbf{A}_{21} & \\mathbf{A}_{22}\\end{pmatrix}}_{\\mathbf{A}}\\begin{pmatrix}\\mathbf{V}_m \\\\ \\boldsymbol{\\phi}_e\\end{pmatrix} = \\begin{pmatrix}\\mathbf{b}_1 \\\\ \\mathbf{b}_2\\end{pmatrix}$$\n  </div>\n\n  <p>\n    With the typical identification (after applying a semi-implicit time stepper like Crank\u2013Nicolson):\n  </p>\n\n  <table>\n    <tr><th>Block</th><th>Definition</th><th>Properties</th></tr>\n    <tr><td>$\\mathbf{A}_{11}$</td><td>$\\mathbf{M}/\\Delta t + \\mathbf{K}_i$</td><td>Symmetric positive definite (SPD)</td></tr>\n    <tr><td>$\\mathbf{A}_{12}$</td><td>$\\mathbf{K}_i$</td><td>Coupling: intracellular stiffness</td></tr>\n    <tr><td>$\\mathbf{A}_{21}$</td><td>$\\mathbf{K}_i$</td><td>$= \\mathbf{A}_{12}^T$ (symmetric)</td></tr>\n    <tr><td>$\\mathbf{A}_{22}$</td><td>$\\mathbf{K}_i + \\mathbf{K}_e$</td><td>SPD (combined stiffness)</td></tr>\n  </table>\n\n  <p>\n    The total system has $2N$ unknowns (where $N$ is the number of spatial nodes) \u2014 <em>double</em> the monodomain system's $N$ unknowns. This is the fundamental object that all subsequent solver strategies (Chapter 16) must handle efficiently. The system is <strong>symmetric</strong> but <strong>indefinite</strong> \u2014 a saddle-point problem that requires specialized linear algebra. This is a qualitative departure from the monodomain, where the implicit system is SPD and solvable by conjugate gradient (Chapter 10).\n  </p>\n\n  <!-- Block system diagram -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 600 220\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:520px;\">\n      <!-- Matrix left bracket (path-based for clean rendering) -->\n      <path d=\"M 55,22 L 42,22 L 42,208 L 55,208\" fill=\"none\" stroke=\"#16213e\" stroke-width=\"1.8\" stroke-linecap=\"square\"/>\n      <!-- A11 -->\n      <rect x=\"60\" y=\"30\" width=\"110\" height=\"80\" rx=\"4\" fill=\"#0f3460\" opacity=\"0.15\" stroke=\"#0f3460\" stroke-width=\"1.5\"/>\n      <text x=\"115\" y=\"65\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"16\" fill=\"#0f3460\" font-weight=\"600\">A<tspan baseline-shift=\"sub\" font-size=\"11\">11</tspan></text>\n      <text x=\"115\" y=\"85\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"10\" fill=\"#0f3460\">M/\u0394t + K<tspan baseline-shift=\"sub\" font-size=\"8\">i</tspan></text>\n      <text x=\"115\" y=\"100\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#2d6a4f\">(SPD)</text>\n      <!-- A12 -->\n      <rect x=\"180\" y=\"30\" width=\"110\" height=\"80\" rx=\"4\" fill=\"#e94560\" opacity=\"0.12\" stroke=\"#e94560\" stroke-width=\"1.5\"/>\n      <text x=\"235\" y=\"65\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"16\" fill=\"#e94560\" font-weight=\"600\">A<tspan baseline-shift=\"sub\" font-size=\"11\">12</tspan></text>\n      <text x=\"235\" y=\"85\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"10\" fill=\"#e94560\">K<tspan baseline-shift=\"sub\" font-size=\"8\">i</tspan></text>\n      <text x=\"235\" y=\"100\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#e94560\">(coupling)</text>\n      <!-- A21 -->\n      <rect x=\"60\" y=\"120\" width=\"110\" height=\"80\" rx=\"4\" fill=\"#e94560\" opacity=\"0.12\" stroke=\"#e94560\" stroke-width=\"1.5\"/>\n      <text x=\"115\" y=\"155\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"16\" fill=\"#e94560\" font-weight=\"600\">A<tspan baseline-shift=\"sub\" font-size=\"11\">21</tspan></text>\n      <text x=\"115\" y=\"175\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"10\" fill=\"#e94560\">K<tspan baseline-shift=\"sub\" font-size=\"8\">i</tspan></text>\n      <text x=\"115\" y=\"190\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#e94560\">(coupling)</text>\n      <!-- A22 -->\n      <rect x=\"180\" y=\"120\" width=\"110\" height=\"80\" rx=\"4\" fill=\"#0f3460\" opacity=\"0.15\" stroke=\"#0f3460\" stroke-width=\"1.5\"/>\n      <text x=\"235\" y=\"155\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"16\" fill=\"#0f3460\" font-weight=\"600\">A<tspan baseline-shift=\"sub\" font-size=\"11\">22</tspan></text>\n      <text x=\"235\" y=\"175\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"10\" fill=\"#0f3460\">K<tspan baseline-shift=\"sub\" font-size=\"8\">i</tspan> + K<tspan baseline-shift=\"sub\" font-size=\"8\">e</tspan></text>\n      <text x=\"235\" y=\"190\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#2d6a4f\">(SPD)</text>\n      <!-- Matrix right bracket -->\n      <path d=\"M 295,22 L 308,22 L 308,208 L 295,208\" fill=\"none\" stroke=\"#16213e\" stroke-width=\"1.8\" stroke-linecap=\"square\"/>\n      <!-- Vector left bracket -->\n      <path d=\"M 355,22 L 342,22 L 342,208 L 355,208\" fill=\"none\" stroke=\"#16213e\" stroke-width=\"1.8\" stroke-linecap=\"square\"/>\n      <text x=\"375\" y=\"80\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"18\" fill=\"#0f3460\" font-weight=\"600\">V<tspan baseline-shift=\"sub\" font-size=\"12\">m</tspan></text>\n      <text x=\"375\" y=\"165\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"18\" fill=\"#e94560\" font-weight=\"600\">\u03c6<tspan baseline-shift=\"sub\" font-size=\"12\">e</tspan></text>\n      <!-- Vector right bracket -->\n      <path d=\"M 393,22 L 406,22 L 406,208 L 393,208\" fill=\"none\" stroke=\"#16213e\" stroke-width=\"1.8\" stroke-linecap=\"square\"/>\n      <!-- = -->\n      <text x=\"435\" y=\"120\" font-family=\"EB Garamond,serif\" font-size=\"28\" fill=\"#16213e\">=</text>\n      <!-- RHS left bracket -->\n      <path d=\"M 475,22 L 462,22 L 462,208 L 475,208\" fill=\"none\" stroke=\"#16213e\" stroke-width=\"1.8\" stroke-linecap=\"square\"/>\n      <text x=\"497\" y=\"80\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"18\" fill=\"#5a6175\" font-weight=\"600\">b<tspan baseline-shift=\"sub\" font-size=\"12\">1</tspan></text>\n      <text x=\"497\" y=\"165\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"18\" fill=\"#5a6175\" font-weight=\"600\">b<tspan baseline-shift=\"sub\" font-size=\"12\">2</tspan></text>\n      <!-- RHS right bracket -->\n      <path d=\"M 517,22 L 530,22 L 530,208 L 517,208\" fill=\"none\" stroke=\"#16213e\" stroke-width=\"1.8\" stroke-linecap=\"square\"/>\n    </svg>\n    <div class=\"figure-caption\"><span class=\"figure-label\">Figure 13.1.</span> The 2\u00d72 block structure of the bidomain linear system. The diagonal blocks are SPD; the off-diagonal coupling blocks are the intracellular stiffness $\\mathbf{K}_i$. The full system is symmetric but indefinite.</div>  </div>\n\n  <h3>13.4 &ensp; Boundary Conditions: Formulation and Implementation</h3>\n\n  <p>\n    In the monodomain (Section 8.7), we needed one boundary condition for one unknown ($V_m$). The bidomain model has <em>two</em> unknowns \u2014 the intracellular potential $\\phi_i$ and the extracellular potential $\\phi_e$ \u2014 so we need <em>two</em> boundary conditions at every point on the tissue surface. This doubles the number of choices and creates new physical situations that have no monodomain analogue.\n  </p>\n\n  <p>\n    To build intuition, think of a piece of cardiac tissue sitting in a glass dish. The intracellular space (inside the cells) is sealed at the tissue surface \u2014 cell membranes continue right up to the edge, and no intracellular current can escape. But the extracellular space (between the cells) is open \u2014 it may be in contact with a conductive bath (saline solution), or it may be exposed to air. What happens at the boundary depends on what is <em>outside</em>.\n  </p>\n\n  <h4>13.4.1 &ensp; Two Domains, Two Sets of Boundary Conditions</h4>\n\n  <p>\n    There are three canonical scenarios, each with a different physical story and a different mathematical consequence:\n  </p>\n\n  <p>\n    <strong>(a) Isolated tissue (Neumann on both).</strong> The tissue sits in a non-conductive medium (air, or a poorly conducting pericardial sac). No current can leave through either the intracellular or extracellular space:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(13.3)</span>\n    $$\\mathbf{D}_i\\,\\nabla\\phi_i \\cdot \\hat{\\mathbf{n}} = 0 \\quad\\text{and}\\quad \\mathbf{D}_e\\,\\nabla\\phi_e \\cdot \\hat{\\mathbf{n}} = 0 \\quad\\text{on } \\partial\\Omega$$\n  </div>\n\n  <p>\n    This is the most physically realistic condition for an isolated heart. But it has a mathematical consequence: the elliptic equation (12.5) with pure Neumann BCs on $\\phi_e$ has a <strong>null space</strong>. Adding a constant to $\\phi_e$ everywhere does not change any gradient, so $\\phi_e$ is determined only up to an additive constant. The linear system is singular.\n  </p>\n\n  <p>\n    <strong>(b) Grounded bath (Neumann on $\\phi_i$, Dirichlet on $\\phi_e$).</strong> The tissue is submerged in a conductive bath (saline), and the bath is connected to a reference electrode that fixes the extracellular potential. Intracellular current still cannot escape (cells are sealed at the surface), but the extracellular potential is clamped:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(13.4)</span>\n    $$\\mathbf{D}_i\\,\\nabla\\phi_i \\cdot \\hat{\\mathbf{n}} = 0 \\quad\\text{and}\\quad \\phi_e = \\phi_{\\text{bath}} \\quad\\text{on } \\partial\\Omega$$\n  </div>\n\n  <p>\n    This is the standard experimental setup for Langendorff-perfused hearts and tissue wedge preparations. The Dirichlet condition on $\\phi_e$ removes the null space: the extracellular potential is pinned to a reference, and the system matrix becomes non-singular. This makes the linear solve easier.\n  </p>\n\n  <p>\n    <strong>(c) Current injection (Dirichlet on $\\phi_i$ at electrode, Neumann elsewhere).</strong> An electrode is inserted into the tissue, clamping the intracellular potential at the electrode site. Elsewhere, normal sealed-cell conditions apply. This represents an intracellular stimulation protocol.\n  </p>\n\n  <p>\n    The following table summarizes how each combination affects the mathematical structure:\n  </p>\n\n  <table>\n    <tr><th>Scenario</th><th>$\\phi_i$ BC</th><th>$\\phi_e$ BC</th><th>Null space?</th><th>Physical setting</th></tr>\n    <tr>\n      <td>Isolated tissue</td>\n      <td>Neumann</td>\n      <td>Neumann</td>\n      <td><strong>Yes</strong> (constant $\\phi_e$)</td>\n      <td>Heart in air / pericardium</td>\n    </tr>\n    <tr>\n      <td>Grounded bath</td>\n      <td>Neumann</td>\n      <td>Dirichlet</td>\n      <td>No</td>\n      <td>Langendorff, tissue wedge</td>\n    </tr>\n    <tr>\n      <td>Current injection</td>\n      <td>Dirichlet (local)</td>\n      <td>Neumann</td>\n      <td>Yes (if $\\phi_e$ has full Neumann)</td>\n      <td>Intracellular electrode stimulus</td>\n    </tr>\n    <tr>\n      <td>Full bath coupling</td>\n      <td>Neumann</td>\n      <td>Robin</td>\n      <td>No</td>\n      <td>Torso model, ECG simulation</td>\n    </tr>\n  </table>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>The null space is not a bug \u2014 it is physics.</strong> When the entire tissue boundary has Neumann conditions on $\\phi_e$, the extracellular potential is defined only relative to some reference point, just like altitude is defined relative to sea level. You can add any constant to $\\phi_e$ everywhere without changing any current flow. In practice, we remove this ambiguity by pinning one node (setting $\\phi_e = 0$ at a single point) or by projecting out the constant mode in the linear solver (Section 15.3).\n    </p>\n  </div>\n\n  <h4>13.4.2 &ensp; Mixed Boundary Conditions: What Do They Mean?</h4>\n\n  <p>\n    A natural question arises: what happens when the intracellular and extracellular domains have <em>different</em> boundary condition types? Let us think through the two most interesting combinations:\n  </p>\n\n  <p>\n    <strong>Neumann on $\\phi_i$ + Dirichlet on $\\phi_e$</strong> (the grounded-bath case). This is the most common experimental configuration. The physical picture: cell membranes seal the intracellular space at the surface (no intracellular current escapes), but the extracellular space opens into a conductive bath that is held at a reference potential. The transmembrane voltage $V_m = \\phi_i - \\phi_e$ is <em>not</em> clamped \u2014 it is free to evolve according to the bidomain equations. Only $\\phi_e$ is fixed at the boundary.\n  </p>\n\n  <p>\n    <strong>Dirichlet on $\\phi_i$ + Neumann on $\\phi_e$.</strong> This represents an intracellular electrode that clamps $\\phi_i$ to a specified voltage, while the extracellular space is sealed (no extracellular current leaves). This is rare experimentally \u2014 intracellular electrodes are typically small and affect only a few cells \u2014 but it is mathematically well-posed and occasionally used in theoretical studies to model localized stimulation.\n  </p>\n\n  <p>\n    <strong>Dirichlet on both.</strong> Both $\\phi_i$ and $\\phi_e$ are fixed at the boundary. Since $V_m = \\phi_i - \\phi_e$, this also fixes $V_m$ at the boundary \u2014 effectively voltage-clamping the transmembrane potential at the tissue surface. This is extremely rare in practice but might be used to model an idealized experimental chamber with both intracellular and extracellular potential control.\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      <strong>Not all combinations are physically realistic.</strong> While the mathematics allows any combination of Dirichlet and Neumann on $\\phi_i$ and $\\phi_e$, the physics constrains the choices. The intracellular space is almost always Neumann (cells are sealed). The extracellular space depends on the experimental setup: Neumann for isolated tissue, Dirichlet for grounded bath, Robin for partial bath coupling. If you are unsure, start with Neumann on both \u2014 it is the most physically conservative choice.\n    </p>\n  </div>\n\n  <h4>13.4.3 &ensp; How BCs Modify the Block System</h4>\n\n  <p>\n    Recall the 2\u00d72 block system from Chapter 13, equation (13.2):\n  </p>\n\n  $$\\begin{pmatrix} A_{11} & A_{12} \\\\ A_{21} & A_{22} \\end{pmatrix} \\begin{pmatrix} \\mathbf{V}_m \\\\ \\boldsymbol{\\phi}_e \\end{pmatrix} = \\begin{pmatrix} \\mathbf{b}_1 \\\\ \\mathbf{b}_2 \\end{pmatrix}$$\n\n  <p>\n    where $A_{22}$ involves the sum $\\mathbf{K}_i + \\mathbf{K}_e$ (intracellular plus extracellular stiffness matrices). The boundary conditions affect this system as follows:\n  </p>\n\n  <p>\n    <strong>Pure Neumann on both (isolated tissue).</strong> The matrix $A_{22} = \\mathbf{K}_i + \\mathbf{K}_e$ inherits the Neumann null space from both stiffness matrices. The all-ones vector $\\mathbf{1}$ satisfies $(\\mathbf{K}_i + \\mathbf{K}_e)\\mathbf{1} = \\mathbf{0}$, so $A_{22}$ is singular. The block system has a one-dimensional null space: any solution plus a constant shift in $\\phi_e$ is also a solution.\n  </p>\n\n  <p>\n    <strong>Dirichlet on $\\phi_e$ (grounded bath).</strong> The rows and columns of $A_{22}$ corresponding to Dirichlet boundary nodes are eliminated (as in Section 8.7.3), and their known values are moved to the right-hand side. The reduced $A_{22}$ is non-singular \u2014 the system can be solved directly without null-space handling.\n  </p>\n\n  <h4>Worked Example: 5-Node 1D Bidomain Cable, Isolated Tissue</h4>\n\n  <p>\n    Consider a 1D bidomain cable with 5 nodes, spacing $\\Delta x = 0.025$ cm, intracellular conductivity $\\sigma_i = 0.17$ S/m, and extracellular conductivity $\\sigma_e = 0.62$ S/m. With Neumann BCs on both $\\phi_i$ and $\\phi_e$, the 10\u00d710 block system has the structure:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(13.5)</span>\n    $$\\begin{pmatrix} \\mathbf{K}_i & \\mathbf{K}_i \\\\ \\mathbf{K}_i & \\mathbf{K}_i + \\mathbf{K}_e \\end{pmatrix} \\begin{pmatrix} \\mathbf{V}_m \\\\ \\boldsymbol{\\phi}_e \\end{pmatrix} = \\begin{pmatrix} \\mathbf{f} \\\\ \\mathbf{0} \\end{pmatrix}$$\n  </div>\n\n  <p>\n    Each $\\mathbf{K}_d$ ($d = i$ or $e$) is a 5\u00d75 tridiagonal matrix with the Neumann-modified boundary stencil from equation (8.4):\n  </p>\n\n  $$\\mathbf{K}_d = \\frac{\\sigma_d}{\\Delta x^2}\\begin{pmatrix} -1 & 1 & & & \\\\ 1 & -2 & 1 & & \\\\ & 1 & -2 & 1 & \\\\ & & 1 & -2 & 1 \\\\ & & & 1 & -1\\end{pmatrix}$$\n\n  <p>\n    The bottom-right block $\\mathbf{K}_i + \\mathbf{K}_e$ is singular (every row sums to zero). To solve the system, we must pin one node \u2014 for instance, set $\\phi_{e,0} = 0$ by replacing the first equation of the lower block with $\\phi_{e,0} = 0$. After pinning:\n  </p>\n\n  <p>\n    Row 5 of the 10\u00d710 system becomes: $1 \\cdot \\phi_{e,0} = 0$. The corresponding column entries for $\\phi_{e,0}$ in other rows are moved to the right-hand side. The modified $(\\mathbf{K}_i + \\mathbf{K}_e)$ block is now non-singular, and the system can be solved by any standard method (direct or iterative).\n  </p>\n\n  <div class=\"insight insight-math\">\n    <p>\n      <strong>Why pinning works.</strong> Pinning one node removes the constant from the null space without changing the physics. If $\\boldsymbol{\\phi}_e$ is a solution, then $\\boldsymbol{\\phi}_e + c\\,\\mathbf{1}$ is also a solution for any constant $c$. Pinning $\\phi_{e,0} = 0$ selects the unique member of this family with $\\phi_{e,0} = 0$. All physical quantities ($V_m = \\phi_i - \\phi_e$, current densities, ion channel states) depend only on <em>differences</em> in $\\phi_e$, so the choice of reference does not affect the simulation output.\n    </p>\n  </div>\n\n  <h4>13.4.4 &ensp; Summary and Forward Pointers</h4>\n\n  <p>\n    Boundary conditions in the bidomain are richer than in the monodomain because two unknowns require two BCs per boundary segment. The physically dominant case \u2014 Neumann on both $\\phi_i$ and $\\phi_e$ (isolated tissue) \u2014 introduces a null space that must be handled in the linear solver. The grounded-bath case (Neumann on $\\phi_i$, Dirichlet on $\\phi_e$) eliminates this null space.\n  </p>\n\n  <table>\n    <tr><th>Aspect</th><th>Monodomain (Ch 7.10)</th><th>Bidomain (this section)</th></tr>\n    <tr><td>Number of unknowns</td><td>1 ($V_m$)</td><td>2 ($\\phi_i$, $\\phi_e$) or equivalently ($V_m$, $\\phi_e$)</td></tr>\n    <tr><td>BCs per boundary segment</td><td>1</td><td>2</td></tr>\n    <tr><td>Default BC</td><td>Neumann</td><td>Neumann on both</td></tr>\n    <tr><td>Null space</td><td>Present in $\\mathbf{K}$, removed by mass matrix</td><td>Present in $A_{22}$, must be handled explicitly</td></tr>\n    <tr><td>Null-space removal</td><td>Not needed (mass matrix breaks degeneracy)</td><td>Pin one node, or deflation (Section 15.3)</td></tr>\n  </table>\n\n  <p>\n    The strategies for handling the null space in iterative solvers \u2014 pinning, deflation, and the DCT's natural treatment of the zero mode \u2014 are discussed in Chapter 15. The spectral solver (Section 15.3) handles the Neumann null space automatically by setting the $(0,0)$ DCT coefficient to zero, which is exactly pinning in spectral space.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      <strong>Engine V5.4 connection.</strong> The current monodomain implementation uses Neumann BCs by default, with the modified stiffness matrix from Section 8.7. For a future bidomain extension, the same boundary modification applies independently to $\\mathbf{K}_i$ and $\\mathbf{K}_e$. The null-space pinning strategy (setting one node of $\\phi_e$ to zero) requires modifying only one row/column of the block system \u2014 the same row-elimination technique used for Dirichlet BCs in Section 8.7.3.\n    </p>\n  </div>\n\n\n\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 14 \u2014 TIME INTEGRATION & OPERATOR SPLITTING               -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "ch14": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 14</div>\n  <h2 class=\"chapter-title\">Time Integration and Operator Splitting</h2>\n  <div class=\"chapter-intro\">\n    Chapter 9 introduced operator splitting for the monodomain equation \u2014 separating the local reaction (ionic ODEs) from the global diffusion (PDE). The same splitting framework applies to the bidomain model, but the diffusion sub-step is fundamentally different: instead of a single SPD system, it requires solving the 2\u00d72 block system from Chapter 14.\n  </div>\n\n  <h3>14.1 &ensp; Operator Splitting Applied to Bidomain</h3>\n\n  <p>\n    The splitting strategy from Chapter 8 carries over directly, but it is worth pausing to understand <em>why</em> it works for the bidomain's mixed parabolic\u2013elliptic system.\n  </p>\n\n  <p>\n    Recall that the monodomain uses operator splitting to separate reaction from diffusion (Section 9.2). The splitting error arises because these two processes interact: the reaction changes $V_m$, which changes the diffusive flux, which changes $V_m$, and so on. By treating them separately within one time step, we make a small error that is $O(\\Delta t)$ for Godunov splitting and $O(\\Delta t^2)$ for Strang splitting.\n  </p>\n\n  <p>\n    For the bidomain, we split in exactly the same way \u2014 reaction first, then diffusion \u2014 but the diffusion sub-step now involves both the parabolic and elliptic equations. Crucially, the splitting error comes from separating reaction from diffusion, <em>not</em> from separating the parabolic equation from the elliptic one. The elliptic equation (12.5) has no time derivative and no memory (Section 12.6): its solution at any instant depends only on the current $V_m$. So when we solve the diffusion sub-step, we are free to solve the parabolic and elliptic equations <em>simultaneously</em> as a coupled block system \u2014 there is no additional splitting error from this coupling.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>Monodomain splitting vs. bidomain splitting.</strong> In the monodomain, splitting separates reaction (local ODEs) from diffusion (global PDE). In the bidomain, splitting does the same thing \u2014 it separates reaction from diffusion. The fact that the diffusion sub-step involves <em>two</em> coupled equations (parabolic + elliptic) does not introduce extra splitting error, because both equations are solved together in the diffusion sub-step. The elliptic equation is a constraint that \"comes along for the ride.\"\n    </p>\n  </div>\n\n  <p>\n    In Godunov (first-order) splitting, each time step has two stages: (1) advance the reaction locally using Rush\u2013Larsen (Section 9.4), then (2) solve the diffusion sub-step. The difference from monodomain is entirely in step 2. For the monodomain, the diffusion sub-step solves a single SPD linear system. For the bidomain, it solves the full 2\u00d72 block system:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\begin{pmatrix}\\mathbf{A}_{11} & \\mathbf{A}_{12} \\\\ \\mathbf{A}_{21} & \\mathbf{A}_{22}\\end{pmatrix}\\begin{pmatrix}V_m^{n+1} \\\\ \\phi_e^{n+1}\\end{pmatrix} = \\begin{pmatrix}\\mathbf{b}_1(V_m^*) \\\\ \\mathbf{b}_2\\end{pmatrix}$$\n  </div>\n\n  <p>\n    where $V_m^*$ comes from the reaction sub-step. Strang (second-order) splitting uses the same symmetric sandwich \u2014 half-reaction, full-diffusion, half-reaction \u2014 as described in Section 9.3. Research has shown that Strang splitting has better <em>stability</em> properties than Godunov for bidomain, because the symmetric arrangement prevents splitting error from accumulating unidirectionally. The recommendation is to use Strang splitting for production bidomain simulations.\n  </p>\n\n  <p>\n    The critical new question for bidomain is: <em>what time stepper do we use for the diffusion sub-step?</em> The monodomain's implicit solvers (Crank\u2013Nicolson, BDF \u2014 Chapter 10) are starting points, but the bidomain's saddle-point structure and sharp wavefronts demand more careful choices.\n  </p>\n\n  <h3>14.2 &ensp; Time Steppers: Crank\u2013Nicolson vs. SDIRK2</h3>\n\n  <p>\n    Within the diffusion sub-step, we need an implicit time integrator for the 2\u00d72 block system. Two standard choices are:\n  </p>\n\n  <h4>Crank\u2013Nicolson (CN)</h4>\n\n  <p>\n    The trapezoidal rule applied to the diffusion step:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\frac{\\mathbf{M}}{\\Delta t}\\bigl(V_m^{n+1} - V_m^*\\bigr) = \\tfrac{1}{2}\\Bigl[\\mathcal{L}(V_m^{n+1},\\phi_e^{n+1}) + \\mathcal{L}(V_m^*,\\phi_e^n)\\Bigr]$$\n  </div>\n\n  <p>\n    where $\\mathcal{L}$ represents the spatial diffusion operator. CN is second-order and A-stable, but it can produce <strong>spurious oscillations</strong> near sharp wave fronts \u2014 a serious concern in cardiac electrophysiology, where the action potential upstroke is extremely steep ($dV/dt \\sim 300$ V/s).\n  </p>\n\n  <h4>SDIRK2 (Singly Diagonally Implicit Runge\u2013Kutta, order 2)</h4>\n\n  <p>\n    The SDIRK2 method uses two implicit stages with the same diagonal coefficient $\\gamma = 1 - \\sqrt{2}/2 \\approx 0.2929$:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\begin{aligned}\n    \\text{Stage 1:}\\quad \\mathbf{k}_1 &= \\mathcal{L}\\bigl(V_m^n + \\gamma\\,\\Delta t\\,\\mathbf{k}_1\\bigr) & &\\text{(implicit solve)} \\\\[6pt]\n    \\text{Stage 2:}\\quad \\mathbf{k}_2 &= \\mathcal{L}\\bigl(V_m^n + (1{-}\\gamma)\\,\\Delta t\\,\\mathbf{k}_1 + \\gamma\\,\\Delta t\\,\\mathbf{k}_2\\bigr) & &\\text{(implicit solve)} \\\\[6pt]\n    V_m^{n+1} &= V_m^n + \\Delta t\\bigl[(1{-}\\gamma)\\,\\mathbf{k}_1 + \\gamma\\,\\mathbf{k}_2\\bigr]\n    \\end{aligned}$$\n  </div>\n\n  <p>\n    SDIRK2 is second-order, L-stable (meaning it <em>damps</em> spurious high-frequency oscillations rather than preserving them), and requires two linear solves per step \u2014 each of the same size and structure as the CN solve, but with a smaller effective time step ($\\gamma\\,\\Delta t$ instead of $\\Delta t$).\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      <strong>Recommendation:</strong> SDIRK2 is preferred over Crank\u2013Nicolson for bidomain. The extra linear solve per step (two instead of one) is a modest cost increase ($\\approx$1.5\u00d7), but L-stability eliminates the spurious oscillations that plague CN near sharp wave fronts. This is especially important for bidomain, where the coupling to $\\phi_e$ can amplify such oscillations.\n    </p>\n  </div>\n\n  <h3>14.3 &ensp; IMEX Methods</h3>\n\n  <p>\n    An alternative to operator splitting is the Implicit-Explicit (IMEX) approach, which treats different terms with different discretizations within a single unified step:\n  </p>\n  <ul>\n    <li><strong>Explicit</strong>: ionic current $I_{\\text{ion}}$ (nonlinear, local, less stiff)</li>\n    <li><strong>Implicit</strong>: diffusion operator (linear, global, stiff)</li>\n  </ul>\n\n  <p>\n    IMEX avoids the splitting error entirely. The general form writes the semi-discrete system as $d\\mathbf{u}/dt = \\mathbf{f}_E(\\mathbf{u}) + \\mathbf{f}_I(\\mathbf{u})$, where $\\mathbf{f}_E$ is treated explicitly (ionic currents) and $\\mathbf{f}_I$ implicitly (diffusion + elliptic coupling). Because the diffusion operator is <em>linear</em>, the implicit part requires only a linear solve \u2014 no Newton iteration.\n  </p>\n\n  <p><strong>IMEX Euler (SBDF1)</strong> \u2014 first-order, L-stable, self-starting:</p>\n  <div class=\"equation-block\">\n    $$\\frac{\\chi C_m}{\\Delta t}\\,\\mathbf{M}\\,(\\mathbf{V}_m^{n+1} - \\mathbf{V}_m^n) + \\mathbf{K}_i\\,\\mathbf{V}_m^{n+1} + \\mathbf{K}_i\\,\\boldsymbol{\\phi}_e^{n+1} = -\\chi\\,\\mathbf{M}\\,I_{\\text{ion}}^n$$\n  </div>\n\n  <p><strong>SBDF2</strong> \u2014 second-order, strong damping, recommended for production:</p>\n  <div class=\"equation-block\">\n    $$\\tfrac{\\chi C_m}{\\Delta t}\\,\\mathbf{M}\\bigl(\\tfrac{3}{2}\\mathbf{V}_m^{n+1} - 2\\mathbf{V}_m^n + \\tfrac{1}{2}\\mathbf{V}_m^{n-1}\\bigr) + \\mathbf{K}_i\\,\\mathbf{V}_m^{n+1} + \\mathbf{K}_i\\,\\boldsymbol{\\phi}_e^{n+1} = -\\chi\\,\\mathbf{M}\\bigl(2\\,I_{\\text{ion}}^n - I_{\\text{ion}}^{n-1}\\bigr)$$\n  </div>\n\n  <p>\n    Other second-order IMEX multistep variants include <strong>CN-FE</strong> (Crank\u2013Nicolson for diffusion, forward Euler for reaction) and <strong>CN-AB</strong> (Crank\u2013Nicolson with Adams\u2013Bashforth extrapolation for ionic terms). Ethier &amp; Bourgault (2008) conducted a systematic stability analysis and found that <strong>SBDF2 provides the strongest damping</strong> of high-frequency error \u2014 making it preferred for cardiac applications where sharp wave fronts produce high-frequency error components. CN-FE should generally be avoided for bidomain because it can produce spurious oscillations near the action potential upstroke, similar to the Crank\u2013Nicolson issue discussed in Section 16.2.\n  </p>\n\n  <p>\n    <strong>IMEX Runge\u2013Kutta</strong> methods offer a single-step (self-starting) alternative. An $s$-stage IMEX-RK method uses an explicit tableau for ionic terms and a DIRK (diagonally implicit Runge\u2013Kutta) tableau for diffusion, requiring $s$ linear solves per step. The stability regions are generally larger than IMEX multistep methods, but the extra linear solves per step make them more expensive for bidomain.\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      <strong>IMEX vs. operator splitting</strong>: IMEX eliminates splitting error entirely, while operator splitting (Godunov/Strang) introduces $O(\\Delta t)$/$O(\\Delta t^2)$ splitting error. However, operator splitting is simpler to implement, allows specialized ionic solvers (Rush\u2013Larsen), and permits different time steps for reaction and diffusion. For production codes, operator splitting with SDIRK2 remains the most common choice. IMEX (especially SBDF2) is a strong alternative when splitting error is a concern.\n    </p>\n  </div>\n\n  <h3>14.4 &ensp; Why Fully Explicit Methods Fail</h3>\n\n  <p>\n    A natural question arises: can we avoid implicit solves entirely and use fully explicit time integration for the bidomain model? The answer is <strong>no</strong>, for a fundamental structural reason: the elliptic equation for $\\phi_e$ has no time derivative.\n  </p>\n\n  <p>\n    Recall the bidomain system. The parabolic equation (for $V_m$) has a $\\partial V_m/\\partial t$ term that can in principle be marched forward explicitly. But the elliptic equation \u2014 $0 = \\nabla\\cdot((\\mathbf{D}_i + \\mathbf{D}_e)\\,\\nabla\\phi_e) + \\nabla\\cdot(\\mathbf{D}_i\\,\\nabla V_m)$ \u2014 is a <em>constraint</em> that must be satisfied at every instant. There is no \"marching forward\" possible for a constraint equation. It always requires solving a linear system:\n  </p>\n\n  <div class=\"equation-block\">\n    $$(\\mathbf{K}_i + \\mathbf{K}_e)\\,\\boldsymbol{\\phi}_e = -\\mathbf{K}_i\\,\\mathbf{V}_m \\tag{15.1}$$\n  </div>\n\n  <p>\n    This is the single most important distinction between bidomain and monodomain. In the monodomain model, there is only a single parabolic PDE, and fully explicit methods (including LBM) can handle the entire system. In the bidomain model, <strong>at least one implicit linear solve per time step is unavoidable</strong>.\n  </p>\n\n  <p>\n    Even if we accept the mandatory elliptic solve, we can ask: can the <em>parabolic</em> part be treated explicitly? Yes \u2014 but at a severe cost. Puwal &amp; Roth (2007) derived the forward Euler stability condition for the bidomain parabolic equation. The CFL condition takes the standard parabolic form:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\Delta t \\leq \\frac{\\chi\\,C_m\\,\\Delta x^2}{2\\,d\\,D_{\\max}} \\tag{15.2}$$\n  </div>\n\n  <p>\n    where $d$ is the spatial dimension and $D_{\\max}$ is the maximum effective diffusion coefficient derived from the bidomain conductivity tensors. For typical cardiac parameters with $\\Delta x = 0.1$&nbsp;mm in 3D, this gives $\\Delta t_{\\text{explicit}} \\lesssim 0.5$&nbsp;\u03bcs. By contrast, semi-implicit methods allow $\\Delta t \\approx 50$&nbsp;\u03bcs \u2014 a factor of <strong>100\u00d7 larger</strong>. Weber dos Santos et al. (2004) numerically verified this: for $\\Delta x = 3.3$&nbsp;\u03bcm, forward Euler required $\\Delta t \\leq 0.07$&nbsp;\u03bcs while a semi-implicit scheme permitted $\\Delta t > 100\\times$ larger.\n  </p>\n\n  <p>\n    Because $\\Delta t \\propto \\Delta x^2$, refining the mesh makes the penalty worse quadratically. For production-quality meshes, the explicit CFL restriction is 25\u2013100\u00d7 more severe than what accuracy alone requires.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      Engine V5.4's explicit diffusion solvers (RK2, RK4) work well for monodomain because the CFL restriction for a single parabolic PDE is manageable. For bidomain, these same explicit methods would require prohibitively small time steps for the parabolic equation, <em>and</em> they cannot handle the elliptic equation at all. The implicit diffusion solvers (CN, BDF1, BDF2) are the correct starting point for bidomain extension.\n    </p>\n  </div>\n\n  <h3>14.5 &ensp; Explicit Stabilized Methods (RKC)</h3>\n\n  <p>\n    Runge\u2013Kutta\u2013Chebyshev (RKC) methods offer a middle ground between fully explicit and implicit approaches. An RKC method with $s$ stages is fully explicit (no linear solves for the parabolic part), but its stability domain grows <em>quadratically</em> with $s$:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\beta_s \\approx 0.65\\,s^2$$\n  </div>\n\n  <p>\n    where $\\beta_s$ is the stability interval length. Standard forward Euler has $\\beta_1 = 2$; an RKC method with $s = 20$ stages achieves $\\beta_{20} \\approx 260$ \u2014 effectively relaxing the CFL restriction by a factor of 130\u00d7. Each stage requires only a matrix-vector product (cheap, parallelizable), and the total number of stages adapts automatically to the stiffness.\n  </p>\n\n  <p>\n    For the bidomain parabolic equation, RKC would work as follows: (1)&nbsp;solve the elliptic constraint for $\\phi_e$ (implicit, unavoidable), (2)&nbsp;advance $V_m$ with $s$ RKC stages (explicit), (3)&nbsp;update ionic variables with Rush\u2013Larsen. The elliptic solve is still required, but the parabolic part avoids any implicit linear solve.\n  </p>\n\n  <p>\n    Rosilho de Souza et al. (2024) recently proposed the <strong>emRKC</strong> (explicit exponential multirate stabilized) method for cardiac electrophysiology, combining multirate RKC for diffusion with Rush\u2013Larsen exponential integration for gating variables. This method <strong>outperforms the standard IMEX baseline</strong> for the monodomain model and is inherently more parallel. However, it has been demonstrated only for the monodomain model so far. Extending emRKC to the bidomain parabolic equation is conceptually straightforward, though the elliptic solve will still dominate the cost (82\u201390% of total runtime in typical bidomain simulations).\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      <strong>The spectrum of explicitness for bidomain:</strong> At one extreme, fully implicit methods (backward Euler, CBDF2) treat everything implicitly, requiring nonlinear Newton solves. At the other, \"maximally explicit\" methods treat the parabolic PDE with RKC and only solve the elliptic constraint implicitly. In between, IMEX methods (SBDF2, operator splitting) treat ionic currents explicitly and diffusion implicitly. For most production bidomain codes, IMEX/operator-splitting represents the best trade-off \u2014 but RKC-based approaches are an active area of research with potential GPU advantages.\n    </p>\n  </div>\n\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n</div>\n\n<!--  CHAPTER 15 \u2014 PARABOLIC SOLVERS (A\u2081\u2081 BLOCK)                      -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "ch15": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 15</div>\n  <h2 class=\"chapter-title\">Parabolic Solvers: The $A_{11}$ Block</h2>\n  <div class=\"chapter-intro\">\n    After operator splitting separates the parabolic and elliptic halves of the bidomain system,\n    the $V_m$ update requires solving a linear system with the $A_{11}$ block \u2014 a symmetric positive\n    definite (SPD) matrix that looks exactly like the monodomain stiffness-plus-mass matrix. This\n    chapter covers the three main solver families for this sub-problem: preconditioned conjugate\n    gradient (PCG), Chebyshev iteration, and spectral (transform-based) methods.\n  </div>\n\n\n  <h3>15.1 &ensp; Preconditioned Conjugate Gradient (PCG)</h3>\n\n  <p>\n    Before tackling the full bidomain block system, let us master the solver for a single SPD sub-block. The Preconditioned Conjugate Gradient method is the most widely used iterative solver for symmetric positive-definite systems \u2014 and in bidomain solvers, it is typically applied to the Schur complement block $\\mathbf{S}$ (or to $A_{11}$ during the parabolic substep).\n  </p>\n\n  <p>\n    Appendix A.10 developed the theory from first principles: minimizing the energy functional, the conjugate direction construction, and preconditioning. Here we focus on the practical details that make PCG effective for cardiac simulation.\n  </p>\n\n  <h4>The Algorithm</h4>\n\n  <p>\n    The full PCG algorithm with Jacobi preconditioning is given in Appendix A.10 (the boxed algorithm). Each iteration requires:\n  </p>\n\n  <ul>\n    <li>One sparse matrix-vector product ($A\\mathbf{p}$) \u2014 the dominant cost</li>\n    <li>Two inner products ($\\mathbf{r}^T\\mathbf{z}$ and $\\mathbf{p}^T A\\mathbf{p}$) \u2014 the synchronization bottleneck on GPUs</li>\n    <li>Three vector updates (AXPY operations) \u2014 negligible cost</li>\n  </ul>\n\n  <p>\n    For a 2D cardiac grid with $N$ nodes, the sparse matrix has $O(N)$ nonzero entries (5 per row for FDM, slightly more for FEM), so the matrix-vector product costs $O(N)$. Total cost per PCG solve: $O(k \\cdot N)$ where $k$ is the iteration count.\n  </p>\n\n  <h4>Warm-Starting: The Key to Cardiac Performance</h4>\n\n  <p>\n    In cardiac simulation, we solve a linear system at <em>every</em> time step. The transmembrane voltage field $V_m$ changes only slightly between consecutive steps (the wavefront advances by roughly $\\Delta t \\times \\text{conduction velocity} \\approx 0.02\\,\\text{ms} \\times 60\\,\\text{cm/s} = 0.0012\\,\\text{cm}$, which is a fraction of a grid spacing). This means the solution at time $t^{n+1}$ is very close to the solution at time $t^n$.\n  </p>\n\n  <p>\n    <strong>Warm-starting</strong> exploits this by using the previous time step's solution as the initial guess for the current step. Instead of starting from $\\mathbf{x}_0 = \\mathbf{0}$ (cold start), we set $\\mathbf{x}_0 = \\mathbf{x}^{n-1}$. The initial residual is already small, and PCG converges in just a few iterations.\n  </p>\n\n  <table>\n    <tr><th>Starting strategy</th><th>Typical iterations (monodomain, CN)</th><th>Typical iterations (bidomain, Schur)</th></tr>\n    <tr><td>Cold start ($\\mathbf{x}_0 = \\mathbf{0}$)</td><td>20\u201350</td><td>40\u2013100</td></tr>\n    <tr><td>Warm start ($\\mathbf{x}_0 = \\mathbf{x}^{n-1}$)</td><td>3\u20138</td><td>8\u201320</td></tr>\n  </table>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>Warm-starting is the single biggest performance optimization for cardiac PCG.</strong> It is free (just keep the previous solution in memory), requires no mathematical sophistication, and typically reduces the iteration count by a factor of 5\u201310. Always use it.\n    </p>\n  </div>\n\n  <h4>Convergence Criterion</h4>\n\n  <p>\n    The standard stopping criterion is a relative residual test: stop when $\\|\\mathbf{r}_k\\|/\\|\\mathbf{b}\\| < \\varepsilon$, where $\\varepsilon$ is a tolerance (typically $10^{-8}$ for cardiac simulations). This ensures the error is small relative to the forcing. If $\\|\\mathbf{b}\\|$ is near zero (e.g., during a quiescent phase when no wavefront is active), an absolute tolerance fallback prevents unnecessary iterations.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      <strong>Engine V5.4 connection.</strong> The <code>PCGSolver</code> class in <code>linear_solver/pcg.py</code> implements Jacobi-preconditioned CG with lazy workspace allocation and warm starting. Key design choices: (1) workspace tensors ($\\mathbf{r}$, $\\mathbf{z}$, $\\mathbf{p}$, $A\\mathbf{p}$) are allocated once and reused across time steps, avoiding GPU memory allocation overhead; (2) the diagonal preconditioner is cached and recomputed only when the matrix identity changes; (3) <code>use_warm_start=True</code> is the default.\n    </p>\n  </div>\n\n  <!-- \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n  <h3>15.2 &ensp; Chebyshev Polynomial Solver</h3>\n\n  <p>\n    PCG is optimal in the mathematical sense (it minimizes the error in the $A$-norm over the Krylov subspace), but it has a practical weakness on GPUs: each iteration requires two <strong>inner products</strong> (global reductions), which force all GPU threads to synchronize. On modern hardware with thousands of cores, this synchronization is a significant bottleneck \u2014 the GPU must wait for every thread to finish before the reduction can complete.\n  </p>\n\n  <p>\n    The <strong>Chebyshev polynomial solver</strong> eliminates this bottleneck entirely. Instead of adaptively choosing step sizes (which require inner products), it uses a <em>predetermined</em> sequence of steps based on Chebyshev polynomials. The iteration count is fixed in advance, and no convergence checks occur during the solve. This makes it ideal for GPU execution: every iteration is a pure matrix-vector product plus vector updates \u2014 no synchronization.\n  </p>\n\n  <h4>The Key Idea</h4>\n\n  <p>\n    A Chebyshev polynomial $T_d(x)$ has the remarkable property that it grows as slowly as possible outside the interval $[-1, 1]$ while satisfying $|T_d(x)| \\leq 1$ for $x \\in [-1, 1]$. If we map the eigenvalue interval $[\\lambda_{\\min}, \\lambda_{\\max}]$ of $A$ onto $[-1, 1]$ and construct a polynomial $p_d(A)$ that approximates $A^{-1}$ (in the sense that $p_d(\\lambda) \\approx 1/\\lambda$ for $\\lambda \\in [\\lambda_{\\min}, \\lambda_{\\max}]$), then $\\mathbf{x} \\approx p_d(A)\\,\\mathbf{b}$ is an approximate solution.\n  </p>\n\n  <p>\n    The Chebyshev iteration evaluates this polynomial via a <strong>3-term recurrence</strong>, which requires only the previous two iterates \u2014 no storage of the full iteration history (unlike GMRES).\n  </p>\n\n  <h4>Eigenvalue Estimation via Gershgorin</h4>\n\n  <p>\n    The Chebyshev solver needs bounds $[\\lambda_{\\min}, \\lambda_{\\max}]$ on the eigenvalues of $A$. Computing exact eigenvalues would be as expensive as solving the system, so we use the <strong>Gershgorin circle theorem</strong>: every eigenvalue of $A$ lies in at least one disc centered at a diagonal entry $a_{ii}$ with radius equal to the sum of absolute off-diagonal entries in that row. The bounds are:\n  </p>\n\n  $$\\lambda_{\\min} \\geq \\min_i\\left(a_{ii} - \\sum_{j \\neq i} |a_{ij}|\\right), \\qquad \\lambda_{\\max} \\leq \\max_i\\left(a_{ii} + \\sum_{j \\neq i} |a_{ij}|\\right)$$\n\n  <p>\n    This requires a single pass over the sparse matrix \u2014 $O(N)$ work \u2014 and produces conservative (over-estimated) bounds. A safety margin of 10% is typically added to guard against underestimation.\n  </p>\n\n  <h4>Trade-Offs: PCG vs Chebyshev</h4>\n\n  <table>\n    <tr><th>Property</th><th>PCG</th><th>Chebyshev</th></tr>\n    <tr><td>Optimality</td><td>Minimizes $A$-norm error</td><td>Near-optimal for well-estimated eigenvalues</td></tr>\n    <tr><td>Convergence</td><td>Adaptive (stops when converged)</td><td>Fixed iteration count</td></tr>\n    <tr><td>Sync points per iteration</td><td>2 (inner products)</td><td>0 (no global reductions)</td></tr>\n    <tr><td>GPU efficiency</td><td>Good, limited by reductions</td><td>Excellent \u2014 fully asynchronous</td></tr>\n    <tr><td>Eigenvalue knowledge</td><td>Not needed</td><td>Required ($\\lambda_{\\min}$, $\\lambda_{\\max}$)</td></tr>\n    <tr><td>Best for</td><td>CPU, moderate GPU workloads</td><td>Large GPU workloads, latency-sensitive</td></tr>\n  </table>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      <strong>Engine V5.4 connection.</strong> The <code>ChebyshevSolver</code> class in <code>linear_solver/chebyshev.py</code> implements the 3-term recurrence with Jacobi preconditioning and Gershgorin eigenvalue estimation. The eigenvalue bounds are cached and recomputed only when the matrix changes. Key parameters: <code>max_iters=50</code> (typical for cardiac with warm starting), <code>safety_margin=0.1</code> (10% Gershgorin bound expansion). For the monodomain with Crank-Nicolson, 20\u201330 iterations suffice with warm starting.\n    </p>\n  </div>\n\n  <!-- \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n  <h3>15.3 &ensp; Spectral Solvers: DCT, DST, and FFT</h3>\n\n  <p>\n    For structured Cartesian grids (the default in FDM and FVM), there is an entirely different approach to solving the linear system \u2014 one that avoids iteration altogether. Instead of gradually improving an approximate solution, a <strong>spectral solver</strong> transforms the problem into a space where the solution can be written down in closed form, then transforms back. The total cost is just two FFT-like transforms: $O(N \\log N)$.\n  </p>\n\n  <p>\n    The mathematical foundation is in Appendix A.8\u2013A.9. Here we focus on the three spectral solvers relevant to cardiac simulation and when to use each.\n  </p>\n\n  <h4>15.3.1 &ensp; DCT for Neumann Boundary Conditions</h4>\n\n  <p>\n    The most important case for cardiac EP. Neumann (zero-flux) BCs are the physically correct default for isolated tissue (Section 8.7, Section 12.6). As shown in Appendix A.9, the cosine basis automatically satisfies $\\partial u/\\partial n = 0$ at the boundaries, so the Discrete Cosine Transform diagonalizes the discrete Laplacian under Neumann BCs.\n  </p>\n\n  <p>\n    The algorithm for solving $A_{\\text{lhs}}\\,\\mathbf{V}^{n+1} = \\mathbf{b}_{\\text{rhs}}$ (from the implicit diffusion step) is:\n  </p>\n\n  <ol>\n    <li><strong>Reshape</strong>: Convert the $N$-vector $\\mathbf{b}$ into an $N_x \\times N_y$ grid.</li>\n    <li><strong>Forward 2D DCT</strong>: $\\hat{\\mathbf{b}} = \\text{DCT}_{2D}(\\mathbf{b}_{\\text{grid}})$. Cost: $O(N \\log N)$.</li>\n    <li><strong>Spectral division</strong>: $\\hat{\\mathbf{V}}_{i,j} = \\hat{\\mathbf{b}}_{i,j}\\,/\\,d_{i,j}$ where $d_{i,j}$ is the $(i,j)$-th entry of the spectral denominator (see below).</li>\n    <li><strong>Null-space handling</strong>: Set $\\hat{\\mathbf{V}}_{0,0} = 0$ (the mean-zero convention for Neumann). This is equivalent to pinning in physical space (Section 12.6).</li>\n    <li><strong>Inverse 2D DCT</strong>: $\\mathbf{V}_{\\text{grid}} = \\text{IDCT}_{2D}(\\hat{\\mathbf{V}})$. Cost: $O(N \\log N)$.</li>\n    <li><strong>Flatten</strong>: Convert $N_x \\times N_y$ grid back to $N$-vector.</li>\n  </ol>\n\n  <p>\n    The spectral denominator $d_{i,j}$ depends on the time-stepping scheme (from Chapters 9\u201310):\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(15.1)</span>\n    $$d_{i,j} = \\begin{cases}\n      \\chi C_m - \\tfrac{1}{2}\\Delta t\\,D\\,\\lambda_{i,j} & \\text{Crank-Nicolson (CN)} \\\\\n      \\chi C_m - \\Delta t\\,D\\,\\lambda_{i,j} & \\text{BDF1 (Backward Euler)} \\\\\n      3\\chi C_m - 2\\Delta t\\,D\\,\\lambda_{i,j} & \\text{BDF2}\n    \\end{cases}$$\n  </div>\n\n  <p>\n    where $\\lambda_{i,j}$ are the 2D DCT eigenvalues from equation (A.10):\n  </p>\n\n  $$\\lambda_{i,j} = \\frac{2}{\\Delta x^2}\\left(\\cos\\!\\left(\\frac{\\pi i}{N_x}\\right) - 1\\right) + \\frac{2}{\\Delta y^2}\\left(\\cos\\!\\left(\\frac{\\pi j}{N_y}\\right) - 1\\right)$$\n\n  <p>\n    Since all $\\lambda_{i,j} \\leq 0$ and $D > 0$, the denominator $d_{i,j}$ is always positive (except at $(i,j) = (0,0)$, which is handled by the null-space step). The division is safe and numerically stable.\n  </p>\n\n  <h4>15.3.2 &ensp; DST for Dirichlet Boundary Conditions</h4>\n\n  <p>\n    When the voltage is clamped at the boundary (Dirichlet BCs), the sine basis is appropriate. As shown in Appendix A.9, $\\sin(k\\pi x/L)$ vanishes at both boundaries, so the Discrete Sine Transform diagonalizes the Laplacian under Dirichlet conditions.\n  </p>\n\n  <p>\n    The algorithm is identical to the DCT case, with two changes: (1) replace DCT with DST (and IDCT with IDST), and (2) use the DST eigenvalues from equation (A.9). There is no null-space issue \u2014 the DST eigenvalues are all strictly negative, so the denominator is always positive.\n  </p>\n\n  <p>\n    In cardiac simulation, pure Dirichlet BCs on the entire boundary are uncommon (they would mean voltage-clamping the entire tissue surface). The DST solver is more relevant for sub-problems where Dirichlet conditions arise \u2014 for instance, when solving the Schur complement with a grounded-bath setup (Section 12.6).\n  </p>\n\n  <h4>15.3.3 &ensp; Combining DCT and DST for Mixed BCs</h4>\n\n  <p>\n    When different axes have different boundary conditions \u2014 for example, Neumann on the $x$-boundaries and Dirichlet on the $y$-boundaries \u2014 we apply a cosine transform along $x$ and a sine transform along $y$. The 2D transform is:\n  </p>\n\n  $$\\hat{\\mathbf{b}}_{i,j} = \\text{DCT}_x\\bigl[\\text{DST}_y\\bigl[\\mathbf{b}_{\\text{grid}}\\bigr]\\bigr]$$\n\n  <p>\n    and the eigenvalues combine the DCT formula for $x$ with the DST formula for $y$:\n  </p>\n\n  $$\\lambda_{i,j} = \\underbrace{\\frac{2}{\\Delta x^2}\\left(\\cos\\!\\left(\\frac{\\pi i}{N_x}\\right) - 1\\right)}_{\\text{Neumann in }x} + \\underbrace{\\frac{2}{\\Delta y^2}\\left(\\cos\\!\\left(\\frac{\\pi j}{N_y+1}\\right) - 1\\right)}_{\\text{Dirichlet in }y}$$\n\n  <p>\n    Recall the key limitation from Appendix A.9: this works only when each axis has a single, uniform BC type. You cannot use spectral methods when one end of the $x$-axis has Neumann and the other has Dirichlet \u2014 in that case, fall back to PCG (Section 15.1) or Chebyshev (Section 15.2).\n  </p>\n\n  <h4>15.3.4 &ensp; FFT for Periodic Boundary Conditions</h4>\n\n  <p>\n    For completeness, the standard FFT solver handles periodic BCs. This is rarely used in cardiac simulation (tissue is not periodic), but it appears in benchmark problems and in simplified models of re-entrant spiral waves on a periodic domain. The eigenvalues are:\n  </p>\n\n  $$\\lambda_{i,j} = -\\left(\\frac{2\\pi\\,\\text{fftfreq}(i, N_x)}{\\Delta x}\\right)^2 - \\left(\\frac{2\\pi\\,\\text{fftfreq}(j, N_y)}{\\Delta y}\\right)^2$$\n\n  <p>\n    where $\\text{fftfreq}(k, N)$ returns the $k$-th frequency bin. The algorithm uses <code>torch.fft.fft2</code> / <code>ifft2</code>.\n  </p>\n\n  <h4>Comparison: When to Use Which Solver</h4>\n\n  <table>\n    <tr><th>Solver</th><th>BCs</th><th>Grid type</th><th>Complexity</th><th>Sync points</th><th>Best for</th></tr>\n    <tr><td>DCT</td><td>Neumann</td><td>Structured Cartesian</td><td>$O(N \\log N)$</td><td>0</td><td>Standard cardiac monodomain</td></tr>\n    <tr><td>DST</td><td>Dirichlet</td><td>Structured Cartesian</td><td>$O(N \\log N)$</td><td>0</td><td>Grounded-bath sub-problems</td></tr>\n    <tr><td>FFT</td><td>Periodic</td><td>Structured Cartesian</td><td>$O(N \\log N)$</td><td>0</td><td>Benchmark problems, spiral waves</td></tr>\n    <tr><td>PCG</td><td>Any</td><td>Any (structured or unstructured)</td><td>$O(k \\cdot N)$</td><td>$2k$</td><td>Unstructured meshes, general BCs</td></tr>\n    <tr><td>Chebyshev</td><td>Any (SPD)</td><td>Any</td><td>$O(d \\cdot N)$</td><td>0</td><td>GPU, large-scale, fixed-iteration</td></tr>\n  </table>\n\n  <p>\n    For monodomain on a structured grid with Neumann BCs (the most common cardiac scenario), DCT is the fastest solver by a wide margin \u2014 it is exact (no iteration), $O(N \\log N)$, and fully parallelizable with zero synchronization. The only limitation is that it cannot handle unstructured meshes or non-Cartesian geometries, where PCG or Chebyshev must be used instead.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      <strong>Engine V5.4 connection.</strong> The <code>DCTSolver</code> and <code>FFTSolver</code> classes in <code>linear_solver/fft.py</code> implement the spectral solvers described above. Both compute the eigenvalue grid lazily on the first call and cache it for all subsequent solves. The <code>DCTSolver</code> uses the <code>torch-dct</code> package for the forward and inverse transforms, with a fallback FFT-based DCT implementation if the package is not installed. The solver ignores the sparse matrix $A$ passed to it \u2014 it constructs the spectral denominator entirely from the grid parameters ($N_x$, $N_y$, $\\Delta x$, $\\Delta y$, $D$, $\\Delta t$, $\\chi$, $C_m$) and the time-stepping scheme.\n    </p>\n  </div>\n\n  <!-- \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n\n</div>\n\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 16 \u2014 ELLIPTIC SOLVERS (SCHUR COMPLEMENT)                 -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "ch16": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 16</div>\n  <h2 class=\"chapter-title\">Elliptic Solvers: The Schur Complement</h2>\n  <div class=\"chapter-intro\">\n    The elliptic equation for $\\phi_e$ \u2014 the computational bottleneck of the bidomain model,\n    consuming 70\u201385% of total runtime \u2014 produces a symmetric but indefinite saddle-point system.\n    This chapter develops the solver stack: block preconditioners that exploit the 2\u00d72 structure,\n    algebraic multigrid (AMG) for the inner solves, Krylov methods (MINRES, GMRES) for the outer\n    iteration, and null-space handling for the isolated-tissue case.\n  </div>\n\n\n  <h3>16.1 &ensp; The Saddle-Point Structure</h3>\n\n  <p>\n    The 2\u00d72 block system (15.2) is <strong>symmetric but indefinite</strong>. This means its eigenvalues include both positive and negative values \u2014 a hallmark of saddle-point problems that arise throughout computational physics (Stokes flow, constrained optimization, mixed FEM). The key implications are:\n  </p>\n  <ul>\n    <li><strong>Conjugate Gradient (CG) cannot be used</strong> on the full system \u2014 CG requires positive definiteness.</li>\n    <li><strong>MINRES</strong> (Minimum Residual) is the natural Krylov solver for symmetric indefinite systems.</li>\n    <li><strong>GMRES</strong> works for any system but requires more memory (stores the full Krylov basis).</li>\n    <li>The <strong>condition number</strong> of the bidomain system ranges from $10^8$ to $10^{10}$ for realistic meshes \u2014 <em>preconditioning is absolutely essential</em>.</li>\n  </ul>\n\n  <h3>16.2 &ensp; Block Preconditioners</h3>\n\n  <p>\n    The 2\u00d72 block structure suggests a natural family of preconditioners that exploit the block decomposition rather than treating the system as a monolithic matrix.\n  </p>\n\n  <h4>Block Diagonal Preconditioner</h4>\n\n  <div class=\"equation-block\">\n    $$\\mathbf{P}_{\\text{diag}} = \\begin{pmatrix}\\mathbf{A}_{11} & \\mathbf{0} \\\\ \\mathbf{0} & \\mathbf{A}_{22}\\end{pmatrix}$$\n  </div>\n\n  <p>\n    Application: solve two independent SPD systems ($\\mathbf{A}_{11}^{-1}\\mathbf{x}_1$ and $\\mathbf{A}_{22}^{-1}\\mathbf{x}_2$) in each preconditioning step. Simple to implement but ignores the off-diagonal coupling, leading to 50\u2013200 outer iterations.\n  </p>\n\n  <h4>Block LDU (Triangular) Preconditioner</h4>\n\n  <p>\n    A more sophisticated choice uses the <strong>Schur complement</strong>:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\mathbf{S} = \\mathbf{A}_{22} - \\mathbf{A}_{21}\\,\\mathbf{A}_{11}^{-1}\\,\\mathbf{A}_{12}$$\n  </div>\n\n  <p>\n    The lower-triangular preconditioner is:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\mathbf{P}_{\\text{LDU}} = \\begin{pmatrix}\\mathbf{A}_{11} & \\mathbf{0} \\\\ \\mathbf{A}_{21} & \\mathbf{S}\\end{pmatrix}$$\n  </div>\n\n  <p>\n    With <em>exact</em> inverses of $\\mathbf{A}_{11}$ and $\\mathbf{S}$, the preconditioned system converges in at most 2\u20133 Krylov iterations. In practice, we approximate:\n  </p>\n  <ul>\n    <li>$\\mathbf{A}_{11}^{-1}$ using one AMG V-cycle for the mass-shifted stiffness matrix.</li>\n    <li>$\\mathbf{S}^{-1}$ using one AMG V-cycle for an approximation of the Schur complement (often $\\tilde{\\mathbf{S}} \\approx \\mathbf{K}_e$ or $\\tilde{\\mathbf{S}} \\approx \\mathbf{K}_i + \\mathbf{K}_e$).</li>\n  </ul>\n\n  <p>\n    With these approximations, convergence typically requires <strong>10\u201330 outer iterations</strong> \u2014 a dramatic improvement over unpreconditioned solves.\n  </p>\n\n  <div class=\"insight insight-math\">\n    <p>\n      <strong>The Schur complement has a physical interpretation.</strong> It represents the \"effective\" equation for $\\phi_e$ after eliminating $V_m$. Computing it exactly is as expensive as solving the original system, but good approximations are cheap: for instance, $\\tilde{\\mathbf{S}} \\approx \\mathbf{K}_e$ works well because the mass-matrix contribution in $\\mathbf{A}_{11}$ makes $\\mathbf{A}_{11}^{-1}\\approx (\\Delta t/\\mathbf{M})$ for small $\\Delta t$, and the correction term $\\mathbf{K}_i\\,(\\Delta t/\\mathbf{M})\\,\\mathbf{K}_i$ is small.\n    </p>\n  </div>\n\n  <h3>16.3 &ensp; Algebraic Multigrid (AMG)</h3>\n\n  <p>\n    AMG is the workhorse preconditioner for elliptic and elliptic-like systems in cardiac simulations. It constructs a hierarchy of progressively coarser \"meshes\" (algebraically, not geometrically) and uses smoothing + coarse-grid correction cycles to damp errors at all spatial frequencies simultaneously.\n  </p>\n\n  <p>\n    For the bidomain system, AMG is applied at the <strong>sub-block level</strong>:\n  </p>\n  <ul>\n    <li><strong>$\\mathbf{A}_{11}$ block</strong>: AMG handles the mass-shifted intracellular stiffness efficiently. Convergence in 1\u20132 V-cycles.</li>\n    <li><strong>$\\mathbf{A}_{22}$ or $\\mathbf{S}$ block</strong>: AMG handles the combined stiffness (elliptic problem for $\\phi_e$). This is the <em>bottleneck</em> \u2014 the elliptic solve typically consumes 60\u201380% of total linear solver time.</li>\n  </ul>\n\n  <p>\n    Available AMG implementations for GPU-accelerated bidomain:\n  </p>\n\n  <table>\n    <tr><th>Library</th><th>GPU Support</th><th>Best For</th></tr>\n    <tr><td>AMGX (NVIDIA)</td><td>Native CUDA</td><td>GPU-only workloads; best performance on NVIDIA hardware</td></tr>\n    <tr><td>Hypre (LLNL)</td><td>CUDA, HIP, SYCL</td><td>Large-scale CPU/GPU clusters; mature and robust</td></tr>\n    <tr><td>PyAMG (Python)</td><td>CPU only</td><td>Prototyping; integrates well with PyTorch via scipy</td></tr>\n    <tr><td>Trilinos ML/MueLu</td><td>Partial (Kokkos)</td><td>Full solver ecosystem; advanced smoothers</td></tr>\n  </table>\n\n  <h3>16.4 &ensp; Krylov Methods: MINRES, GMRES, and Friends</h3>\n\n  <p>\n    The outer Krylov solver iterates on the preconditioned system until the residual falls below a tolerance (typically $10^{-6}$ to $10^{-8}$).\n  </p>\n\n  <h4>MINRES</h4>\n  <p>\n    The mathematically optimal choice for symmetric indefinite systems. It minimizes the residual norm over the Krylov subspace at each iteration. Requires a <strong>symmetric</strong> preconditioner (block diagonal qualifies; block LDU does not, unless symmetrized). Memory-efficient: stores only 3 vectors.\n  </p>\n\n  <h4>GMRES</h4>\n  <p>\n    Works for any system (no symmetry requirement). Allows non-symmetric preconditioners like block LDU. However, memory grows linearly with iteration count (each iteration stores one vector). A restart parameter (typically 30\u201350) limits memory at the cost of slower convergence.\n  </p>\n\n  <h4>Flexible GMRES (FGMRES)</h4>\n  <p>\n    A variant that allows the preconditioner to <em>change</em> at each iteration \u2014 useful when AMG V-cycles produce slightly different results each time (as happens with some adaptive smoothers). Memory cost is 2\u00d7 GMRES.\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      <strong>Recommended solver stack for bidomain:</strong><br>\n      <em>Outer solver:</em> FGMRES(30) or MINRES<br>\n      <em>Preconditioner:</em> Block LDU with AMG V-cycles for sub-blocks<br>\n      <em>Expected iterations:</em> 10\u201330 per time step<br>\n      <em>Expected speedup over unpreconditioned:</em> 50\u2013100\u00d7\n    </p>\n  </div>\n\n  <h3>16.5 &ensp; The Null-Space Problem</h3>\n\n  <p>\n    The elliptic equation for $\\phi_e$ with homogeneous Neumann boundary conditions means $\\phi_e$ is determined only up to an additive constant \u2014 the matrix $\\mathbf{A}_{22}$ has a one-dimensional null space spanned by the constant vector $\\mathbf{1}$. As discussed in Section 12.6, this is a direct consequence of the isolated-tissue boundary conditions.\n  </p>\n\n  <p>\n    Three strategies for handling the null space:\n  </p>\n  <ol>\n    <li><strong>Pin one node</strong>: set $(\\
