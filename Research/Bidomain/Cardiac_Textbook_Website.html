hread is completely independent. On modern GPUs, this translates to\n    near-peak memory bandwidth utilization and minimal synchronization overhead.\n  </p>\n\n  <h4>The Swap-Streaming Optimization</h4>\n\n  <p>\n    The naive implementation of Algorithm (19.11) uses two arrays: a pre-collision array $\\mathbf{f}$ and\n    a post-collision array $\\mathbf{f}^*$. After streaming populates $\\mathbf{f}^*$, the arrays are\n    swapped. This doubles memory usage. The <strong>swap-streaming</strong> (or \"AA-pattern\") optimization\n    fuses collision and streaming into a single pass:\n  </p>\n\n  <p>\n    On even timesteps, read $f_i(\\mathbf{x})$ from the source node and write $f_i^*$ directly to the\n    destination node $\\mathbf{x} + \\mathbf{e}_i\\Delta x$ (scatter pattern). On odd timesteps, reverse:\n    read $f_i$ from the neighbor $\\mathbf{x} - \\mathbf{e}_i\\Delta x$ and write the post-collision value\n    to $\\mathbf{x}$ (gather pattern). By alternating read/write patterns every other timestep, a single\n    array suffices &mdash; halving memory and improving cache performance.\n  </p>\n\n  <h4>Memory Layout: Structure of Arrays</h4>\n\n  <p>\n    For GPU kernels, the distributions are stored in <strong>Structure of Arrays</strong> (SoA) format:\n    one contiguous array per direction $i$, each of size $N_x \\times N_y$ (or $N_x \\times N_y \\times N_z$\n    in 3D). The node at position $(x, y)$ has its $f_i$ stored at index $i \\times N_x N_y + y \\times N_x + x$.\n    This layout ensures that when a GPU warp processes adjacent nodes, it accesses contiguous memory\n    locations within each direction &mdash; maximizing memory coalescing.\n  </p>\n\n  <h4>Sparse/Indirect Addressing for Irregular Geometries</h4>\n\n  <p>\n    Cardiac tissue is not rectangular. A ventricular slab, a cross-section of the septum, or a full\n    biventricular geometry all have irregular boundaries. Storing distributions on a full Cartesian grid\n    wastes memory on nodes outside the tissue. The solution is <strong>indirect addressing</strong>: an\n    adjacency array maps each active node to its neighbors. Instead of computing neighbor positions from\n    $(x \\pm 1, y \\pm 1)$, the streaming step looks up the neighbor index from a precomputed table. This\n    adds one integer load per direction per node but eliminates wasted storage on inactive nodes.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      In Engine V5.4, the LBM monodomain solver is in the <code>cardiac_sim.simulation.lbm</code> package.\n      The lattice definitions (<code>D2Q5</code>, <code>D3Q7</code>) are frozen dataclasses holding weights,\n      velocity vectors, and the $\\tau$-$D$ conversion formula. Collision operators (<code>BGKCollision</code>,\n      <code>MRTCollision</code>) inherit from <code>CollisionOperator(ABC)</code> and implement the update step\n      (equation 18.3 or 18.8). The <code>LBMState</code> container holds the distribution tensor\n      $\\mathbf{f}$ (shape $Q \\times N_x \\times N_y$ for 2D), voltage $V_m$, ionic states $\\mathbf{w}$, and\n      the domain mask. The <code>LBMSimulation</code> class orchestrates the six-step loop (19.11): call\n      <code>collision.collide(f, V, source, dt)</code>, apply <code>state.stream()</code> (one\n      <code>torch.roll</code> per direction), <code>state.apply_bounce_back()</code>, and finally\n      <code>state.recover_voltage()</code> to compute $V_m = \\sum f_i$. The ionic substep is identical\n      to the classical path &mdash; only the diffusion step changes. Factory functions\n      <code>create_isotropic_bgk(D, dx, dt)</code> and\n      <code>create_anisotropic_mrt(D_fiber, D_cross, fiber_angle, dx, dt)</code> handle initialization.\n    </p>\n  </div>\n\n  <h3>19.8 &ensp; LBM vs. Classical Methods: When to Choose What</h3>\n\n  <p>\n    LBM, explicit methods (Chapter 9), and implicit methods (Chapter 10) each have distinct trade-offs:\n  </p>\n\n  <table style=\"width:100%; border-collapse:collapse; margin:1em 0; font-size:0.95em;\">\n    <thead>\n      <tr style=\"background:#f0f0f0;\">\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:left;\">Aspect</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:center;\">Explicit (Ch 9)</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:center;\">Implicit (Ch 10)</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:center;\">LBM-BGK/MRT</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <td style=\"padding:6px; border:1px solid #ddd;\">Linear solve?</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">No</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">Yes (PCG/FFT)</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">No</td>\n      </tr>\n      <tr style=\"background:#fafafa;\">\n        <td style=\"padding:6px; border:1px solid #ddd;\">Stability limit?</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">Yes ($\\Delta t \\leq h^2/2dD$)</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">No (unconditional)</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">$\\tau > \\Delta t/2$ (always satisfied)</td>\n      </tr>\n      <tr>\n        <td style=\"padding:6px; border:1px solid #ddd;\">Anisotropy?</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">Via diffusion tensor</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">Via diffusion tensor</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">BGK = isotropic only; MRT = full tensor</td>\n      </tr>\n      <tr style=\"background:#fafafa;\">\n        <td style=\"padding:6px; border:1px solid #ddd;\">Unstructured mesh?</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">Yes (FEM)</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">Yes (FEM)</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">No (Cartesian only)</td>\n      </tr>\n      <tr>\n        <td style=\"padding:6px; border:1px solid #ddd;\">GPU suitability</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">Good (SpMV)</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">Fair (global reductions)</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">Excellent (zero global sync)</td>\n      </tr>\n      <tr style=\"background:#fafafa;\">\n        <td style=\"padding:6px; border:1px solid #ddd;\">Memory per node</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">1 float ($V_m$)</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">1 float + sparse $\\mathbf{A}$</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">$Q$ floats ($f_i$): 5 (D2Q5) or 7 (D3Q7)</td>\n      </tr>\n      <tr>\n        <td style=\"padding:6px; border:1px solid #ddd;\">Typical use</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">Small problems, rapid prototyping</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">Production FEM, large $\\Delta t$</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">GPU throughput, parameter sweeps</td>\n      </tr>\n    </tbody>\n  </table>\n\n  <p>\n    <strong>When to use LBM:</strong> GPU hardware, Cartesian grids, and when throughput (simulations per\n    unit wall-clock time) matters more than memory. The total absence of global synchronization makes LBM\n    ideal for multi-GPU scaling and massive parameter sweeps. <strong>When to use classical methods:</strong>\n    unstructured meshes (patient-specific geometries from MRI), problems where memory is the bottleneck\n    (very large 3D domains), or when existing FEM infrastructure is already validated and optimized.\n  </p>\n\n  <p>\n    With the monodomain LBM now complete, we turn to its greatest challenge: the bidomain system. The\n    parabolic intracellular equation can be solved by LBM, but the elliptic extracellular equation has no\n    time dependence &mdash; it is a constraint that must be satisfied at every instant. Chapter 19\n    develops three strategies to overcome this fundamental obstacle: pseudo-time relaxation, hybrid\n    LBM&ndash;classical solvers, and the dual-lattice architecture.\n  </p>\n</div>\n\n\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 20 \u2014 LATTICE-BOLTZMANN FOR BIDOMAIN                     -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "ch2": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 2</div>\n  <h2 class=\"chapter-title\">From Neurons to Heart Cells</h2>\n  <div class=\"chapter-intro\">\n    The nerve action potential is a brief spark \u2014 over in 2 milliseconds. The cardiac action potential is\n    a sustained flame, lasting 200\u2013400 ms. This chapter explains why the heart demands such a profoundly\n    different electrical signature, and what new biophysics makes it possible.\n  </div>\n\n  <h3>2.1 &ensp; Why the Heart Needs a Longer Action Potential</h3>\n\n  <p>\n    A nerve fiber has one job: transmit a binary signal from point A to point B as fast as possible.\n    It fires and recovers quickly so it can fire again. But a cardiac myocyte has a very different job:\n    it must <em>contract</em>, and contraction takes time. The heart needs the electrical signal to\n    outlast the mechanical event so that every cell stays activated long enough to squeeze in synchrony.\n  </p>\n\n  <p>\n    If the cardiac AP were as short as a nerve spike, the cell would repolarize before it finished\n    contracting. Worse, a new electrical impulse could arrive and re-activate parts of the heart while\n    other parts were still contracting \u2014 leading to chaotic, uncoordinated contraction. The long AP\n    duration serves as a <em>built-in safety mechanism</em>: by keeping the cell depolarized for hundreds\n    of milliseconds, it prevents premature re-excitation.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      Think of it this way: the nerve AP is like a camera flash \u2014 bright, instantaneous, done.\n      The cardiac AP is like holding a light switch on for a deliberate period. The heart needs this\n      \"held\" state because mechanical contraction is slow compared to electrical activation. The electrical\n      plateau is the heart's way of saying \"stay contracted until I tell you to relax.\"\n    </p>\n  </div>\n\n  <h3>2.2 &ensp; The L-type Calcium Current and the Plateau</h3>\n\n  <p>\n    So how does the heart stretch a 2 ms spike into a 300 ms plateau? The answer is a current that\n    neurons barely use: the <em>L-type calcium current</em>, $I_{\\text{CaL}}$. This inward current\n    activates during depolarization (like Na$^+$), but it inactivates <em>much more slowly</em> \u2014 on a\n    timescale of 50\u2013200 ms rather than 1\u20132 ms.\n  </p>\n\n  <p>\n    During the plateau phase (Phase 2 of the cardiac AP), the membrane sits at roughly 0 to +20 mV\n    because two opposing forces are nearly balanced:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\underbrace{I_{\\text{CaL}}}_{\\text{inward, depolarizing}} \\approx -\\underbrace{I_{\\text{Kr}} + I_{\\text{Ks}}}_{\\text{outward, repolarizing}}$$\n  </div>\n\n  <p>\n    The L-type Ca$^{2+}$ current holds the voltage up, while slowly activating delayed-rectifier\n    K$^+$ currents ($I_{\\text{Kr}}$ and $I_{\\text{Ks}}$) try to pull it down. This tug-of-war\n    creates a nearly flat plateau that can last over 200 ms. Eventually, as $I_{\\text{CaL}}$ inactivates\n    (both via voltage and via rising intracellular Ca$^{2+}$), the K$^+$ currents win and repolarization\n    accelerates.\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      The plateau is a <em>fragile equilibrium</em>. A small change in any current during Phase 2 can\n      dramatically alter AP duration. This is why drug-induced QT prolongation (blocking $I_{\\text{Kr}}$) is\n      so dangerous \u2014 it tips the balance toward inward current, lengthens the plateau, and can trigger\n      the lethal arrhythmia <em>torsades de pointes</em>. Understanding this balance is central to\n      computational drug safety testing.\n    </p>\n  </div>\n\n  <p>\n    The L-type calcium current also serves a second critical role: it triggers the release of a much\n    larger amount of calcium from the sarcoplasmic reticulum (SR) \u2014 the cell's internal calcium store.\n    This process, called <em>calcium-induced calcium release</em> (CICR), amplifies the Ca$^{2+}$ signal\n    roughly 10-fold and drives actual muscle contraction. We will see this calcium handling machinery in\n    detail when we study the TTP06 model in Chapter 5.\n  </p>\n\n  <h3>2.3 &ensp; Minimal Cardiac Models: FitzHugh\u2013Nagumo to Fenton\u2013Karma</h3>\n\n  <p>\n    Before diving into the full complexity of modern ionic models, it is instructive to see how\n    the cardiac AP can be captured with just 2\u20133 variables. These minimal models sacrifice biophysical\n    detail for mathematical tractability, but they capture the essential shape.\n  </p>\n\n  <h4>The FitzHugh\u2013Nagumo Model (2 variables)</h4>\n\n  <p>\n    In 1961, Richard FitzHugh realized that the HH equations could be distilled to their essence.\n    The key insight: the fast variable (Na$^+$ activation) and the slow variable (recovery) are\n    what matter most. He proposed:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(2.1)</span>\n    $$\\frac{dv}{dt} = v - \\tfrac{v^3}{3} - w + I_{\\text{ext}}, \\qquad \\frac{dw}{dt} = \\epsilon(v + a - bw)$$\n  </div>\n\n  <p>\n    Here $v$ is a rescaled voltage, $w$ is a slow recovery variable (combining $h$ and $n$ into a\n    single \"how recovered is the cell\" variable), and $\\epsilon \\ll 1$ ensures that $w$ moves much\n    slower than $v$. The cubic nonlinearity $v - v^3/3$ creates the bistability needed for excitation:\n    $v$ has two stable branches (resting and excited) and the system jumps between them.\n  </p>\n\n  <p>\n    FitzHugh\u2013Nagumo captures excitability, threshold behavior, and refractoriness \u2014 but it produces a\n    triangular AP, not the flat plateau of a cardiac cell.\n  </p>\n\n  <h4>The Fenton\u2013Karma Model (3 variables)</h4>\n\n  <p>\n    In 1998, Flavio Fenton and Alain Karma introduced a three-variable model specifically designed for\n    cardiac tissue. The key addition: a slow inward current that produces the plateau.\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(2.2)</span>\n    $$\\frac{dV}{dt} = -\\bigl(I_{\\text{fi}}(V,v) + I_{\\text{so}}(V) + I_{\\text{si}}(V,w)\\bigr)$$\n  </div>\n\n  <p>\n    The three currents map directly to cardiac physiology: $I_{\\text{fi}}$ is a fast inward current (like Na$^+$\n    creating the upstroke), $I_{\\text{so}}$ is a slow outward current (like K$^+$ causing repolarization), and\n    $I_{\\text{si}}$ is a slow inward current (like Ca$^{2+}$ sustaining the plateau). With just three variables\n    ($V$, $v$, $w$), the Fenton\u2013Karma model reproduces realistic AP shapes, spiral waves, and even\n    alternans \u2014 all phenomena seen in real cardiac tissue.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      Minimal models like Fenton\u2013Karma are not toys. In Engine V5.4, they serve as essential\n      <em>validation benchmarks</em>: if the monodomain solver produces the correct spiral-wave dynamics\n      with a 3-variable model, you can have confidence in the diffusion numerics before scaling up to\n      TTP06 (18 variables) or ORd (40 variables). They are also used for parameter sweeps and\n      machine-learning studies where millions of simulations are needed.\n    </p>\n  </div>\n\n  <p>\n    The progression from HH (4 variables, nerve) \u2192 FitzHugh\u2013Nagumo (2 variables, generic excitable) \u2192\n    Fenton\u2013Karma (3 variables, cardiac) \u2192 full ionic models (18\u201340+ variables, human ventricle) is\n    the story of matching model complexity to the scientific question being asked. In the next chapter,\n    we zoom in on the full cardiac action potential and dissect each phase.\n  </p>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 3 \u2014 ANATOMY OF THE CARDIAC ACTION POTENTIAL              -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "ch20": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 20</div>\n  <h2 class=\"chapter-title\">Lattice-Boltzmann Methods for Bidomain</h2>\n  <div class=\"chapter-intro\">\n    Engine V5.4's LBM solver achieves 10\u201345\u00d7 speedups over FEM for the monodomain equation. Can this advantage be preserved for bidomain? Yes \u2014 but the elliptic equation requires creative treatment. This chapter develops the core strategies: pseudo-time relaxation, hybrid LBM\u2013classical solvers, and the dual-lattice architecture that couples two independent distribution systems. We show how to extend the computational fiction of particle distributions to solve problems with fundamentally different mathematical structure.\n  </div>\n\n  <h3>20.1 &ensp; The Bidomain Challenge: One Parabolic + One Elliptic</h3>\n\n  <!-- Layer 1: ELI5 -->\n  <p>\n    Imagine two fish tanks connected by pipes: an intracellular tank (inside the cells) and an extracellular tank (outside the cells). Water flows from one tank to the other through countless tiny pipes \u2014 the ion channels. The voltage across the cell membrane is the water-level difference. Now here is the key: the intracellular voltage evolves over time (it changes as currents flow), so it satisfies a time-dependent equation. But the extracellular voltage is constrained to always satisfy a balance \u2014 at every instant, whatever current flows out of the intracellular space must flow through the external medium. This constraint is instantaneous, with no time dependence. One tank's level evolves; the other's is a slave variable determined by the constraint.\n  </p>\n\n  <!-- Layer 2: Conceptual -->\n  <p>\n    The bidomain equations (from Chapter 12) are:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\chi\\,C_m\\,\\frac{\\partial V_m}{\\partial t} + I_{\\text{ion}} = \\nabla\\!\\cdot\\!(\\mathbf{D}_i\\,\\nabla V_m) + \\nabla\\!\\cdot\\!(\\mathbf{D}_i\\,\\nabla\\phi_e)$$\n  </div>\n\n  <div class=\"equation-block\">\n    $$0 = \\nabla\\!\\cdot\\!\\bigl[(\\mathbf{D}_i + \\mathbf{D}_e)\\,\\nabla\\phi_e\\bigr] + \\nabla\\!\\cdot\\!(\\mathbf{D}_i\\,\\nabla V_m) + I_{\\text{stim}}$$\n  </div>\n\n  <p>\n    The first equation is <em>parabolic</em> \u2014 it has a time derivative, so it describes an evolution. The second is <em>elliptic</em> \u2014 no time derivative at all. It is a constraint that must be satisfied at every instant. LBM, by its nature, is a time-marching method: it evolves distributions forward in time. This is perfect for the parabolic equation but fundamentally at odds with the elliptic constraint.\n  </p>\n\n  <p>\n    The core mismatch is this: LBM asks \"How do the distributions evolve?\" But the elliptic equation says \"The distributions must be such that this constraint is satisfied right now.\" These are two different questions. Resolving the tension between them \u2014 evolution versus constraint \u2014 is the central challenge of bidomain LBM.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      Think of the monodomain equation (Chapter 18) as a single fish tank with a changing water level. LBM marches the level forward in time with each step. The bidomain is two tanks. The intracellular tank (Vm) still evolves. But the extracellular tank (\u03c6e) is not free to evolve \u2014 its level is pinned down by the requirement that water conservation is always satisfied. This is why \u03c6e is an elliptic equation: it is an instantaneous constraint, not a time-evolution equation.\n    </p>\n  </div>\n\n  <h3>20.2 &ensp; Strategy 1: Pseudo-Time Relaxation</h3>\n\n  <!-- Layer 1: ELI5 -->\n  <p>\n    If you heat a cold metal plate in a furnace with a fixed pattern of heat sources, the temperature rises over time. Eventually it reaches a steady state where the heat input exactly balances the heat loss through the edges. The temperature at that steady state is determined by the heat sources alone \u2014 it is independent of the initial condition or the \"time\" you waited. In mathematics, finding this steady state is the same as solving the elliptic equation that governs heat diffusion in equilibrium.\n  </p>\n\n  <!-- Layer 2: Conceptual -->\n  <p>\n    Pseudo-time relaxation exploits this observation. We cannot use LBM directly on an elliptic equation because there is no time-derivative to march. But we can invent a fictitious time \u2014 call it $\\tau$ (not to be confused with the relaxation time parameter) \u2014 and add an artificial time derivative to the elliptic equation:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(20.1)</span>\n    $$\\frac{\\partial\\phi_e}{\\partial\\tau} = \\nabla\\!\\cdot\\!\\bigl[(\\mathbf{D}_i\\!+\\!\\mathbf{D}_e)\\,\\nabla\\phi_e\\bigr] + \\nabla\\!\\cdot\\!(\\mathbf{D}_i\\,\\nabla V_m) + I_{\\text{stim}}$$\n  </div>\n\n  <p>\n    This is now a parabolic equation in the pseudo-time $\\tau$. We march it with LBM in pseudo-time for many sub-iterations until the solution settles to a steady state, meaning $\\partial\\phi_e/\\partial\\tau$ becomes negligibly small. At that point, the solution is the same as what the elliptic equation demands \u2014 the constraint is satisfied.\n  </p>\n\n  <p>\n    The beauty of this approach: LBM works just as well on the pseudo-time equation as on the physical parabolic equation. The lattice parameter $\\tau_e$ is set by the same Chapman\u2013Enskog relationship (equation 17.26):\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(20.2)</span>\n    $$\\tau_e = \\frac{1}{2} + \\frac{3\\,(\\mathbf{D}_i + \\mathbf{D}_e)\\,\\Delta\\tau}{\\Delta x^2}$$\n  </div>\n\n  <p>\n    where $\\Delta\\tau$ is the pseudo-time step size and the conductivity is $\\mathbf{D}_i + \\mathbf{D}_e$ (the sum of intracellular and extracellular tensors, as required by the elliptic equation).\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      The convergence speed depends on $\\tau_e$ (which determines the collision rate) and on the geometry of the domain. A larger $\\tau_e$ means gentler relaxation and slower convergence. Typical practice is to use a moderately large $\\tau_e$ (around 0.8\u20131.5) to balance stability with speed. The number of pseudo-time sub-iterations per physical time step is usually 10\u2013100, depending on the desired residual reduction. With multigrid acceleration (not detailed here), this can be reduced to 5\u201310 iterations.\n    </p>\n  </div>\n\n  <h3>20.3 &ensp; Strategy 2: Hybrid LBM\u2013Classical Solver</h3>\n\n  <!-- Layer 1: ELI5 -->\n  <p>\n    You would not use a hammer to write on paper \u2014 you use a pen. And you would not use a pen to drive nails \u2014 you use a hammer. The principle is simple: use the right tool for the job. LBM is superb at time-marching parabolic equations on Cartesian grids with GPUs. Classical solvers (conjugate gradient with multigrid preconditioning) are superb at solving elliptic systems exactly (or nearly exactly) without iteration over a fictitious time.\n  </p>\n\n  <!-- Layer 2: Conceptual -->\n  <p>\n    The hybrid approach splits the labor:\n  </p>\n\n  <ul>\n    <li><strong>$V_m$ equation (parabolic)</strong>: Use LBM with MRT collision (as in monodomain). Advance it by one physical time step.</li>\n    <li><strong>$\\phi_e$ equation (elliptic)</strong>: Use a classical solver \u2014 Conjugate Gradient (CG) preconditioned by Algebraic Multigrid (AMG). Solve it directly to a tight tolerance.</li>\n  </ul>\n\n  <p>\n    At each physical time step:\n  </p>\n\n  <ol>\n    <li>Compute ionic currents and update gates (Rush\u2013Larsen).</li>\n    <li>March $V_m$ forward one LBM step using the $V_m$ distribution lattice.</li>\n    <li>Assemble the right-hand side for the elliptic $\\phi_e$ equation, which includes the $V_m$ gradient (now known from step 2) and the stimulus term.</li>\n    <li>Solve the elliptic system $\\nabla\\!\\cdot\\!\\bigl[(\\mathbf{D}_i + \\mathbf{D}_e)\\,\\nabla\\phi_e\\bigr] = \\cdots$ using CG+AMG, yielding $\\phi_e$.</li>\n    <li>Feed $\\phi_e$ back as a source term for the next step's $V_m$ equation.</li>\n  </ol>\n\n  <p>\n    The key advantage: avoiding the pseudo-time convergence loop. The classical solver reaches machine precision in 10\u201330 iterations (typically much faster than 100 pseudo-time iterations). The tradeoff: data must be transferred between the LBM lattice (which lives on a Cartesian GPU grid) and the classical solver's matrix assembly (which may involve FEM or FDM operators).\n  </p>\n\n  <div class=\"insight insight-math\">\n    <p>\n      The hybrid approach requires careful bookkeeping of the gradient $\\nabla V_m$ on the LBM lattice and its transfer to the classical solver. One way to do this: compute $\\nabla V_m$ on the Cartesian grid using finite differences (natural in LBM since we have nearest-neighbor data), then pass this to the classical solver's RHS assembly. The solver can run on the same grid (FDM) or on a finer/coarser grid (via interpolation operators) to trade memory for accuracy.\n    </p>\n  </div>\n\n  <h3>20.4 &ensp; The Dual-Lattice Architecture</h3>\n\n  <!-- Layer 1: ELI5 -->\n  <p>\n    Instead of mixing tools, use two of the same tool \u2014 but in different modes. Imagine having two bookkeepers, each tracking inventory for different tanks. Tank 1's bookkeeper (Lattice 1) evolves the intracellular voltage. Tank 2's bookkeeper (Lattice 2) repeatedly adjusts the extracellular potential until the water-balance constraint is met. They hand notes to each other at the end of each physical time step, telling each other what changed.\n  </p>\n\n  <!-- Layer 2: Conceptual -->\n  <p>\n    The dual-lattice architecture maintains two independent LBM lattices, each solving its own equation:\n  </p>\n\n  <ul>\n    <li><strong>Lattice 1</strong>: Distribution functions $f_i^{(m)}(\\mathbf{x}, t)$ solving the parabolic $V_m$ equation.\n    Relaxation time $\\tau_m$ encodes the intracellular diffusivity $\\mathbf{D}_i$.</li>\n    <li><strong>Lattice 2</strong>: Distribution functions $f_i^{(e)}(\\mathbf{x}, t)$ solving the pseudo-time-augmented $\\phi_e$ equation.\n    Relaxation time $\\tau_e$ encodes the sum $\\mathbf{D}_i + \\mathbf{D}_e$.</li>\n  </ul>\n\n  <p>\n    The two lattices are coupled through source terms. The source for Lattice 1 includes the gradient of $\\phi_e$ (the extracellular potential) plus the ionic current. The source for Lattice 2 includes the gradient of $V_m$ plus the stimulus:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(20.3)</span>\n    $$f_i^{(m)*} = f_i^{(m)} - \\omega_m\\,(f_i^{(m)} - f_i^{(m)\\text{eq}}) + \\Delta t\\,w_i\\,\\bigl[\\text{ionic term} + \\text{coupling to } \\phi_e\\bigr]$$\n  </div>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(20.4)</span>\n    $$f_i^{(e)*} = f_i^{(e)} - \\omega_e\\,(f_i^{(e)} - f_i^{(e)\\text{eq}}) + \\Delta\\tau\\,w_i\\,\\bigl[\\text{coupling to } V_m + \\text{stimulus}\\bigr]$$\n  </div>\n\n  <p>\n    The algorithm at each physical time step is:\n  </p>\n\n  <div class=\"equation-block\" style=\"background:#f8f8f0; border:2px solid #666; padding:15px; border-radius:4px;\">\n    <p style=\"margin:0 0 10px 0; font-weight:bold;\">Dual-Lattice Bidomain LBM Timestep:</p>\n    $$\\begin{aligned}\n      &\\textbf{1. Reaction:} &&\\text{Ionic currents and state updates (Rush\u2013Larsen)} \\\\[4pt]\n      &\\textbf{2. Vm update:} &&\\text{One LBM step on Lattice 1 (physical time step } \\Delta t\\text{)} \\\\[4pt]\n      &\\textbf{3. \u03c6}_e\\textbf{ convergence:} &&\\text{Iterate Lattice 2 until } \\frac{\\partial\\phi_e}{\\partial\\tau} \\text{ is negligible} \\\\[4pt]\n      &\\textbf{4. Source exchange:} &&\\text{Compute coupling terms for the next physical step}\n    \\end{aligned}$$\n  </div>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>Worked example outline.</strong> Suppose at the start of a timestep: $V_m$ is known (say, $-85$ mV at most nodes), and $\\phi_e$ is at its previous steady state. We compute ionic currents (depends on $V_m$ and gates). Lattice 1 takes one LBM step, advancing $V_m$ to $-84$ mV (approximately). Now $V_m$ has changed, so the constraint for $\\phi_e$ has changed (because the RHS includes $\\nabla\\!\\cdot\\!(\\mathbf{D}_i\\,\\nabla V_m)$). Lattice 2 then iterates in pseudo-time, re-adjusting $\\phi_e$ at every node until the new steady state is reached. This typically takes 10\u201350 pseudo-time iterations. Once converged, Lattice 1 knows the new $\\phi_e$ value for the next physical step's source term.\n    </p>\n  </div>\n\n  <!-- Layer 3: Architecture comparison -->\n  <p>\n    How do the three strategies compare?\n  </p>\n\n  <table style=\"width:100%; border-collapse:collapse; margin:1em 0; font-size:0.95em;\">\n    <thead>\n      <tr style=\"background:#f0f0f0;\">\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:left;\">Architecture</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:center;\">$V_m$ Solver</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:center;\">$\\phi_e$ Solver</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:left;\">Pros</th>\n        <th style=\"padding:8px; border:1px solid #ddd; text-align:left;\">Cons</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:left;\"><strong>A: Dual-Lattice</strong></td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">LBM</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">LBM (pseudo-time)</td>\n        <td style=\"padding:6px; border:1px solid #ddd;\">Pure LBM; maximal GPU parallelism; unified code path</td>\n        <td style=\"padding:6px; border:1px solid #ddd;\">Pseudo-time convergence overhead (typically 20\u2013100 sub-iterations)</td>\n      </tr>\n      <tr style=\"background:#fafafa;\">\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:left;\"><strong>B: Hybrid</strong></td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">LBM</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">CG+AMG</td>\n        <td style=\"padding:6px; border:1px solid #ddd;\">Optimal solver for each PDE type; fewer iterations for $\\phi_e$</td>\n        <td style=\"padding:6px; border:1px solid #ddd;\">Data transfer overhead between LBM and classical grids</td>\n      </tr>\n      <tr>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:left;\"><strong>C: Full Classical</strong></td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">FEM/FDM</td>\n        <td style=\"padding:6px; border:1px solid #ddd; text-align:center;\">FEM/FDM</td>\n        <td style=\"padding:6px; border:1px solid #ddd;\">Mature solver ecosystem; handles unstructured meshes</td>\n        <td style=\"padding:6px; border:1px solid #ddd;\">Slower than LBM for parabolic; matrix assembly overhead</td>\n      </tr>\n    </tbody>\n  </table>\n\n  <p>\n    Architecture A (dual-lattice) is the most elegant and maximizes GPU utilization. It is the natural choice for research and exploration. Architecture B (hybrid) trades elegance for robustness: it leverages decades of optimization in multigrid solvers and avoids the pseudo-time convergence cost. In practice, Architecture A is recommended as the starting point for Engine V5.4, with Architecture B as a fallback.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      Engine V5.4 already has the infrastructure for Lattice 1: the D3Q7 lattice definitions, the MRT collision operator, and the torch-based streaming and recovery. For Lattice 2, you need: (1) a second set of distribution arrays $f_i^{(e)}$, (2) a pseudo-time loop that iterates until convergence (checking $\\|\\partial\\phi_e/\\partial\\tau\\|$ after each step), (3) source term construction that couples $V_m$ gradients from Lattice 1 into Lattice 2's collision. The factory functions can be extended: <code>create_dual_lattice_bidomain(D_i, D_e, dx, dt)</code> would initialize both lattices and return a <code>DualLatticeBidomainSolver</code> object with methods <code>step_reaction()</code>, <code>step_vm()</code>, <code>converge_phi_e(residual_tol)</code>.\n    </p>\n  </div>\n\n  <h3>20.5 &ensp; Performance and Implementation Outlook</h3>\n\n  <!-- Layer 1: ELI5 -->\n  <p>\n    How much faster is bidomain LBM than classical bidomain solvers? That depends on how much time the classical solver spends on the elliptic solve. If the elliptic solve is fast (because the domain is simple or multigrid works well), then the speedup is modest. If the elliptic solve dominates, then LBM's advantage is large.\n  </p>\n\n  <!-- Layer 2: Conceptual -->\n  <p>\n    Based on the literature for monodomain LBM (which achieves 10\u201345\u00d7 speedup over FEM) and accounting for the added cost of the elliptic $\\phi_e$ equation, estimated performance ranges for bidomain LBM are:\n  </p>\n\n  <ul>\n    <li><strong>Dual-Lattice (Architecture A)</strong>: 5\u201320\u00d7 speedup over classical FEM bidomain, depending on the pseudo-time convergence rate and domain geometry. The lower end occurs when pseudo-time takes many iterations; the upper end occurs on simple geometries or with multigrid acceleration of the pseudo-time loop.</li>\n    <li><strong>Hybrid (Architecture B)</strong>: 3\u201310\u00d7 speedup. The elliptic solve using AMG is already near-optimal, so gains come mainly from the LBM parabolic solve and from avoiding the global reductions (inner products) required by iterative classical solvers.</li>\n  </ul>\n\n  <p>\n    Memory overhead: Each architecture stores two voltage fields ($V_m$ and $\\phi_e$) plus either one or two lattices. The dual-lattice uses $2Q$ floats per node (two sets of $Q$ distributions); the hybrid uses $Q$ floats plus the classical solver's matrix storage. For a 3D grid with D3Q7 ($Q=7$), the dual-lattice costs 14 floats per node \u2014 manageable on modern GPUs with 24\u201380 GB.\n  </p>\n\n  <!-- Layer 3: Implementation path -->\n  <p>\n    The recommended implementation path for Engine V5.4:\n  </p>\n\n  <ol>\n    <li><strong>Phase 1:</strong> Extend the existing LBM infrastructure to support dual lattices. Test on a simple 2D domain with uniform conductivity.</li>\n    <li><strong>Phase 2:</strong> Implement pseudo-time convergence checks and convergence acceleration (e.g., line-by-line SOR, incomplete factorization).</li>\n    <li><strong>Phase 3:</strong> Add the hybrid solver as an alternative path: call external AMG libraries (AMGX on GPU, Hypre on CPU).</li>\n    <li><strong>Phase 4:</strong> Benchmark against classical FEM bidomain solvers on realistic geometries and compare accuracy and wall-clock time.</li>\n    <li><strong>Phase 5:</strong> Extend to anisotropic conductivity (different $D_f$ and $D_c$ for intracellular and extracellular spaces) using MRT on both lattices.</li>\n  </ol>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      <strong>Recommended starting point for Engine V5.4:</strong> Implement Architecture A (dual-lattice) first. The pseudocode:\n    </p>\n    <pre style=\"background:#f5f5f5; padding:10px; border-radius:4px; overflow-x:auto;\"><code>\nclass DualLatticeBidomainLBMSolver(ABC):\n    def __init__(self, D_i, D_e, dx, dt, ionic_model):\n        self.lattice_vm = LBMLattice(D_i, dx, dt)\n        self.lattice_phi_e = LBMLattice(D_i + D_e, dx, dt_pseudo)\n        self.ionic = ionic_model\n\n    def step(self, V_m, phi_e, I_stim, residual_tol=1e-6):\n        # Step 1: Ionic\n        I_ion, gates = self.ionic.step(V_m)\n\n        # Step 2: V_m LBM\n        source_vm = -(I_ion + I_stim) / (chi * Cm)\n        source_vm += gradient_phi_e  # coupling term\n        V_m = self.lattice_vm.step(source_vm)\n\n        # Step 3: phi_e convergence (pseudo-time loop)\n        source_phi_e = -gradient(D_i @ gradient(V_m)) + I_stim_e\n        phi_e = self.lattice_phi_e.converge(source_phi_e, tol=residual_tol)\n\n        return V_m, phi_e, gates\n    </code></pre>\n    <p>\n      Extend <code>LBMLattice</code> (already in the codebase for monodomain) to support pseudo-time iteration with convergence checks. Reuse the collision operator; only the time step size and convergence criterion change.\n    </p>\n  </div>\n\n  <p>\n    With the completion of Part IV (Chapters 17\u201319), we have the full mathematical and algorithmic foundation for bidomain electrophysiology. From the ionic model (Part I) through the monodomain and bidomain frameworks (Parts II and III), every piece is in place for a production cardiac simulator. The final part of this textbook turns to validation, performance optimization, and the art of choosing the right solver for your problem \u2014 the practical craft of turning equations into fast, accurate simulations.\n  </p>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  APPENDICES PART PAGE                                              -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "ch3": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 3</div>\n  <h2 class=\"chapter-title\">Anatomy of the Cardiac Action Potential</h2>\n  <div class=\"chapter-intro\">\n    The ventricular action potential is traditionally divided into five phases (0 through 4). Each phase\n    has a dominant current, a clear biophysical story, and direct consequences for the heart's electrical\n    and mechanical function. Understanding these phases is the Rosetta Stone for reading any cardiac\n    cell model. Chapter 5 provides the complete mathematical formulations for all 12 membrane currents\n    in the TTP06 model; here we build the qualitative intuition first.\n  </div>\n\n  <!-- \u2500\u2500\u2500 Cardiac AP with phases labeled \u2500\u2500\u2500 -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 520 280\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:470px;\">\n      <!-- Axes -->\n      <line x1=\"55\" y1=\"240\" x2=\"500\" y2=\"240\" stroke=\"#16213e\" stroke-width=\"1.2\"/>\n      <line x1=\"55\" y1=\"240\" x2=\"55\" y2=\"15\" stroke=\"#16213e\" stroke-width=\"1.2\"/>\n      <text x=\"280\" y=\"272\" font-size=\"11\" fill=\"#16213e\" font-family=\"serif\" text-anchor=\"middle\">Time (ms)</text>\n      <text x=\"14\" y=\"130\" font-size=\"11\" fill=\"#16213e\" font-family=\"serif\" text-anchor=\"middle\" transform=\"rotate(-90,14,130)\">V<tspan font-size=\"8\" dy=\"2\">m</tspan><tspan dy=\"-2\"> (mV)</tspan></text>\n\n      <!-- Voltage ticks -->\n      <text x=\"47\" y=\"244\" font-size=\"9\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"end\">-85</text>\n      <text x=\"47\" y=\"165\" font-size=\"9\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"end\">-20</text>\n      <text x=\"47\" y=\"105\" font-size=\"9\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"end\">+20</text>\n      <text x=\"47\" y=\"40\" font-size=\"9\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"end\">+40</text>\n      <!-- Time ticks -->\n      <text x=\"55\" y=\"255\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"middle\">0</text>\n      <text x=\"155\" y=\"255\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"middle\">50</text>\n      <text x=\"255\" y=\"255\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"middle\">150</text>\n      <text x=\"355\" y=\"255\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"middle\">250</text>\n      <text x=\"455\" y=\"255\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"middle\">350</text>\n\n      <!-- zero line -->\n      <line x1=\"55\" y1=\"140\" x2=\"500\" y2=\"140\" stroke=\"#d0d5e0\" stroke-width=\"0.5\" stroke-dasharray=\"3,3\"/>\n\n      <!-- AP trace (ventricular-like: fast upstroke, notch, plateau, repolarization) -->\n      <path d=\"M 55,235 L 72,235 Q 75,235 77,200 Q 80,90 82,35 Q 84,28 86,35 Q 89,55 93,75 Q 96,85 100,80\n               Q 120,72 170,75 Q 220,80 270,90 Q 310,110 340,145\n               Q 370,190 390,218 Q 410,232 430,235 L 500,235\"\n            fill=\"none\" stroke=\"#e94560\" stroke-width=\"2.5\"/>\n\n      <!-- Phase labels -->\n      <!-- Phase 0 -->\n      <rect x=\"71\" y=\"20\" width=\"20\" height=\"16\" rx=\"3\" fill=\"#e94560\" opacity=\"0.15\"/>\n      <text x=\"81\" y=\"32\" font-size=\"10\" fill=\"#e94560\" font-family=\"serif\" font-weight=\"700\" text-anchor=\"middle\">0</text>\n      <path d=\"M 81,38 L 81,120\" fill=\"none\" stroke=\"#e94560\" stroke-width=\"0.7\" stroke-dasharray=\"2,2\"/>\n\n      <!-- Phase 1 -->\n      <rect x=\"85\" y=\"54\" width=\"20\" height=\"16\" rx=\"3\" fill=\"#0f3460\" opacity=\"0.15\"/>\n      <text x=\"95\" y=\"66\" font-size=\"10\" fill=\"#0f3460\" font-family=\"serif\" font-weight=\"700\" text-anchor=\"middle\">1</text>\n\n      <!-- Phase 2 -->\n      <rect x=\"155\" y=\"54\" width=\"20\" height=\"16\" rx=\"3\" fill=\"#2d6a4f\" opacity=\"0.15\"/>\n      <text x=\"165\" y=\"66\" font-size=\"10\" fill=\"#2d6a4f\" font-family=\"serif\" font-weight=\"700\" text-anchor=\"middle\">2</text>\n\n      <!-- Phase 3 -->\n      <rect x=\"325\" y=\"120\" width=\"20\" height=\"16\" rx=\"3\" fill=\"#8a6d00\" opacity=\"0.15\"/>\n      <text x=\"335\" y=\"132\" font-size=\"10\" fill=\"#8a6d00\" font-family=\"serif\" font-weight=\"700\" text-anchor=\"middle\">3</text>\n\n      <!-- Phase 4 -->\n      <rect x=\"445\" y=\"222\" width=\"20\" height=\"16\" rx=\"3\" fill=\"#5a6175\" opacity=\"0.15\"/>\n      <text x=\"455\" y=\"234\" font-size=\"10\" fill=\"#5a6175\" font-family=\"serif\" font-weight=\"700\" text-anchor=\"middle\">4</text>\n\n      <!-- Current arrows/labels -->\n      <text x=\"72\" y=\"145\" font-size=\"8\" fill=\"#e94560\" font-family=\"serif\" font-style=\"italic\">I<tspan font-size=\"6\" dy=\"1\">Na</tspan></text>\n      <text x=\"92\" y=\"96\" font-size=\"8\" fill=\"#0f3460\" font-family=\"serif\" font-style=\"italic\">I<tspan font-size=\"6\" dy=\"1\">to</tspan></text>\n      <text x=\"170\" y=\"96\" font-size=\"8\" fill=\"#2d6a4f\" font-family=\"serif\" font-style=\"italic\">I<tspan font-size=\"6\" dy=\"1\">CaL</tspan></text>\n      <text x=\"310\" y=\"156\" font-size=\"8\" fill=\"#8a6d00\" font-family=\"serif\" font-style=\"italic\">I<tspan font-size=\"6\" dy=\"1\">Kr</tspan><tspan dy=\"-1\">,I</tspan><tspan font-size=\"6\" dy=\"1\">Ks</tspan></text>\n      <text x=\"440\" y=\"218\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" font-style=\"italic\">I<tspan font-size=\"6\" dy=\"1\">K1</tspan></text>\n    </svg>\n    <div class=\"figure-caption\">\n      <span class=\"figure-label\">Figure 3.1.</span> The five phases of the human ventricular action potential with dominant\n      currents. Phase 0: Na$^+$ upstroke. Phase 1: transient outward K$^+$ (notch). Phase 2: Ca$^{2+}$-K$^+$ plateau.\n      Phase 3: K$^+$-driven repolarization. Phase 4: resting potential maintained by $I_{\\text{K1}}$.\n    </div>\n  </div>\n\n  <h3>3.1 &ensp; Phase 0: The Sodium Upstroke</h3>\n\n  <p>\n    Phase 0 is the fastest event in cardiac electrophysiology. When an arriving wavefront brings $V_m$\n    above threshold ($\\approx -65$ mV), sodium channels undergo the same explosive positive feedback\n    we saw in the HH model: $m$-gates open rapidly, Na$^+$ floods inward, and $V_m$ rockets from\n    $-85$ mV to about $+40$ mV in roughly 1\u20132 ms.\n  </p>\n\n  <p>\n    The maximum rate of rise, $dV/dt_{\\text{max}}$, is a clinical measure of sodium channel\n    availability. In healthy ventricular tissue, $dV/dt_{\\text{max}} \\approx 200{-}300$ V/s. This\n    is also what determines <em>conduction velocity</em> \u2014 the faster the upstroke, the larger the\n    local current source that can depolarize neighboring cells, and the faster the wave propagates.\n    In the monodomain equation (Chapter 7), this translates directly to the source term.\n  </p>\n\n  <h3>3.2 &ensp; Phase 1: Early Repolarization ($I_{\\text{to}}$)</h3>\n\n  <p>\n    Immediately after the peak, a brief notch appears \u2014 a small dip in voltage before the plateau.\n    This is caused by the <em>transient outward</em> potassium current $I_{\\text{to}}$, which activates\n    rapidly during depolarization and inactivates within tens of milliseconds.\n  </p>\n\n  <p>\n    Phase 1 may look like a minor detail, but it has major consequences. The depth of the notch varies\n    across the ventricular wall: epicardial cells (outer surface) have large $I_{\\text{to}}$ and a\n    deep notch, while endocardial cells (inner surface) have little $I_{\\text{to}}$ and almost no notch.\n    This <em>transmural gradient</em> in AP morphology creates voltage differences across the wall\n    that are visible on the ECG \u2014 the J-wave and T-wave both depend on it.\n  </p>\n\n  <h3>3.3 &ensp; Phase 2: The Plateau \u2014 A Delicate Balance</h3>\n\n  <p>\n    The plateau is the heart's signature. For 150\u2013250 ms, the membrane voltage hovers between\n    $-10$ and $+20$ mV, sustained by the near-cancellation of two opposing current groups:\n  </p>\n\n  <p>\n    <strong>Inward (depolarizing):</strong> The L-type calcium current $I_{\\text{CaL}}$ is the\n    dominant plateau current. Ca$^{2+}$ ions enter through slowly inactivating channels, holding\n    the voltage up. A smaller late sodium current ($I_{\\text{NaL}}$) also contributes, especially\n    in disease states.\n  </p>\n\n  <p>\n    <strong>Outward (repolarizing):</strong> Two delayed-rectifier potassium currents slowly activate:\n    $I_{\\text{Kr}}$ (rapid component, carried by hERG channels) and $I_{\\text{Ks}}$ (slow component).\n    The inward-rectifier $I_{\\text{K1}}$ is largely blocked at plateau voltages due to its voltage\n    dependence \u2014 it will become important again in Phase 3\u20134.\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      The plateau balance explains why the cardiac AP duration (APD) is so sensitive to perturbations.\n      Block 30% of $I_{\\text{Kr}}$ (as many common drugs do), and the plateau suddenly lacks enough\n      repolarizing current. APD extends, the QT interval on the ECG lengthens, and the risk of\n      arrhythmia rises. This is why <em>in silico</em> drug testing with models like TTP06 and ORd has\n      become a regulatory focus (the CiPA initiative).\n    </p>\n  </div>\n\n  <h3>3.4 &ensp; Phase 3: Repolarization \u2014 The Potassium Takeover</h3>\n\n  <p>\n    As $I_{\\text{CaL}}$ gradually inactivates (driven both by voltage-dependent inactivation and by\n    rising intracellular Ca$^{2+}$ concentration), the balance tips irreversibly toward outward current.\n    The K$^+$ currents $I_{\\text{Kr}}$ and $I_{\\text{Ks}}$, which have been slowly building, now dominate.\n    As the voltage falls, $I_{\\text{K1}}$ \u2014 the strong inward rectifier that was blocked at plateau\n    voltages \u2014 begins to unblock and adds its large outward conductance to the repolarization.\n  </p>\n\n  <p>\n    Phase 3 repolarization is <em>regenerative</em>: as $V_m$ falls, more $I_{\\text{K1}}$ unblocks,\n    which pulls $V_m$ down further, which unblocks more $I_{\\text{K1}}$. This positive feedback\n    (now outward) ensures that repolarization, once started, proceeds rapidly to completion. The\n    membrane returns to its resting potential of about $-85$ mV.\n  </p>\n\n  <h3>3.5 &ensp; Phase 4: Rest and the Role of $I_{\\text{K1}}$</h3>\n\n  <p>\n    At rest, the membrane potential sits near $E_K \\approx -88$ mV because $I_{\\text{K1}}$ dominates\n    the conductance. The \"inward rectifier\" name refers to a peculiar property: $I_{\\text{K1}}$ passes\n    large outward current at voltages just below $E_K$, but essentially zero current at plateau\n    voltages. This voltage-dependent block (caused by intracellular magnesium and polyamines plugging\n    the channel pore) is what allows the plateau to exist \u2014 without it, K$^+$ would short-circuit the\n    plateau and the AP would collapse.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      Think of $I_{\\text{K1}}$ as a two-state switch. At rest, it is \"on\" \u2014 a strong anchor holding\n      $V_m$ near $E_K$. During the plateau, it switches \"off\" \u2014 stepping aside to let the delicate\n      Ca$^{2+}$/K$^+$ balance play out. Then in Phase 3, it switches back \"on\" to slam the door shut\n      and restore the resting potential. No other current has this dual role.\n    </p>\n  </div>\n\n  <p>\n    With the five phases clearly in mind, we now turn to the single most important ion in cardiac\n    physiology: calcium. The next chapter is devoted entirely to the intracellular calcium machinery \u2014\n    from the nanoscale architecture of the dyadic cleft to the pathological remodeling that drives\n    heart failure and arrhythmia.\n  </p>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 4 \u2014 INTRACELLULAR CALCIUM: THE MASTER REGULATOR           -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "ch4": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 4</div>\n  <h2 class=\"chapter-title\">Intracellular Calcium: The Master Regulator</h2>\n  <div class=\"chapter-intro\">\n    Calcium is the singular ion that links electrical excitation to mechanical contraction. But this\n    link is not simple: it involves nanoscale signaling domains, stochastic release events, multi-protein\n    regulatory complexes, and feedback loops that span timescales from microseconds to minutes. This\n    chapter provides a modern, in-depth account of cardiac calcium handling \u2014 from the architecture of\n    the dyadic cleft to the pathological remodeling seen in heart failure.\n  </div>\n\n  <h3>4.1 &ensp; The Dyadic Cleft \u2014 Where Electrical Meets Mechanical</h3>\n\n  <p>\n    Excitation-contraction (EC) coupling occurs at <em>dyads</em> \u2014 nanoscopic junctions formed where\n    transverse tubules (T-tubules) invaginate to within 10\u201320 nm of the junctional sarcoplasmic reticulum\n    (jSR). This tiny gap \u2014 the <em>dyadic cleft</em> \u2014 is the reaction chamber where the electrical signal\n    is transduced into a calcium signal. During an action potential, calcium concentration within the cleft\n    surges from a resting $\\sim$100 nM to $\\sim$10 $\\mu$M, a 100-fold increase confined to a space smaller\n    than a virus particle.\n  </p>\n\n  <p>\n    The cleft is held together by <strong>junctophilin-2 (JPH2)</strong>, a structural protein that\n    physically anchors the T-tubule membrane to the jSR membrane. JPH2 maintains the critical 10\u201320 nm\n    separation required for efficient local control coupling. As we will see in Section 4.7, the loss\n    of JPH2 in heart failure is one of the earliest and most consequential structural failures.\n  </p>\n\n  <h4>Calcium Release Units and Nanoscale Organization</h4>\n\n  <p>\n    The functional unit of calcium release is the <em>calcium release unit</em> (CRU), also called a\n    <em>couplon</em>. A CRU consists of a cluster of type-2 ryanodine receptors (RyR2) on the jSR\n    membrane, positioned directly beneath a group of L-type calcium channels (Ca$_\\text{V}$1.2) on the\n    T-tubule membrane. A typical human ventricular myocyte contains approximately 10,000\u201320,000 CRUs.\n  </p>\n\n  <p>\n    Recent super-resolution imaging \u2014 using dSTORM (direct stochastic optical reconstruction microscopy),\n    DNA-PAINT, and most recently MINFLUX microscopy \u2014 has revealed the nanoscale architecture of these\n    clusters in unprecedented detail. Key findings include:\n  </p>\n\n  <p>\n    <strong>RyR2 cluster heterogeneity:</strong> A typical CRU contains 4\u201320 RyR2 tetramers (16\u201380\n    individual subunits), but cluster sizes vary widely. RyR2 channels function cohesively as a CRU\n    only when their nearest-neighbor distance (NND) is less than $\\sim$100\u2013150 nm. Beyond this threshold,\n    coupling between channels is lost and the release event becomes unreliable.\n  </p>\n\n  <p>\n    <strong>Sparse channel activation:</strong> Despite clusters containing dozens of channels, only\n    2\u20134 RyR2 channels typically open simultaneously during a single elementary release event under\n    basal conditions. Beta-adrenergic stimulation increases this to 5\u20138 channels, providing a mechanism\n    for graded calcium release amplification.\n  </p>\n\n  <p>\n    <strong>L-type channel organization:</strong> Super-resolution studies using STED and DNA-PAINT\n    (2024) revealed that Ca$_\\text{V}$1.2 and Ca$_\\text{V}$1.3 channels form loose clusters of\n    $\\sim$9 molecules within $\\sim$120 nm domains, arranged in an irregular pattern with significant\n    intermolecular spacing \u2014 not densely packed. This loose arrangement reflects the functional need\n    for positioning (close to RyR2) rather than crowding.\n  </p>\n\n  <!-- \u2500\u2500\u2500 Dyadic Cleft Architecture Diagram \u2500\u2500\u2500 -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 500 310\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:450px;\">\n      <!-- T-tubule membrane -->\n      <rect x=\"40\" y=\"20\" width=\"420\" height=\"12\" rx=\"2\" fill=\"#e3f2fd\" stroke=\"#1565c0\" stroke-width=\"1.2\"/>\n      <text x=\"250\" y=\"16\" font-size=\"10\" fill=\"#1565c0\" font-family=\"serif\" text-anchor=\"middle\" font-weight=\"600\">T-tubule membrane</text>\n\n      <!-- L-type channels -->\n      <rect x=\"100\" y=\"26\" width=\"18\" height=\"30\" rx=\"3\" fill=\"#e94560\" stroke=\"#c62828\" stroke-width=\"1\"/>\n      <rect x=\"160\" y=\"26\" width=\"18\" height=\"30\" rx=\"3\" fill=\"#e94560\" stroke=\"#c62828\" stroke-width=\"1\"/>\n      <rect x=\"230\" y=\"26\" width=\"18\" height=\"30\" rx=\"3\" fill=\"#e94560\" stroke=\"#c62828\" stroke-width=\"1\"/>\n      <rect x=\"310\" y=\"26\" width=\"18\" height=\"30\" rx=\"3\" fill=\"#e94560\" stroke=\"#c62828\" stroke-width=\"1\"/>\n      <rect x=\"370\" y=\"26\" width=\"18\" height=\"30\" rx=\"3\" fill=\"#e94560\" stroke=\"#c62828\" stroke-width=\"1\"/>\n      <text x=\"470\" y=\"44\" font-size=\"8\" fill=\"#c62828\" font-family=\"serif\">Ca<tspan font-size=\"6\" dy=\"-3\">2+</tspan><tspan dy=\"3\"> channels</tspan></text>\n\n      <!-- Dyadic cleft space -->\n      <rect x=\"70\" y=\"56\" width=\"360\" height=\"35\" rx=\"0\" fill=\"#fff8e1\" opacity=\"0.6\"/>\n      <text x=\"250\" y=\"78\" font-size=\"9\" fill=\"#8a6d00\" font-family=\"serif\" text-anchor=\"middle\" font-style=\"italic\">Dyadic cleft (~15 nm) \u2014 [Ca\u00b2\u207a] peaks at ~10 \u00b5M</text>\n\n      <!-- Ca2+ arrows from L-type into cleft -->\n      <line x1=\"109\" y1=\"56\" x2=\"109\" y2=\"70\" stroke=\"#e94560\" stroke-width=\"1.2\" marker-end=\"url(#arrowRed4)\"/>\n      <line x1=\"169\" y1=\"56\" x2=\"169\" y2=\"70\" stroke=\"#e94560\" stroke-width=\"1.2\" marker-end=\"url(#arrowRed4)\"/>\n      <line x1=\"239\" y1=\"56\" x2=\"239\" y2=\"70\" stroke=\"#e94560\" stroke-width=\"1.2\" marker-end=\"url(#arrowRed4)\"/>\n\n      <!-- jSR membrane -->\n      <rect x=\"40\" y=\"91\" width=\"420\" height=\"12\" rx=\"2\" fill=\"#e8f5e9\" stroke=\"#2e7d32\" stroke-width=\"1.2\"/>\n      <text x=\"250\" y=\"88\" font-size=\"10\" fill=\"#2e7d32\" font-family=\"serif\" text-anchor=\"middle\" font-weight=\"600\">jSR membrane</text>\n\n      <!-- RyR2 cluster -->\n      <rect x=\"85\" y=\"91\" width=\"22\" height=\"24\" rx=\"3\" fill=\"#2d6a4f\" stroke=\"#1b5e20\" stroke-width=\"1\"/>\n      <rect x=\"115\" y=\"91\" width=\"22\" height=\"24\" rx=\"3\" fill=\"#2d6a4f\" stroke=\"#1b5e20\" stroke-width=\"1\"/>\n      <rect x=\"145\" y=\"91\" width=\"22\" height=\"24\" rx=\"3\" fill=\"#2d6a4f\" stroke=\"#1b5e20\" stroke-width=\"1\"/>\n      <rect x=\"175\" y=\"91\" width=\"22\" height=\"24\" rx=\"3\" fill=\"#2d6a4f\" stroke=\"#1b5e20\" stroke-width=\"1\"/>\n      <rect x=\"215\" y=\"91\" width=\"22\" height=\"24\" rx=\"3\" fill=\"#2d6a4f\" stroke=\"#1b5e20\" stroke-width=\"1\"/>\n      <rect x=\"245\" y=\"91\" width=\"22\" height=\"24\" rx=\"3\" fill=\"#2d6a4f\" stroke=\"#1b5e20\" stroke-width=\"1\"/>\n      <rect x=\"285\" y=\"91\" width=\"22\" height=\"24\" rx=\"3\" fill=\"#2d6a4f\" stroke=\"#1b5e20\" stroke-width=\"1\"/>\n      <rect x=\"315\" y=\"91\" width=\"22\" height=\"24\" rx=\"3\" fill=\"#2d6a4f\" stroke=\"#1b5e20\" stroke-width=\"1\"/>\n      <rect x=\"355\" y=\"91\" width=\"22\" height=\"24\" rx=\"3\" fill=\"#2d6a4f\" stroke=\"#1b5e20\" stroke-width=\"1\"/>\n      <text x=\"470\" y=\"108\" font-size=\"8\" fill=\"#1b5e20\" font-family=\"serif\">RyR2 cluster</text>\n\n      <!-- CICR arrows from RyR2 downward -->\n      <line x1=\"126\" y1=\"115\" x2=\"126\" y2=\"140\" stroke=\"#2d6a4f\" stroke-width=\"1.5\" marker-end=\"url(#arrowGreen4)\"/>\n      <line x1=\"186\" y1=\"115\" x2=\"186\" y2=\"140\" stroke=\"#2d6a4f\" stroke-width=\"1.5\" marker-end=\"url(#arrowGreen4)\"/>\n      <line x1=\"256\" y1=\"115\" x2=\"256\" y2=\"140\" stroke=\"#2d6a4f\" stroke-width=\"1.5\" marker-end=\"url(#arrowGreen4)\"/>\n      <line x1=\"326\" y1=\"115\" x2=\"326\" y2=\"140\" stroke=\"#2d6a4f\" stroke-width=\"1.5\" marker-end=\"url(#arrowGreen4)\"/>\n      <text x=\"395\" y=\"132\" font-size=\"8\" fill=\"#2d6a4f\" font-family=\"serif\" font-weight=\"600\">CICR</text>\n\n      <!-- SR lumen -->\n      <rect x=\"60\" y=\"103\" width=\"380\" height=\"50\" rx=\"6\" fill=\"#e8f5e9\" opacity=\"0.3\" stroke=\"#2e7d32\" stroke-width=\"0.5\" stroke-dasharray=\"3,2\"/>\n\n      <!-- CASQ2 polymers inside SR -->\n      <circle cx=\"120\" cy=\"135\" r=\"5\" fill=\"#66bb6a\" opacity=\"0.7\"/>\n      <circle cx=\"135\" cy=\"130\" r=\"5\" fill=\"#66bb6a\" opacity=\"0.7\"/>\n      <circle cx=\"150\" cy=\"138\" r=\"4\" fill=\"#66bb6a\" opacity=\"0.7\"/>\n      <circle cx=\"220\" cy=\"132\" r=\"5\" fill=\"#66bb6a\" opacity=\"0.7\"/>\n      <circle cx=\"235\" cy=\"140\" r=\"4\" fill=\"#66bb6a\" opacity=\"0.7\"/>\n      <circle cx=\"300\" cy=\"135\" r=\"5\" fill=\"#66bb6a\" opacity=\"0.7\"/>\n      <circle cx=\"315\" cy=\"130\" r=\"4\" fill=\"#66bb6a\" opacity=\"0.7\"/>\n      <circle cx=\"370\" cy=\"136\" r=\"5\" fill=\"#66bb6a\" opacity=\"0.7\"/>\n      <text x=\"408\" y=\"148\" font-size=\"7\" fill=\"#2e7d32\" font-family=\"serif\">CASQ2</text>\n\n      <!-- Cytoplasm label -->\n      <text x=\"250\" y=\"175\" font-size=\"10\" fill=\"#0f3460\" font-family=\"serif\" text-anchor=\"middle\" font-weight=\"600\">Cytoplasm</text>\n\n      <!-- JPH2 bridges -->\n      <line x1=\"75\" y1=\"32\" x2=\"75\" y2=\"91\" stroke=\"#5a6175\" stroke-width=\"1.5\" stroke-dasharray=\"2,2\"/>\n      <line x1=\"400\" y1=\"32\" x2=\"400\" y2=\"91\" stroke=\"#5a6175\" stroke-width=\"1.5\" stroke-dasharray=\"2,2\"/>\n      <text x=\"56\" y=\"65\" font-size=\"7\" fill=\"#5a6175\" font-family=\"serif\" transform=\"rotate(-90,56,65)\">JPH2</text>\n      <text x=\"418\" y=\"65\" font-size=\"7\" fill=\"#5a6175\" font-family=\"serif\" transform=\"rotate(-90,418,65)\">JPH2</text>\n\n      <!-- Triadin/Junctin labels -->\n      <text x=\"96\" y=\"101\" font-size=\"6\" fill=\"white\" font-family=\"serif\">T</text>\n      <text x=\"146\" y=\"101\" font-size=\"6\" fill=\"white\" font-family=\"serif\">J</text>\n      <text x=\"216\" y=\"101\" font-size=\"6\" fill=\"white\" font-family=\"serif\">T</text>\n      <text x=\"286\" y=\"101\" font-size=\"6\" fill=\"white\" font-family=\"serif\">J</text>\n\n      <!-- SERCA pumps and NCX lower -->\n      <rect x=\"80\" y=\"195\" width=\"80\" height=\"30\" rx=\"5\" fill=\"#fff3e0\" stroke=\"#b36b00\" stroke-width=\"1.2\"/>\n      <text x=\"120\" y=\"214\" font-size=\"9\" fill=\"#b36b00\" font-family=\"serif\" text-anchor=\"middle\" font-weight=\"600\">SERCA2a</text>\n\n      <rect x=\"210\" y=\"195\" width=\"80\" height=\"30\" rx=\"5\" fill=\"#f3e5f5\" stroke=\"#6a1b9a\" stroke-width=\"1.2\"/>\n      <text x=\"250\" y=\"214\" font-size=\"9\" fill=\"#6a1b9a\" font-family=\"serif\" text-anchor=\"middle\" font-weight=\"600\">NCX</text>\n\n      <rect x=\"340\" y=\"195\" width=\"80\" height=\"30\" rx=\"5\" fill=\"#fce4ec\" stroke=\"#c62828\" stroke-width=\"1.2\"/>\n      <text x=\"380\" y=\"209\" font-size=\"8\" fill=\"#c62828\" font-family=\"serif\" text-anchor=\"middle\" font-weight=\"600\">Na/K</text>\n      <text x=\"380\" y=\"219\" font-size=\"8\" fill=\"#c62828\" font-family=\"serif\" text-anchor=\"middle\" font-weight=\"600\">ATPase</text>\n\n      <!-- Arrows: SERCA uptake -->\n      <path d=\"M 120,195 L 120,170 Q 120,155 140,155 L 200,155 Q 220,155 220,140\" fill=\"none\" stroke=\"#b36b00\" stroke-width=\"1.2\" marker-end=\"url(#arrowOrange4)\"/>\n      <text x=\"170\" y=\"150\" font-size=\"7\" fill=\"#b36b00\" font-family=\"serif\" text-anchor=\"middle\">J<tspan font-size=\"5\" dy=\"1\">up</tspan></text>\n\n      <!-- NCX: Ca out, Na in -->\n      <path d=\"M 250,195 L 250,180\" fill=\"none\" stroke=\"#6a1b9a\" stroke-width=\"1.2\" marker-end=\"url(#arrowPurple4)\"/>\n      <text x=\"265\" y=\"186\" font-size=\"7\" fill=\"#6a1b9a\" font-family=\"serif\">3Na\u207a\u2194Ca\u00b2\u207a</text>\n\n      <!-- Buffers -->\n      <text x=\"80\" y=\"265\" font-size=\"9\" fill=\"#5a6175\" font-family=\"serif\" font-weight=\"600\">Cytoplasmic buffers:</text>\n      <text x=\"80\" y=\"278\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\">Troponin C (~35%) \u00b7 Calmodulin (~12%) \u00b7 SR membranes (~15%) \u00b7 Other (~37%)</text>\n      <text x=\"80\" y=\"293\" font-size=\"8\" fill=\"#e94560\" font-family=\"serif\" font-style=\"italic\">Only ~1\u20132% of total Ca\u00b2\u207a is free \u2014 the rest is bound to buffers</text>\n\n      <!-- Arrow defs -->\n      <defs>\n        <marker id=\"arrowRed4\" markerWidth=\"7\" markerHeight=\"5\" refX=\"7\" refY=\"2.5\" orient=\"auto\">\n          <path d=\"M 0,0 L 7,2.5 L 0,5 Z\" fill=\"#e94560\"/>\n        </marker>\n        <marker id=\"arrowGreen4\" markerWidth=\"7\" markerHeight=\"5\" refX=\"7\" refY=\"2.5\" orient=\"auto\">\n          <path d=\"M 0,0 L 7,2.5 L 0,5 Z\" fill=\"#2d6a4f\"/>\n        </marker>\n        <marker id=\"arrowOrange4\" markerWidth=\"7\" markerHeight=\"5\" refX=\"7\" refY=\"2.5\" orient=\"auto\">\n          <path d=\"M 0,0 L 7,2.5 L 0,5 Z\" fill=\"#b36b00\"/>\n        </marker>\n        <marker id=\"arrowPurple4\" markerWidth=\"7\" markerHeight=\"5\" refX=\"7\" refY=\"2.5\" orient=\"auto\">\n          <path d=\"M 0,0 L 7,2.5 L 0,5 Z\" fill=\"#6a1b9a\"/>\n        </marker>\n      </defs>\n    </svg>\n    <div class=\"figure-caption\">\n      <span class=\"figure-label\">Figure 4.1.</span> Architecture of the dyadic cleft. L-type Ca$^{2+}$ channels\n      on the T-tubule membrane face RyR2 clusters on the jSR, separated by $\\sim$15 nm. Junctophilin-2 (JPH2)\n      anchors the two membranes. Triadin (T) and junctin (J) link RyR2 to luminal CASQ2 polymers. SERCA2a\n      pumps Ca$^{2+}$ back into the SR; NCX extrudes Ca$^{2+}$ across the sarcolemma. Only 1\u20132% of\n      cytoplasmic Ca$^{2+}$ is free.\n    </div>\n  </div>\n\n  <h3>4.2 &ensp; Calcium-Induced Calcium Release \u2014 Local Control Theory</h3>\n\n  <h4>Calcium Sparks: The Elementary Release Event</h4>\n\n  <p>\n    A <em>calcium spark</em> is the optical signature of the concerted opening of a small group (typically\n    2\u201310) of RyR2 channels within a single CRU. Discovered by Cheng, Lederer, and Bhatt in 1993 using\n    confocal line-scanning and the fluorescent indicator fluo-3, sparks are now understood as the\n    fundamental building blocks of the whole-cell calcium transient.\n  </p>\n\n  <p>\n    Each spark has well-defined characteristics: a peak amplitude of 0.5\u20132 $\\mu$M above baseline, a\n    spatial half-width of 1\u20133 $\\mu$M, a rise time of 2\u20135 ms, and a full-width-at-half-maximum (FWHM)\n    duration of 15\u201350 ms. During a normal heartbeat, the action potential triggers $\\sim$10,000 sparks\n    nearly simultaneously across the myocyte; their spatial and temporal summation produces the global\n    calcium transient that drives contraction.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      Think of CRUs as thousands of tiny fireworks launchers spread throughout the cell. When the\n      action potential arrives, it does not light them all at once with a single fuse. Instead, each\n      launcher has its own independent trigger \u2014 an L-type channel \u2014 that fires with a certain probability\n      ($\\sim$30\u201340% per beat). The global calcium transient is the <em>sum</em> of thousands of probabilistic,\n      independent sparks. This is why calcium release is <em>graded</em>: more L-type current recruits\n      more sparks, producing a larger transient \u2014 without the all-or-nothing behavior you might expect\n      from positive feedback.\n    </p>\n  </div>\n\n  <!-- \u2500\u2500\u2500 Spark-to-wave transition diagram \u2500\u2500\u2500 -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 560 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:500px;\">\n      <!-- Normal: isolated sparks -->\n      <text x=\"130\" y=\"16\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"12\" fill=\"#2d6a4f\" font-weight=\"700\">Normal: Isolated Sparks</text>\n      <!-- CRU dots with sparks -->\n      <circle cx=\"30\" cy=\"80\" r=\"6\" fill=\"#ccc\" stroke=\"#999\" stroke-width=\"1\"/>\n      <circle cx=\"70\" cy=\"80\" r=\"6\" fill=\"#2d6a4f\" stroke=\"#2d6a4f\" stroke-width=\"1.5\"/>\n      <circle cx=\"70\" cy=\"50\" r=\"12\" fill=\"#2d6a4f\" opacity=\"0.15\"/>\n      <circle cx=\"110\" cy=\"80\" r=\"6\" fill=\"#ccc\" stroke=\"#999\" stroke-width=\"1\"/>\n      <circle cx=\"150\" cy=\"80\" r=\"6\" fill=\"#2d6a4f\" stroke=\"#2d6a4f\" stroke-width=\"1.5\"/>\n      <circle cx=\"150\" cy=\"50\" r=\"12\" fill=\"#2d6a4f\" opacity=\"0.15\"/>\n      <circle cx=\"190\" cy=\"80\" r=\"6\" fill=\"#ccc\" stroke=\"#999\" stroke-width=\"1\"/>\n      <circle cx=\"230\" cy=\"80\" r=\"6\" fill=\"#ccc\" stroke=\"#999\" stroke-width=\"1\"/>\n      <!-- Labels -->\n      <text x=\"130\" y=\"110\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#5a6175\">sparks confined to single CRUs</text>\n      <text x=\"130\" y=\"124\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#2d6a4f\">\u2192 graded release, no propagation</text>\n\n      <!-- Arrow between panels -->\n      <text x=\"280\" y=\"70\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"22\" fill=\"#e94560\">\u2192</text>\n      <text x=\"280\" y=\"90\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#e94560\">SR overload</text>\n      <text x=\"280\" y=\"100\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#e94560\">or leaky RyR2</text>\n\n      <!-- Pathological: calcium wave -->\n      <text x=\"430\" y=\"16\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"12\" fill=\"#e94560\" font-weight=\"700\">Pathological: Calcium Wave</text>\n      <circle cx=\"330\" cy=\"80\" r=\"6\" fill=\"#e94560\" stroke=\"#e94560\" stroke-width=\"1.5\"/>\n      <circle cx=\"330\" cy=\"50\" r=\"16\" fill=\"#e94560\" opacity=\"0.12\"/>\n      <circle cx=\"370\" cy=\"80\" r=\"6\" fill=\"#e94560\" stroke=\"#e94560\" stroke-width=\"1.5\"/>\n      <circle cx=\"370\" cy=\"50\" r=\"16\" fill=\"#e94560\" opacity=\"0.12\"/>\n      <circle cx=\"410\" cy=\"80\" r=\"6\" fill=\"#e94560\" stroke=\"#e94560\" stroke-width=\"1.5\"/>\n      <circle cx=\"410\" cy=\"50\" r=\"16\" fill=\"#e94560\" opacity=\"0.12\"/>\n      <circle cx=\"450\" cy=\"80\" r=\"6\" fill=\"#e94560\" stroke=\"#e94560\" stroke-width=\"1.5\" opacity=\"0.7\"/>\n      <circle cx=\"450\" cy=\"55\" r=\"12\" fill=\"#e94560\" opacity=\"0.08\"/>\n      <circle cx=\"490\" cy=\"80\" r=\"6\" fill=\"#ccc\" stroke=\"#999\" stroke-width=\"1\"/>\n      <circle cx=\"530\" cy=\"80\" r=\"6\" fill=\"#ccc\" stroke=\"#999\" stroke-width=\"1\"/>\n      <!-- Wave arrow -->\n      <path d=\"M 330,68 Q 400,35 490,68\" fill=\"none\" stroke=\"#e94560\" stroke-width=\"1.8\" marker-end=\"url(#arrCaWave)\"/>\n      <text x=\"410\" y=\"38\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#e94560\" font-weight=\"600\">propagating wave</text>\n      <text x=\"430\" y=\"110\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#5a6175\">sparks recruit neighbors</text>\n      <text x=\"430\" y=\"124\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#e94560\">\u2192 DADs \u2192 arrhythmia</text>\n\n      <!-- NCX inward current annotation -->\n      <rect x=\"330\" y=\"140\" width=\"200\" height=\"40\" rx=\"5\" fill=\"#e94560\" opacity=\"0.08\" stroke=\"#e94560\" stroke-width=\"0.8\"/>\n      <text x=\"430\" y=\"156\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"9\" fill=\"#e94560\">Elevated [Ca\u00b2\u207a]<tspan font-size=\"7\" dy=\"1\">i</tspan><tspan dy=\"-1\"> activates NCX</tspan></text>\n      <text x=\"430\" y=\"170\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"9\" fill=\"#e94560\">\u2192 inward I<tspan font-size=\"7\" dy=\"1\">NCX</tspan><tspan dy=\"-1\"> \u2192 membrane depolarization</tspan></text>\n\n      <defs>\n        <marker id=\"arrCaWave\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\">\n          <path d=\"M 0,0 L 8,3 L 0,6 Z\" fill=\"#e94560\"/>\n        </marker>\n      </defs>\n    </svg>\n    <div class=\"figure-caption\"><span class=\"figure-label\">Figure 4.2.</span> The spark-to-wave transition. <em>Left:</em> Under normal conditions, individual sparks (green) are spatially isolated \u2014 positive feedback is confined within each CRU. <em>Right:</em> With SR overload or leaky RyR2, sparks recruit neighboring CRUs, generating a propagating calcium wave that activates NCX and triggers DADs.</div>\n  </div>\n\n  <h4>Local Control vs. Common Pool</h4>\n\n  <p>\n    The <em>local control</em> theory, established in the 1990s and continuously refined through 2025,\n    resolves a paradox that troubled the field for decades: how can CICR be both <em>high-gain</em>\n    (a tiny calcium trigger from L-type channels produces a large SR release) and <em>graded</em>\n    (release is proportional to trigger size, not all-or-nothing)?\n  </p>\n\n  <p>\n    The answer is spatial isolation. Each RyR2 cluster senses <em>local</em> calcium concentration\n    within its dyadic cleft ($\\sim$10 $\\mu$M during activation), not the global cytosolic concentration\n    ($\\sim$1 $\\mu$M). Positive feedback \u2014 calcium from one RyR2 opening its neighbors \u2014 is confined\n    within the CRU because the cleft's tiny volume ($\\sim$10$^{-18}$ L) means even picoampere currents\n    produce micromolar concentrations locally, while rapid diffusion dilutes the signal before it reaches\n    neighboring CRUs $\\sim$2 $\\mu$m away.\n  </p>\n\n  <p>\n    This contrasts with the older <em>common pool</em> model, which assumed a single well-mixed cytoplasmic\n    calcium compartment. Common pool models predict all-or-nothing release \u2014 once any RyR2 opens, the\n    resulting calcium elevation should trigger all other RyR2s. Experimentally, this is not what happens:\n    sparks occur at discrete locations without propagating, and the total release scales smoothly with\n    L-type current magnitude. Local control explains both observations.\n  </p>\n\n  <h4>SR Load: The Central Regulator of Release</h4>\n\n  <p>\n    The SR calcium content ($[\\text{Ca}^{2+}]_{\\text{SR}}$, typically 1\u20132 mM total, of which only\n    $\\sim$20\u201350 $\\mu$M is free \u2014 the rest bound to calsequestrin) is the single most powerful determinant\n    of release properties. Spark frequency increases <em>exponentially</em> with SR load: doubling the\n    load can increase spontaneous release 5\u201310-fold. Spark amplitude increases more modestly, while the\n    probability that a given L-type channel opening will trigger a spark (the <em>coupling fidelity</em>)\n    rises steeply with load.\n  </p>\n\n  <p>\n    This load-dependence creates an inherent negative feedback: release depletes the store, which reduces\n    the probability of further release. In healthy cells, this feedback stabilizes the system. In disease,\n    when SR load is chronically elevated or RyR2 sensitivity is pathologically increased, the feedback\n    can be overwhelmed \u2014 sparks merge into waves, and arrhythmias follow.\n  </p>\n\n  <h4>The Spark-to-Wave Transition</h4>\n\n  <p>\n    Under pathological conditions \u2014 elevated SR load, increased diastolic calcium, enhanced RyR2\n    sensitivity \u2014 isolated sparks can recruit their neighbors, generating <em>calcium waves</em> that\n    propagate through the myocyte at $\\sim$100 $\\mu$m/s. The wave front advances by saltatory\n    conduction: a spark at one CRU raises local calcium enough to trigger sparks at neighboring CRUs\n    $\\sim$2 $\\mu$m away. The critical radius for wave propagation is $\\sim$2.7 $\\mu$m \u2014 below this,\n    the calcium elevation dissipates before reaching the next CRU.\n  </p>\n\n  <p>\n    Calcium waves are the primary trigger for <em>delayed afterdepolarizations</em> (DADs). As the wave\n    sweeps through the cell, the elevated cytoplasmic calcium activates the sodium-calcium exchanger\n    (NCX) in forward mode, generating a net inward current that depolarizes the membrane. If this\n    depolarization reaches threshold during diastole, a triggered action potential fires \u2014 the\n    cellular mechanism behind many clinical arrhythmias.\n  </p>\n\n  <h3>4.3 &ensp; The Ryanodine Receptor \u2014 Gatekeeper of the SR</h3>\n\n  <p>\n    RyR2 is the largest known ion channel ($\\sim$2.2 MDa as a homotetramer) and the primary gate\n    controlling calcium release from the SR. Its regulation involves a remarkable convergence of\n    signals: cytoplasmic calcium (activation), luminal calcium (load sensing), phosphorylation by\n    multiple kinases, oxidative modifications, and protein\u2013protein interactions.\n  </p>\n\n  <h4>Phosphorylation by PKA and CaMKII</h4>\n\n  <p>\n    Two kinases dominate RyR2 regulation, each targeting a distinct serine residue with different\n    physiological and pathological consequences:\n  </p>\n\n  <p>\n    <strong>PKA at Serine 2808:</strong> During beta-adrenergic stimulation (exercise, stress), PKA\n    phosphorylates RyR2 at S2808, increasing the channel's sensitivity to calcium activation. The\n    channel opens more frequently and requires less trigger calcium. This is the acute \"fight-or-flight\"\n    enhancement of calcium release. Phosphatase 1 (PP1) rapidly reverses the phosphorylation when\n    adrenergic tone subsides.\n  </p>\n\n  <p>\n    <strong>CaMKII at Serine 2814:</strong> CaMKII, activated by calcium/calmodulin, phosphorylates\n    RyR2 at S2814 with more potent effects on spark frequency than PKA. Critically, CaMKII also\n    increases the channel's sensitivity to <em>luminal</em> calcium, amplifying the load-dependent\n    release mechanism. This creates a positive feedback loop: more calcium \u2192 more CaMKII activation \u2192\n    more RyR2 phosphorylation \u2192 more calcium release.\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      Recent work (2023\u20132025) has established that CaMKII phosphorylation at S2814 \u2014 not PKA\n      phosphorylation at S2808 \u2014 is the primary driver of pro-arrhythmic calcium leak in chronic\n      heart failure. A 2025 study in <em>Nature Cardiovascular Research</em> found an unexpected\n      twist: preventing RyR2 phosphorylation reduced calcium leak but paradoxically reactivated the\n      sodium current $I_{\\text{Na}}$, suggesting a previously unknown crosstalk between RyR2 status\n      and sarcolemmal channel regul
