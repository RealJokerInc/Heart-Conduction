ased human\n    ventricular myocyte recordings. With 41 state variables, 15 membrane currents, and a CaMKII\n    signaling pathway that confers rate adaptation, it represents the current gold standard for human\n    ventricular electrophysiology simulation. This chapter provides the same comprehensive treatment\n    given to TTP06 in Chapter 5 \u2014 every current, every equation, organized by physiological function.\n  </div>\n\n  <h3>6.1 &ensp; 41 State Variables: What and Why</h3>\n\n  <p>\n    ORd has more than twice the state variables of TTP06 (41 vs. 18). The additional complexity\n    arises from three sources: (1) separate fast and slow inactivation gates for most currents,\n    (2) CaMKII-phosphorylated variants of several gates, and (3) two additional ionic compartments\n    (subspace sodium and potassium). Every state variable has a clear biophysical justification.\n  </p>\n\n  <p>\n    <strong>29 gating variables</strong> (each between 0 and 1, following Hodgkin\u2013Huxley-style kinetics):\n  </p>\n\n  <table>\n    <tr><th>Gate(s)</th><th>Current</th><th>Role</th><th>CaMKII variant?</th></tr>\n    <tr><td>$m$</td><td>$I_{\\text{Na}}$</td><td>Fast Na$^+$ activation</td><td>No</td></tr>\n    <tr><td>$h_f$, $h_s$</td><td>$I_{\\text{Na}}$</td><td>Fast and slow inactivation</td><td>$h_{sp}$ (slow, phosphorylated)</td></tr>\n    <tr><td>$j$</td><td>$I_{\\text{Na}}$</td><td>Recovery from inactivation</td><td>$j_p$</td></tr>\n    <tr><td>$m_L$</td><td>$I_{\\text{NaL}}$</td><td>Late Na$^+$ activation</td><td>No</td></tr>\n    <tr><td>$h_L$</td><td>$I_{\\text{NaL}}$</td><td>Late Na$^+$ inactivation</td><td>$h_{Lp}$</td></tr>\n    <tr><td>$d$</td><td>$I_{\\text{CaL}}$</td><td>Ca$^{2+}$ activation</td><td>No</td></tr>\n    <tr><td>$f_f$, $f_s$</td><td>$I_{\\text{CaL}}$</td><td>Fast and slow voltage inactivation</td><td>$f_{fp}$</td></tr>\n    <tr><td>$f_{\\text{Ca},f}$, $f_{\\text{Ca},s}$</td><td>$I_{\\text{CaL}}$</td><td>Fast and slow Ca$^{2+}$-dependent inactivation</td><td>$f_{\\text{Ca},fp}$</td></tr>\n    <tr><td>$j_{\\text{Ca}}$</td><td>$I_{\\text{CaL}}$</td><td>Ca$^{2+}$-dependent recovery</td><td>No</td></tr>\n    <tr><td>$n_{\\text{Ca}}$</td><td>$I_{\\text{CaL}}$</td><td>CaMKII phosphorylation transition</td><td>\u2014</td></tr>\n    <tr><td>$a$</td><td>$I_{\\text{to}}$</td><td>Transient outward activation</td><td>$a_p$</td></tr>\n    <tr><td>$i_F$, $i_S$</td><td>$I_{\\text{to}}$</td><td>Fast and slow inactivation</td><td>$i_{Fp}$, $i_{Sp}$</td></tr>\n    <tr><td>$x_{r,f}$, $x_{r,s}$</td><td>$I_{\\text{Kr}}$</td><td>Fast and slow activation</td><td>No</td></tr>\n    <tr><td>$x_{s1}$, $x_{s2}$</td><td>$I_{\\text{Ks}}$</td><td>Slow delayed rectifier gates</td><td>No</td></tr>\n    <tr><td>$x_{K1}$</td><td>$I_{\\text{K1}}$</td><td>Inward rectifier (now dynamic!)</td><td>No</td></tr>\n  </table>\n\n  <p>\n    A key design principle of ORd is the <em>CaMKII-phosphorylated population</em> concept. For currents\n    modulated by CaMKII ($I_{\\text{Na}}$, $I_{\\text{NaL}}$, $I_{\\text{CaL}}$, $I_{\\text{to}}$), the model\n    maintains separate gating variables for the phosphorylated channel population. The total current is\n    then a weighted average: $(1 - \\Phi)\\cdot I_{\\text{normal}} + \\Phi\\cdot I_{\\text{phosphorylated}}$,\n    where $\\Phi$ is the CaMKII-dependent phosphorylation fraction. This doubles the gate count for\n    affected currents but allows rate-dependent modulation of channel kinetics.\n  </p>\n\n  <p>\n    <strong>8 concentration variables</strong> (dynamic, changing each beat):\n  </p>\n\n  <table>\n    <tr><th>Variable</th><th>Description</th><th>Typical Value</th><th>New vs. TTP06?</th></tr>\n    <tr><td>$[\\text{Na}^+]_i$</td><td>Intracellular sodium (bulk)</td><td>$\\sim$7 mM</td><td>Same concept</td></tr>\n    <tr><td>$[\\text{Na}^+]_{\\text{ss}}$</td><td>Subspace sodium</td><td>$\\sim$7 mM</td><td><strong>New</strong></td></tr>\n    <tr><td>$[\\text{K}^+]_i$</td><td>Intracellular potassium (bulk)</td><td>$\\sim$145 mM</td><td>Same concept</td></tr>\n    <tr><td>$[\\text{K}^+]_{\\text{ss}}$</td><td>Subspace potassium</td><td>$\\sim$145 mM</td><td><strong>New</strong></td></tr>\n    <tr><td>$[\\text{Ca}^{2+}]_i$</td><td>Cytoplasmic calcium (free)</td><td>$\\sim$0.0001 mM</td><td>Same concept</td></tr>\n    <tr><td>$[\\text{Ca}^{2+}]_{\\text{ss}}$</td><td>Subspace calcium</td><td>$\\sim$0.0001 mM</td><td>Same concept</td></tr>\n    <tr><td>$[\\text{Ca}^{2+}]_{\\text{nsr}}$</td><td>Network SR calcium</td><td>$\\sim$1.2 mM</td><td><strong>Split from $[\\text{Ca}^{2+}]_{\\text{SR}}$</strong></td></tr>\n    <tr><td>$[\\text{Ca}^{2+}]_{\\text{jsr}}$</td><td>Junctional SR calcium</td><td>$\\sim$1.2 mM</td><td><strong>Split from $[\\text{Ca}^{2+}]_{\\text{SR}}$</strong></td></tr>\n  </table>\n\n  <p>\n    <strong>Additional state variables:</strong>\n  </p>\n\n  <table>\n    <tr><th>Variable</th><th>Description</th><th>Role</th></tr>\n    <tr><td>$\\text{CaMK}_{\\text{trap}}$</td><td>CaMKII trapped (autophosphorylated) fraction</td><td>Long-term kinase memory; drives rate adaptation</td></tr>\n    <tr><td>$V_m$</td><td>Membrane potential</td><td>Primary electrical variable</td></tr>\n    <tr><td>$J_{\\text{rel,NP}}$</td><td>SR release flux (non-phosphorylated)</td><td>RyR release dynamics</td></tr>\n    <tr><td>$J_{\\text{rel,CaMK}}$</td><td>SR release flux (CaMKII-phosphorylated)</td><td>Enhanced RyR release</td></tr>\n  </table>\n\n  <p>\n    The most important structural differences from TTP06 are the addition of subspace Na$^+$ and K$^+$\n    compartments (reflecting the fact that these ions also have local concentrations near the membrane),\n    the split of the SR into network and junctional compartments (SERCA pumps into the nSR; RyR releases\n    from the jSR), and the CaMKII trapped state that provides long-term \"memory\" of recent heart rate.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      Why does ORd track subspace Na$^+$ and K$^+$? In TTP06, only Ca$^{2+}$ had a subspace compartment\n      because its concentration can change dramatically during a single beat ($\\times$10\u2013100 locally). Na$^+$\n      and K$^+$ concentrations change by much less ($\\lt$1%), so a single bulk compartment seemed sufficient.\n      But ORd found that even small Na$^+$ gradients near the membrane affect NCX and Na$^+$/K$^+$-ATPase\n      activity \u2014 the subspace compartments improve accuracy when these transporters are the focus.\n    </p>\n  </div>\n\n  <h3>6.2 &ensp; The Complete Current Inventory</h3>\n\n  <p>\n    ORd models 15 distinct membrane currents. Every current contributes to the total ionic current:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.1)</span>\n    $$\\begin{aligned}\n    I_{\\text{ion}} \\;=\\; & \\underbrace{I_{\\text{Na}} + I_{\\text{NaL}} + I_{\\text{CaL}}}_{\\text{depolarizing}} \\;+\\; \\underbrace{I_{\\text{to}} + I_{\\text{Kr}} + I_{\\text{Ks}} + I_{\\text{K1}} + I_{\\text{Kb}}}_{\\text{repolarizing}} \\\\[6pt]\n    & +\\; \\underbrace{I_{\\text{NaK}} + I_{\\text{NaCa,i}} + I_{\\text{NaCa,ss}} + I_{\\text{pCa}}}_{\\text{pumps/exchangers}} \\;+\\; \\underbrace{I_{\\text{Nab}} + I_{\\text{Cab}}}_{\\text{background}} \\;+\\; \\underbrace{I_{\\text{ClCa}} + I_{\\text{Clb}}}_{\\text{chloride}}\n    \\end{aligned}$$\n  </div>\n\n  <p>\n    Compared to TTP06's 12 currents, ORd adds $I_{\\text{NaL}}$ (late sodium), splits $I_{\\text{NaCa}}$\n    into two populations, adds chloride currents ($I_{\\text{ClCa}}$, $I_{\\text{Clb}}$), and replaces\n    the plateau potassium current $I_{\\text{pK}}$ with a background potassium current $I_{\\text{Kb}}$.\n    The L-type calcium current is further decomposed into three ionic components ($I_{\\text{CaL,Ca}}$,\n    $I_{\\text{CaL,Na}}$, $I_{\\text{CaL,K}}$). The table below provides the complete reference.\n  </p>\n\n  <!-- \u2500\u2500\u2500 Comprehensive ORd current table \u2500\u2500\u2500 -->\n  <table>\n    <tr><th>Current</th><th>Type</th><th>Ion</th><th>AP Phase</th><th>Direction</th><th>Clinical Relevance</th></tr>\n    <tr><td>$I_{\\text{Na}}$</td><td>Voltage-gated channel</td><td>Na$^+$</td><td>0 (upstroke)</td><td>Inward</td><td>Conduction velocity; Class I antiarrhythmics</td></tr>\n    <tr><td>$I_{\\text{NaL}}$</td><td>Voltage-gated channel</td><td>Na$^+$</td><td>2 (plateau)</td><td>Inward</td><td><strong>NEW:</strong> APD modulation; ranolazine target; LQT3</td></tr>\n    <tr><td>$I_{\\text{CaL}}$</td><td>Voltage-gated channel</td><td>Ca$^{2+}$/Na$^+$/K$^+$</td><td>2 (plateau)</td><td>Inward</td><td>EC coupling trigger; 3 ionic components; CaMKII-modulated</td></tr>\n    <tr><td>$I_{\\text{to}}$</td><td>Voltage-gated channel</td><td>K$^+$</td><td>1 (notch)</td><td>Outward</td><td>Transmural heterogeneity; Brugada syndrome</td></tr>\n    <tr><td>$I_{\\text{Kr}}$</td><td>Voltage-gated channel</td><td>K$^+$</td><td>3 (repolarization)</td><td>Outward</td><td>hERG block; drug-induced LQTS; CiPA assessment</td></tr>\n    <tr><td>$I_{\\text{Ks}}$</td><td>Voltage-gated channel</td><td>K$^+$</td><td>3 (repolarization reserve)</td><td>Outward</td><td>Rate adaptation (CaMKII); LQT1; $\\beta$-adrenergic</td></tr>\n    <tr><td>$I_{\\text{K1}}$</td><td>Inward rectifier</td><td>K$^+$</td><td>4 (rest) / 3 (late)</td><td>Outward</td><td>Resting potential; now with dynamic gate</td></tr>\n    <tr><td>$I_{\\text{Kb}}$</td><td>Background leak</td><td>K$^+$</td><td>All</td><td>Outward</td><td>Replaces TTP06's $I_{\\text{pK}}$; small repolarization</td></tr>\n    <tr><td>$I_{\\text{NaK}}$</td><td>ATP-driven pump</td><td>Na$^+$/K$^+$</td><td>All</td><td>Net outward</td><td>Thermodynamic cycle model; digitalis target</td></tr>\n    <tr><td>$I_{\\text{NaCa,i}}$</td><td>Exchanger</td><td>Na$^+$/Ca$^{2+}$</td><td>2\u20133 / 4</td><td>Both$^*$</td><td>Bulk cytoplasm NCX; calcium extrusion</td></tr>\n    <tr><td>$I_{\\text{NaCa,ss}}$</td><td>Exchanger</td><td>Na$^+$/Ca$^{2+}$</td><td>2\u20133 / 4</td><td>Both$^*$</td><td><strong>NEW:</strong> Subspace NCX; local Ca$^{2+}$ control</td></tr>\n    <tr><td>$I_{\\text{pCa}}$</td><td>ATP-driven pump</td><td>Ca$^{2+}$</td><td>All</td><td>Outward</td><td>Fine calcium homeostasis (PMCA)</td></tr>\n    <tr><td>$I_{\\text{Nab}}$</td><td>Background leak</td><td>Na$^+$</td><td>All</td><td>Inward</td><td>Resting Na$^+$ influx; balanced by $I_{\\text{NaK}}$</td></tr>\n    <tr><td>$I_{\\text{Cab}}$</td><td>Background leak</td><td>Ca$^{2+}$</td><td>All</td><td>Inward</td><td>Resting Ca$^{2+}$ influx; GHK formulation</td></tr>\n    <tr><td>$I_{\\text{ClCa}}$</td><td>Ca$^{2+}$-activated channel</td><td>Cl$^-$</td><td>1\u20132</td><td>Inward$^\\dagger$</td><td><strong>NEW:</strong> Contributes to Phase 1 notch and plateau</td></tr>\n    <tr><td>$I_{\\text{Clb}}$</td><td>Background leak</td><td>Cl$^-$</td><td>All</td><td>Inward$^\\dagger$</td><td><strong>NEW:</strong> Background Cl$^-$ leak</td></tr>\n  </table>\n\n  <p style=\"font-size:0.85em; color:#5a6175; margin-top:-0.5em;\">\n    $^*$$I_{\\text{NaCa}}$ operates in forward mode (inward, extruding Ca$^{2+}$) during late repolarization and diastole, and in reverse mode (outward, bringing Ca$^{2+}$ in) briefly during early depolarization.\n    $^\\dagger$Cl$^-$ currents are depolarizing (inward by convention) because Cl$^-$ efflux = inward current, with $E_{\\text{Cl}} \\approx -40$ mV.\n  </p>\n\n  <h3>6.3 &ensp; Voltage-Gated Depolarizing Currents</h3>\n\n  <h4>Fast Sodium Current ($I_{\\text{Na}}$) \u2014 Phase 0</h4>\n\n  <p>\n    The fast sodium current retains the classical HH structure from TTP06, but with two key upgrades:\n    refitted kinetics from undiseased human data, and CaMKII phosphorylation of the slow inactivation gate.\n    The total current blends non-phosphorylated and phosphorylated channel populations:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.2)</span>\n    $$I_{\\text{Na}} = \\bar{g}_{\\text{Na}}\\,m^3\\,\\bigl[(1 - \\Phi_{\\text{Na}})\\,h\\,j + \\Phi_{\\text{Na}}\\,h_p\\,j_p\\bigr]\\,(V_m - E_{\\text{Na}})$$\n  </div>\n\n  <p>\n    Here $\\Phi_{\\text{Na}}$ is the CaMKII phosphorylation fraction for the sodium channel, and the\n    composite inactivation gate $h$ is a weighted sum of fast and slow components:\n    $h = A_{hf}\\,h_f + (1 - A_{hf})\\,h_s$, with the weight $A_{hf}$ depending on voltage (fast\n    inactivation dominates at depolarized potentials). The phosphorylated population uses $h_p =\n    A_{hf}\\,h_f + (1 - A_{hf})\\,h_{sp}$, where $h_{sp}$ has a shifted voltage dependence \u2014 CaMKII\n    phosphorylation slows recovery from inactivation, contributing to rate-dependent sodium channel\n    availability. The maximal conductance $\\bar{g}_{\\text{Na}} = 75$ mS/$\\mu$F is substantially larger\n    than TTP06's 14.838 nS/pF (note different units), reflecting the refitting to human data.\n  </p>\n\n  <h4>Late Sodium Current ($I_{\\text{NaL}}$) \u2014 Phase 2</h4>\n\n  <p>\n    The late sodium current is the most important addition in ORd relative to TTP06. It represents a small\n    but persistent Na$^+$ influx that flows throughout the plateau \u2014 generated by sodium channels that\n    briefly reopen or fail to fully inactivate:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.3)</span>\n    $$I_{\\text{NaL}} = \\bar{g}_{\\text{NaL}}\\,m_L\\,\\bigl[(1 - \\Phi_{\\text{NaL}})\\,h_L + \\Phi_{\\text{NaL}}\\,h_{Lp}\\bigr]\\,(V_m - E_{\\text{Na}})$$\n  </div>\n\n  <p>\n    The maximal conductance $\\bar{g}_{\\text{NaL}} = 0.0075$ mS/$\\mu$F is roughly 1/10,000th of peak\n    $I_{\\text{Na}}$, but because $I_{\\text{NaL}}$ flows for 200+ ms (vs. $\\lt$2 ms for peak $I_{\\text{Na}}$),\n    it carries significant charge and contributes approximately 5% of APD. The activation gate $m_L$ is\n    similar to the fast sodium $m$ gate but with slightly slower kinetics. The inactivation gate $h_L$ has\n    a time constant of $\\sim$200 ms \u2014 orders of magnitude slower than the fast sodium $h$ gate \u2014 explaining\n    why this current persists through the plateau.\n  </p>\n\n  <p>\n    CaMKII phosphorylation of $I_{\\text{NaL}}$ ($h_{Lp}$) shifts the inactivation, increasing the late\n    current at faster heart rates. This creates a positive feedback loop: faster rate \u2192 more Ca$^{2+}$\n    entry \u2192 more CaMKII activation \u2192 more $I_{\\text{NaL}}$ \u2192 more Na$^+$ entry \u2192 potentially dangerous\n    if unchecked. Clinically, this pathway is relevant to arrhythmia in heart failure.\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      $I_{\\text{NaL}}$ is the primary target of <strong>ranolazine</strong>, an antianginal drug that\n      selectively inhibits late sodium current without significantly affecting peak $I_{\\text{Na}}$.\n      This specificity is impossible to study computationally without explicitly modeling $I_{\\text{NaL}}$\n      \u2014 one of the main reasons TTP06 is inadequate for drug safety assessment. In Long QT syndrome\n      type 3 (LQT3), gain-of-function mutations in SCN5A increase $I_{\\text{NaL}}$ by 2\u20135 fold,\n      dangerously prolonging the plateau. ORd can reproduce this pathology by simply scaling\n      $\\bar{g}_{\\text{NaL}}$.\n    </p>\n  </div>\n\n  <h4>L-Type Calcium Current ($I_{\\text{CaL}}$) \u2014 Phase 2</h4>\n\n  <p>\n    The L-type calcium current in ORd is substantially more complex than in TTP06. It is decomposed into\n    three ionic components, reflecting the imperfect selectivity of the Cav1.2 channel:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.4)</span>\n    $$I_{\\text{CaL}} = I_{\\text{CaL,Ca}} + I_{\\text{CaL,Na}} + I_{\\text{CaL,K}}$$\n  </div>\n\n  <p>\n    Each component uses the GHK flux equation with its respective permeability. The calcium component\n    (by far the largest) is:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.5)</span>\n    $$I_{\\text{CaL,Ca}} = P_{\\text{Ca}}\\,d\\,\\bigl[(1 - \\Phi_{\\text{CaL}})\\,f\\,j_{\\text{Ca}}\\,f_{\\text{Ca}} + \\Phi_{\\text{CaL}}\\,f_p\\,j_{\\text{Ca}}\\,f_{\\text{Ca},p}\\bigr] \\cdot \\Psi_{\\text{Ca}}(V_m, [\\text{Ca}^{2+}]_{\\text{ss}})$$\n  </div>\n\n  <p>\n    where $\\Psi_{\\text{Ca}}$ is the GHK flux:\n    $\\Psi_{\\text{Ca}} = 4\\tfrac{F^2}{RT}\\,V_m\\,\\tfrac{[\\text{Ca}^{2+}]_{\\text{ss}}\\,e^{2FV_m/RT} - 0.341\\,[\\text{Ca}^{2+}]_o}{e^{2FV_m/RT}-1}$,\n    and the composite gates are: $f = A_{ff}\\,f_f + (1 - A_{ff})\\,f_s$ (voltage inactivation, blending fast\n    and slow components) and $f_{\\text{Ca}} = A_{\\text{Ca},f}\\,f_{\\text{Ca},f} + (1 - A_{\\text{Ca},f})\\,f_{\\text{Ca},s}$\n    (calcium-dependent inactivation).\n  </p>\n\n  <p>\n    The CaMKII-phosphorylated population ($\\Phi_{\\text{CaL}}$) uses separate gates $f_p$ and\n    $f_{\\text{Ca},p}$ with shifted kinetics \u2014 phosphorylation facilitates channel reopening and slows\n    CDI, increasing calcium influx at faster rates. This CaMKII-mediated enhancement of $I_{\\text{CaL}}$\n    is counterbalanced by increased SERCA activity (also CaMKII-dependent), maintaining calcium\n    homeostasis while strengthening contraction \u2014 a key component of the positive force-frequency\n    relationship.\n  </p>\n\n  <p>\n    The Na$^+$ and K$^+$ components follow the same gating but use sodium and potassium permeabilities\n    ($P_{\\text{Na}} = 0.00125\\,P_{\\text{Ca}}$ and $P_{\\text{K}} = 3.574\\times10^{-4}\\,P_{\\text{Ca}}$)\n    and their respective GHK fluxes. Though individually small, these components contribute to the ion\n    balance over many beats.\n  </p>\n\n  <div class=\"insight insight-math\">\n    <p>\n      Why split $I_{\\text{CaL}}$ into three components? In TTP06, only Ca$^{2+}$ permeation was modeled\n      because Ca$^{2+}$ is the dominant charge carrier. But when tracking Na$^+$ and K$^+$ concentrations\n      dynamically over thousands of beats (as ORd does with its subspace compartments), even the small\n      Na$^+$ and K$^+$ fluxes through L-type channels contribute to concentration drift. Ignoring them\n      causes slow, insidious accumulation errors that manifest as AP duration changes after hundreds of\n      beats \u2014 exactly the kind of subtle bug that plagues long-running simulations.\n    </p>\n  </div>\n\n  <h3>6.4 &ensp; Voltage-Gated Repolarizing Currents</h3>\n\n  <h4>Transient Outward Current ($I_{\\text{to}}$) \u2014 Phase 1</h4>\n\n  <p>\n    The transient outward current in ORd has separate fast and slow inactivation gates (replacing TTP06's\n    single $s$ gate), plus CaMKII-phosphorylated variants:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.6)</span>\n    $$I_{\\text{to}} = \\bar{g}_{\\text{to}}\\,\\bigl[(1 - \\Phi_{\\text{to}})\\,a\\,i + \\Phi_{\\text{to}}\\,a_p\\,i_p\\bigr]\\,(V_m - E_{\\text{K}})$$\n  </div>\n\n  <p>\n    where $i = A_{iF}\\,i_F + (1 - A_{iF})\\,i_S$ blends fast and slow inactivation, with the weight $A_{iF}$\n    depending on voltage. The CaMKII-phosphorylated inactivation $i_p = A_{iF}\\,i_{Fp} + (1-A_{iF})\\,i_{Sp}$\n    has shifted kinetics. The maximal conductance $\\bar{g}_{\\text{to}}$ retains the dramatic transmural\n    gradient: 0.02 mS/$\\mu$F in endocardium vs. 0.08 mS/$\\mu$F in epicardium and M-cells.\n  </p>\n\n  <h4>Rapid Delayed Rectifier ($I_{\\text{Kr}}$) \u2014 Phase 3</h4>\n\n  <p>\n    $I_{\\text{Kr}}$ in ORd uses refitted kinetics from undiseased human hERG data. Like TTP06, it has\n    two activation components, but ORd blends fast and slow activation:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.7)</span>\n    $$I_{\\text{Kr}} = \\bar{g}_{\\text{Kr}}\\,\\sqrt{[\\text{K}^+]_o / 5.4}\\,x_r\\,r_{Kr}(V_m)\\,(V_m - E_{\\text{K}})$$\n  </div>\n\n  <p>\n    Here $x_r = A_{xr,f}\\,x_{r,f} + (1 - A_{xr,f})\\,x_{r,s}$ is a weighted blend of fast and slow\n    activation, and $r_{Kr}(V_m)$ is an instantaneous rectification factor that captures the\n    voltage-dependent inactivation of hERG channels. The $\\sqrt{[\\text{K}^+]_o/5.4}$ factor preserves\n    the extracellular K$^+$ dependence from TTP06. Notably, $I_{\\text{Kr}}$ is <em>not</em> CaMKII-modulated\n    in ORd \u2014 its kinetics are purely voltage-dependent. This is the key current for the CiPA\n    (Comprehensive <em>in vitro</em> Proarrhythmia Assay) initiative, which uses ORd as its reference\n    model for predicting drug-induced arrhythmia risk.\n  </p>\n\n  <h4>Slow Delayed Rectifier ($I_{\\text{Ks}}$) \u2014 Repolarization Reserve</h4>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.8)</span>\n    $$I_{\\text{Ks}} = \\bar{g}_{\\text{Ks}}\\,K_{\\text{s,Ca}}\\,x_{s1}\\,x_{s2}\\,(V_m - E_{\\text{Ks}})$$\n  </div>\n\n  <p>\n    A key difference from TTP06 is the calcium-sensitivity factor $K_{\\text{s,Ca}} = 1 + 0.6\\bigl/\\bigl(1 + (3.8\\times10^{-5}/[\\text{Ca}^{2+}]_i)^{1.4}\\bigr)$,\n    which increases $I_{\\text{Ks}}$ when intracellular calcium is elevated. At resting calcium ($\\sim$100 nM),\n    $K_{\\text{s,Ca}} \\approx 1$ and the current is near baseline. During systolic calcium peaks ($\\sim$1 $\\mu$M),\n    $K_{\\text{s,Ca}}$ increases to $\\sim$1.6, boosting repolarization reserve precisely when the cell needs it most.\n    Combined with CaMKII modulation of $\\bar{g}_{\\text{Ks}}$ at faster heart rates, this creates robust\n    rate-dependent enhancement of repolarization reserve. The reversal potential\n    $E_{\\text{Ks}}$ remains a mixed Na$^+$/K$^+$ potential, computed from the Goldman equation.\n    The maximal conductance shows strong transmural variation: $\\bar{g}_{\\text{Ks}} = 0.0034$ mS/$\\mu$F\n    (baseline) in endocardial cells, scaled $1.4\\times$ in epicardial cells, with reduced values in M-cells\n    explaining the prolonged M-cell APD and the T-wave morphology on the ECG.\n  </p>\n\n  <h4>Inward Rectifier ($I_{\\text{K1}}$) \u2014 Phase 4 and Late Phase 3</h4>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.9)</span>\n    $$I_{\\text{K1}} = \\bar{g}_{\\text{K1}}\\,\\sqrt{[\\text{K}^+]_o}\\,x_{K1}\\,r_{K1}(V_m)\\,(V_m - E_{\\text{K}})$$\n  </div>\n\n  <p>\n    Unlike TTP06 \u2014 where $I_{\\text{K1}}$ used only an instantaneous steady-state function \u2014 ORd gives\n    $I_{\\text{K1}}$ a <em>dynamic</em> gating variable $x_{K1}$ with its own time constant (though still\n    fast, $\\tau \\sim 1{-}10$ ms). The instantaneous rectification factor $r_{K1}(V_m)$ captures the\n    polyamine block at depolarized voltages. This formulation better reproduces the terminal repolarization\n    phase and the resting membrane potential measured in human ventricular myocytes.\n  </p>\n\n  <h4>Background Potassium Current ($I_{\\text{Kb}}$)</h4>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.10)</span>\n    $$I_{\\text{Kb}} = \\bar{g}_{\\text{Kb}}\\,x_{Kb}(V_m)\\,(V_m - E_{\\text{K}})$$\n  </div>\n\n  <p>\n    $I_{\\text{Kb}}$ replaces TTP06's $I_{\\text{pK}}$. The gating is instantaneous (a sigmoidal function\n    of voltage). Like its predecessor, it provides a small outward current during the plateau.\n  </p>\n\n  <h3>6.5 &ensp; Pumps, Exchangers, and Background Currents</h3>\n\n  <h4>Na$^+$/K$^+$ ATPase ($I_{\\text{NaK}}$) \u2014 Thermodynamic Cycle Model</h4>\n\n  <p>\n    The Na$^+$/K$^+$-ATPase in ORd represents the most significant single-equation change from TTP06.\n    Instead of the Hill-type empirical formulation, ORd uses a thermodynamically constrained cycle model\n    that explicitly accounts for the pump's conformational states:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.11)</span>\n    $$I_{\\text{NaK}} = 30\\,\\frac{z_{\\text{Na}} \\cdot a_1 \\cdot k_{1p} - z_{\\text{Na}} \\cdot b_1 \\cdot k_{1m}}{1 + \\frac{a_1\\,k_{1p}}{b_2\\,k_{2m}} + \\frac{b_1\\,k_{1m}}{a_2\\,k_{2p}} + \\frac{a_2\\,k_{2p}}{b_3\\,k_{3m}} + \\frac{b_2\\,k_{2m}}{a_3\\,k_{3p}} + \\frac{a_3\\,k_{3p}}{b_4\\,k_{4m}} + \\frac{b_3\\,k_{3m}}{a_4\\,k_{4p}}}$$\n  </div>\n\n  <p>\n    The rate constants $a_i$, $b_i$, $k_{ip}$, $k_{im}$ depend on $[\\text{Na}^+]_i$, $[\\text{K}^+]_o$,\n    ATP, and $V_m$ through microscopic detailed balance. This formulation satisfies the second law of\n    thermodynamics \u2014 the pump cannot generate flux against its electrochemical gradient without ATP\n    hydrolysis, a constraint that the simpler TTP06 formulation does not enforce. The practical consequence\n    is more accurate pump behavior under extreme conditions (ischemia, low ATP, hyperkalemia) where the\n    driving forces are close to equilibrium.\n  </p>\n\n  <h4>Na$^+$/Ca$^{2+}$ Exchanger \u2014 Split Populations</h4>\n\n  <p>\n    ORd explicitly models two NCX populations operating in different calcium environments:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.12)</span>\n    $$I_{\\text{NaCa}} = I_{\\text{NaCa,i}} + I_{\\text{NaCa,ss}}$$\n  </div>\n\n  <p>\n    where $I_{\\text{NaCa,i}}$ (80% of NCX) senses bulk cytoplasmic $[\\text{Ca}^{2+}]_i$ and\n    $[\\text{Na}^+]_i$, while $I_{\\text{NaCa,ss}}$ (20% of NCX) senses subspace $[\\text{Ca}^{2+}]_{\\text{ss}}$\n    and $[\\text{Na}^+]_{\\text{ss}}$. Each uses a thermodynamic formulation:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.13)</span>\n    $$I_{\\text{NaCa,x}} = 0.8\\,\\bar{g}_{\\text{NaCa}}\\cdot\\frac{k_{3p}\\,k_{4pp}\\,[\\text{Na}^+]_x^3 - k_{3pp}\\,k_{4p}\\,[\\text{Ca}^{2+}]_x}{(1 + Q_{10})(h_1 \\cdot h_2 + h_3)(1/h_7 + h_8)}$$\n  </div>\n\n  <p>\n    The split is physiologically motivated: NCX molecules near the dyadic cleft \"see\" a very different\n    calcium signal (high, fast transient from CICR) than those in the bulk cytoplasm (lower, slower rise).\n    In TTP06's single-population NCX, forward-mode extrusion is driven by a spatially averaged\n    $[\\text{Ca}^{2+}]_i$ that underestimates the local signal near the release sites. The subspace NCX\n    population responds to the actual local calcium in the dyad, providing more accurate calcium cycling\n    and a better match to experimental measurements of NCX current during the action potential.\n  </p>\n\n  <h4>Sarcolemmal Ca$^{2+}$ Pump ($I_{\\text{pCa}}$)</h4>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.14)</span>\n    $$I_{\\text{pCa}} = \\frac{\\bar{g}_{\\text{pCa}}\\,[\\text{Ca}^{2+}]_i}{K_{m,\\text{pCa}} + [\\text{Ca}^{2+}]_i}$$\n  </div>\n\n  <p>\n    The PMCA formulation is essentially unchanged from TTP06: a Michaelis\u2013Menten-style saturating function\n    of cytoplasmic calcium. It contributes roughly 1\u20132% of total calcium extrusion per beat.\n  </p>\n\n  <h4>Background Leak Currents ($I_{\\text{Nab}}$, $I_{\\text{Cab}}$)</h4>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.15)</span>\n    $$I_{\\text{Nab}} = \\bar{g}_{\\text{Nab}}\\,(V_m - E_{\\text{Na}})$$\n  </div>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.16)</span>\n    $$I_{\\text{Cab}} = P_{\\text{Cab}}\\cdot\\Psi_{\\text{Ca}}(V_m, [\\text{Ca}^{2+}]_i)$$\n  </div>\n\n  <p>\n    The sodium background current retains TTP06's Ohmic formulation. However, the calcium background\n    current in ORd switches from an Ohmic to a GHK formulation ($\\Psi_{\\text{Ca}}$), providing more\n    physically correct behavior at the very low intracellular Ca$^{2+}$ concentrations where the Ohmic\n    approximation breaks down.\n  </p>\n\n  <h4>Chloride Currents ($I_{\\text{ClCa}}$, $I_{\\text{Clb}}$) \u2014 New in ORd</h4>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.17)</span>\n    $$I_{\\text{ClCa}} = \\bar{g}_{\\text{ClCa}}\\,\\frac{[\\text{Ca}^{2+}]_{\\text{ss}}}{K_{d,\\text{ClCa}} + [\\text{Ca}^{2+}]_{\\text{ss}}}\\,(V_m - E_{\\text{Cl}})$$\n  </div>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.18)</span>\n    $$I_{\\text{Clb}} = \\bar{g}_{\\text{Clb}}\\,(V_m - E_{\\text{Cl}})$$\n  </div>\n\n  <p>\n    ORd introduces chloride currents, absent from TTP06. The calcium-activated chloride current\n    $I_{\\text{ClCa}}$ is gated by subspace calcium and contributes to the Phase 1 notch alongside\n    $I_{\\text{to}}$. With $E_{\\text{Cl}} \\approx -40$ mV (between rest and plateau), this current\n    is depolarizing at rest and repolarizing during the plateau, adding nuance to the Phase 1\u20132\n    transition. The background chloride leak $I_{\\text{Clb}}$ is small but ensures chloride balance.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      Engine V5.4's ORd implementation omits the chloride currents ($I_{\\text{ClCa}}$ and $I_{\\text{Clb}}$).\n      Their combined contribution is typically $\\lt$1% of total ionic current, and many benchmark ORd\n      implementations (including the CiPA reference) also exclude them. If chloride sensitivity is needed\n      for a specific study, these currents can be added as post-hoc corrections without modifying the\n      core state variable system.\n    </p>\n  </div>\n\n  <h3>6.6 &ensp; The CaMKII Signaling Pathway</h3>\n\n  <p>\n    The calcium/calmodulin-dependent protein kinase II (CaMKII) signaling pathway is the largest\n    conceptual addition in ORd and the primary mechanism underlying rate adaptation. CaMKII is\n    activated by calcium/calmodulin binding and can autophosphorylate to maintain activity even\n    after calcium levels fall \u2014 creating a molecular \"memory\" of recent heart rate.\n  </p>\n\n  <p>\n    The active CaMKII fraction in ORd is:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.19)</span>\n    $$\\text{CaMK}_{\\text{active}} = \\text{CaMK}_{\\text{bound}} + \\text{CaMK}_{\\text{trap}}$$\n  </div>\n\n  <p>\n    where $\\text{CaMK}_{\\text{bound}} = \\text{CaMK}_0\\,(1 - \\text{CaMK}_{\\text{trap}})/(1 + K_m/[\\text{Ca}^{2+}]_{\\text{ss}})$\n    is the fraction bound to calcium/calmodulin (instantaneous, set by current subspace Ca$^{2+}$), and\n    $\\text{CaMK}_{\\text{trap}}$ is the autophosphorylated fraction that decays slowly:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(6.20)</span>\n    $$\\frac{d\\,\\text{CaMK}_{\\text{trap}}}{dt} = \\alpha_{\\text{CaMK}}\\,\\text{CaMK}_{\\text{bound}}\\,\\text{CaMK}_{\\text{active}} - \\beta_{\\text{CaMK}}\\,\\text{CaMK}_{\\text{trap}}$$\n  </div>\n\n  <p>\n    The time constant for CaMKII trapping is on the order of seconds \u2014 much slower than any gating variable.\n    This creates a hierarchical timescale structure:\n  </p>\n\n  <p>\n    <strong>Milliseconds:</strong> Gate kinetics (m, h, d, f, etc.) \u2014 respond within a single AP.\n    <strong>Hundreds of milliseconds:</strong> Concentration changes ($[\\text{Ca}^{2+}]_i$, $[\\text{Na}^+]_i$) \u2014 settle over a few beats.\n    <strong>Seconds to minutes:</strong> CaMKII trapping \u2014 requires dozens to hundreds of beats to equilibrate.\n  </p>\n\n  <p>\n    Active CaMKII phosphorylates four main targets in ORd:\n  </p>\n\n  <table>\n    <tr><th>Target</th><th>Effect of CaMKII Phosphorylation</th><th>Consequence for AP</th></tr>\n    <tr><td>$I_{\\text{CaL}}$</td><td>Slowed voltage inactivation; enhanced recovery</td><td>Increased Ca$^{2+}$ entry \u2192 stronger contraction</td></tr>\n    <tr><td>$I_{\\text{NaL}}$</td><td>Slowed inactivation \u2192 increased late Na$^+$</td><td>Slight APD prolongation at fast rates</td></tr>\n    <tr><td>RyR / $J_{\\text{rel}}$</td><td>Increased open probability and release fraction</td><td>Larger Ca$^{2+}$ transient; potential for diastolic leak</td></tr>\n    <tr><td>SERCA / $J_{\\text{up}}$</td><td>Faster Ca$^{2+}$ reuptake into SR</td><td>Faster relaxation; maintains SR load at fast rates</td></tr>\n  </table>\n\n  <p>\n    The net effect of CaMKII at faster heart rates is: more calcium entry per beat (via enhanced $I_{\\text{CaL}}$),\n    faster calcium reuptake (via enhanced SERCA), larger SR release (via enhanced RyR sensitivity), and\n    slightly increased late sodium influx. The enhanced SERCA activity dominates the APD effect \u2014 by removing\n    calcium from the cytoplasm faster, it reduces the duration of the calcium transient and the plateau currents\n    that depend on it, resulting in APD shortening. This is how ORd achieves rate adaptation.\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      CaMKII makes ORd simulations significantly more expensive than TTP06. With 41 state variables (vs. 18),\n      the per-cell cost roughly doubles. But the bigger issue is the slow CaMKII equilibration time: reaching\n      steady state after a rate change requires 300\u2013600 beats (2\u20135 minutes of simulated time), compared to\n      50\u2013100 beats for TTP06. For tissue-scale studies where CaMKII effects are not the primary focus, TTP06\n      remains the pragmatic choice.\n    </p>\n  </div>\n\n  <h3>6.7 &ensp; Currents During Each AP Phase \u2014 A Visual Map</h3>\n\n  <!-- \u2500\u2500\u2500 ORd current activity during AP phases diagram \u2500\u2500\u2500 -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 620 470\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:560px;\">\n      <!-- Column headers (AP phases) -->\n      <text x=\"170\" y=\"18\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#e94560\" font-weight=\"700\">Phase 0</text>\n      <text x=\"170\" y=\"30\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Upstroke</text>\n      <text x=\"250\" y=\"18\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#0f3460\" font-weight=\"700\">Phase 1</text>\n      <text x=\"250\" y=\"30\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Notch</text>\n      <text x=\"340\" y=\"18\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#2d6a4f\" font-weight=\"700\">Phase 2</text>\n      <text x=\"340\" y=\"30\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Plateau</text>\n      <text x=\"440\" y=\"18\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#8a6d00\" font-weight=\"700\">Phase 3</text>\n      <text x=\"440\" y=\"30\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Repol.</text>\n      <text x=\"540\" y=\"18\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#5a6175\" font-weight=\"700\">Phase 4</text>\n      <text x=\"540\" y=\"30\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Rest</text>\n\n      <!-- Row labels -->\n      <text x=\"120\" y=\"55\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">INa</text>\n      <text x=\"120\" y=\"77\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">INaL</text>\n      <text x=\"120\" y=\"99\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">ICaL</text>\n      <text x=\"120\" y=\"121\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">Ito</text>\n      <text x=\"120\" y=\"143\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">IKr</text>\n      <text x=\"120\" y=\"165\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">IKs</text>\n      <text x=\"120\" y=\"187\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">IK1</text>\n      <text x=\"120\" y=\"209\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">IK ext x=\"440\" y=\"166\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#0f3460\">reserve</text>\n\n      <!-- IK1: Phase 3 late, Phase 4 DOMINANT -->\n      <rect x=\"440\" y=\"178\" width=\"40\" height=\"13\" rx=\"3\" fill=\"#0f3460\" opacity=\"0.5\"/>\n      <rect x=\"500\" y=\"178\" width=\"70\" height=\"13\" rx=\"3\" fill=\"#0f3460\" opacity=\"0.85\"/>\n      <text x=\"535\" y=\"188\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"white\" font-weight=\"700\">DOMINANT</text>\n\n      <!-- IKb: Phase 2 small -->\n      <rect x=\"310\" y=\"200\" width=\"70\" height=\"13\" rx=\"3\" fill=\"#0f3460\" opacity=\"0.15\"/>\n      <text x=\"345\" y=\"210\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#0f3460\">small</text>\n\n      <!-- INaK: all phases, moderate -->\n      <rect x=\"140\" y=\"222\" width=\"430\" height=\"13\" rx=\"3\" fill=\"#5a6175\" opacity=\"0.25\"/>\n      <text x=\"355\" y=\"232\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#5a6175\">continuous \u2014 thermodynamic cycle</text>\n\n      <!-- INaCa,i: Phase 2 reverse, Phase 3-4 forward -->\n      <rect x=\"300\" y=\"244\" width=\"80\" height=\"13\" rx=\"3\" fill=\"#0f3460\" opacity=\"0.2\"/>\n      <text x=\"340\" y=\"254\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#0f3460\">reverse</text>\n      <rect x=\"400\" y=\"244\" width=\"170\" height=\"13\" rx=\"3\" fill=\"#e94560\" opacity=\"0.35\"/>\n      <text x=\"485\" y=\"254\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#e94560\">forward (80%)</text>\n\n      <!-- INaCa,ss: similar but subspace -->\n      <rect x=\"300\" y=\"266\" width=\"80\" height=\"13\" rx=\"3\" fill=\"#0f3460\" opacity=\"0.15\"/>\n      <text x=\"340\" y=\"276\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#0f3460\">reverse</text>\n      <rect x=\"400\" y=\"266\" width=\"170\" height=\"13\" rx=\"3\" fill=\"#e94560\" opacity=\"0.25\"/>\n      <text x=\"485\" y=\"276\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#e94560\">forward (20%)</text>\n\n      <!-- IpCa: all phases, small -->\n      <rect x=\"140\" y=\"288\" width=\"430\" height=\"13\" rx=\"3\" fill=\"#5a6175\" opacity=\"0.12\"/>\n      <text x=\"355\" y=\"298\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#5a6175\">continuous \u2014 fine Ca\u00b2\u207a tuning</text>\n\n      <!-- INab: all phases, tiny -->\n      <rect x=\"140\" y=\"310\" width=\"430\" height=\"13\" rx=\"3\" fill=\"#5a6175\" opacity=\"0.08\"/>\n      <text x=\"355\" y=\"320\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#aaa\">tiny leak</text>\n\n      <!-- ICab: all phases, tiny -->\n      <rect x=\"140\" y=\"332\" width=\"430\" height=\"13\" rx=\"3\" fill=\"#5a6175\" opacity=\"0.08\"/>\n      <text x=\"355\" y=\"342\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#aaa\">tiny leak (GHK)</text>\n\n      <!-- IClCa: Phase 1-2, calcium activated -->\n      <rect x=\"220\" y=\"354\" width=\"140\" height=\"13\" rx=\"3\" fill=\"#8a6d00\" opacity=\"0.35\"/>\n      <text x=\"290\" y=\"364\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#8a6d00\">Ca\u00b2\u207a-activated</text>\n\n      <!-- IClb: all phases, tiny -->\n      <rect x=\"140\" y=\"376\" width=\"430\" height=\"13\" rx=\"3\" fill=\"#8a6d00\" opacity=\"0.08\"/>\n      <text x=\"355\" y=\"386\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#aaa\">tiny leak</text>\n\n      <!-- Legend -->\n      <rect x=\"130\" y=\"410\" width=\"18\" height=\"10\" rx=\"2\" fill=\"#e94560\" opacity=\"0.8\"/>\n      <text x=\"154\" y=\"419\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Inward (depolarizing)</text>\n      <rect x=\"280\" y=\"410\" width=\"18\" height=\"10\" rx=\"2\" fill=\"#0f3460\" opacity=\"0.8\"/>\n      <text x=\"304\" y=\"419\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Outward (repolarizing)</text>\n      <rect x=\"420\" y=\"410\" width=\"18\" height=\"10\" rx=\"2\" fill=\"#5a6175\" opacity=\"0.25\"/>\n      <text x=\"444\" y=\"419\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Housekeeping</text>\n      <rect x=\"530\" y=\"410\" width=\"18\" height=\"10\" rx=\"2\" fill=\"#8a6d00\" opacity=\"0.4\"/>\n      <text x=\"554\" y=\"419\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Chloride</text>\n    </svg>\n    <div class=\"figure-caption\"><span class=\"figure-label\">Figure 6.1.</span> Activity map of all ORd membrane currents across the five AP phases. Bar width represents temporal extent; opacity represents relative magnitude. Red bars are inward (depolarizing), blue bars are outward (repolarizing), gray bars are housekeeping currents, gold bars are chloride currents. Compare with Figure 5.1 for TTP06 \u2014 note the addition of $I_{\\text{NaL}}$ (persistent through the plateau), split NCX populations, and chloride currents.</div>\n  </div>\n\n  <div class=\"insight insight-math\">\n    <p>\n      As in TTP06, all gating variables in ORd satisfy the relaxation ODE $dx/dt = (x_\\infty - x)/\\tau_x$.\n      The Rush\u2013Larsen exponential integrator (Chapter 8) applies to every gate, regardless of CaMKII\n      phosphorylation status. The key numerical difference is that ORd has 29 gates vs. TTP06's 12,\n      so the Rush\u2013Larsen evaluation cost roughly doubles. The concentration ODEs remain non-relaxation\n      and require explicit or implicit integration.\n    </p>\n  </div>\n\n  <h3>6.8 &ensp; Endo, Epi, and M-Cells: Transmural Heterogeneity</h3>\n\n  <p>\n    Like TTP06, ORd supports three transmural cell types. However, ORd's transmural differences are\n    more nuanced, affecting more parameters:\n  </p>\n\n  <table>\n    <tr><th>Parameter</th><th>Endocardial</th><th>Epicardial</th><th>M-Cell</th><th>Physiological Basis</th></tr>\n    <tr><td>$\\bar{g}_{\\text{to}}$</td><td>0.02</td><td>0.08 ($4\\times$)</td><td>0.08 ($4\\times$)</td><td>Large epi/M-cell notch; minimal endo notch</td></tr>\n    <tr><td>$P_{\\text{CaL}}$</td><td>$1\\times$</td><td>$1.2\\times$</td><td>$2.5\\times$</td><td>Enhanced plateau in M-cells</td></tr>\n    <tr><td>$\\bar{g}_{\\text{Kr}}$</td><td>$1\\times$</td><td>$1.3\\times$</td><td>$0.8\\times$</td><td>M-cell APD prolongation</td></tr>\n    <tr><td>$\\bar{g}_{\\text{Ks}}$</td><td>0.0034</td><td>0.00476 ($1.4\\times$)</td><td>Reduced</td><td>M-cell APD prolongation (reduced repol. reserve)</td></tr>\n    <tr><td>$\\bar{g}_{\\text{K1}}$</td><td>$1\\times$</td><td>$1.2\\times$</td><td>$1.3\\times$</td><td>Resting potential variation</td></tr>\n    <tr><td>$\\bar{g}_{\\text{NaL}}$</td><td>$1\\times$</td><td>$0.6\\times$</td><td>$1\\times$</td><td>Reduced late Na$^+$ in epicardium</td></tr>\n    <tr><td>$I_{\\text{NaCa}}$</td><td>$1\\times$</td><td>$1.1\\times$</td><td>$1.4\\times$</td><td>Enhanced Ca$^{2+}$ extrusion in M-cells</td></tr>\n    <tr><td>$I_{\\text{NaK}}$</td><td>$1\\times$</td><td>$0.9\\times$</td><td>$0.7\\times$</td><td>Reduced pump activity in M-cells</td></tr>\n  </table>\n\n  <p>\n    The M-cell phenotype in ORd arises from the combination of reduced $I_{\\text{Ks}}$ (less repolarization\n    reserve), reduced $I_{\\text{Kr}}$ ($0.8\\times$), enhanced $I_{\\text{CaL}}$ ($2.5\\times$), and\n    reduced $I_{\\text{NaK}}$ ($0.7\\times$). These changes collectively produce the\n    longest APD of any cell type \u2014 a feature that is important for generating the T-wave on the surface\n    ECG. The transmural APD gradient (endo $\\lt$ epi $\\lt$ M-cell) drives the voltage gradient that\n    produces the terminal T-wave inscription.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      In Engine V5.4, both TTP06 and ORd implement the same <code>IonicModel</code> interface. The\n      <code>cell_type</code> parameter selects transmural variant by switching maximal conductances.\n      A simulation can mix cell types spatially \u2014 endocardial cells on the inner surface, epicardial\n      on the outer surface, M-cells in between \u2014 reproducing the full transmural gradient with a single\n      model class.\n    </p>\n  </div>\n\n  <h3>6.9 &ensp; Calcium Handling: Two SR Compartments</h3>\n\n  <p>\n    ORd refines the calcium subsystem beyond TTP06's three-compartment model (subspace, cytoplasm, SR)\n    by splitting the SR into two functionally distinct regions:\n  </p>\n\n  <p>\n    <strong>Network SR (nSR):</strong> The bulk of the SR volume. SERCA pumps calcium from the cytoplasm\n    into the nSR. Calcium diffuses freely within the nSR toward the junctional terminals.\n  </p>\n\n  <p>\n    <strong>Junctional SR (jSR):</strong> The terminal cisternae directly apposed to the T-tubule\n    membrane, containing the RyR2 clusters. This compartment empties rapidly during CICR and must\n    refill from the nSR between beats.\n  </p>\n\n  <p>\n    The calcium fluxes in ORd are:\n  </p>\n\n  <p>\n    <strong>$J_{\\text{up}}$</strong> (SERCA2a, cytoplasm \u2192 nSR): CaMKII-enhanced pump with phospholamban\n    relief. At faster rates, CaMKII increases the maximum pump rate, enabling faster reuptake.\n  </p>\n\n  <p>\n    <strong>$J_{\\text{tr}}$</strong> (nSR \u2192 jSR diffusion): A simple first-order transfer with time\n    constant $\\tau_{\\text{tr}} = 60$ ms. This creates a delay between SERCA refilling and jSR recovery \u2014\n    the jSR content lags behind the nSR, explaining why premature beats (before full jSR recovery) produce\n    weaker calcium transients.\n  </p>\n\n  <p>\n    <strong>$J_{\\text{rel}}$</strong> (RyR, jSR \u2192 subspace): CaMKII-enhanced release. The release flux\n    is proportional to the jSR-subspace calcium gradient and is activated by subspace calcium (CICR trigger).\n    CaMKII phosphorylation increases the RyR open probability, producing larger releases at faster rates.\n    The ORd release model blends non-phosphorylated and CaMKII-phosphorylated populations, with the total\n    release $J_{\\text{rel}} = (1 - \\Phi)\\,J_{\\text{rel,NP}} + \\Phi\\,J_{\\text{rel,CaMK}}$.\n  </p>\n\n  <p>\n    <strong>$J_{\\text{xfer}}$</strong> (subspace \u2192 cytoplasm diffusion): First-order transfer with time\n    constant $\\tau_{\\text{xfer}} = 8$ ms. Combined with the subspace Na$^+$ and K$^+$ diffusion, this\n    maintains the subspace as a distinct microenvironment that equilibrates with the bulk cytoplasm on\n    a timescale of tens of milliseconds.\n  </p>\n\n  <p>\n    <strong>$J_{\\text{leak}}$</strong> (nSR \u2192 cytoplasm): A small passive leak proportional to\n    $[\\text{Ca}^{2+}]_{\\text{nsr}}$. This leak is the starting point for modeling diastolic SR calcium\n    leak in heart failure \u2014 by increasing the leak rate, one can simulate the RyR2 dysfunction that\n    drives spontaneous calcium waves and DADs.\n  </p>\n\n  <h3>6.10 &ensp; TTP06 vs. ORd at a Glance</h3>\n\n  <p>\n    The following table summarizes the key differences between TTP06 and ORd for quick reference:\n  </p>\n\n  <table>\n    <tr><th>Feature</th><th>TTP06</th><th>ORd</th></tr>\n    <tr><td>State variables</td><td>18</td><td>41</td></tr>\n    <tr><td>Membrane currents</td><td>12</td><td>15 (+ chloride)</td></tr>\n    <tr><td>Data source</td><td>Mixed species/cell lines</td><td>Undiseased human ventricle</td></tr>\n    <tr><td>Late Na$^+$ current</td><td>Not modeled</td><td>Explicit $I_{\\text{NaL}}$</td></tr>\n    <tr><td>CaMKII signaling</td><td>Not modeled</td><td>Full pathway; rate adaptation</td></tr>\n    <tr><td>SR compartments</td><td>1 (single SR)</td><td>2 (nSR + jSR)</td></tr>\n    <tr><td>NCX populations</td><td>1 (bulk)</td><td>2 (bulk + subspace)</td></tr>\n    <tr><td>Na$^+$/K$^+$ pump</td><td>Hill-type empirical</td><td>Thermodynamic cycle</td></tr>\n    <tr><td>Subspace ions</td><td>Ca$^{2+}$ only</td><td>Ca$^{2+}$, Na$^+$, K$^+$</td></tr>\n    <tr><td>Beats to steady state</td><td>$\\sim$50\u2013100</td><td>$\\sim$300\u2013600 (CaMKII)</td></tr>\n    <tr><td>Cost per cell per step</td><td>$1\\times$ (baseline)</td><td>$\\sim$2\u20132.5$\\times$</td></tr>\n    <tr><td>Best for</td><td>Wave dynamics, large-scale 3D, prototyping</td><td>Drug safety (CiPA), rate-dependent phenomena</td></tr>\n  </table>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      Engine V5.4 implements both models behind the same <code>IonicModel</code> interface. Switching\n      from TTP06 to ORd requires changing a single configuration parameter \u2014 the spatial solver, mesh,\n      operator splitting strategy, and output pipeline remain identical. The <code>step(V, ionic_states,\n      dt)</code> method handles the internal complexity, whether updating TTP06's 18 or ORd's 40 ionic\n      state variables (V stored separately in both). The <code>RushLarsenSolver</code> calls each\n      model's <code>compute_gate_steady_states()</code> and <code>compute_gate_time_constants()</code>\n      to perform the exponential update, and <code>compute_concentration_rates()</code> for Forward\n      Euler \u2014 all defined identically on the <code>IonicModel</code> ABC. This abstraction is\n      what allows the same tissue solver to work with any ionic model.\n    </p>\n  </div>\n\n  <p>\n    With both ionic models thoroughly characterized \u2014 from 18-variable TTP06 to 41-variable ORd \u2014 we now\n    have the single-cell building blocks that will be embedded at every spatial point in the tissue. In\n    Part II, we add the spatial dimension: diffusion, the monodomain equation, and the numerical methods\n    that make tissue-scale simulation possible.\n  </p>\n</div>\n\n\n<!-- \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 -->\n<!--                    PART II \u2014 TISSUE-LEVEL MONODOMAIN               -->\n<!-- \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 -->", "ch7": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 7</div>\n  <h2 class=\"chapter-title\">The Monodomain Equation</h2>\n  <div class=\"chapter-intro\">\n    A single cell model tells you what happens at one point. To simulate a wave of activation\n    spreading across the heart, we need to couple millions of these cells through the physics\n    of electrical diffusion. The monodomain equation is this coupling \u2014 and it is the equation\n    that Engine V5.4 was built to solve.\n  </div>\n\n  <h3>7.1 &ensp; From Single Cell to Tissue: Adding Diffusion</h3>\n\n  <p>\n    Imagine you have a row of light bulbs connected by wires. If you turn on one bulb in the middle,\n    electrical current flows through the wires to its neighbors, and they start to glow too \u2014 then\n    <em>their</em> neighbors light up, and so on down the line. That is exactly what happens in cardiac\n    tissue. One cell depolarizes (the \"bulb turns on\"), and current flows through gap junctions (the\n    \"wires\") to neighboring cells, triggering them in sequence. This chain reaction is the propagating\n    action potential.\n  </p>\n\n  <p>\n    In Chapter 1, we wrote the membrane current equation for a single cell:\n    $C_m \\, dV_m/dt = -I_{\\text{ion}}$. This says \"the voltage changes because ions flow through\n    channels.\" But in tissue, there is a second source of current: <em>electrotonic current</em> from\n    neighboring cells, flowing through gap junctions.\n  </p>\n\n  <p>\n    When cell A depolarizes before cell B, a voltage gradient exists between them, and current\n    flows from A to B through the intracellular pathway. This is just Ohm's law \u2014 voltage difference\n    divided by resistance gives current \u2014 written in continuous form:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\mathbf{J}_i = -\\mathbf{D}_i \\nabla V_m$$\n  </div>\n\n  <p>\n    where $\\mathbf{D}_i$ is the <em>effective intracellular conductivity tensor</em> \u2014 it encodes\n    both the gap-junction coupling strength and the geometric anisotropy of the tissue. The divergence\n    of this current, $\\nabla \\cdot (\\mathbf{D}_i \\nabla V_m)$, gives the net current arriving at each\n    point from its neighbors. Adding this to the single-cell equation gives us the monodomain equation.\n  </p>\n\n  <h3>7.2 &ensp; The Reaction\u2013Diffusion Formulation</h3>\n\n  <p>\n    Before writing the equation, let us understand what it will say in plain language. At every point\n    in the tissue, the voltage changes for exactly two reasons: (1) ion channels at that point open\n    and close, pushing the voltage up or down \u2014 this is the <em>reaction</em>, the local chemistry;\n    (2) current leaks in from depolarized neighbors or out to resting neighbors through gap\n    junctions \u2014 this is the <em>diffusion</em>, the spatial coupling. The monodomain equation is\n    simply the mathematical statement that \"voltage change = reaction + diffusion.\"\n  </p>\n\n  <p>\n    Written out, the monodomain equation is:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(7.1)</span>\n    $$\\chi C_m \\frac{\\partial V_m}{\\partial t} = \\nabla \\cdot (\\mathbf{D}\\,\\nabla V_m) - \\chi\\,I_{\\text{ion}}(V_m, \\mathbf{w}) + I_{\\text{stim}}$$\n  </div>\n\n  <p>\n    This is a <em>reaction\u2013diffusion</em> equation \u2014 one of the most important classes of PDEs in\n    mathematical biology. The \"reaction\" is the ionic current $I_{\\text{ion}}$ (local chemistry at each\n    cell), and the \"diffusion\" is $\\nabla \\cdot (\\mathbf{D}\\,\\nabla V_m)$ (spatial coupling between cells).\n    The stimulus current $I_{\\text{stim}}$ represents external pacing.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      The monodomain equation says: \"at every point in the tissue, the voltage changes for two reasons \u2014\n      (1) ion channels open and close locally (the reaction), and (2) current leaks in from depolarized\n      neighbors or out to resting neighbors (the diffusion).\" These two processes compete: the reaction\n      creates sharp voltage fronts, while the diffusion smooths them out. The balance determines the\n      conduction velocity \u2014 typically 60\u201380 cm/s along fibers in healthy ventricular tissue.\n    </p>\n  </div>\n\n  <p>\n    The state vector $\\mathbf{w}$ contains all the gating variables and concentrations from the ionic\n    model (18 for TTP06, 40 for ORd). These evolve by their own ODEs at each spatial point:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(7.2)</span>\n    $$\\frac{\\partial \\mathbf{w}}{\\partial t} = \\mathbf{g}(V_m, \\mathbf{w})$$\n  </div>\n\n  <p>\n    Note that $\\mathbf{w}$ has <em>no diffusion term</em> \u2014 gating variables do not diffuse from cell\n    to cell. Only voltage (and in the bidomain model, extracellular potential) spreads spatially.\n    This locality of the ionic state is what makes operator splitting so natural.\n  </p>\n\n  <h3>7.3 &ensp; Conductivity, Fibers, and Anisotropy</h3>\n\n  <p>\n    Think of cardiac tissue like a bundle of straws, all pointing roughly the same direction. If you\n    push water into one straw, it flows easily along the straw's length but very poorly sideways into\n    neighboring straws. Heart muscle works the same way: myocytes are long, thin cells connected\n    end-to-end by gap junctions. Electrical current zips along the fiber direction about\n    <em>three times faster</em> than it crosses fibers. This directional preference is called\n    <em>anisotropy</em>, and it shapes the entire wavefront: elliptical in a tissue slab, spiraling in\n    the ventricle wall where fibers rotate transmurally from epicardium to endocardium.\n  </p>\n\n  <p>\n    Mathematically, a single number (scalar conductivity) cannot capture \"fast in one direction, slow in\n    another.\" We need a <em>tensor</em> \u2014 essentially a $2 \\times 2$ or $3 \\times 3$ matrix that\n    converts a voltage gradient in any direction into the resulting current in that direction.\n    If $\\mathbf{f}$ is the local fiber direction (a unit vector), the conductivity tensor is:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(7.3)</span>\n    $$\\mathbf{D} = d_\\parallel \\mathbf{f}\\mathbf{f}^T + d_\\perp(\\mathbf{I} - \\mathbf{f}\\mathbf{f}^T)$$\n  </div>\n\n  <p>\n    where $d_\\parallel$ and $d_\\perp$ are the conductivities along and across fibers, respectively.\n    Typical values are $d_\\parallel \\approx 0.174$ and $d_\\perp \\approx 0.019$ mm$^2$/ms, giving an\n    anisotropy ratio of about 3:1 in conduction velocity (since CV $\\propto \\sqrt{d}$). In 3D,\n    a sheet-normal direction adds a third axis with even lower conductivity.\n  </p>\n\n\n  <h3>7.4 &ensp; Boundary Conditions: What Happens at the Edge?</h3>\n\n  <p>\n    So far we have written the monodomain equation and explained the conductivity tensor \u2014 but\n    we have said nothing about what happens at the <em>boundary</em> of the tissue. Every PDE\n    needs boundary conditions, and physically, the question is simple: <strong>what happens to\n    electrical current when it reaches the edge of the heart?</strong>\n  </p>\n\n  <p>\n    Think of a swimming pool. Water circulates inside, but what happens at the walls?\n    If the walls are solid concrete, no water escapes \u2014 that is a <em>Neumann</em> (zero-flux)\n    condition. If the pool has an overflow drain that holds the water level fixed, that is a\n    <em>Dirichlet</em> (fixed-value) condition. If the walls are porous and leak at a rate\n    proportional to the water pressure, that is a <em>Robin</em> (mixed) condition. Cardiac\n    tissue faces the same three choices for electrical current at its surface.\n  </p>\n\n  <p>\n    For the monodomain equation, the three boundary condition types are:\n  </p>\n\n  <ul>\n    <li><strong>Neumann (zero flux):</strong> $\\mathbf{D}\\,\\nabla V_m \\cdot \\hat{\\mathbf{n}} = 0$ \u2014 no current leaves the tissue. This is the default for isolated hearts and the overwhelmingly common choice in cardiac simulations.</li>\n    <li><strong>Dirichlet (fixed voltage):</strong> $V_m = V_{\\text{boundary}}$ \u2014 the transmembrane potential is clamped at the boundary. Rare in practice (what physical setup would clamp $V_m$ at the tissue surface?) but useful in test problems.</li>\n    <li><strong>Robin (partial flux):</strong> $\\mathbf{D}\\,\\nabla V_m \\cdot \\hat{\\mathbf{n}} + \\alpha\\,V_m = g$ \u2014 a weighted combination. Used when the tissue surface is partially coupled to an external medium.</li>\n  </ul>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      <strong>Why Neumann is the default.</strong> In a real heart, cardiac cells are sealed at the tissue surface by connective tissue (the epicardium and endocardium). No intracellular current escapes through these layers into the surrounding pericardial fluid. Mathematically, zero current flux across the boundary is exactly what the Neumann condition says. Nearly every monodomain simulation uses this condition on all boundaries.\n    </p>\n  </div>\n\n  <p>\n    Each boundary condition type has a different effect on the numerical discretization \u2014 it changes\n    the stiffness matrix, the right-hand side vector, or both. The concrete formulations (ghost nodes\n    for FDM, natural conditions for FEM, modified stencils) are developed in Chapter 8, Sections 8.6\u20138.7.\n  </p>\n\n  <p>\n    The situation becomes substantially more complex in the bidomain model, where <em>two</em> unknowns\n    ($V_m$ and $\\phi_e$) each need their own boundary condition. In particular, the \"isolated tissue\"\n    case (Neumann on both) creates a null space in the linear system that requires special handling.\n    We will tackle bidomain boundary conditions in Chapter 12.\n  </p>\n\n\n\n</div>\n\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 8 \u2014 SPATIAL DISCRETIZATION (MONODOMAIN)                  -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "ch8": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 8</div>\n  <h2 class=\"chapter-title\">Spatial Discretization</h2>\n  <div class=\"chapter-intro\">\n    The monodomain PDE lives in continuous space \u2014 but computers work with discrete numbers.\n    Spatial discretization replaces the continuous diffusion operator with a matrix that\n    computes the same physics at a finite set of mesh points. This chapter develops three\n    discretization methods (FDM, FEM, FVM) and shows how boundary conditions enter the\n    discrete system.\n  </div>\n\n\n    <h3>8.1 &ensp; Spatial Discretization: What It Means Physically</h3>\n\n  <p>\n    The continuous diffusion operator $\\nabla \\cdot (\\mathbf{D}\\,\\nabla V_m)$ answers a simple\n    physical question: <em>how much net electrical current is flowing into this point from its\n    neighbors?</em> Spatial discretization replaces this continuous question with a discrete one:\n    given the voltage at every mesh point, compute the net current arriving at each point from\n    its neighbors. This computation turns out to be a matrix-vector product.\n  </p>\n\n  <p>\n    Think of it this way. If node $i$ is at $-85$ mV (resting) and its neighbor $j$ is at $+20$ mV\n    (depolarized), there is a voltage difference of 105 mV driving current from $j$ to $i$ through\n    the intracellular resistance. The amount of current depends on the conductivity between them and\n    the distance. Summing up these pairwise contributions from all neighbors of node $i$ gives the\n    net diffusive current \u2014 and that sum is exactly one row of the matrix-vector product $\\mathbf{K}\\cdot\\mathbf{V}$.\n  </p>\n\n  <p>\n    Three classical methods exist for building this matrix. Each approaches the problem from a different\n    mathematical direction, but all three produce the same object: a <em>sparse matrix</em> that encodes\n    how current flows through the tissue mesh. The matrix is sparse because each node couples only to\n    its immediate neighbors \u2014 a node in the middle of a 3D mesh might have 6\u201326 neighbors out of\n    millions of total nodes.\n  </p>\n\n  <table>\n    <tr><th>Method</th><th>Core Idea</th><th>Mesh Requirement</th><th>Best For</th></tr>\n    <tr><td><strong>FDM</strong></td><td>Replace derivatives with neighbor differences</td><td>Regular Cartesian grid</td><td>Tissue slabs, GPU computing, fast prototyping</td></tr>\n    <tr><td><strong>FEM</strong></td><td>Reformulate as integral (weak form)</td><td>Any: triangles, tetrahedra, hexahedra</td><td>Realistic heart geometries, curved boundaries</td></tr>\n    <tr><td><strong>FVM</strong></td><td>Balance fluxes across control-volume faces</td><td>Any with orthogonal dual mesh</td><td>Sharp conductivity jumps (scar/healthy boundary)</td></tr>\n  </table>\n\n  <p>\n    We will work through each method with the same running philosophy: <em>show the matrix</em>. For\n    each method, we will build the actual stiffness matrix for a tiny example mesh, inspect its structure,\n    and verify that it makes physical sense. Then in Section 8.6, we will connect these matrices back to\n    the ionic models from Chapters 5\u20136, showing how TTP06's 12 currents or ORd's 15 currents feed into\n    the full system.\n  </p>\n\n  <h3>8.2 &ensp; Finite Difference Method (FDM)</h3>\n\n  <h4>The Central Idea</h4>\n\n  <p>\n    FDM is the most direct approach: place nodes on a regular grid with uniform spacing $h$, and\n    approximate the second derivative using the values at neighboring grid points. The fundamental\n    approximation in 1D is:\n  </p>\n\n  <div class=\"equation-block\">\n    $$d\\,\\frac{\\partial^2 V}{\\partial x^2}\\bigg|_i \\;\\approx\\; \\frac{d}{h^2}\\bigl(V_{i-1} - 2V_i + V_{i+1}\\bigr)$$\n  </div>\n\n  <p>\n    This is second-order accurate (error $\\sim O(h^2)$), derived from Taylor expansion.\n    But the deeper insight is <em>geometric</em>: the expression $V_{i-1} - 2V_i + V_{i+1}$\n    measures how much $V_i$ deviates from the average of its neighbors. If $V_i$ is higher than\n    the average $\\tfrac{1}{2}(V_{i-1} + V_{i+1})$, the Laplacian is negative \u2014 current flows\n    outward, pulling $V_i$ down. If $V_i$ is lower than the average, current flows inward,\n    pushing $V_i$ up. Diffusion always acts to smooth out voltage differences.\n  </p>\n\n  <h4>Worked Example: 5-Node 1D Cable</h4>\n\n  <p>\n    Consider a tiny 1D cardiac cable with 5 nodes, spacing $h = 0.2$ mm, and uniform conductivity\n    $d = 0.1$ mm$^2$/ms. The no-flux (Neumann) boundary condition means no current flows out of\n    the cable ends.\n  </p>\n\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 500 80\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:450px;\">\n      <!-- Cable -->\n      <line x1=\"50\" y1=\"35\" x2=\"450\" y2=\"35\" stroke=\"#ccc\" stroke-width=\"2\"/>\n      <!-- Nodes -->\n      <circle cx=\"50\" cy=\"35\" r=\"8\" fill=\"#0f3460\"/>\n      <circle cx=\"150\" cy=\"35\" r=\"8\" fill=\"#0f3460\"/>\n      <circle cx=\"250\" cy=\"35\" r=\"8\" fill=\"#0f3460\"/>\n      <circle cx=\"350\" cy=\"35\" r=\"8\" fill=\"#e94560\"/>\n      <circle cx=\"450\" cy=\"35\" r=\"8\" fill=\"#0f3460\"/>\n      <!-- Labels -->\n      <text x=\"50\" y=\"65\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"10\" fill=\"#16213e\">0</text>\n      <text x=\"150\" y=\"65\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"10\" fill=\"#16213e\">1</text>\n      <text x=\"250\" y=\"65\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"10\" fill=\"#16213e\">2</text>\n      <text x=\"350\" y=\"65\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"10\" fill=\"#e94560\">3</text>\n      <text x=\"450\" y=\"65\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"10\" fill=\"#16213e\">4</text>\n      <!-- Voltages -->\n      <text x=\"50\" y=\"20\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"9\" fill=\"#5a6175\">\u221285</text>\n      <text x=\"150\" y=\"20\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"9\" fill=\"#5a6175\">\u221285</text>\n      <text x=\"250\" y=\"20\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"9\" fill=\"#5a6175\">\u221285</text>\n      <text x=\"350\" y=\"20\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"9\" fill=\"#e94560\">+20</text>\n      <text x=\"450\" y=\"20\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"9\" fill=\"#5a6175\">\u221285</text>\n      <!-- Spacing -->\n      <text x=\"100\" y=\"50\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"9\" fill=\"#888\">h</text>\n    </svg>\n    <div class=\"figure-caption\"><span class=\"figure-label\">Figure 7.1.</span> A 5-node 1D cable with node 3 depolarized to +20 mV (wavefront). All other nodes at resting potential \u221285 mV.</div>\n  </div>\n\n  <p>\n    The FDM stencil $[1, -2, 1]$ is applied at each interior node. At boundary nodes (0 and 4),\n    the no-flux condition $\\partial V/\\partial x = 0$ modifies the stencil to $[-1, 1]$ (the\n    \"missing\" neighbor is replaced by mirroring). Collecting all stencils into a matrix, we get the\n    <strong>stiffness matrix</strong> $\\mathbf{K}$:\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\mathbf{K} = \\frac{d}{h^2}\\begin{pmatrix} 1 & -1 & 0 & 0 & 0 \\\\ -1 & 2 & -1 & 0 & 0 \\\\ 0 & -1 & 2 & -1 & 0 \\\\ 0 & 0 & -1 & 2 & -1 \\\\ 0 & 0 & 0 & -1 & 1 \\end{pmatrix} = 2.5\\begin{pmatrix} 1 & -1 & 0 & 0 & 0 \\\\ -1 & 2 & -1 & 0 & 0 \\\\ 0 & -1 & 2 & -1 & 0 \\\\ 0 & 0 & -1 & 2 & -1 \\\\ 0 & 0 & 0 & -1 & 1 \\end{pmatrix}$$\n  </div>\n\n  <p>\n    Three properties of $\\mathbf{K}$ to notice: (1) it is <em>symmetric</em> \u2014 the coupling from node $i$\n    to $j$ equals the coupling from $j$ to $i$; (2) it is <em>tridiagonal</em> \u2014 each node couples only\n    to its immediate neighbors; (3) every row sums to zero \u2014 applying a uniform voltage\n    $V = c\\,\\mathbf{1}$ gives $\\mathbf{K}\\cdot V = \\mathbf{0}$, meaning diffusion does nothing to a\n    spatially constant voltage (as it should).\n  </p>\n\n  <p>\n    Now let us compute the diffusion term $-\\mathbf{K}\\cdot\\mathbf{V}$ for the wavefront scenario\n    $\\mathbf{V} = [-85, -85, -85, +20, -85]^T$ (mV):\n  </p>\n\n  <div class=\"equation-block\">\n    $$-\\mathbf{K}\\cdot\\mathbf{V} = -2.5\\begin{pmatrix}1(-85) + (-1)(-85)\\\\(-1)(-85) + 2(-85) + (-1)(-85)\\\\(-1)(-85) + 2(-85) + (-1)(20)\\\\(-1)(-85) + 2(20) + (-1)(-85)\\\\(-1)(20) + 1(-85)\\end{pmatrix} = -2.5\\begin{pmatrix}0\\\\0\\\\-190\\\\210\\\\-105\\end{pmatrix} = \\begin{pmatrix}0\\\\0\\\\475\\\\-525\\\\262.5\\end{pmatrix}$$\n  </div>\n\n  <p>\n    Read this result physically:\n  </p>\n\n  <p>\n    <strong>Node 2</strong> ($-85$ mV, next to wavefront): receives $+475$ mV/ms of diffusive current\n    \u2014 a large positive push from the depolarized node 3. This is the electrotonic current that will\n    soon trigger node 2's sodium channels, propagating the wave to the left.\n  </p>\n\n  <p>\n    <strong>Node 3</strong> ($+20$ mV, the wavefront): loses $-525$ mV/ms \u2014 current flows out to both\n    resting neighbors. The depolarized cell is the \"source\" that drives the wavefront forward.\n  </p>\n\n  <p>\n    <strong>Node 4</strong> ($-85$ mV, behind the wavefront): receives $+262.5$ mV/ms from node 3. Only\n    half the push that node 2 gets, because node 4 has only one neighbor (boundary).\n  </p>\n\n  <p>\n    <strong>Nodes 0\u20131</strong> (far from wavefront): zero diffusive current \u2014 all neighbors have the\n    same voltage, so there is nothing to diffuse.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      This example reveals the core mechanism of wave propagation. The depolarized region (node 3)\n      acts as a current source, pushing electrotonic current into the resting neighbors (nodes 2 and 4).\n      When this current is strong enough to bring a neighbor above threshold ($\\sim-65$ mV), the\n      neighbor's sodium channels fire explosively, depolarizing it and extending the wavefront. The\n      matrix $\\mathbf{K}$ encodes <em>all</em> of this neighbor-to-neighbor coupling.\n    </p>\n  </div>\n\n  <h4>The 5-Point and 9-Point Stencils (2D)</h4>\n\n  <p>\n    In two dimensions with isotropic conductivity $d$, the Laplacian is approximated by the\n    <strong>5-point stencil</strong>:\n  </p>\n\n  <div class=\"equation-block\">\n    $$d\\,\\nabla^2 V\\big|_{i,j} \\approx \\frac{d}{h^2}\\bigl(V_{i+1,j} + V_{i-1,j} + V_{i,j+1} + V_{i,j-1} - 4V_{i,j}\\bigr)$$\n  </div>\n\n  <p>\n    Same idea as 1D: the value at the center minus the average of its four axis-aligned neighbors.\n    The stiffness matrix now has 5 nonzeros per row (the center node and its four neighbors).\n    On an $N \\times N$ grid, $\\mathbf{K}$ is $N^2 \\times N^2$ \u2014 potentially millions of rows \u2014\n    but with only $\\sim 5N^2$ nonzero entries. This extreme sparsity is what makes large-scale\n    cardiac simulation tractable.\n  </p>\n\n  <p>\n    When the conductivity tensor $\\mathbf{D}$ has off-diagonal entries (because cardiac fibers\n    are rotated relative to the grid axes):\n  </p>\n\n  <div class=\"equation-block\">\n    $$\\mathbf{D} = \\begin{pmatrix}D_{xx} & D_{xy} \\\\ D_{xy} & D_{yy}\\end{pmatrix}$$\n  </div>\n\n  <p>\n    the 5-point stencil can only handle the diagonal terms $D_{xx}$ and $D_{yy}$. The cross-derivative\n    $D_{xy}\\,\\partial^2 V / \\partial x\\,\\partial y$ requires the <strong>9-point stencil</strong>, which\n    includes diagonal neighbors:\n  </p>\n\n  <div class=\"equation-block\">\n    $$D_{xy}\\,\\frac{\\partial^2 V}{\\partial x\\,\\partial y}\\bigg|_{i,j} \\approx \\frac{D_{xy}}{4h^2}\\bigl(V_{i+1,j+1} - V_{i+1,j-1} - V_{i-1,j+1} + V_{i-1,j-1}\\bigr)$$\n  </div>\n\n  <p>\n    In 3D, the full anisotropic operator requires a <strong>27-point stencil</strong> \u2014 the node\n    plus all 26 neighbors in a $3 \\times 3 \\times 3$ cube. The stiffness matrix then has up to\n    27 nonzeros per row.\n  </p>\n\n  <!-- FDM stencil figure -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 600 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:520px;\">\n      <!-- 5-point stencil -->\n      <text x=\"130\" y=\"18\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"13\" fill=\"#16213e\" font-weight=\"600\">5-Point (Isotropic)</text>\n      <circle cx=\"130\" cy=\"100\" r=\"8\" fill=\"#0f3460\"/>\n      <circle cx=\"130\" cy=\"60\" r=\"6\" fill=\"#e94560\"/>\n      <circle cx=\"130\" cy=\"140\" r=\"6\" fill=\"#e94560\"/>\n      <circle cx=\"90\" cy=\"100\" r=\"6\" fill=\"#e94560\"/>\n      <circle cx=\"170\" cy=\"100\" r=\"6\" fill=\"#e94560\"/>\n      <circle cx=\"90\" cy=\"60\" r=\"3\" fill=\"#ccc\"/>\n      <circle cx=\"170\" cy=\"60\" r=\"3\" fill=\"#ccc\"/>\n      <circle cx=\"90\" cy=\"140\" r=\"3\" fill=\"#ccc\"/>\n      <circle cx=\"170\" cy=\"140\" r=\"3\" fill=\"#ccc\"/>\n      <line x1=\"130\" y1=\"92\" x2=\"130\" y2=\"68\" stroke=\"#e94560\" stroke-width=\"1.5\"/>\n      <line x1=\"130\" y1=\"108\" x2=\"130\" y2=\"132\" stroke=\"#e94560\" stroke-width=\"1.5\"/>\n      <line x1=\"122\" y1=\"100\" x2=\"98\" y2=\"100\" stroke=\"#e94560\" stroke-width=\"1.5\"/>\n      <line x1=\"138\" y1=\"100\" x2=\"162\" y2=\"100\" stroke=\"#e94560\" stroke-width=\"1.5\"/>\n      <text x=\"130\" y=\"104\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"9\" fill=\"white\">\u22124</text>\n      <text x=\"130\" y=\"56\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"9\" fill=\"#e94560\">+1</text>\n      <text x=\"130\" y=\"152\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"9\" fill=\"#e94560\">+1</text>\n      <text x=\"78\" y=\"104\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"9\" fill=\"#e94560\">+1</text>\n      <text x=\"182\" y=\"104\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"9\" fill=\"#e94560\">+1</text>\n\n      <!-- 9-point stencil -->\n      <text x=\"420\" y=\"18\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"13\" fill=\"#16213e\" font-weight=\"600\">9-Point (Anisotropic)</text>\n      <circle cx=\"420\" cy=\"100\" r=\"8\" fill=\"#0f3460\"/>\n      <circle cx=\"420\" cy=\"60\" r=\"6\" fill=\"#e94560\"/>\n      <circle cx=\"420\" cy=\"140\" r=\"6\" fill=\"#e94560\"/>\n      <circle cx=\"380\" cy=\"100\" r=\"6\" fill=\"#e94560\"/>\n      <circle cx=\"460\" cy=\"100\" r=\"6\" fill=\"#e94560\"/>\n      <circle cx=\"380\" cy=\"60\" r=\"5\" fill=\"#2d6a4f\"/>\n      <circle cx=\"460\" cy=\"60\" r=\"5\" fill=\"#2d6a4f\"/>\n      <circle cx=\"380\" cy=\"140\" r=\"5\" fill=\"#2d6a4f\"/>\n      <circle cx=\"460\" cy=\"140\" r=\"5\" fill=\"#2d6a4f\"/>\n      <line x1=\"420\" y1=\"92\" x2=\"420\" y2=\"68\" stroke=\"#e94560\" stroke-width=\"1.5\"/>\n      <line x1=\"420\" y1=\"108\" x2=\"420\" y2=\"132\" stroke=\"#e94560\" stroke-width=\"1.5\"/>\n      <line x1=\"412\" y1=\"100\" x2=\"388\" y2=\"100\" stroke=\"#e94560\" stroke-width=\"1.5\"/>\n      <line x1=\"428\" y1=\"100\" x2=\"452\" y2=\"100\" stroke=\"#e94560\" stroke-width=\"1.5\"/>\n      <line x1=\"414\" y1=\"94\" x2=\"388\" y2=\"68\" stroke=\"#2d6a4f\" stroke-width=\"1.2\" stroke-dasharray=\"4,2\"/>\n      <line x1=\"426\" y1=\"94\" x2=\"452\" y2=\"68\" stroke=\"#2d6a4f\" stroke-width=\"1.2\" stroke-dasharray=\"4,2\"/>\n      <line x1=\"414\" y1=\"106\" x2=\"388\" y2=\"132\" stroke=\"#2d6a4f\" stroke-width=\"1.2\" stroke-dasharray=\"4,2\"/>\n      <line x1=\"426\" y1=\"106\" x2=\"452\" y2=\"132\" stroke=\"#2d6a4f\" stroke-width=\"1.2\" stroke-dasharray=\"4,2\"/>\n      <text x=\"420\" y=\"104\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"white\">center</text>\n      <text x=\"420\" y=\"56\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#e94560\">D<tspan baseline-shift=\"sub\" font-size=\"6\">yy</tspan></text>\n      <text x=\"420\" y=\"152\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#e94560\">D<tspan baseline-shift=\"sub\" font-size=\"6\">yy</tspan></text>\n      <text x=\"368\" y=\"104\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#e94560\">D<tspan baseline-shift=\"sub\" font-size=\"6\">xx</tspan></text>\n      <text x=\"472\" y=\"104\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#e94560\">D<tspan baseline-shift=\"sub\" font-size=\"6\">xx</tspan></text>\n      <text x=\"370\" y=\"56\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#2d6a4f\">D<tspan baseline-shift=\"sub\" font-size=\"6\">xy</tspan></text>\n      <text x=\"470\" y=\"56\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#2d6a4f\">D<tspan baseline-shift=\"sub\" font-size=\"6\">xy</tspan></text>\n      <text x=\"370\" y=\"152\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#2d6a4f\">D<tspan baseline-shift=\"sub\" font-size=\"6\">xy</tspan></text>\n      <text x=\"470\" y=\"152\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#2d6a4f\">D<tspan baseline-shift=\"sub\" font-size=\"6\">xy</tspan></text>\n    </svg>\n    <div class=\"figure-caption\"><span class=\"figure-label\">Figure 7.2.</span> FDM stencils for the 2D diffusion operator. <em>Left:</em> The 5-point stencil uses axis-aligned neighbors only (isotropic or axis-aligned anisotropic). <em>Right:</em> The 9-point stencil adds diagonal neighbors (green) for the cross-derivative $D_{xy}$ terms from rotated fiber fields.</div>\n  </div>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      <strong>When to use FDM:</strong> FDM is fastest, simplest to implement, and cache-friendly \u2
