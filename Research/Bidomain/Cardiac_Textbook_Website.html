ation. This has implications for anti-arrhythmic drug design.\n    </p>\n  </div>\n\n  <h4>Luminal Calcium Sensing: The CASQ2\u2013Triadin\u2013Junctin Complex</h4>\n\n  <p>\n    RyR2 possesses an intrinsic ability to sense the calcium concentration <em>inside</em> the SR,\n    independent of cytoplasmic calcium. This luminal sensing is mediated by a multi-protein complex\n    anchored to the SR luminal face of RyR2:\n  </p>\n\n  <p>\n    <strong>Calsequestrin 2 (CASQ2)</strong> is the primary SR calcium storage protein, binding\n    $\\sim$40\u201350 calcium ions per molecule across a broad affinity range ($K_d \\approx$ 0.1\u201310 mM).\n    At low luminal $[\\text{Ca}^{2+}]$ ($\\lt$1 mM), CASQ2 exists as a monomer and directly inhibits\n    RyR2 via triadin and junctin \u2014 a molecular \"brake\" that prevents release from a depleted store.\n    As luminal calcium rises through intermediate concentrations (3\u20135 mM), CASQ2 undergoes progressive\n    oligomerization: monomer \u2192 dimer \u2192 polymer. The polymeric form dissociates from the\n    triadin\u2013junctin bridge, <em>relieving</em> RyR2 inhibition and permitting calcium release.\n  </p>\n\n  <p>\n    <strong>Triadin</strong> (primarily the 95 kDa junctional isoform) and <strong>junctin</strong>\n    are integral SR membrane proteins that serve as molecular scaffolds linking CASQ2 to RyR2. Their\n    ablation causes complete loss of functional CRUs, severe arrhythmias, and cardiomyopathy \u2014\n    underscoring their essential structural role. Mutations in triadin and junctin are now recognized\n    causes of catecholaminergic polymorphic ventricular tachycardia (CPVT).\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      The CASQ2 sensing mechanism works like a pressure gauge. When the SR \"tank\" is nearly empty\n      (low luminal calcium), CASQ2 monomers bind to the RyR2 \"valve\" and hold it shut \u2014 preventing\n      futile release from a depleted store. As the tank fills (SERCA pumps calcium back in), CASQ2\n      polymers form and detach from the valve, allowing it to open on the next trigger. This\n      self-regulating mechanism ensures that release magnitude tracks store content \u2014 a form of\n      automatic gain control.\n    </p>\n  </div>\n\n  <h4>The \"Leaky RyR\" Hypothesis and Heart Failure</h4>\n\n  <p>\n    Andrew Marks and colleagues demonstrated that RyR2 dysfunction is central to heart failure\n    pathophysiology through a mechanism now termed the <em>leaky RyR hypothesis</em>. In failing\n    hearts, chronic neurohormonal activation leads to persistent hyperphosphorylation of RyR2 at\n    both S2808 (PKA) and S2814 (CaMKII). This, combined with oxidative modification\n    (S-nitrosylation, sulfhydryl oxidation), increases the channel's diastolic open probability \u2014\n    creating a sustained <em>calcium leak</em> from the SR even when the cell should be at rest.\n  </p>\n\n  <p>\n    The consequences cascade: elevated diastolic $[\\text{Ca}^{2+}]_i$ ($\\sim$200\u2013300 nM vs. normal\n    50\u2013100 nM) impairs relaxation, activates calcium-dependent proteases (calpains), and drives\n    maladaptive hypertrophic signaling via calcineurin/NFAT. Simultaneously, the increased forward-mode\n    NCX activity needed to extrude the leaked calcium brings excess sodium into the cell, raising\n    $[\\text{Na}^+]_i$ and further compromising SERCA efficiency. The leaked SR calcium is also\n    unavailable for systolic release, weakening contraction.\n  </p>\n\n  <h4>Store-Overload-Induced Calcium Release (SOICR)</h4>\n\n  <p>\n    When SR calcium load exceeds a critical threshold ($[\\text{Ca}^{2+}]_{\\text{SR}} \\gt$ $\\sim$1.5 mM\n    free), spontaneous calcium release occurs without any electrical trigger \u2014 a phenomenon called\n    SOICR. At such high loads, CASQ2 inhibition is completely relieved, and the tiny amount of calcium\n    that inevitably leaks through any channel is amplified by CICR into full-scale spontaneous waves.\n  </p>\n\n  <p>\n    SOICR is the cellular mechanism behind digitalis toxicity (Na/K-ATPase inhibition \u2192 sodium overload \u2192\n    reverse NCX \u2192 calcium overload \u2192 SOICR \u2192 arrhythmia), and it is a primary trigger for CPVT \u2014 a\n    genetic arrhythmia syndrome caused by RyR2 or CASQ2 mutations that lower the load threshold for\n    spontaneous release. Carvedilol, a nonselective beta-blocker, uniquely suppresses SOICR by directly\n    reducing RyR2 open duration, independent of its beta-blocking properties \u2014 making it particularly\n    effective for CPVT and heart failure arrhythmias.\n  </p>\n\n  <h3>4.4 &ensp; SERCA2a and Phospholamban \u2014 The Pump and Its Brake</h3>\n\n  <p>\n    The sarco/endoplasmic reticulum calcium-ATPase 2a (SERCA2a) is the workhorse of diastolic calcium\n    removal, responsible for 70\u201390% of cytoplasmic calcium clearance in human ventricular myocytes.\n    Understanding its regulation is essential for understanding both normal relaxation and the diastolic\n    dysfunction that characterizes heart failure.\n  </p>\n\n  <h4>SERCA2a Kinetics</h4>\n\n  <p>\n    SERCA2a transports 2 Ca$^{2+}$ ions per ATP hydrolyzed, with a $K_m$ of $\\sim$0.5\u20131 $\\mu$M for\n    calcium \u2014 meaning it operates at roughly half-maximal velocity at resting diastolic $[\\text{Ca}^{2+}]$.\n    The pump consumes an estimated 30\u201340% of the myocyte's total ATP budget during active beating \u2014 a\n    staggering metabolic cost that underscores calcium cycling's importance. A typical human ventricular\n    myocyte contains $\\sim$1,000\u20132,000 SERCA2a molecules per unit SR surface.\n  </p>\n\n  <!-- \u2500\u2500\u2500 SERCA/PLB pump-brake diagram \u2500\u2500\u2500 -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 560 190\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:500px;\">\n      <!-- Left panel: PLB inhibited (baseline) -->\n      <text x=\"140\" y=\"16\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#b36b00\" font-weight=\"700\">Baseline: PLB Inhibits SERCA</text>\n      <!-- SR membrane -->\n      <rect x=\"30\" y=\"80\" width=\"220\" height=\"8\" rx=\"2\" fill=\"#fff3e0\" stroke=\"#b36b00\" stroke-width=\"1\"/>\n      <text x=\"140\" y=\"107\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#b36b00\">SR membrane</text>\n      <!-- SERCA pump (circle embedded in membrane) -->\n      <circle cx=\"120\" cy=\"84\" r=\"22\" fill=\"#2d6a4f\" opacity=\"0.2\" stroke=\"#2d6a4f\" stroke-width=\"1.5\"/>\n      <text x=\"120\" y=\"81\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"9\" fill=\"#2d6a4f\" font-weight=\"700\">SERCA</text>\n      <text x=\"120\" y=\"91\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#2d6a4f\">slow</text>\n      <!-- PLB bound (red X on pump) -->\n      <circle cx=\"150\" cy=\"65\" r=\"12\" fill=\"#e94560\" opacity=\"0.2\" stroke=\"#e94560\" stroke-width=\"1.5\"/>\n      <text x=\"150\" y=\"69\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"9\" fill=\"#e94560\" font-weight=\"700\">PLB</text>\n      <!-- Ca arrows (slow, thin) -->\n      <path d=\"M 120,55 L 120,30\" fill=\"none\" stroke=\"#5a6175\" stroke-width=\"1\" stroke-dasharray=\"3,2\" marker-end=\"url(#arrGraySerca)\"/>\n      <text x=\"105\" y=\"28\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#5a6175\">Ca\u00b2\u207a \u2193 slow</text>\n      <!-- Cytoplasm label -->\n      <text x=\"140\" y=\"130\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\" font-style=\"italic\">Cytoplasm</text>\n      <text x=\"140\" y=\"45\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\" font-style=\"italic\">SR lumen</text>\n      <!-- Km annotation -->\n      <text x=\"140\" y=\"150\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#e94560\">K<tspan font-size=\"6\" dy=\"1\">m</tspan><tspan dy=\"-1\"> \u2248 1.5 \u00b5M (low affinity)</tspan></text>\n\n      <!-- Arrow between panels -->\n      <text x=\"280\" y=\"70\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"20\" fill=\"#2d6a4f\">\u2192</text>\n      <text x=\"280\" y=\"88\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#2d6a4f\">PKA / CaMKII</text>\n      <text x=\"280\" y=\"98\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#2d6a4f\">phosphorylation</text>\n\n      <!-- Right panel: PLB released (\u03b2-adrenergic) -->\n      <text x=\"430\" y=\"16\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#2d6a4f\" font-weight=\"700\">\u03b2-Adrenergic: PLB Released</text>\n      <rect x=\"320\" y=\"80\" width=\"220\" height=\"8\" rx=\"2\" fill=\"#fff3e0\" stroke=\"#b36b00\" stroke-width=\"1\"/>\n      <text x=\"430\" y=\"107\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#b36b00\">SR membrane</text>\n      <!-- SERCA pump (bright, active) -->\n      <circle cx=\"410\" cy=\"84\" r=\"22\" fill=\"#2d6a4f\" opacity=\"0.5\" stroke=\"#2d6a4f\" stroke-width=\"2\"/>\n      <text x=\"410\" y=\"81\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"9\" fill=\"white\" font-weight=\"700\">SERCA</text>\n      <text x=\"410\" y=\"91\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"white\">FAST</text>\n      <!-- PLB dissociated (moved away) -->\n      <circle cx=\"480\" cy=\"65\" r=\"10\" fill=\"#5a6175\" opacity=\"0.15\" stroke=\"#5a6175\" stroke-width=\"1\" stroke-dasharray=\"2,2\"/>\n      <text x=\"480\" y=\"68\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"7\" fill=\"#5a6175\">PLB-P</text>\n      <!-- Ca arrows (fast, thick) -->\n      <path d=\"M 410,55 L 410,30\" fill=\"none\" stroke=\"#2d6a4f\" stroke-width=\"2.5\" marker-end=\"url(#arrGreenSerca)\"/>\n      <text x=\"395\" y=\"28\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#2d6a4f\" font-weight=\"700\">Ca\u00b2\u207a \u2193 FAST</text>\n      <text x=\"430\" y=\"130\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\" font-style=\"italic\">Cytoplasm</text>\n      <text x=\"430\" y=\"45\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\" font-style=\"italic\">SR lumen</text>\n      <text x=\"430\" y=\"150\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#2d6a4f\">K<tspan font-size=\"6\" dy=\"1\">m</tspan><tspan dy=\"-1\"> \u2248 0.5 \u00b5M (high affinity)</tspan></text>\n\n      <defs>\n        <marker id=\"arrGraySerca\" markerWidth=\"6\" markerHeight=\"5\" refX=\"6\" refY=\"2.5\" orient=\"auto\">\n          <path d=\"M 0,0 L 6,2.5 L 0,5 Z\" fill=\"#5a6175\"/>\n        </marker>\n        <marker id=\"arrGreenSerca\" markerWidth=\"7\" markerHeight=\"5\" refX=\"7\" refY=\"2.5\" orient=\"auto\">\n          <path d=\"M 0,0 L 7,2.5 L 0,5 Z\" fill=\"#2d6a4f\"/>\n        </marker>\n      </defs>\n    </svg>\n    <div class=\"figure-caption\"><span class=\"figure-label\">Figure 4.3.</span> The SERCA2a/phospholamban pump-brake system. <em>Left:</em> At baseline, PLB inhibits SERCA2a by reducing its calcium affinity (high $K_m$), resulting in slow calcium reuptake. <em>Right:</em> After PKA phosphorylation (\u03b2-adrenergic stimulation), PLB dissociates, restoring SERCA2a's full affinity and dramatically accelerating calcium reuptake \u2014 the molecular basis of lusitropy.</div>\n  </div>\n\n  <h4>Phospholamban: The Molecular Brake</h4>\n\n  <p>\n    Phospholamban (PLB) is a 52-amino-acid transmembrane protein that constitutively <em>inhibits</em>\n    SERCA2a in its unphosphorylated state. It reduces SERCA2a's calcium affinity 2\u20133-fold (shifting\n    $K_m$ from $\\sim$0.5 $\\mu$M to $\\sim$1.5 $\\mu$M), dramatically slowing calcium reuptake at\n    diastolic calcium concentrations. PLB is the reason that at baseline, SERCA2a operates far below\n    its maximum capacity \u2014 a reserve that can be unlocked on demand.\n  </p>\n\n  <p>\n    During beta-adrenergic stimulation, PKA phosphorylates PLB at serine-16 (and CaMKII at threonine-17),\n    causing PLB to dissociate from SERCA2a. This relieves inhibition and dramatically accelerates\n    calcium reuptake \u2014 the molecular basis of the <em>lusitropic</em> (relaxation-enhancing) effect\n    of sympathetic stimulation. The coordinated phosphorylation of both RyR2 (more release) and PLB\n    (faster reuptake) ensures that the enhanced systolic transient is followed by faster relaxation,\n    allowing the heart to fill adequately at elevated heart rates.\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      The CUPID trials (Calcium Upregulation by Percutaneous Administration of Gene Therapy in Cardiac\n      Disease) attempted to restore SERCA2a expression in failing hearts using AAV1-delivered gene\n      therapy. Early-phase results were encouraging, but the pivotal CUPID 2 trial (2016) did not meet\n      its primary endpoint. Current research has shifted toward upstream approaches: rather than\n      adding more pump protein, investigators are targeting phosphatase-1 inhibitors (e.g., AB-1002)\n      to relieve PLB-mediated inhibition of the <em>endogenous</em> SERCA2a \u2014 a more physiologically\n      regulated strategy.\n    </p>\n  </div>\n\n  <h3>4.5 &ensp; The Sodium-Calcium Exchanger \u2014 Dual-Mode Transport</h3>\n\n  <p>\n    The sodium-calcium exchanger NCX1 is a bidirectional transporter that exchanges 3 Na$^+$ for 1\n    Ca$^{2+}$ across the sarcolemma. The direction of transport depends on the electrochemical\n    gradients of both ions and the membrane potential \u2014 making NCX a voltage-sensitive, context-dependent\n    player in calcium homeostasis.\n  </p>\n\n  <!-- \u2500\u2500\u2500 NCX bidirectional operation diagram \u2500\u2500\u2500 -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 560 180\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:500px;\">\n      <!-- Left: Forward mode -->\n      <text x=\"130\" y=\"16\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#e94560\" font-weight=\"700\">Forward Mode (Diastole / Phase 3\u20134)</text>\n      <!-- Membrane -->\n      <rect x=\"20\" y=\"75\" width=\"220\" height=\"8\" rx=\"2\" fill=\"#eef0f8\" stroke=\"#0f3460\" stroke-width=\"1\"/>\n      <!-- NCX transporter -->\n      <rect x=\"95\" y=\"55\" width=\"70\" height=\"48\" rx=\"8\" fill=\"#0f3460\" opacity=\"0.12\" stroke=\"#0f3460\" stroke-width=\"1.5\"/>\n      <text x=\"130\" y=\"78\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#0f3460\" font-weight=\"700\">NCX</text>\n      <!-- 3 Na\u207a in -->\n      <path d=\"M 110,45 L 110,55\" fill=\"none\" stroke=\"#e94560\" stroke-width=\"2\" marker-end=\"url(#arrRedNCX)\"/>\n      <text x=\"110\" y=\"40\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#e94560\" font-weight=\"600\">3 Na\u207a IN</text>\n      <!-- 1 Ca\u00b2\u207a out -->\n      <path d=\"M 150,103 L 150,115\" fill=\"none\" stroke=\"#2d6a4f\" stroke-width=\"2\" marker-end=\"url(#arrGreenNCX)\"/>\n      <text x=\"150\" y=\"130\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#2d6a4f\" font-weight=\"600\">1 Ca\u00b2\u207a OUT</text>\n      <!-- Net current -->\n      <rect x=\"45\" y=\"140\" width=\"170\" height=\"22\" rx=\"4\" fill=\"#e94560\" opacity=\"0.1\"/>\n      <text x=\"130\" y=\"155\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#e94560\">Net: 1 charge IN \u2192 inward current</text>\n      <!-- Labels -->\n      <text x=\"40\" y=\"50\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\" font-style=\"italic\">Extracellular</text>\n      <text x=\"40\" y=\"116\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\" font-style=\"italic\">Intracellular</text>\n\n      <!-- Arrow between panels -->\n      <text x=\"280\" y=\"80\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"18\" fill=\"#5a6175\">\u21cc</text>\n\n      <!-- Right: Reverse mode -->\n      <text x=\"430\" y=\"16\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#0f3460\" font-weight=\"700\">Reverse Mode (Early Phase 0\u20131)</text>\n      <rect x=\"320\" y=\"75\" width=\"220\" height=\"8\" rx=\"2\" fill=\"#eef0f8\" stroke=\"#0f3460\" stroke-width=\"1\"/>\n      <rect x=\"395\" y=\"55\" width=\"70\" height=\"48\" rx=\"8\" fill=\"#0f3460\" opacity=\"0.12\" stroke=\"#0f3460\" stroke-width=\"1.5\"/>\n      <text x=\"430\" y=\"78\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#0f3460\" font-weight=\"700\">NCX</text>\n      <!-- 3 Na\u207a out -->\n      <path d=\"M 410,103 L 410,115\" fill=\"none\" stroke=\"#e94560\" stroke-width=\"2\" marker-end=\"url(#arrRedNCX)\"/>\n      <text x=\"410\" y=\"130\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#e94560\" font-weight=\"600\">3 Na\u207a OUT</text>\n      <!-- 1 Ca\u00b2\u207a in -->\n      <path d=\"M 450,45 L 450,55\" fill=\"none\" stroke=\"#2d6a4f\" stroke-width=\"2\" marker-end=\"url(#arrGreenNCX)\"/>\n      <text x=\"450\" y=\"40\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#2d6a4f\" font-weight=\"600\">1 Ca\u00b2\u207a IN</text>\n      <rect x=\"345\" y=\"140\" width=\"170\" height=\"22\" rx=\"4\" fill=\"#0f3460\" opacity=\"0.1\"/>\n      <text x=\"430\" y=\"155\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#0f3460\">Net: 1 charge OUT \u2192 outward current</text>\n      <text x=\"340\" y=\"50\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\" font-style=\"italic\">Extracellular</text>\n      <text x=\"340\" y=\"116\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\" font-style=\"italic\">Intracellular</text>\n\n      <defs>\n        <marker id=\"arrRedNCX\" markerWidth=\"7\" markerHeight=\"5\" refX=\"7\" refY=\"2.5\" orient=\"auto\">\n          <path d=\"M 0,0 L 7,2.5 L 0,5 Z\" fill=\"#e94560\"/>\n        </marker>\n        <marker id=\"arrGreenNCX\" markerWidth=\"7\" markerHeight=\"5\" refX=\"7\" refY=\"2.5\" orient=\"auto\">\n          <path d=\"M 0,0 L 7,2.5 L 0,5 Z\" fill=\"#2d6a4f\"/>\n        </marker>\n      </defs>\n    </svg>\n    <div class=\"figure-caption\"><span class=\"figure-label\">Figure 4.4.</span> The two operating modes of the Na$^+$/Ca$^{2+}$ exchanger (NCX). <em>Left:</em> Forward mode \u2014 dominant during diastole and late repolarization \u2014 extrudes Ca$^{2+}$ while importing Na$^+$, generating a net inward (depolarizing) current. <em>Right:</em> Reverse mode \u2014 briefly active during early depolarization \u2014 imports Ca$^{2+}$ and exports Na$^+$, generating a net outward current. The reversal potential depends on both $[\\text{Na}^+]$ and $[\\text{Ca}^{2+}]$ gradients plus $V_m$.</div>\n  </div>\n\n  <h4>Forward Mode (Calcium Extrusion)</h4>\n\n  <p>\n    Under normal diastolic conditions, NCX operates in <em>forward mode</em>: 3 Na$^+$ ions enter\n    the cell down their concentration gradient, providing the energy to extrude 1 Ca$^{2+}$ against\n    its gradient. This accounts for $\\sim$10\u201330% of diastolic calcium removal (with SERCA2a handling\n    the remainder). Because the exchange is electrogenic (net transfer of one positive charge inward),\n    forward-mode NCX generates a small depolarizing current \u2014 normally negligible, but significant\n    when calcium is elevated.\n  </p>\n\n  <h4>Reverse Mode and Arrhythmogenesis</h4>\n\n  <p>\n    When intracellular sodium is elevated (as in heart failure or digitalis toxicity) or the membrane\n    is strongly depolarized, NCX reverses: Na$^+$ exits and Ca$^{2+}$ enters. This reverse-mode\n    operation contributes to calcium overload. More importantly, during spontaneous calcium waves,\n    the large forward-mode NCX current (extruding the wave-elevated calcium) generates substantial\n    inward current \u2014 100\u2013500 pA when summed over the cell \u2014 sufficient to depolarize the membrane\n    and trigger delayed afterdepolarizations (DADs). This is the primary mechanism linking calcium\n    instability to electrical arrhythmia.\n  </p>\n\n  <p>\n    Recent cryo-EM structures of human NCX1 (2023) revealed distinct inactivated and activated\n    conformations, with a sodium-dependent inactivation mechanism that serves as an intrinsic \"brake\"\n    when intracellular sodium is chronically elevated. A 2024 study showed that gain-of-function NCX1\n    mutations paradoxically depress contractility by excessive calcium extrusion, demonstrating that\n    too much of either forward or reverse NCX activity is maladaptive.\n  </p>\n\n  <h4>The Calcium Clock in Pacemaker Cells</h4>\n\n  <p>\n    In sinoatrial node (SAN) cells, a fundamentally different calcium cycling mechanism contributes\n    to automaticity. During diastole, spontaneous calcium sparks from the SR activate NCX in forward\n    mode, generating a ramp-like inward current that gradually depolarizes the membrane toward threshold.\n    This \"calcium clock\" works in concert with the classical \"membrane clock\" (funny current $I_f$,\n    T-type calcium current) to set heart rate. Disruption of the calcium clock \u2014 through RyR2 inhibition\n    or SERCA2a depression \u2014 slows or abolishes pacemaker activity, demonstrating that spontaneous\n    calcium cycling is not merely a byproduct but an active driver of the heartbeat.\n  </p>\n\n  <h3>4.6 &ensp; Calcium Buffering \u2014 The 1% Rule</h3>\n\n  <p>\n    Perhaps the most underappreciated fact in cardiac calcium biology is that <strong>only $\\sim$1\u20132%\n    of total intracellular calcium exists as free Ca$^{2+}$ ions</strong>. The remaining 98\u201399% is\n    bound to proteins. This massive buffering has profound consequences for calcium signaling: it\n    drastically slows effective calcium diffusion (to $\\sim$10\u201330 $\\mu$m$^2$/s, roughly 10\u00d7 slower\n    than free aqueous diffusion) and shapes the kinetics of every calcium-dependent process.\n  </p>\n\n  <p>\n    The buffer capacity $\\beta$ \u2014 defined as the ratio of total calcium change to free calcium change \u2014\n    ranges from $\\sim$20 to 100 depending on the cell compartment. During a typical beat, free\n    $[\\text{Ca}^{2+}]_i$ rises from $\\sim$100 nM to $\\sim$1\u20132 $\\mu$M, a 10\u201320-fold increase. But the\n    total calcium flux required to achieve this is 20\u2013100 times larger, because most of the released\n    calcium is immediately captured by buffers.\n  </p>\n\n  <!-- \u2500\u2500\u2500 Calcium buffering pie chart \u2500\u2500\u2500 -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 520 220\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:460px;\">\n      <!-- Left: total Ca pie -->\n      <text x=\"110\" y=\"18\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#16213e\" font-weight=\"700\">Total Cytoplasmic Ca\u00b2\u207a</text>\n      <!-- Bound portion (large) -->\n      <circle cx=\"110\" cy=\"120\" r=\"70\" fill=\"#0f3460\" opacity=\"0.15\" stroke=\"#0f3460\" stroke-width=\"1.5\"/>\n      <!-- Free portion (tiny slice) \u2014 approximated as a thin wedge -->\n      <path d=\"M 110,120 L 180,120 A 70,70 0 0,0 177,99 Z\" fill=\"#e94560\" opacity=\"0.7\" stroke=\"#e94560\" stroke-width=\"1\"/>\n      <!-- Labels -->\n      <text x=\"85\" y=\"125\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"13\" fill=\"#0f3460\" font-weight=\"700\">98\u201399%</text>\n      <text x=\"85\" y=\"140\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"9\" fill=\"#0f3460\">bound to buffers</text>\n      <text x=\"188\" y=\"105\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#e94560\" font-weight=\"700\">1\u20132%</text>\n      <text x=\"188\" y=\"117\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#e94560\">free Ca\u00b2\u207a</text>\n\n      <!-- Right: buffer partitioning -->\n      <text x=\"380\" y=\"18\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#16213e\" font-weight=\"700\">Cytoplasmic Buffer Partitioning</text>\n      <!-- Stacked bar chart -->\n      <rect x=\"300\" y=\"38\" width=\"160\" height=\"36\" rx=\"0\" fill=\"#2d6a4f\" opacity=\"0.6\"/>\n      <text x=\"380\" y=\"55\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"white\" font-weight=\"600\">Troponin C  ~35%</text>\n      <text x=\"380\" y=\"67\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"white\">contractile sensor</text>\n\n      <rect x=\"300\" y=\"76\" width=\"160\" height=\"26\" rx=\"0\" fill=\"#5a6175\" opacity=\"0.45\"/>\n      <text x=\"380\" y=\"93\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"white\" font-weight=\"600\">ATP/Mg\u00b2\u207a  ~15%</text>\n\n      <rect x=\"300\" y=\"104\" width=\"160\" height=\"26\" rx=\"0\" fill=\"#0f3460\" opacity=\"0.4\"/>\n      <text x=\"380\" y=\"121\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"white\" font-weight=\"600\">Calmodulin  ~12%</text>\n\n      <rect x=\"300\" y=\"132\" width=\"160\" height=\"20\" rx=\"0\" fill=\"#b36b00\" opacity=\"0.35\"/>\n      <text x=\"380\" y=\"146\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"white\" font-weight=\"600\">Other  ~38%</text>\n\n      <!-- SR buffer annotation -->\n      <rect x=\"300\" y=\"165\" width=\"160\" height=\"36\" rx=\"4\" fill=\"#fff3e0\" stroke=\"#b36b00\" stroke-width=\"1\"/>\n      <text x=\"380\" y=\"180\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"9\" fill=\"#b36b00\" font-weight=\"600\">Inside SR:</text>\n      <text x=\"380\" y=\"193\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"8\" fill=\"#b36b00\">CASQ2 buffers 95\u201398%</text>\n    </svg>\n    <div class=\"figure-caption\"><span class=\"figure-label\">Figure 4.5.</span> Calcium buffering in the cardiomyocyte. <em>Left:</em> Only 1\u20132% of total cytoplasmic calcium is free; the rest is bound to buffer proteins. <em>Right:</em> Partitioning among the major cytoplasmic buffers. Troponin C (the contractile sensor) is the largest single buffer pool. Inside the SR, calsequestrin-2 (CASQ2) binds 95\u201398% of luminal calcium.</div>\n  </div>\n\n  <h4>The Major Buffers</h4>\n\n  <p>\n    <strong>Troponin C ($\\sim$35% of cytoplasmic buffering):</strong> The regulatory calcium sensor of\n    the contractile apparatus. Each troponin C molecule has 4 calcium-binding sites (2 regulatory with\n    $K_d \\approx 1{-}10\\;\\mu$M, 2 structural with $K_d \\approx 100$ nM). With $\\sim$10\u201315 million\n    troponin C molecules per myocyte, this represents the largest single buffer pool. Calcium binding\n    to the regulatory sites triggers the conformational cascade (tropomyosin shift \u2192 myosin binding site\n    exposure \u2192 cross-bridge cycling) that produces contraction. Thus troponin C is simultaneously a\n    buffer, a sensor, and the effector of the entire contractile process.\n  </p>\n\n  <p>\n    <strong>Calmodulin ($\\sim$12% of buffering):</strong> A ubiquitous calcium sensor with 4 EF-hand\n    binding motifs ($K_d$ range 100 nM to 5 $\\mu$M). Calmodulin activates CaMKII, calcineurin, and\n    numerous other enzymes \u2014 serving as the cell's primary calcium-to-kinase signal transducer.\n    With $\\sim$1\u20132 million molecules per myocyte and faster on/off kinetics than troponin C, calmodulin\n    is particularly responsive to rapid calcium transients.\n  </p>\n\n  <p>\n    <strong>Calsequestrin 2 ($\\sim$95\u201398% of SR luminal buffering):</strong> Inside the SR,\n    CASQ2 binds $\\sim$40\u201350 calcium ions per molecule, maintaining total SR calcium at 1\u20132 mM while\n    keeping free SR calcium at only $\\sim$20\u201350 $\\mu$M. This enormous buffer capacity allows the SR\n    to function as a high-capacity store without the osmotic stress that millimolar free calcium\n    would create.\n  </p>\n\n  <p>\n    <strong>Other contributors:</strong> ATP and its magnesium complexes ($\\sim$15%), mitochondrial\n    uptake ($\\lt$5% acutely but important for long-term calcium homeostasis), and various smaller\n    calcium-binding proteins collectively account for the remaining buffering capacity.\n  </p>\n\n  <div class=\"insight insight-math\">\n    <p>\n      In computational models, calcium buffering is typically handled by either <em>rapid-equilibrium\n      approximation</em> (assuming buffer binding/unbinding is instantaneous, valid when buffer\n      kinetics are much faster than calcium transient kinetics) or <em>dynamic buffering ODEs</em>\n      (explicitly tracking bound and free buffer pools). TTP06 uses a rapid-equilibrium approach\n      for most buffers, while ORd tracks selected buffer states dynamically. The choice matters:\n      dynamic buffering adds state variables but captures the delay between calcium rise and buffer\n      saturation \u2014 important for accurate spark modeling.\n    </p>\n  </div>\n\n  <h3>4.7 &ensp; T-Tubule Remodeling \u2014 When Structure Fails</h3>\n\n  <p>\n    The T-tubule network consists of regular sarcolemmal invaginations ($\\sim$0.2\u20130.5 $\\mu$m diameter)\n    that penetrate deep into the myocyte at $\\sim$2 $\\mu$m intervals, aligned with the Z-lines of the\n    sarcomere. This regular architecture ensures that every CRU across the cell volume is within\n    $\\sim$1 $\\mu$m of a T-tubule, enabling near-synchronous calcium release during the action potential.\n  </p>\n\n  <h4>T-Tubule Loss in Heart Failure</h4>\n\n  <p>\n    One of the earliest and most consequential structural changes in the failing myocardium is\n    progressive loss and disorganization of the T-tubule network. Advanced heart failure can show\n    50\u201380% reduction in T-tubular density, with the remaining tubules becoming tortuous, dilated,\n    and misaligned.\n  </p>\n\n  <p>\n    The primary mechanism is <strong>calpain-mediated cleavage of junctophilin-2</strong>. Elevated\n    diastolic calcium in failing cells activates the protease calpain, which cleaves JPH2 \u2014 the very\n    protein that anchors T-tubules to the jSR. Once this anchor is lost, the T-tubule membrane\n    retracts from the SR surface, physically separating L-type channels from RyR2 clusters.\n  </p>\n\n  <h4>Orphaned RyR2 and Dyssynchronous Release</h4>\n\n  <p>\n    As T-tubules withdraw, the RyR2 clusters they once faced become <em>orphaned</em> \u2014 physically\n    uncoupled from their L-type channel triggers. These orphaned RyR2s cannot be activated by the\n    normal CICR mechanism (the L-type channel calcium signal no longer reaches them). Instead, they\n    can only be activated secondarily, by the slower wave-like diffusion of calcium from neighboring\n    intact dyads. The result is <em>dyssynchronous calcium release</em>: surface dyads fire promptly\n    with the action potential, while interior orphaned clusters fire with a variable delay of\n    10\u2013100 ms.\n  </p>\n\n  <p>\n    This dyssynchrony has dual consequences. First, the contractile force is reduced \u2014 not all\n    sarcomeres are activated simultaneously. Second, the orphaned RyR2s, no longer under the tight\n    local control of a nearby L-type channel, often exhibit increased sensitivity to luminal calcium\n    and are prone to spontaneous opening. They become sources of diastolic calcium leak and\n    spontaneous waves \u2014 contributing to both systolic dysfunction and arrhythmia susceptibility.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      From a modeling perspective, the T-tubule remodeling story highlights a limitation of standard\n      ionic models like TTP06 and ORd: they assume a single, well-coupled dyadic compartment. Capturing\n      the spatial heterogeneity of heart failure \u2014 some CRUs coupled, some orphaned, some partially\n      coupled \u2014 requires either multi-compartment extensions or spatially explicit subcellular models.\n      This remains an active area of computational research, with multiscale models (2021\u20132024)\n      integrating nanoscale dyadic dynamics into whole-cell and tissue-level simulations.\n    </p>\n  </div>\n\n  <h3>4.8 &ensp; Emerging Frontiers: Imaging, Modeling, and Therapy</h3>\n\n  <h4>Super-Resolution Imaging of Living Cardiomyocytes</h4>\n\n  <p>\n    The past five years have seen transformative advances in visualizing calcium handling machinery\n    in intact, living cells. <strong>MINFLUX microscopy</strong> (2024\u20132025) can now resolve individual\n    RyR2 subunits and determine their 3D orientation within clusters \u2014 approaching atomic-level structural\n    information in the native cellular environment. Live-cell photoactivated localization microscopy (PALM,\n    2022) has correlated nanoscale RyR2 cluster configuration with functional calcium spark properties,\n    revealing that heart failure induces fragmentation of large RyR2 clusters into numerous smaller\n    groupings with increased nearest-neighbor distances and impaired cooperative gating.\n  </p>\n\n  <h4>Next-Generation Calcium Indicators</h4>\n\n  <p>\n    Genetically encoded calcium indicators continue to evolve. The jGCaMP8 family (2023) achieves\n    submillisecond rise times with the highest sensitivity yet \u2014 enabling real-time nanodomain calcium\n    imaging. The NEMOer sensor family (2025) was specifically designed for endoplasmic/sarcoplasmic\n    reticulum calcium imaging, overcoming the limited dynamic range of previous luminal indicators.\n    These tools are beginning to provide direct experimental access to the $[\\text{Ca}^{2+}]_{\\text{SR}}$\n    dynamics that models have long predicted but experiments could not resolve.\n  </p>\n\n  <h4>Graph-Theoretic Prediction of Spark Fidelity</h4>\n\n  <p>\n    A striking computational advance (2023) uses graph theory to predict calcium spark probability\n    directly from nanoscale cluster architecture. By constructing an adjacency graph of RyR2 positions\n    within a CRU (nodes = channels, edges = functional coupling), researchers showed that the\n    <em>maximum eigenvalue</em> of this adjacency matrix predicts spark probability with remarkable\n    accuracy. This bridges the gap between structure (super-resolution images) and function\n    (calcium spark recordings), explaining why some RyR2 clusters reliably produce sparks while\n    others are functionally \"silent.\"\n  </p>\n\n  <p>\n    With this deep understanding of calcium handling in hand, we are now prepared to examine the\n    quantitative ionic models that encode these mechanisms computationally. The next chapter dissects\n    the ten Tusscher\u2013Panfilov 2006 model \u2014 18 state variables that capture the calcium cycling\n    machinery alongside every ionic current we have discussed.\n  </p>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 5 \u2014 THE TEN TUSSCHER\u2013PANFILOV 2006 MODEL                  -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "ch5": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 5</div>\n  <h2 class=\"chapter-title\">The ten Tusscher\u2013Panfilov 2006 Model</h2>\n  <div class=\"chapter-intro\">\n    TTP06 is the workhorse model for human ventricular electrophysiology. With 18 state variables \u2014\n    12 gating variables and 6 ionic concentrations \u2014 it captures every phase of the action potential\n    we dissected in Chapter 3, plus the calcium cycling machinery that drives contraction.\n  </div>\n\n  <h3>5.1 &ensp; 18 State Variables: What and Why</h3>\n\n  <p>\n    A natural question when encountering TTP06 for the first time is: <em>why 18 variables?</em>\n    The answer lies in the variety of currents and intracellular processes that shape the cardiac AP.\n    Each current requires gates, and each ion species requires a concentration variable to track\n    changes over multiple beats.\n  </p>\n\n  <p>\n    The 18 states fall into two natural groups:\n  </p>\n\n  <p>\n    <strong>12 gating variables</strong> (each between 0 and 1, following Hodgkin\u2013Huxley-style kinetics):\n  </p>\n\n  <table>\n    <tr><th>Gate</th><th>Current</th><th>Role</th><th>Speed</th></tr>\n    <tr><td>$m$</td><td>$I_{\\text{Na}}$</td><td>Na$^+$ activation</td><td>$\\lt 1$ ms</td></tr>\n    <tr><td>$h$, $j$</td><td>$I_{\\text{Na}}$</td><td>Na$^+$ fast and slow inactivation</td><td>1\u2013100 ms</td></tr>\n    <tr><td>$d$</td><td>$I_{\\text{CaL}}$</td><td>Ca$^{2+}$ activation</td><td>1\u20135 ms</td></tr>\n    <tr><td>$f$, $f_2$</td><td>$I_{\\text{CaL}}$</td><td>Ca$^{2+}$ voltage inactivation</td><td>20\u2013300 ms</td></tr>\n    <tr><td>$f_{\\text{Ca}}$</td><td>$I_{\\text{CaL}}$</td><td>Ca$^{2+}$-dependent inactivation</td><td>2\u201350 ms</td></tr>\n    <tr><td>$r$</td><td>$I_{\\text{to}}$</td><td>Transient outward activation</td><td>1\u20135 ms</td></tr>\n    <tr><td>$s$</td><td>$I_{\\text{to}}$</td><td>Transient outward inactivation</td><td>5\u201350 ms</td></tr>\n    <tr><td>$x_{r1}$, $x_{r2}$</td><td>$I_{\\text{Kr}}$</td><td>Rapid delayed rectifier</td><td>10\u2013100 ms</td></tr>\n    <tr><td>$x_s$</td><td>$I_{\\text{Ks}}$</td><td>Slow delayed rectifier</td><td>100\u2013500 ms</td></tr>\n  </table>\n\n  <p>\n    <strong>6 concentration variables</strong> (dynamic, changing each beat):\n  </p>\n\n  <table>\n    <tr><th>Variable</th><th>Description</th><th>Typical Value</th></tr>\n    <tr><td>$[\\text{Na}^+]_i$</td><td>Intracellular sodium</td><td>$\\sim$10 mM</td></tr>\n    <tr><td>$[\\text{K}^+]_i$</td><td>Intracellular potassium</td><td>$\\sim$138 mM</td></tr>\n    <tr><td>$[\\text{Ca}^{2+}]_i$</td><td>Cytoplasmic calcium (free)</td><td>$\\sim$0.0001 mM</td></tr>\n    <tr><td>$[\\text{Ca}^{2+}]_{\\text{SR}}$</td><td>SR calcium store</td><td>$\\sim$1\u20133 mM</td></tr>\n    <tr><td>$[\\text{Ca}^{2+}]_{\\text{ss}}$</td><td>Subspace calcium (near L-type channels)</td><td>$\\sim$0.0001 mM</td></tr>\n    <tr><td>$R'$</td><td>SR release recovery variable</td><td>$\\sim$1</td></tr>\n  </table>\n\n  <p>\n    The distinction between $[\\text{Ca}^{2+}]_i$, $[\\text{Ca}^{2+}]_{\\text{ss}}$, and\n    $[\\text{Ca}^{2+}]_{\\text{SR}}$ reflects the <em>compartmentalization</em> of calcium handling.\n    Calcium entering through L-type channels first reaches a tiny subspace near the SR release\n    channels, triggering CICR locally before diffusing into the bulk cytoplasm.\n  </p>\n\n  <h3>5.2 &ensp; The Complete Current Inventory</h3>\n\n  <p>\n    TTP06 models 12 distinct membrane currents plus 4 internal calcium fluxes. Every membrane current\n    contributes to the total ionic current:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(5.1)</span>\n    $$I_{\\text{ion}} = \\underbrace{I_{\\text{Na}} + I_{\\text{CaL}}}_{\\text{depolarizing}} + \\underbrace{I_{\\text{to}} + I_{\\text{Kr}} + I_{\\text{Ks}} + I_{\\text{K1}} + I_{\\text{pK}}}_{\\text{repolarizing}} + \\underbrace{I_{\\text{NaK}} + I_{\\text{NaCa}} + I_{\\text{pCa}}}_{\\text{pumps/exchangers}} + \\underbrace{I_{\\text{bNa}} + I_{\\text{bCa}}}_{\\text{background}}$$\n  </div>\n\n  <p>\n    This equation is the heart of the model: at every timestep, the simulator evaluates all 12 terms,\n    sums them, and uses the total to update $V_m$. The sign convention follows physiology \u2014 positive\n    current is outward (repolarizing), negative current is inward (depolarizing). The table below\n    provides a complete reference, mapping each current to its AP phase, physiological role, and\n    clinical significance.\n  </p>\n\n  <!-- \u2500\u2500\u2500 Comprehensive current table \u2500\u2500\u2500 -->\n  <table>\n    <tr><th>Current</th><th>Type</th><th>Ion</th><th>AP Phase</th><th>Direction</th><th>Clinical Relevance</th></tr>\n    <tr><td>$I_{\\text{Na}}$</td><td>Voltage-gated channel</td><td>Na$^+$</td><td>0 (upstroke)</td><td>Inward</td><td>Conduction velocity; Class I antiarrhythmics</td></tr>\n    <tr><td>$I_{\\text{CaL}}$</td><td>Voltage-gated channel</td><td>Ca$^{2+}$</td><td>2 (plateau)</td><td>Inward</td><td>EC coupling trigger; Ca$^{2+}$ channel blockers (verapamil)</td></tr>\n    <tr><td>$I_{\\text{to}}$</td><td>Voltage-gated channel</td><td>K$^+$</td><td>1 (notch)</td><td>Outward</td><td>Transmural heterogeneity; Brugada syndrome</td></tr>\n    <tr><td>$I_{\\text{Kr}}$</td><td>Voltage-gated channel</td><td>K$^+$</td><td>3 (repolarization)</td><td>Outward</td><td>Primary drug target; Long QT syndrome (hERG block)</td></tr>\n    <tr><td>$I_{\\text{Ks}}$</td><td>Voltage-gated channel</td><td>K$^+$</td><td>3 (repolarization reserve)</td><td>Outward</td><td>Rate adaptation; LQT1; adrenergic modulation</td></tr>\n    <tr><td>$I_{\\text{K1}}$</td><td>Inward rectifier</td><td>K$^+$</td><td>4 (rest) / 3 (late)</td><td>Outward</td><td>Resting potential; Andersen-Tawil syndrome (LQT7)</td></tr>\n    <tr><td>$I_{\\text{pK}}$</td><td>Voltage-gated channel</td><td>K$^+$</td><td>2 (plateau)</td><td>Outward</td><td>Small contribution to repolarization reserve</td></tr>\n    <tr><td>$I_{\\text{NaK}}$</td><td>ATP-driven pump</td><td>Na$^+$/K$^+$</td><td>All</td><td>Net outward</td><td>Gradient maintenance; digitalis target</td></tr>\n    <tr><td>$I_{\\text{NaCa}}$</td><td>Exchanger</td><td>Na$^+$/Ca$^{2+}$</td><td>2\u20133 / 4</td><td>Both$^*$</td><td>Calcium extrusion; DAD generation; heart failure</td></tr>\n    <tr><td>$I_{\\text{pCa}}$</td><td>ATP-driven pump</td><td>Ca$^{2+}$</td><td>All</td><td>Outward</td><td>Fine calcium homeostasis</td></tr>\n    <tr><td>$I_{\\text{bNa}}$</td><td>Background leak</td><td>Na$^+$</td><td>All</td><td>Inward</td><td>Resting Na$^+$ influx; balanced by $I_{\\text{NaK}}$</td></tr>\n    <tr><td>$I_{\\text{bCa}}$</td><td>Background leak</td><td>Ca$^{2+}$</td><td>All</td><td>Inward</td><td>Resting Ca$^{2+}$ influx; balanced by pumps</td></tr>\n  </table>\n\n  <p style=\"font-size:0.85em; color:#5a6175; margin-top:-0.5em;\">\n    $^*$$I_{\\text{NaCa}}$  operates in <em>forward mode</em> (inward, extruding Ca$^{2+}$) during late repolarization and diastole, and in <em>reverse mode</em> (outward, bringing Ca$^{2+}$ in) briefly during early depolarization.\n  </p>\n\n  <h3>5.3 &ensp; Voltage-Gated Depolarizing Currents</h3>\n\n  <h4>Fast Sodium Current ($I_{\\text{Na}}$) \u2014 Phase 0</h4>\n\n  <p>\n    The fast sodium current is responsible for the action potential upstroke and determines conduction\n    velocity in tissue. It follows the classical HH formulation with three activation gates ($m$) and\n    two inactivation gates (fast $h$ and slow $j$):\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(5.2)</span>\n    $$I_{\\text{Na}} = \\bar{g}_{\\text{Na}}\\,m^3\\,h\\,j\\,(V_m - E_{\\text{Na}})$$\n  </div>\n\n  <p>\n    The maximal conductance $\\bar{g}_{\\text{Na}} = 14.838$ nS/pF is one of the largest in the model.\n    The $m^3$ activation is ultrafast ($\\tau_m \\lt 1$ ms), providing the explosive upstroke. The dual\n    inactivation ($h$ fast, $j$ slow) ensures that sodium channels close within a few milliseconds and\n    remain closed throughout the plateau \u2014 creating the absolute refractory period. Physiologically,\n    $I_{\\text{Na}}$ determines the maximum rate of rise $dV/dt_{\\text{max}} \\approx 250{-}350$ V/s, which\n    is a direct clinical measure of sodium channel availability. Class I antiarrhythmic drugs (lidocaine,\n    flecainide) work by reducing $\\bar{g}_{\\text{Na}}$, slowing conduction.\n  </p>\n\n  <h4>L-Type Calcium Current ($I_{\\text{CaL}}$) \u2014 Phase 2</h4>\n\n  <p>\n    The L-type calcium current sustains the plateau and triggers excitation-contraction coupling. Unlike\n    $I_{\\text{Na}}$, it uses the Goldman\u2013Hodgkin\u2013Katz (GHK) formulation rather than an Ohmic driving force,\n    because Ca$^{2+}$ has a very low intracellular concentration and a 2+ valence:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(5.3)</span>\n    $$I_{\\text{CaL}} = P_{\\text{CaL}}\\,d\\,f\\,f_2\\,f_{\\text{Ca}}\\cdot 4\\,\\frac{F^2}{RT}\\,(V_m - 15)\\,\\frac{0.25\\,[\\text{Ca}^{2+}]_{\\text{ss}}\\,e^{2F(V_m-15)/RT} - [\\text{Ca}^{2+}]_o}{e^{2F(V_m-15)/RT}-1}$$\n  </div>\n\n  <p>\n    Note three features that distinguish this from a simple Ohmic current. First, TTP06 uses a <em>permeability</em>\n    $P_{\\text{CaL}} = 3.98 \\times 10^{-5}$ cm/s rather than a conductance \u2014 the natural parameter for the GHK formulation.\n    Second, the voltage is shifted by $-15$ mV ($V_m - 15$), reflecting the experimental observation that the\n    current\u2013voltage relationship of L-type channels peaks near $+15$ mV rather than $0$ mV. Third, the\n    intracellular calcium carries an activity coefficient of 0.25, while the extracellular side uses bare\n    $[\\text{Ca}^{2+}]_o$ \u2014 this asymmetry accounts for the different ionic environments on each side.\n    The four gates represent distinct biophysical mechanisms: $d$ is voltage activation ($\\tau_d \\sim 1{-}5$ ms),\n    $f$ and $f_2$ are voltage-dependent inactivation (slow, $\\tau \\sim 20{-}300$ ms \u2014 this determines\n    how long the plateau lasts), and $f_{\\text{Ca}}$ is <em>calcium-dependent inactivation</em> (CDI), which\n    responds to the local subspace calcium $[\\text{Ca}^{2+}]_{\\text{ss}}$. CDI is the primary negative\n    feedback mechanism that limits calcium entry: as CICR raises subspace calcium, $f_{\\text{Ca}}$\n    inactivates the channel, shutting off the trigger.\n  </p>\n\n  <div class=\"insight insight-intuition\">\n    <p>\n      The GHK equation replaces the simple $(V_m - E_{\\text{Ca}})$ driving force with a nonlinear function\n      of voltage and concentrations on both sides. Why? For ions with large concentration gradients\n      ($[\\text{Ca}^{2+}]_o / [\\text{Ca}^{2+}]_i \\approx 20{,}000$) and multivalent charge,\n      the Ohmic approximation badly overestimates current at large depolarizations. The GHK formula\n      \u2014 derived from the Nernst\u2013Planck electrodiffusion equation \u2014 accounts for the exponential\n      concentration profile across the membrane and gives physically correct saturation behavior.\n    </p>\n  </div>\n\n  <h3>5.4 &ensp; Voltage-Gated Repolarizing Currents</h3>\n\n  <h4>Transient Outward Current ($I_{\\text{to}}$) \u2014 Phase 1</h4>\n\n  <p>\n    The transient outward K$^+$ current creates the Phase 1 notch. It activates rapidly during\n    depolarization ($r$ gate, $\\tau \\sim 1{-}5$ ms) and inactivates within tens of milliseconds\n    ($s$ gate, $\\tau \\sim 5{-}50$ ms):\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(5.4)</span>\n    $$I_{\\text{to}} = \\bar{g}_{\\text{to}}\\,r\\,s\\,(V_m - E_{\\text{K}})$$\n  </div>\n\n  <p>\n    The maximal conductance $\\bar{g}_{\\text{to}}$ varies dramatically between cell types: 0.294 nS/pF\n    in epicardial cells (deep notch) vs. 0.073 nS/pF in endocardial cells (minimal notch). This transmural gradient\n    is the single largest source of AP shape variation across the ventricular wall and produces the\n    J-point deflection on the surface ECG. In Brugada syndrome, enhanced $I_{\\text{to}}$ in right\n    ventricular epicardium creates an exaggerated notch that can trigger reentrant arrhythmias.\n  </p>\n\n  <h4>Rapid Delayed Rectifier ($I_{\\text{Kr}}$) \u2014 Phase 3</h4>\n\n  <p>\n    $I_{\\text{Kr}}$ is the primary repolarization current, carried by hERG (Kv11.1) channels. It\n    has unusual kinetics \u2014 fast inactivation at positive voltages, rapid recovery from inactivation\n    during repolarization \u2014 that produce a characteristic \"resurgent\" current during Phase 3:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(5.5)</span>\n    $$I_{\\text{Kr}} = \\bar{g}_{\\text{Kr}}\\,\\sqrt{[\\text{K}^+]_o / 5.4}\\,x_{r1}\\,x_{r2}\\,(V_m - E_{\\text{K}})$$\n  </div>\n\n  <p>\n    The $\\sqrt{[\\text{K}^+]_o / 5.4}$ factor captures the experimental observation that hERG\n    conductance scales with the square root of extracellular potassium. The two gating variables\n    $x_{r1}$ (activation, $\\tau \\sim 10{-}100$ ms) and $x_{r2}$ (inactivation, fast) together\n    create the voltage-dependent rectification that makes $I_{\\text{Kr}}$ small during the plateau\n    but large during Phase 3. Clinically, $I_{\\text{Kr}}$ is the most important current in cardiac\n    pharmacology: hERG block is the leading cause of drug-induced Long QT syndrome, and the CiPA\n    initiative focuses heavily on predicting hERG interactions <em>in silico</em>.\n  </p>\n\n  <h4>Slow Delayed Rectifier ($I_{\\text{Ks}}$) \u2014 Repolarization Reserve</h4>\n\n  <p>\n    $I_{\\text{Ks}}$ activates very slowly ($\\tau_{x_s} \\sim 100{-}500$ ms) and provides a \"safety net\"\n    when $I_{\\text{Kr}}$ is compromised:\n  </p>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(5.6)</span>\n    $$I_{\\text{Ks}} = \\bar{g}_{\\text{Ks}}\\,x_s^2\\,(V_m - E_{\\text{Ks}})$$\n  </div>\n\n  <p>\n    Note that $I_{\\text{Ks}}$ uses the potassium\u2013sodium reversal potential $E_{\\text{Ks}}$ (computed from\n    the Goldman equation for K$^+$ and Na$^+$ permeability) rather than the pure potassium reversal\n    $E_{\\text{K}}$, because the KvLQT1/minK channel complex has slight Na$^+$ permeability. The\n    $x_s^2$ activation gives the current a sigmoid-like voltage dependence with a slower foot than\n    $I_{\\text{Kr}}$. Under normal conditions, $I_{\\text{Ks}}$ contributes modestly to repolarization.\n    Its importance emerges when $I_{\\text{Kr}}$ is blocked \u2014 then $I_{\\text{Ks}}$ becomes the backup\n    repolarization pathway. This is the concept of <em>repolarization reserve</em>: a healthy heart\n    can tolerate partial block of one K$^+$ channel because others compensate. Loss of repolarization\n    reserve (e.g., combined $I_{\\text{Kr}}$ + $I_{\\text{Ks}}$ reduction) dramatically increases\n    arrhythmia risk.\n  </p>\n\n  <h4>Inward Rectifier ($I_{\\text{K1}}$) \u2014 Phase 4 and Late Phase 3</h4>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(5.7)</span>\n    $$I_{\\text{K1}} = \\bar{g}_{\\text{K1}}\\,\\sqrt{[\\text{K}^+]_o / 5.4}\\,x_{K1,\\infty}(V_m)\\,(V_m - E_{\\text{K}})$$\n  </div>\n\n  <p>\n    $I_{\\text{K1}}$ is unique among TTP06 currents: it has <em>no dynamic gating variable</em>. Its\n    rectification is instantaneous, captured entirely by the steady-state function $x_{K1,\\infty}(V_m)$,\n    which transitions from $\\sim$1 below $-80$ mV to $\\sim$0 above $-40$ mV. Physiologically, this\n    reflects the block of Kir2.1 channels by intracellular Mg$^{2+}$ and polyamines at depolarized\n    voltages. The result is a current that behaves as a strong \"anchor\" at rest (holding $V_m$ near\n    $E_K \\approx -88$ mV), vanishes during the plateau (allowing the ICaL/IKr balance to play out),\n    and then reactivates during Phase 3 to accelerate the final phase of repolarization.\n  </p>\n\n  <h4>Plateau Potassium Current ($I_{\\text{pK}}$)</h4>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(5.8)</span>\n    $$I_{\\text{pK}} = \\bar{g}_{\\text{pK}}\\,\\frac{1}{1 + e^{(25 - V_m)/5.98}}\\,(V_m - E_{\\text{K}})$$\n  </div>\n\n  <p>\n    $I_{\\text{pK}}$ is a small outward K$^+$ current active during the plateau. It has no dynamic\n    gates \u2014 the sigmoidal voltage dependence is instantaneous. Its contribution to total current is\n    minor ($\\bar{g}_{\\text{pK}} = 0.0146$ nS/pF), but it participates in the repolarization reserve\n    and affects APD at the margins.\n  </p>\n\n  <h3>5.5 &ensp; Pumps, Exchangers, and Background Currents</h3>\n\n  <p>\n    The six voltage-gated currents above shape the AP waveform on a beat-to-beat basis. But the cell\n    must also maintain its ionic gradients over thousands of beats. This is the job of the pumps,\n    exchangers, and background leak currents \u2014 a group that is often overlooked but is essential for\n    long-term stability.\n  </p>\n\n  <h4>Na$^+$/K$^+$ ATPase ($I_{\\text{NaK}}$) \u2014 The Gradient Keeper</h4>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(5.9)</span>\n    $$I_{\\text{NaK}} = \\frac{P_{\\text{NaK}}\\,[\\text{K}^+]_o\\,[\\text{Na}^+]_i}{([\\text{K}^+]_o + K_{mK})([\\text{Na}^+]_i + K_{mNa})}\\cdot\\frac{1}{1 + 0.1245\\,e^{-0.1FV_m/RT} + 0.0353\\,e^{-FV_m/RT}}$$\n  </div>\n\n  <p>\n    The Na$^+$/K$^+$-ATPase pumps 3 Na$^+$ ions out and 2 K$^+$ ions in per ATP hydrolyzed, generating a\n    net outward current. This pump is what maintains the sodium and potassium gradients that all\n    voltage-gated currents depend on. Without it, gradients would run down within minutes and the\n    cell would depolarize. The current is voltage-dependent (less effective at positive voltages),\n    saturates with intracellular Na$^+$ ($K_{mNa} = 40$ mM) and extracellular K$^+$ ($K_{mK} = 1$ mM),\n    and is the target of cardiac glycosides (digoxin/digitalis): by blocking $I_{\\text{NaK}}$,\n    intracellular Na$^+$ rises, which reduces the driving force for the Na$^+$/Ca$^{2+}$ exchanger,\n    indirectly increasing intracellular Ca$^{2+}$ and strengthening contraction (positive inotropy).\n  </p>\n\n  <h4>Na$^+$/Ca$^{2+}$ Exchanger ($I_{\\text{NaCa}}$) \u2014 The Bidirectional Bridge</h4>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(5.10)</span>\n    $$I_{\\text{NaCa}} = \\frac{k_{\\text{NaCa}}\\bigl([\\text{Na}^+]_i^3\\,[\\text{Ca}^{2+}]_o\\,e^{\\gamma FV_m/RT} - \\alpha\\,[\\text{Na}^+]_o^3\\,[\\text{Ca}^{2+}]_i\\,e^{(\\gamma-1)FV_m/RT}\\bigr)}{(K_{m,\\text{Na}}^3 + [\\text{Na}^+]_o^3)(K_{m,\\text{Ca}} + [\\text{Ca}^{2+}]_o)(1 + k_{\\text{sat}}\\,e^{(\\gamma-1)FV_m/RT})}$$\n  </div>\n\n  <p>\n    The NCX exchanges 3 Na$^+$ for 1 Ca$^{2+}$ and can operate in either direction depending on the\n    electrochemical gradients. The numerator contains two terms: the first (forward) drives Na$^+$ in\n    and Ca$^{2+}$ out; the second (reverse, scaled by $\\alpha = 2.5$) drives Na$^+$ out and Ca$^{2+}$ in.\n    The factor $\\alpha$ sets the relative strength of reverse-mode transport. The denominator has three\n    components: the $K_m$ saturation terms for Na$^+$ and Ca$^{2+}$, and a voltage-dependent saturation\n    factor $1 + k_{\\text{sat}}\\,e^{(\\gamma-1)FV_m/RT}$ that prevents the exchanger from running at\n    unphysically high rates at extreme potentials. In <strong>forward mode</strong> (dominant during late\n    repolarization and diastole): Na$^+$ enters, Ca$^{2+}$ is extruded \u2192 net inward current. This is the\n    primary mechanism for removing calcium from the cytoplasm after each beat (contributing $\\sim$28% of\n    calcium removal in human ventricular myocytes, with SERCA handling the remaining $\\sim$70%). In\n    <strong>reverse mode</strong> (brief, during early depolarization): Na$^+$ exits, Ca$^{2+}$ enters \u2192\n    net outward current. The voltage-dependent partition factor $\\gamma \\approx 0.35$ determines the relative\n    influence of voltage on the forward vs. reverse rates.\n  </p>\n\n  <p>\n    $I_{\\text{NaCa}}$ is critically important in disease. In heart failure, elevated $[\\text{Na}^+]_i$\n    reduces forward-mode NCX activity, impairing calcium removal and contributing to diastolic\n    dysfunction. In conditions of calcium overload, the inward current generated by forward-mode NCX\n    during diastole can trigger <em>delayed afterdepolarizations</em> (DADs) \u2014 a major arrhythmia\n    mechanism (Chapter 4, Section 4.5).\n  </p>\n\n  <h4>Sarcolemmal Ca$^{2+}$ Pump ($I_{\\text{pCa}}$)</h4>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(5.11)</span>\n    $$I_{\\text{pCa}} = \\frac{\\bar{g}_{\\text{pCa}}\\,[\\text{Ca}^{2+}]_i}{K_{\\text{pCa}} + [\\text{Ca}^{2+}]_i}$$\n  </div>\n\n  <p>\n    The plasma membrane Ca$^{2+}$-ATPase (PMCA) provides a secondary route for calcium extrusion \u2014\n    slower than NCX but with higher affinity ($K_{\\text{pCa}} = 0.0005$ mM). It contributes only\n    $\\sim$1\u20132% of total calcium removal per beat but is important for fine-tuning the diastolic\n    calcium level over many beats.\n  </p>\n\n  <h4>Background Leak Currents ($I_{\\text{bNa}}$, $I_{\\text{bCa}}$)</h4>\n\n  <div class=\"equation-block\">\n    <span class=\"equation-label\">(5.12)</span>\n    $$I_{\\text{bNa}} = \\bar{g}_{\\text{bNa}}\\,(V_m - E_{\\text{Na}}), \\qquad I_{\\text{bCa}} = \\bar{g}_{\\text{bCa}}\\,(V_m - E_{\\text{Ca}})$$\n  </div>\n\n  <p>\n    These small Ohmic currents represent the passive leak of Na$^+$ and Ca$^{2+}$ through non-specific\n    channels. Their conductances are tiny ($\\bar{g}_{\\text{bNa}} = 2.9 \\times 10^{-4}$, $\\bar{g}_{\\text{bCa}} = 5.92 \\times 10^{-4}$ nS/pF), but they serve a critical bookkeeping role: they provide the\n    steady inward Na$^+$ and Ca$^{2+}$ leak that the pumps ($I_{\\text{NaK}}$, $I_{\\text{pCa}}$, NCX)\n    must counterbalance. Without these background currents, the model would slowly drift to\n    non-physiological concentrations over hundreds of beats.\n  </p>\n\n  <div class=\"insight insight-warning\">\n    <p>\n      The balance between background leak currents and pump/exchanger currents is what determines the\n      long-term stability of ionic concentrations. If you modify pump parameters (e.g., reducing\n      $I_{\\text{NaK}}$ to simulate ischemia), you must simulate hundreds of beats to reach a new\n      steady state \u2014 the first few beats will look normal, but gradual Na$^+$ accumulation will\n      progressively alter the AP shape. This is why cardiac modelers must always run to steady state\n      before collecting data.\n    </p>\n  </div>\n\n  <h3>5.6 &ensp; Currents During Each AP Phase \u2014 A Visual Map</h3>\n\n  <!-- \u2500\u2500\u2500 Current activity during AP phases diagram \u2500\u2500\u2500 -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 620 380\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:560px;\">\n      <!-- Column headers (AP phases) -->\n      <text x=\"170\" y=\"18\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#e94560\" font-weight=\"700\">Phase 0</text>\n      <text x=\"170\" y=\"30\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Upstroke</text>\n      <text x=\"250\" y=\"18\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#0f3460\" font-weight=\"700\">Phase 1</text>\n      <text x=\"250\" y=\"30\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Notch</text>\n      <text x=\"340\" y=\"18\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#2d6a4f\" font-weight=\"700\">Phase 2</text>\n      <text x=\"340\" y=\"30\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Plateau</text>\n      <text x=\"440\" y=\"18\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#8a6d00\" font-weight=\"700\">Phase 3</text>\n      <text x=\"440\" y=\"30\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Repol.</text>\n      <text x=\"540\" y=\"18\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"11\" fill=\"#5a6175\" font-weight=\"700\">Phase 4</text>\n      <text x=\"540\" y=\"30\" text-anchor=\"middle\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Rest</text>\n\n      <!-- Row labels (currents) -->\n      <text x=\"120\" y=\"58\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">$I_{\\text{Na}}$</text>\n      <text x=\"120\" y=\"83\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">$I_{\\text{CaL}}$</text>\n      <text x=\"120\" y=\"108\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">$I_{\\text{to}}$</text>\n      <text x=\"120\" y=\"133\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">$I_{\\text{Kr}}$</text>\n      <text x=\"120\" y=\"158\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">$I_{\\text{Ks}}$</text>\n      <text x=\"120\" y=\"183\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">$I_{\\text{K1}}$</text>\n      <text x=\"120\" y=\"208\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">$I_{\\text{pK}}$</text>\n      <text x=\"120\" y=\"233\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">$I_{\\text{NaK}}$</text>\n      <text x=\"120\" y=\"258\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">$I_{\\text{NaCa}}$</text>\n      <text x=\"120\" y=\"283\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">$I_{\\text{pCa}}$</text>\n      <text x=\"120\" y=\"308\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">$I_{\\text{bNa}}$</text>\n      <text x=\"120\" y=\"333\" text-anchor=\"end\" font-family=\"EB Garamond,serif\" font-size=\"10\" fill=\"#16213e\">$I_{\\text{bCa}}$</text>\n\n      <!-- Grid lines -->\n      <line x1=\"130\" y1=\"38\" x2=\"580\" y2=\"38\" stroke=\"#e0e0e0\" stroke-width=\"0.5\"/>\n      <line x1=\"130\" y1=\"345\" x2=\"580\" y2=\"345\" stroke=\"#e0e0e0\" stroke-width=\"0.5\"/>\n\n      <!-- Column separators -->\n      <line x1=\"210\" y1=\"38\" x2=\"210\" y2=\"345\" stroke=\"#e8e8e8\" stroke-width=\"0.5\"/>\n      <line x1=\"290\" y1=\"38\" x2=\"290\" y2=\"345\" stroke=\"#e8e8e8\" stroke-width=\"0.5\"/>\n      <line x1=\"390\" y1=\"38\" x2=\"390\" y2=\"345\" stroke=\"#e8e8e8\" stroke-width=\"0.5\"/>\n      <line x1=\"490\" y1=\"38\" x2=\"490\" y2=\"345\" stroke=\"#e8e8e8\" stroke-width=\"0.5\"/>\n\n      <!-- Activity bars \u2014 height and opacity encode magnitude -->\n      <!-- INa: Phase 0 DOMINANT -->\n      <rect x=\"140\" y=\"48\" width=\"60\" height=\"14\" rx=\"3\" fill=\"#e94560\" opacity=\"0.9\"/>\n      <text x=\"170\" y=\"59\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"white\" font-weight=\"700\">DOMINANT</text>\n\n      <!-- ICaL: Phase 1 small, Phase 2 DOMINANT, Phase 3 small -->\n      <rect x=\"220\" y=\"73\" width=\"60\" height=\"14\" rx=\"3\" fill=\"#e94560\" opacity=\"0.3\"/>\n      <rect x=\"300\" y=\"73\" width=\"80\" height=\"14\" rx=\"3\" fill=\"#e94560\" opacity=\"0.85\"/>\n      <text x=\"340\" y=\"84\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"white\" font-weight=\"700\">DOMINANT</text>\n      <rect x=\"400\" y=\"73\" width=\"40\" height=\"14\" rx=\"3\" fill=\"#e94560\" opacity=\"0.2\"/>\n\n      <!-- Ito: Phase 1 DOMINANT -->\n      <rect x=\"220\" y=\"98\" width=\"60\" height=\"14\" rx=\"3\" fill=\"#0f3460\" opacity=\"0.85\"/>\n      <text x=\"250\" y=\"109\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"white\" font-weight=\"700\">DOMINANT</text>\n\n      <!-- IKr: Phase 2 small, Phase 3 DOMINANT -->\n      <rect x=\"310\" y=\"123\" width=\"70\" height=\"14\" rx=\"3\" fill=\"#0f3460\" opacity=\"0.25\"/>\n      <rect x=\"400\" y=\"123\" width=\"80\" height=\"14\" rx=\"3\" fill=\"#0f3460\" opacity=\"0.8\"/>\n      <text x=\"440\" y=\"134\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"white\" font-weight=\"700\">DOMINANT</text>\n\n      <!-- IKs: Phase 2-3 building slowly -->\n      <rect x=\"310\" y=\"148\" width=\"70\" height=\"14\" rx=\"3\" fill=\"#0f3460\" opacity=\"0.15\"/>\n      <rect x=\"400\" y=\"148\" width=\"80\" height=\"14\" rx=\"3\" fill=\"#0f3460\" opacity=\"0.45\"/>\n      <text x=\"440\" y=\"159\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#0f3460\">reserve</text>\n\n      <!-- IK1: Phase 3 late moderate, Phase 4 DOMINANT -->\n      <rect x=\"440\" y=\"173\" width=\"40\" height=\"14\" rx=\"3\" fill=\"#0f3460\" opacity=\"0.5\"/>\n      <rect x=\"500\" y=\"173\" width=\"70\" height=\"14\" rx=\"3\" fill=\"#0f3460\" opacity=\"0.85\"/>\n      <text x=\"535\" y=\"184\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"white\" font-weight=\"700\">DOMINANT</text>\n\n      <!-- IpK: Phase 2 small -->\n      <rect x=\"310\" y=\"198\" width=\"70\" height=\"14\" rx=\"3\" fill=\"#0f3460\" opacity=\"0.15\"/>\n      <text x=\"345\" y=\"209\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#0f3460\">small</text>\n\n      <!-- INaK: all phases, moderate -->\n      <rect x=\"140\" y=\"223\" width=\"430\" height=\"14\" rx=\"3\" fill=\"#5a6175\" opacity=\"0.25\"/>\n      <text x=\"355\" y=\"234\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#5a6175\">continuous \u2014 gradient maintenance</text>\n\n      <!-- INaCa: Phase 2 reverse (outward), Phase 3-4 forward (inward) -->\n      <rect x=\"300\" y=\"248\" width=\"80\" height=\"14\" rx=\"3\" fill=\"#0f3460\" opacity=\"0.2\"/>\n      <text x=\"340\" y=\"259\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#0f3460\">reverse</text>\n      <rect x=\"400\" y=\"248\" width=\"170\" height=\"14\" rx=\"3\" fill=\"#e94560\" opacity=\"0.35\"/>\n      <text x=\"485\" y=\"259\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#e94560\">forward (Ca\u00b2\u207a extrusion)</text>\n\n      <!-- IpCa: all phases, small -->\n      <rect x=\"140\" y=\"273\" width=\"430\" height=\"14\" rx=\"3\" fill=\"#5a6175\" opacity=\"0.12\"/>\n      <text x=\"355\" y=\"284\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#5a6175\">continuous \u2014 fine Ca\u00b2\u207a tuning</text>\n\n      <!-- IbNa: all phases, tiny -->\n      <rect x=\"140\" y=\"298\" width=\"430\" height=\"14\" rx=\"3\" fill=\"#5a6175\" opacity=\"0.08\"/>\n      <text x=\"355\" y=\"309\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#aaa\">tiny leak</text>\n\n      <!-- IbCa: all phases, tiny -->\n      <rect x=\"140\" y=\"323\" width=\"430\" height=\"14\" rx=\"3\" fill=\"#5a6175\" opacity=\"0.08\"/>\n      <text x=\"355\" y=\"334\" text-anchor=\"middle\" font-family=\"Source Code Pro,monospace\" font-size=\"7\" fill=\"#aaa\">tiny leak</text>\n\n      <!-- Legend -->\n      <rect x=\"140\" y=\"355\" width=\"18\" height=\"10\" rx=\"2\" fill=\"#e94560\" opacity=\"0.8\"/>\n      <text x=\"164\" y=\"364\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Inward (depolarizing)</text>\n      <rect x=\"280\" y=\"355\" width=\"18\" height=\"10\" rx=\"2\" fill=\"#0f3460\" opacity=\"0.8\"/>\n      <text x=\"304\" y=\"364\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Outward (repolarizing)</text>\n      <rect x=\"420\" y=\"355\" width=\"18\" height=\"10\" rx=\"2\" fill=\"#5a6175\" opacity=\"0.25\"/>\n      <text x=\"444\" y=\"364\" font-family=\"EB Garamond,serif\" font-size=\"8\" fill=\"#5a6175\">Housekeeping</text>\n    </svg>\n    <div class=\"figure-caption\"><span class=\"figure-label\">Figure 5.1.</span> Activity map of all 12 TTP06 membrane currents across the five AP phases. Bar width represents the temporal extent; opacity represents relative magnitude. Red bars are inward (depolarizing), blue bars are outward (repolarizing), gray bars are housekeeping currents active throughout the cycle.</div>\n  </div>\n\n  <div class=\"insight insight-math\">\n    <p>\n      All gating variables in TTP06 satisfy the same relaxation ODE we derived in equation (1.3):\n      $dx/dt = (x_\\infty - x)/\\tau_x$. This uniformity is what makes the Rush\u2013Larsen method\n      (Chapter 8) so powerful: you can integrate <em>every</em> gate with the same exponential formula\n      $x^{n+1} = x_\\infty + (x^n - x_\\infty)\\,e^{-\\Delta t/\\tau_x}$, regardless of how stiff the\n      kinetics are. The concentration variables ($[\\text{Na}^+]_i$, $[\\text{K}^+]_i$, etc.) do\n      <em>not</em> follow relaxation kinetics and must be integrated with Forward Euler or a similar method.\n    </p>\n  </div>\n\n  <h3>5.7 &ensp; Endo, Epi, and M-Cells: Transmural Heterogeneity</h3>\n\n  <p>\n    One of TTP06's most important features is its ability to represent three distinct cell types\n    across the ventricular wall, each with a different AP morphology:\n  </p>\n\n  <p>\n    <strong>Epicardial cells</strong> (outer wall): Large $I_{\\text{to}}$ \u2192 deep Phase 1 notch \u2192 shorter AP.\n    <strong>Endocardial cells</strong> (inner wall): Small $I_{\\text{to}}$ \u2192 minimal notch \u2192 moderate AP duration.\n    <strong>M-cells</strong> (mid-wall): Small $I_{\\text{Ks}}$ \u2192 very long plateau \u2192 longest AP duration.\n  </p>\n\n  <p>\n    These differences arise from changing just a few maximal conductance values ($\\bar{g}_{\\text{to}}$,\n    $\\bar{g}_{\\text{Ks}}$) and some kinetic parameters. The fact that the same model structure, with\n    minor parameter adjustments, reproduces three qualitatively different AP shapes is a testament to\n    how well TTP06 captures the underlying biophysics.\n  </p>\n\n  <div class=\"insight insight-engine\">\n    <p>\n      In Engine V5.4, the TTP06 implementation lives in the <code>cardiac_sim/ionic/ttp06/</code> package:\n      <code>model.py</code> (the <code>TTP06Model</code> class), <code>currents.py</code> (all 12 current\n      functions), <code>gating.py</code> (steady-states and time constants), <code>calcium.py</code>\n      (concentration update equations), and <code>parameters.py</code> (the <code>StateIndex</code> enum\n      and <code>TTP06Parameters</code> dataclass). V is stored separately; the 18 ionic states live in a\n      tensor of shape <code>(n_cells, 18)</code>. The <code>cell_type</code> parameter\n      (<code>CellType.ENDO</code>, <code>CellType.EPI</code>, <code>CellType.M_CELL</code>) selects\n      endo/epi/M-cell variants by switching maximal conductances and I$_{\\text{to}}$ kinetics. A single\n      tissue simulation can represent the full transmural gradient by assigning different cell types to\n      different spatial regions \u2014 essential for realistic ECG simulation.\n    </p>\n  </div>\n\n  <h3>5.8 &ensp; Calcium Handling and CICR</h3>\n\n  <p>\n    The calcium subsystem is perhaps the most physiologically important part of TTP06, because\n    calcium is the link between electrical excitation and mechanical contraction. The model tracks\n    calcium through three compartments connected by fluxes:\n  </p>\n\n  <!-- \u2500\u2500\u2500 Calcium cycling diagram \u2500\u2500\u2500 -->\n  <div class=\"figure\">\n    <svg viewBox=\"0 0 460 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:400px;\">\n      <!-- Compartments -->\n      <rect x=\"10\" y=\"70\" width=\"100\" height=\"60\" rx=\"8\" fill=\"#e8f5e9\" stroke=\"#2d6a4f\" stroke-width=\"1.5\"/>\n      <text x=\"60\" y=\"95\" font-size=\"10\" fill=\"#2d6a4f\" font-family=\"serif\" text-anchor=\"middle\" font-weight=\"600\">Subspace</text>\n      <text x=\"60\" y=\"110\" font-size=\"9\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"middle\">[Ca\u00b2\u207a]<tspan font-size=\"7\" dy=\"2\">ss</tspan></text>\n\n      <rect x=\"180\" y=\"70\" width=\"100\" height=\"60\" rx=\"8\" fill=\"#eef0f8\" stroke=\"#0f3460\" stroke-width=\"1.5\"/>\n      <text x=\"230\" y=\"95\" font-size=\"10\" fill=\"#0f3460\" font-family=\"serif\" text-anchor=\"middle\" font-weight=\"600\">Cytoplasm</text>\n      <text x=\"230\" y=\"110\" font-size=\"9\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"middle\">[Ca\u00b2\u207a]<tspan font-size=\"7\" dy=\"2\">i</tspan></text>\n\n      <rect x=\"350\" y=\"70\" width=\"100\" height=\"60\" rx=\"8\" fill=\"#fff3e0\" stroke=\"#b36b00\" stroke-width=\"1.5\"/>\n      <text x=\"400\" y=\"95\" font-size=\"10\" fill=\"#b36b00\" font-family=\"serif\" text-anchor=\"middle\" font-weight=\"600\">SR Store</text>\n      <text x=\"400\" y=\"110\" font-size=\"9\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"middle\">[Ca\u00b2\u207a]<tspan font-size=\"7\" dy=\"2\">SR</tspan></text>\n\n      <!-- Arrows -->\n      <!-- ICaL into subspace -->\n      <line x1=\"60\" y1=\"30\" x2=\"60\" y2=\"68\" stroke=\"#e94560\" stroke-width=\"1.5\" marker-end=\"url(#arrowRed)\"/>\n      <text x=\"60\" y=\"22\" font-size=\"9\" fill=\"#e94560\" font-family=\"serif\" text-anchor=\"middle\">I<tspan font-size=\"7\" dy=\"1\">CaL</tspan></text>\n\n      <!-- CICR: SR \u2192 subspace -->\n      <path d=\"M 350,85 Q 270,30 110,85\" fill=\"none\" stroke=\"#2d6a4f\" stroke-width=\"1.5\" marker-end=\"url(#arrowGreen)\"/>\n      <text x=\"230\" y=\"42\" font-size=\"9\" fill=\"#2d6a4f\" font-family=\"serif\" text-anchor=\"middle\" font-weight=\"600\">CICR (J<tspan font-size=\"7\" dy=\"1\">rel</tspan><tspan dy=\"-1\">)</tspan></text>\n\n      <!-- Diffusion: subspace \u2192 cytoplasm -->\n      <line x1=\"112\" y1=\"100\" x2=\"178\" y2=\"100\" stroke=\"#5a6175\" stroke-width=\"1.3\" marker-end=\"url(#arrowGray)\"/>\n      <text x=\"145\" y=\"93\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"middle\">J<tspan font-size=\"6\" dy=\"1\">xfer</tspan></text>\n\n      <!-- SERCA: cytoplasm \u2192 SR -->\n      <line x1=\"282\" y1=\"100\" x2=\"348\" y2=\"100\" stroke=\"#b36b00\" stroke-width=\"1.3\" marker-end=\"url(#arrowOrange)\"/>\n      <text x=\"315\" y=\"93\" font-size=\"8\" fill=\"#b36b00\" font-family=\"serif\" text-anchor=\"middle\">J<tspan font-size=\"6\" dy=\"1\">up</tspan></text>\n\n      <!-- SR leak -->\n      <path d=\"M 370,132 Q 320,170 270,132\" fill=\"none\" stroke=\"#5a6175\" stroke-width=\"1\" stroke-dasharray=\"3,2\" marker-end=\"url(#arrowGray)\"/>\n      <text x=\"320\" y=\"178\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"middle\">J<tspan font-size=\"6\" dy=\"1\">leak</tspan></text>\n\n      <!-- Buffers note -->\n      <text x=\"230\" y=\"155\" font-size=\"8\" fill=\"#5a6175\" font-family=\"serif\" text-anchor=\"middle\" font-style=\"italic\">+ Ca\u00b2\u207a buffers in each compartment</text>\n\n      <!-- Arrow markers -->\n      <defs>\n        <marker id=\"arrowRed\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\">\n          <path d=\"M 0,0 L 8,3 L 0,6 Z\" fill=\"#e94560\"/>\n        </marker>\n        <marker id=\"arrowGreen\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\">\n          <path d=\"M 0,0 L 8,3 L 0,6 Z\" fill=\"#2d6a4f\"/>\n        </marker>\n        <marker id=\"arrowGray\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\">\n          <path d=\"M 0,0 L 8,3 L 0,6 Z\" fill=\"#5a6175\"/>\n        </marker>\n        <marker id=\"arrowOrange\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\">\n          <path d=\"M 0,0 L 8,3 L 0,6 Z\" fill=\"#b36b00\"/>\n        </marker>\n      </defs>\n    </svg>\n    <div class=\"figure-caption\">\n      <span class=\"figure-label\">Figure 4.1.</span> Calcium cycling in TTP06. The L-type current $I_{\\text{CaL}}$ brings\n      Ca$^{2+}$ into the subspace, triggering CICR from the SR ($J_{\\text{rel}}$). Ca$^{2+}$ diffuses to the\n      cytoplasm ($J_{\\text{xfer}}$), drives contraction, then is pumped back into the SR by SERCA ($J_{\\text{up}}$).\n    </div>\n  </div>\n\n  <p>\n    The CICR mechanism works like a trigger and amplifier:\n  </p>\n\n  <p>\n    <strong>Trigger:</strong> L-type calcium channels open during Phase 2, admitting a small amount of\n    Ca$^{2+}$ into the subspace. This raises $[\\text{Ca}^{2+}]_{\\text{ss}}$.\n  </p>\n\n  <p>\n    <strong>Amplification:</strong> The elevated $[\\text{Ca}^{2+}]_{\\text{ss}}$ activates ryanodine\n    receptors (RyR) on the SR membrane, which release a much larger bolus of Ca$^{2+}$ from the SR\n    store into the subspace. This is the \"release\" flux $J_{\\text{rel}}$.\n  </p>\n\n  <p>\n    <strong>Diffusion and contraction:</strong> Ca$^{2+}$ diffuses from the subspace to the bulk\n    cytoplasm ($J_{\\text{xfer}}$), where it binds to troponin C and triggers the contractile\n    machinery of the sarcomere.\n  </p>\n\n  <p>\n    <strong>Recovery:</strong> The SERCA pump ($J_{\\text{up}}$) actively transports Ca$^{2+}$ from\n    the cytoplasm back into the SR, refilling the store for the next beat. A small leak\n    ($J_{\\text{leak}}$) allows some Ca$^{2+}$ to trickle back out.\n  </p>\n\n  <p>\n    Getting this calcium balance right is critical: if the SR is overloaded, spontaneous Ca$^{2+}$\n    release can trigger delayed afterdepolarizations (DADs) and arrhythmias. If the SR is depleted,\n    contractile force drops and the AP shape distorts. The three-compartment model in TTP06 captures\n    these dynamics with reasonable fidelity while remaining computationally tractable for tissue-scale\n    simulations.\n  </p>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!--  CHAPTER 6 \u2014 THE O'HARA\u2013RUDY 2011 MODEL                          -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->", "ch6": "<div class=\"chapter\">\n  <div class=\"chapter-number\">Chapter 6</div>\n  <h2 class=\"chapter-title\">The O'Hara\u2013Rudy 2011 Model</h2>\n  <div class=\"chapter-intro\">\n    The O'Hara\u2013Rudy dynamic (ORd) model was built from an unprecedented dataset of undise
