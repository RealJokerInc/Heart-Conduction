<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardiac Computational Modeling — A Visual Textbook</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$']],
    displayMath: [['$$', '$$']],
    tags: 'ams'
  },
  svg: { fontCache: 'global' },
  startup: {
    ready: () => {
      MathJax.startup.defaultReady();
      MathJax.startup.promise.then(() => {
        document.dispatchEvent(new Event('mathjax-ready'));
      });
    }
  }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
</head>
<body>

<!-- ─── Skip Link ─── -->
<a href="#main-content" class="skip-link">Skip to content</a>

<!-- ─── Top Bar ─── -->
<header class="topbar">
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <div class="topbar-title">
    <span class="topbar-title-full">Cardiac Computational Modeling</span>
    <span class="topbar-title-short">CCM</span>
  </div>
  <div class="topbar-actions">
    <div class="search-container" id="search-container">
      <button class="topbar-btn" id="search-toggle" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <div class="search-panel" id="search-panel">
        <input type="text" id="search-input" placeholder="Search the textbook..." autocomplete="off">
        <div class="search-results" id="search-results"></div>
      </div>
    </div>
    <button class="topbar-btn" id="font-toggle" aria-label="Change font size" title="Font size">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <text x="3" y="18" font-size="16" font-weight="bold" fill="currentColor" stroke="none">A</text>
        <text x="15" y="18" font-size="10" font-weight="bold" fill="currentColor" stroke="none">A</text>
      </svg>
    </button>
    <button class="topbar-btn" id="theme-toggle" aria-label="Toggle dark mode">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
    </button>
    <a class="topbar-btn" href="../Cardiac_Computational_Modeling.pdf" title="Download PDF" aria-label="Download PDF">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </a>
  </div>
  <div class="progress-bar" id="progress-bar"></div>
</header>

<!-- ─── Sidebar Overlay (mobile) ─── -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- ─── Sidebar ─── -->
<nav class="sidebar" id="sidebar" aria-label="Table of contents">
  <div class="sidebar-header">
    <div class="sidebar-brand">Contents</div>
  </div>
  <div class="sidebar-toc" id="sidebar-toc">
    <!-- Populated by app.js -->
  </div>
</nav>

<!-- ─── Main Content ─── -->
<main class="content" id="main-content">
  <article class="chapter-content" id="chapter-content">
    <!-- Chapter HTML loaded here -->
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <p>Loading textbook...</p>
    </div>
  </article>

  <!-- ─── Bottom Navigation ─── -->
  <nav class="bottom-nav" id="bottom-nav" aria-label="Chapter navigation">
    <a class="nav-prev" id="nav-prev" href="#">
      <span class="nav-direction">← Previous</span>
      <span class="nav-label" id="nav-prev-label"></span>
    </a>
    <a class="nav-next" id="nav-next" href="#">
      <span class="nav-direction">Next →</span>
      <span class="nav-label" id="nav-next-label"></span>
    </a>
  </nav>
</main>

<!-- ─── Right Margin (desktop) ─── -->
<aside class="right-margin" id="right-margin" aria-label="On this page">
  <div class="right-margin-header">On this page</div>
  <ul class="right-margin-toc" id="right-margin-toc"></ul>
</aside>

<script src="app.js"></script>
</body>
</html>
