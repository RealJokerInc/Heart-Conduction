{% extends "base.html" %}

{% block content %}
<div class="page page-upload">
    <div class="upload-card">
        <div class="upload-content fade-in">
            <a href="/" class="back-link">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Back
            </a>

            <h2>Upload Image</h2>
            <p class="subtitle">Drop your tissue design image below</p>

            <div class="dropzone" id="dropzone">
                <div class="dropzone-content">
                    <div class="dropzone-icon">
                        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M16 32L24 24L32 32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M24 24V42" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M40.78 35.37A8 8 0 0038 20H35.28A12.8 12.8 0 1010 28.3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M16 32L24 24L32 32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <p>Drop image here</p>
                    <p class="dropzone-hint">or click to browse</p>
                    <p class="dropzone-formats">.png .jpg .svg</p>
                </div>
                <input type="file" id="file-input" accept=".png,.jpg,.jpeg,.svg" hidden>
            </div>

            <div class="upload-status" id="upload-status"></div>

            <button class="btn btn-primary btn-large btn-block" id="continue-btn" disabled>
                Continue &rarr;
            </button>
        </div>
    </div>
</div>

<script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    const continueBtn = document.getElementById('continue-btn');
    const statusEl = document.getElementById('upload-status');

    let uploadedFile = null;

    // Click to browse
    dropzone.addEventListener('click', () => fileInput.click());

    // Drag events
    dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.classList.add('dragover');
    });

    dropzone.addEventListener('dragleave', () => {
        dropzone.classList.remove('dragover');
    });

    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            handleFile(files[0]);
        }
    });

    // File input change
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            handleFile(e.target.files[0]);
        }
    });

    function handleFile(file) {
        const validTypes = ['image/png', 'image/jpeg', 'image/svg+xml'];
        const ext = file.name.toLowerCase().split('.').pop();

        if (!validTypes.includes(file.type) && !['png', 'jpg', 'jpeg', 'svg'].includes(ext)) {
            statusEl.textContent = 'Invalid file type. Use PNG, JPG, or SVG.';
            statusEl.className = 'upload-status error';
            return;
        }

        // Upload file
        const formData = new FormData();
        formData.append('file', file);

        statusEl.textContent = 'Uploading...';
        statusEl.className = 'upload-status';

        fetch('/api/upload', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                uploadedFile = file;
                statusEl.textContent = `✓ ${file.name}`;
                statusEl.className = 'upload-status success';
                continueBtn.disabled = false;
                dropzone.classList.add('uploaded');
            } else {
                statusEl.textContent = data.error || 'Upload failed';
                statusEl.className = 'upload-status error';
            }
        })
        .catch(err => {
            statusEl.textContent = 'Upload failed: ' + err.message;
            statusEl.className = 'upload-status error';
        });
    }

    // Continue button
    continueBtn.addEventListener('click', () => {
        if (uploadedFile) {
            window.location.href = '/loading';
        }
    });
</script>
{% endblock %}
